<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإدارة | لبنى سلامي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f1f5f9; padding: 20px; transition: 0.4s; }
        .dark body { background: #0f172a; color: #f1f5f9; }
        .admin-card { background: white; border-radius: 2.5rem; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; border: 3px solid white; transition: 0.4s; }
        .dark .admin-card { background: #1e293b; border-color: #334155; color: white; }
        input, textarea, select { border: 3px solid #e2e8f0; border-radius: 1.5rem; padding: 15px; width: 100%; margin-bottom: 12px; font-weight: 900; color: #1e293b; }
        .dark input, .dark textarea, .dark select { background: #0f172a; border-color: #334155; color: white; }
        .btn-main { background: #4f46e5; color: white; padding: 15px; border-radius: 1rem; font-weight: 900; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <header class="flex justify-between items-center mb-10 px-4">
        <button onclick="toggleDark()" class="text-2xl">🌓</button>
        <h1 class="text-2xl font-black text-indigo-700 dark:text-indigo-400">لوحة تحكم المعلمة لبنى 👩‍🏫</h1>
    </header>

    <div class="max-w-2xl mx-auto">
        <div class="admin-card border-r-8 border-green-500">
            <h3 class="font-black text-green-700 mb-4 italic">✨ إضافة محتوى جديد:</h3>
            <select id="p_type">
                <option value="news">📢 إعلان</option>
                <option value="hw">📚 وظيفة</option>
                <option value="event">📸 فعالية</option>
            </select>
            <input id="p_title" placeholder="العنوان">
            <textarea id="p_desc" placeholder="نص الوظيفة"></textarea>
            <input id="p_img" placeholder="رابط الصورة">
            <button onclick="publish()" class="btn-main w-full bg-green-600">نشر الآن ✅</button>
        </div>

        <div class="admin-card border-r-8 border-indigo-600">
            <h3 class="font-black text-indigo-700 mb-4">👥 الطلاب:</h3>
            <div id="studentsList" class="space-y-3"></div>
        </div>

        <div class="admin-card border-r-8 border-orange-500">
            <h3 class="font-black text-orange-700 mb-4">📦 الأرشيف:</h3>
            <div id="contentList" class="space-y-4 text-sm font-bold"></div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';
        
        if(localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        window.toggleDark = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        };

        window.publish = async () => {
            const t = document.getElementById('p_type').value;
            await supabase.from('assignments').insert([{
                title: (t==='news'||t==='event') ? document.getElementById('p_title').value : null,
                description: (t==='hw') ? document.getElementById('p_desc').value : null,
                image_url: (t==='event') ? document.getElementById('p_img').value : null
            }]);
            location.reload();
        };

        async function load() {
            const { data: ads } = await supabase.from('assignments').select('*').order('created_at', {ascending: false});
            document.getElementById('contentList').innerHTML = ads.map(i => `<div class="flex justify-between p-3 bg-slate-50 dark:bg-slate-900 rounded-xl mb-2"><span>${i.title || i.description}</span><button onclick="del('assignments', '${i.id}')" class="text-red-500">حذف</button></div>`).join('');
            const { data: stds } = await supabase.from('students').select('*').order('full_name');
            document.getElementById('studentsList').innerHTML = stds.map(s => `<div class="flex justify-between items-center p-3 bg-indigo-50 dark:bg-slate-900 rounded-xl"><span>${s.full_name}</span><div class="flex gap-2"><button onclick="tStar('${s.id}', ${s.is_star})">${s.is_star?'⭐':'☆'}</button><button onclick="del('students', '${s.id}')">🗑️</button></div></div>`).join('');
        }
        window.del = async (t, id) => { if(confirm("حذف؟")) { await supabase.from(t).delete().eq('id', id); load(); } };
        window.tStar = async (id, cur) => { await supabase.from('students').update({ is_star: !cur }).eq('id', id); load(); };
        load();
    </script>
</body>
</html>
