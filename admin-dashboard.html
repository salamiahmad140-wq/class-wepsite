<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | المعلمة لبنى</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; padding: 20px; }
        .card { background: white; border-radius: 2rem; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        input, textarea, select { border: 2px solid #e2e8f0; border-radius: 1rem; padding: 12px; width: 100%; margin-bottom: 10px; font-weight: bold; }
        .btn { width: 100%; padding: 15px; border-radius: 1rem; font-weight: 900; transition: 0.2s; color: white; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <h1 class="text-2xl font-black text-indigo-600 mb-6 text-center">أهلاً يا أستاذة لبنى 👋</h1>

    <div class="card border-r-8 border-green-500">
        <h3 class="font-black mb-4 text-green-600 italic">✨ نشر جديد:</h3>
        <select id="type">
            <option value="news">📢 إعلان جديد</option>
            <option value="hw">📚 وظيفة بيتية</option>
            <option value="event">📸 فعالية (صورة)</option>
        </select>
        <input id="title" placeholder="العنوان (للإعلان والفعالية)">
        <textarea id="description" placeholder="نص الوظيفة (للوظائف فقط)"></textarea>
        <input id="image_url" placeholder="رابط الصورة (للفعالية فقط)">
        <button onclick="publish()" class="btn bg-green-500 shadow-lg">نشر الآن ✅</button>
    </div>

    <div class="card border-r-8 border-orange-500">
        <h3 class="font-black mb-4 text-orange-600 italic">📦 إدارة المنشورات (تعديل وحذف):</h3>
        <div id="contentList" class="space-y-3"></div>
    </div>

    <div class="card border-r-8 border-indigo-600">
        <h3 class="font-black mb-4 text-indigo-600">👥 إدارة الطلاب والدرجات:</h3>
        <div class="flex gap-2 mb-4">
            <input id="s_name" placeholder="اسم الطالب">
            <input id="s_user" placeholder="يوزر">
            <input id="s_pass" placeholder="باسورد">
            <button onclick="addStudent()" class="bg-indigo-600 text-white px-4 rounded-xl font-black">+</button>
        </div>
        <div id="studentsList" class="space-y-3"></div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        // وظيفة النشر
        window.publish = async () => {
            const t = document.getElementById('type').value;
            const { error } = await supabase.from('assignments').insert([{
                title: (t==='news' || t==='event') ? document.getElementById('title').value : null,
                description: (t==='hw') ? document.getElementById('description').value : null,
                image_url: (t==='event') ? document.getElementById('image_url').value : null
            }]);
            if(!error) { alert("تم النشر!"); location.reload(); }
            else { alert("خطأ! تأكدي من الأعمدة في السوبابيز"); }
        };

        // تحميل البيانات
        async function load() {
            const { data: items } = await supabase.from('assignments').select('*').order('created_at', {ascending: false});
            document.getElementById('contentList').innerHTML = items.map(i => `
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-2xl border">
                    <span class="text-[10px] font-bold truncate w-40">${i.title || i.description}</span>
                    <div class="flex gap-1">
                        <button onclick="editItem('${i.id}', '${i.title || i.description}')" class="bg-blue-500 text-white text-[9px] px-2 py-1 rounded-lg">تعديل</button>
                        <button onclick="deleteItem('assignments', '${i.id}')" class="bg-red-500 text-white text-[9px] px-2 py-1 rounded-lg">حذف</button>
                    </div>
                </div>
            `).join('');

            const { data: students } = await supabase.from('students').select('*').order('full_name');
            document.getElementById('studentsList').innerHTML = students.map(s => `
                <div class="flex justify-between items-center bg-indigo-50 p-4 rounded-2xl border">
                    <span class="text-xs font-black text-indigo-700">${s.full_name}</span>
                    <div class="flex gap-2">
                        <button onclick="addExam('${s.id}')" class="bg-indigo-600 text-white text-[9px] px-2 py-1 rounded-lg">+ علامة</button>
                        <button onclick="toggleStar('${s.id}', ${s.is_star})" class="text-lg ${s.is_star ? '' : 'grayscale'}">⭐</button>
                        <button onclick="deleteItem('students', '${s.id}')" class="text-lg">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        window.deleteItem = async (table, id) => {
            if(confirm("حذف نهائي؟")) {
                await supabase.from(table).delete().eq('id', id);
                load();
            }
        };

        window.editItem = async (id, old) => {
            const n = prompt("تعديل النص:", old);
            if(n) {
                // الكود يعدل العنوان أو الوصف تلقائياً
                await supabase.from('assignments').update({ title: n, description: n }).eq('id', id);
                load();
            }
        };

        window.addStudent = async () => {
            const n = document.getElementById('s_name').value;
            const u = document.getElementById('s_user').value;
            const p = document.getElementById('s_pass').value;
            await supabase.from('students').insert([{ full_name: n, username: u, password: p }]);
            location.reload();
        };

        window.addExam = async (id) => {
            const sub = prompt("المادة:"), sc = prompt("العلامة:");
            if(sub && sc) await supabase.from('exams').insert([{ student_id: id, subject: sub, score: parseInt(sc) }]);
        };

        window.toggleStar = async (id, cur) => { await supabase.from('students').update({ is_star: !cur }).eq('id', id); load(); };

        load();
    </script>
</body>
</html>
