<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة القيادة | المعلمة لبنى سلامي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #080a10; color: white; }
        .card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 2rem; }
        input { background: #111827 !important; border: 1px solid #1f2937 !important; color: white !important; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">
    <header class="max-w-7xl mx-auto flex justify-between items-center mb-12">
        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-l from-blue-400 to-cyan-300">نظام إدارة الصف الأول "ب"</h1>
        <div class="flex items-center gap-4">
            <span class="text-slate-400">أهلاً معلمة لبنى</span>
            <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center font-bold">L</div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-8">
        <aside class="lg:col-span-1 space-y-6">
            <div class="card p-6">
                <h3 class="text-blue-400 font-bold mb-4">➕ إضافة طالب جديد</h3>
                <div class="space-y-3">
                    <input type="text" id="sName" placeholder="الاسم الكامل" class="w-full p-3 rounded-xl text-sm">
                    <input type="text" id="sUser" placeholder="اسم المستخدم" class="w-full p-3 rounded-xl text-sm">
                    <input type="password" id="sPass" placeholder="كلمة المرور" class="w-full p-3 rounded-xl text-sm">
                    <button id="addBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition-all">حفظ الطالب</button>
                </div>
            </div>

            <div class="card p-6 border-r-4 border-yellow-500">
                <h3 class="text-yellow-400 font-bold mb-4">📝 إضافة وظيفة بيتية</h3>
                <textarea id="taskContent" placeholder="اكتبي تفاصيل الوظيفة هنا..." class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm h-24 mb-3"></textarea>
                <button id="taskBtn" class="w-full bg-yellow-600 hover:bg-yellow-500 py-3 rounded-xl font-bold transition-all text-sm">نشر الوظيفة للأهالي</button>
            </div>
        </aside>

        <main class="lg:col-span-3 card p-8 overflow-hidden">
            <h3 class="text-xl font-bold mb-8 flex items-center gap-2">
                <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                قائمة الطلاب الحالية والنتائج
            </h3>
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead>
                        <tr class="text-slate-500 border-b border-white/5">
                            <th class="pb-4">الطالب</th>
                            <th class="pb-4 text-center">علامة الاختبار</th>
                            <th class="pb-4 text-center">نجم الأسبوع</th>
                            <th class="pb-4 text-center">الإجراء</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        // إضافة طالب
        document.getElementById('addBtn').onclick = async () => {
            const name = document.getElementById('sName').value;
            const user = document.getElementById('sUser').value;
            const pass = document.getElementById('sPass').value;
            const { error } = await supabase.from('students').insert([{ full_name: name, username: user, password: pass }]);
            if(error) alert(error.message); else location.reload();
        };

        // إضافة وظيفة
        document.getElementById('taskBtn').onclick = async () => {
            const content = document.getElementById('taskContent').value;
            const { error } = await supabase.from('assignments').insert([{ content: content }]);
            if(error) alert(error.message); else alert("تم نشر الوظيفة بنجاح! ✅");
        };

        // جلب البيانات للجدول
        async function loadData() {
            const { data } = await supabase.from('students').select('*').order('full_name');
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map(s => `
                <tr class="border-b border-white/5 hover:bg-white/5 transition-all">
                    <td class="py-4 font-bold text-slate-200">${s.full_name}</td>
                    <td class="py-4 text-center">
                        <input type="number" id="g-${s.id}" value="${s.grade || 0}" class="w-16 p-1 text-center rounded-lg text-blue-400">
                    </td>
                    <td class="py-4 text-center">
                        <button onclick="window.setStar('${s.id}', ${s.is_star})" class="text-2xl ${s.is_star ? '' : 'grayscale'} hover:grayscale-0 transition">⭐</button>
                    </td>
                    <td class="py-4 text-center">
                        <button onclick="window.saveRow('${s.id}')" class="bg-green-500/10 text-green-400 px-3 py-1 rounded-lg text-xs border border-green-500/20">تحديث</button>
                    </td>
                </tr>
            `).join('');
        }

        window.saveRow = async (id) => {
            const grade = document.getElementById('g-'+id).value;
            const { error } = await supabase.from('students').update({ grade: parseInt(grade) }).eq('id', id);
            if(error) alert(error.message); else alert("تم تحديث علامة الطالب بنجاح!");
        };

        window.setStar = async (id, current) => {
            await supabase.from('students').update({ is_star: !current }).eq('id', id);
            loadData();
        };

        window.onload = loadData;
    </script>
</body>
</html>
