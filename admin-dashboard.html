<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>غرفة قيادة أ. لبنى | إدارة الأساطير</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 p-10 font-['Cairo']">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10 bg-white p-8 rounded-[40px] shadow-xl">
            <div>
                <h1 class="text-5xl font-black text-indigo-900">تحكم المعلمة لبنى 🛡️</h1>
                <p class="text-slate-500 text-xl mt-2">إدارة الصف الأول ب - إمبراطورية النجوم</p>
            </div>
            <button onclick="Admin.add()" class="bg-indigo-600 text-white px-10 py-5 rounded-3xl font-black text-2xl shadow-xl hover:bg-indigo-500">إضافة بطل +</button>
        </header>

        <div class="bg-white rounded-[50px] shadow-2xl overflow-hidden">
            <table class="w-full text-right text-xl">
                <thead class="bg-slate-50 border-b">
                    <tr class="text-slate-500 font-black">
                        <th class="p-8">البطل</th>
                        <th class="p-8 text-center">كود الدخول</th>
                        <th class="p-8 text-center">الرصيد والتقدم</th>
                        <th class="p-8">الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="admin-table"></tbody>
            </table>
        </div>
    </div>

<script>
    const DB_KEY = 'LUBNA_ULTIMATE_V3_2026';
    const Admin = {
        get() { return JSON.parse(localStorage.getItem(DB_KEY)) || []; },
        save(data) { localStorage.setItem(DB_KEY, JSON.stringify(data)); this.render(); },

        render() {
            const db = this.get();
            const table = document.getElementById('admin-table');
            table.innerHTML = db.map(s => `
                <tr class="border-b hover:bg-slate-50">
                    <td class="p-8 flex items-center gap-4">
                        <span class="text-6xl">${s.avatar || '🦁'}</span>
                        <div class="font-black text-2xl">${s.name}</div>
                    </td>
                    <td class="p-8 text-center"><span class="bg-indigo-100 text-indigo-700 px-6 py-2 rounded-xl font-mono font-black">${s.code}</span></td>
                    <td class="p-8 text-center">
                        <div class="text-amber-500 font-black">💰 ${s.coins} | ⭐ ${s.stars}</div>
                        <div class="text-sm text-slate-400">مراحل: ${s.progress.math + s.progress.arabic} / 200</div>
                    </td>
                    <td class="p-8">
                        <button onclick="Admin.gift('${s.code}')" class="bg-amber-100 text-amber-700 px-4 py-2 rounded-xl font-bold ml-2">هدية 💰</button>
                        <button onclick="Admin.del('${s.code}')" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl font-bold">حذف</button>
                    </td>
                </tr>
            `).join('');
        },

        add() {
            const name = prompt("اسم بطل الصف الأول ب الجديد:");
            if(name) {
                const db = this.get();
                const code = "LUB-" + Math.floor(1000 + Math.random()*9000);
                db.push({
                    name, code, avatar: '👤', stars: 0, coins: 0, 
                    inventory: [], equipped: null,
                    progress: { math: 0, arabic: 0 }
                });
                this.save(db);
            }
        },

        gift(code) {
            const db = this.get();
            const idx = db.findIndex(s => s.code === code);
            const amount = prompt("كم ذهبة تريدين إهداء البطل؟", "500");
            if(amount) {
                db[idx].coins += parseInt(amount);
                this.save(db);
            }
        },

        del(code) {
            if(confirm("حذف البطل؟")) {
                const db = this.get().filter(s => s.code !== code);
                this.save(db);
            }
        }
    };
    Admin.render();
</script>
</body>
</html>
