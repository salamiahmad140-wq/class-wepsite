<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة القيادة الإمبراطورية | أ. لبنى</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background: #f1f5f9; }</style>
</head>
<body class="p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <h1 class="text-5xl font-black text-indigo-900 border-r-8 border-indigo-600 pr-6">لوحة تحكم القائدة لبنى 👑</h1>
            <button onclick="Admin.add()" class="bg-indigo-600 text-white px-10 py-5 rounded-3xl text-2xl font-black shadow-2xl hover:bg-indigo-500 transition">إضافة بطل جديد +</button>
        </header>

        <div class="grid grid-cols-3 gap-8 mb-12">
            <div class="bg-white p-10 rounded-[40px] shadow-xl text-center">
                <div class="text-slate-400 font-bold mb-2">إجمالي الأبطال</div>
                <div id="stat-count" class="text-6xl font-black">0</div>
            </div>
            <div class="bg-white p-10 rounded-[40px] shadow-xl text-center border-b-8 border-amber-400">
                <div class="text-slate-400 font-bold mb-2">إجمالي النجوم</div>
                <div id="stat-stars" class="text-6xl font-black text-amber-500">0</div>
            </div>
            <div class="bg-white p-10 rounded-[40px] shadow-xl text-center border-b-8 border-blue-400">
                <div class="text-slate-400 font-bold mb-2">مراحل منجزة</div>
                <div id="stat-lvls" class="text-6xl font-black text-blue-500">0</div>
            </div>
        </div>

        <div class="bg-white rounded-[50px] shadow-2xl overflow-hidden">
            <table class="w-full text-right text-xl">
                <thead class="bg-slate-50 border-b">
                    <tr class="text-slate-500 font-black">
                        <th class="p-8">البطل</th><th class="p-8 text-center">الكود الدائم</th><th class="p-8 text-center">الرصيد</th><th class="p-8">التحكم</th>
                    </tr>
                </thead>
                <tbody id="admin-table"></tbody>
            </table>
        </div>
    </div>

<script>
    const DB_KEY = 'LUBNA_FINAL_SYSTEM_2026';
    const Admin = {
        get() { return JSON.parse(localStorage.getItem(DB_KEY)) || []; },
        save(data) { localStorage.setItem(DB_KEY, JSON.stringify(data)); this.render(); },

        render() {
            const db = this.get();
            const table = document.getElementById('admin-table');
            let stars = 0, lvls = 0;

            table.innerHTML = db.map(s => {
                stars += s.stars; lvls += (s.progress.math + s.progress.arabic);
                return `
                <tr class="border-b hover:bg-slate-50">
                    <td class="p-8 flex items-center gap-4">
                        <span class="text-5xl">${s.avatar}</span>
                        <div class="font-black text-2xl">${s.name}</div>
                    </td>
                    <td class="p-8 text-center"><span class="bg-indigo-100 text-indigo-700 px-6 py-2 rounded-xl font-mono font-black">${s.code}</span></td>
                    <td class="p-8 text-center">
                        <div class="text-amber-500 font-black">💰 ${s.coins}</div>
                        <div class="text-blue-500 font-black">⭐ ${s.stars}</div>
                    </td>
                    <td class="p-8">
                        <button onclick="Admin.edit('${s.code}')" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl font-bold ml-2">تعديل</button>
                        <button onclick="Admin.del('${s.code}')" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl font-bold">حذف</button>
                    </td>
                </tr>
                `;
            }).join('');

            document.getElementById('stat-count').innerText = db.length;
            document.getElementById('stat-stars').innerText = stars;
            document.getElementById('stat-lvls').innerText = lvls;
        },

        add() {
            const name = prompt("اسم البطل الجديد:");
            if(name) {
                const db = this.get();
                const code = "LUB-" + Math.floor(1000 + Math.random()*9000);
                db.push({ name, code, avatar: '🐱', stars: 0, coins: 0, progress: { math: 0, arabic: 0 } });
                this.save(db);
                alert("تم! الكود هو: " + code);
            }
        },

        edit(code) {
            const db = this.get();
            const idx = db.findIndex(s => s.code === code);
            const newStars = prompt("تعديل النجوم:", db[idx].stars);
            if(newStars !== null) {
                db[idx].stars = parseInt(newStars);
                this.save(db);
            }
        },

        del(code) {
            if(confirm("حذف البطل نهائياً؟")) {
                const db = this.get().filter(s => s.code !== code);
                this.save(db);
            }
        }
    };
    Admin.render();
</script>
</body>
</html>
