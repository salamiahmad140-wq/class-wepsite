<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | المعلمة لبنى</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f1f5f9; }
        .admin-card { background: white; border-radius: 2rem; padding: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input, textarea { border: 2px solid #e2e8f0; border-radius: 1rem; padding: 12px; width: 100%; outline-color: #6366f1; margin-bottom: 10px; }
    </style>
</head>
<body class="p-4 pb-24">

    <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm">
        <h1 class="text-xl font-black text-indigo-600">لوحة تحكم الأستاذة لبنى 👩‍🏫</h1>
        <button onclick="location.href='index.html'" class="bg-indigo-600 text-white px-4 py-2 rounded-full text-xs">معاينة</button>
    </header>

    <div class="max-w-4xl mx-auto space-y-6">
        
        <section class="admin-card">
            <h3 class="font-black mb-4 text-green-600 underline">+ إضافة طالب جديد</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                <input id="new_name" placeholder="الاسم الكامل">
                <input id="new_user" placeholder="اسم الدخول">
                <input id="new_pass" placeholder="كلمة السر">
            </div>
            <button onclick="addStudent()" class="w-full bg-green-500 text-white font-black py-3 rounded-xl mt-2 shadow-lg">إضافة البطل 🎉</button>
        </section>

        <section class="admin-card border-r-8 border-indigo-600">
            <h3 class="font-black mb-4 text-indigo-600 italic">📢 نشر محتوى للطلاب</h3>
            <input id="pub_title" placeholder="عنوان الإعلان (يظهر في هام)">
            <textarea id="pub_hw" placeholder="تفاصيل الوظيفة (تظهر في صفحة الوظائف)"></textarea>
            <input id="pub_img" placeholder="رابط صورة للفعاليات (URL)">
            <button onclick="publish()" class="w-full bg-indigo-600 text-white font-black py-3 rounded-xl mt-2">نشر المحتوى ✅</button>
        </section>

        <section class="admin-card">
            <h3 class="font-black mb-6 border-b pb-2 text-slate-400">👥 إدارة الطلاب والاختبارات</h3>
            <div id="studentsAdminList" class="space-y-4"></div>
        </section>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        window.addStudent = async () => {
            const n = document.getElementById('new_name').value;
            const u = document.getElementById('new_user').value;
            const p = document.getElementById('new_pass').value;
            if(n && u && p) {
                await supabase.from('students').insert([{ full_name: n, username: u, password: p }]);
                alert("تمت الإضافة!"); location.reload();
            }
        };

        window.publish = async () => {
            const t = document.getElementById('pub_title').value;
            const d = document.getElementById('pub_hw').value;
            const i = document.getElementById('pub_img').value;
            await supabase.from('assignments').insert([{ title: t || null, description: d || null, image_url: i || null }]);
            alert("تم النشر بنجاح!");
        };

        async function loadAdmin() {
            const { data } = await supabase.from('students').select('*').order('full_name');
            document.getElementById('studentsAdminList').innerHTML = data.map(s => `
                <div class="flex flex-col md:flex-row justify-between items-center p-4 bg-slate-50 rounded-2xl border gap-4">
                    <div class="text-right">
                        <p class="font-black text-sm">${s.full_name}</p>
                        <p class="text-[10px] text-slate-400">العلامة: ${s.grade || 0}</p>
                    </div>
                    <div class="flex gap-2 flex-wrap justify-center">
                        <button onclick="addEx('${s.id}')" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-[10px]">+ علامة اختبار</button>
                        <button onclick="toggleS('${s.id}', ${s.is_star})" class="text-xl ${s.is_star ? '' : 'grayscale'}">⭐</button>
                        <button onclick="delSt('${s.id}')" class="bg-red-100 text-red-500 px-3 py-1 rounded-lg text-[10px]">حذف 🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        window.delSt = async (id) => { if(confirm("حذف الطالب نهائياً؟")) { await supabase.from('students').delete().eq('id', id); loadAdmin(); } };
        window.toggleS = async (id, cur) => { await supabase.from('students').update({ is_star: !cur }).eq('id', id); loadAdmin(); };
        window.addEx = async (id) => {
            const sub = prompt("اسم المادة:");
            const sc = prompt("العلامة:");
            if(sub && sc) {
                await supabase.from('exams').insert([{ student_id: id, subject: sub, score: parseInt(sc) }]);
                await supabase.from('students').update({ grade: parseInt(sc) }).eq('id', id); // تحديث آخر علامة
                alert("تم الحفظ!");
            }
        };

        loadAdmin();
    </script>
</body>
</html>
