<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنصة الشاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Cairo', sans-serif; background: #f1f5f9; } </style>
</head>
<body class="p-6">
    <div class="max-w-5xl mx-auto">
        <div class="bg-white p-8 rounded-3xl shadow-sm mb-6 flex justify-between items-center border border-slate-200">
            <div><h1 class="text-3xl font-black text-indigo-600">لوحة الإدارة الشاملة 👑</h1></div>
            <div class="flex gap-2">
                <button onclick="Admin.export()" class="bg-green-500 text-white px-4 py-2 rounded-xl font-bold">تحميل Excel</button>
                <button onclick="Admin.show()" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold">+ طالب</button>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-right">
                <thead class="bg-slate-50 border-b">
                    <tr>
                        <th class="p-4">الاسم</th> <th class="p-4">الكود</th>
                        <th class="p-4 text-center">النقاط</th> <th class="p-4 text-center">التقدم</th>
                        <th class="p-4 text-center">أدوات</th>
                    </tr>
                </thead>
                <tbody id="t-body"></tbody>
            </table>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm">
            <h2 class="text-2xl font-black mb-4">بطل جديد</h2>
            <input type="text" id="m-name" placeholder="الاسم" class="w-full p-3 mb-3 bg-slate-100 rounded-xl outline-none">
            <input type="text" id="m-code" placeholder="الكود" class="w-full p-3 mb-6 bg-slate-100 rounded-xl outline-none uppercase">
            <button onclick="Admin.save()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold mb-2">حفظ</button>
            <button onclick="Admin.hide()" class="w-full bg-slate-200 py-3 rounded-xl font-bold">إلغاء</button>
        </div>
    </div>

<script>
const DB_KEY = 'LEGENDS_ULTIMATE_DB';
const Admin = {
    get() { return JSON.parse(localStorage.getItem(DB_KEY)) || []; },
    set(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); this.render(); },
    render() {
        const db = this.get();
        document.getElementById('t-body').innerHTML = db.map(u => `
            <tr class="border-b hover:bg-slate-50">
                <td class="p-4 font-bold text-lg">${u.avatar || '👦'} ${u.name}</td>
                <td class="p-4"><span class="bg-slate-100 px-2 py-1 rounded font-mono">${u.code}</span></td>
                <td class="p-4 text-center">⭐${u.stars} | 💰${u.coins}</td>
                <td class="p-4 text-center text-sm text-blue-600 font-bold">حساب:${u.progress.math} | لغتي:${u.progress.arabic}</td>
                <td class="p-4 text-center flex justify-center gap-2">
                    <button onclick="Admin.gift('${u.code}')" class="bg-yellow-100 text-yellow-600 px-3 py-1 rounded-lg">🎁 هدية</button>
                    <button onclick="Admin.del('${u.code}')" class="bg-red-100 text-red-600 px-3 py-1 rounded-lg">🗑️ حذف</button>
                </td>
            </tr>
        `).join('');
    },
    show() { document.getElementById('modal').style.display = 'flex'; },
    hide() { document.getElementById('modal').style.display = 'none'; },
    save() {
        const n = document.getElementById('m-name').value; const c = document.getElementById('m-code').value.toUpperCase();
        if(!n||!c) return; const db = this.get();
        if(db.find(x=>x.code===c)) return alert('الكود مستخدم!');
        db.push({name:n, code:c, stars:0, coins:200, avatar:'👦', progress:{math:0, arabic:0}});
        this.set(db); this.hide();
    },
    gift(c) { const db=this.get(); db.find(x=>x.code===c).coins+=500; this.set(db); alert('تمت الهدية!'); },
    del(c) { if(confirm('حذف؟')) this.set(this.get().filter(x=>x.code!==c)); },
    export() {
        let csv = "الاسم,الكود,النجوم,العملات,تقدم الرياضيات,تقدم لغتي\n";
        this.get().forEach(u => csv += `${u.name},${u.code},${u.stars},${u.coins},${u.progress.math},${u.progress.arabic}\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob(["\ufeff" + csv], {type: 'text/csv;charset=utf-8;'}));
        link.download = "تقرير_الطلاب.csv"; link.click();
    }
};
Admin.render();
</script>
</body>
</html>
