<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Master Control | الأستاذة لبنى</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-900 text-white font-['Cairo'] p-8">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
            <h1 class="text-3xl font-black text-yellow-400">لوحة تحكم الأساطير 👩‍🏫</h1>
            <button onclick="generateNewAccount()" class="bg-green-600 px-6 py-3 rounded-2xl font-black hover:bg-green-500">+ إضافة طالب جديد</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white/5 p-6 rounded-3xl border border-white/10 text-center">
                <p class="opacity-50 text-xs">إجمالي الطلاب</p>
                <h3 class="text-4xl font-black" id="total-students">0</h3>
            </div>
            <div class="bg-white/5 p-6 rounded-3xl border border-white/10 text-center">
                <p class="opacity-50 text-xs">النجوم الموزعة</p>
                <h3 class="text-4xl font-black text-blue-400">1,250</h3>
            </div>
            <div class="bg-white/5 p-6 rounded-3xl border border-white/10 text-center">
                <p class="opacity-50 text-xs">متوسط النقاط</p>
                <h3 class="text-4xl font-black text-yellow-500">85%</h3>
            </div>
        </div>

        <div class="bg-white/5 rounded-[2.5rem] border border-white/10 overflow-hidden">
            <table class="w-full text-right">
                <thead class="bg-white/5">
                    <tr>
                        <th class="p-4">اسم الطالب</th>
                        <th class="p-4">كود الدخول</th>
                        <th class="p-4">النجوم ⭐</th>
                        <th class="p-4">التحكم</th>
                    </tr>
                </thead>
                <tbody id="student-table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const students = [
            { id: 1, name: "أحمد محمد", code: "LUB-552", stars: 12 },
            { id: 2, name: "سارة خالد", code: "LUB-901", stars: 25 }
        ];

        function renderTable() {
            const body = document.getElementById('student-table-body');
            document.getElementById('total-students').innerText = students.length;
            body.innerHTML = students.map(s => `
                <tr class="border-b border-white/5">
                    <td class="p-4 font-bold">${s.name}</td>
                    <td class="p-4"><span class="bg-white/10 px-3 py-1 rounded-lg text-yellow-400 font-mono">${s.code}</span></td>
                    <td class="p-4">${s.stars}</td>
                    <td class="p-4 flex gap-2">
                        <button onclick="addStar(${s.id})" class="bg-blue-600 p-2 rounded-lg text-xs">⭐ +1</button>
                        <button onclick="deleteStudent(${s.id})" class="bg-red-500/20 text-red-500 p-2 rounded-lg text-xs">حذف</button>
                    </td>
                </tr>
            `).join('');
        }

        function generateNewAccount() {
            const name = prompt("أدخلي اسم الطالب الجديد:");
            if(name) {
                const newCode = "LUB-" + Math.floor(100 + Math.random() * 900);
                students.push({ id: Date.now(), name: name, code: newCode, stars: 0 });
                renderTable();
                alert(`تم إنشاء الحساب! كود الطالب هو: ${newCode}`);
            }
        }

        function addStar(id) {
            const s = students.find(x => x.id === id);
            if(s) s.stars++;
            renderTable();
        }

        renderTable();
    </script>
</body>
</html>
