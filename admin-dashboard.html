<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنصة | لبنى سلامي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; }
        .card { background: white; border-radius: 2rem; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, textarea, select { border: 2px solid #e2e8f0; border-radius: 1rem; padding: 12px; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body class="p-4 pb-20">

    <header class="bg-white p-6 rounded-3xl shadow-sm mb-6 flex justify-between items-center">
        <h1 class="text-xl font-black text-indigo-600">لوحة تحكم المعلمة لبنى 👩‍🏫</h1>
        <button onclick="location.href='index.html'" class="bg-slate-100 px-4 py-2 rounded-xl text-xs font-bold">عرض الموقع 🏠</button>
    </header>

    <section class="card border-r-8 border-indigo-600">
        <h3 class="font-black mb-3 text-indigo-600">✨ نشر جديد (إعلان / وظيفة / فعالية)</h3>
        <select id="type">
            <option value="news">📢 إعلان هام (يظهر في الرئيسية)</option>
            <option value="hw">📚 وظيفة بيتية (يظهر في الوظائف)</option>
            <option value="event">📸 فعالية/صورة (يظهر في الفعاليات)</option>
        </select>
        <input id="title" placeholder="عنوان الإعلان أو الفعالية">
        <textarea id="desc" placeholder="نص الوظيفة البيتية"></textarea>
        <input id="img" placeholder="رابط الصورة (URL) للفعاليات فقط">
        <button onclick="publish()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg">نشر الآن ✅</button>
    </section>

    <section class="card border-r-8 border-orange-500">
        <h3 class="font-black mb-4 text-orange-600 italic">📦 إدارة المنشورات السابقة (تعديل وحذف)</h3>
        <div id="contentList" class="space-y-3"></div>
    </section>

    <section class="card border-r-8 border-green-500">
        <h3 class="font-black mb-4 text-green-600">👥 إدارة أبطال الصف الأول</h3>
        <div class="flex gap-2 mb-4">
            <input id="s_name" placeholder="اسم الطالب">
            <input id="s_user" placeholder="اليوزر">
            <input id="s_pass" placeholder="الباسورد">
            <button onclick="addStudent()" class="bg-green-500 text-white px-4 rounded-xl font-bold">+</button>
        </div>
        <div id="studentsList" class="space-y-4"></div>
    </section>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        window.publish = async () => {
            const t = document.getElementById('type').value;
            const title = document.getElementById('title').value;
            const desc = document.getElementById('desc').value;
            const img = document.getElementById('img').value;
            
            await supabase.from('assignments').insert([{
                title: (t==='news' || t==='event') ? title : null,
                description: t==='hw' ? desc : null,
                image_url: t==='event' ? img : null
            }]);
            alert("تم النشر!"); location.reload();
        };

        async function loadData() {
            // تحميل المنشورات للإدارة
            const { data: items } = await supabase.from('assignments').select('*').order('created_at', {ascending:false});
            document.getElementById('contentList').innerHTML = items.map(i => `
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-2xl border">
                    <span class="text-[10px] font-bold truncate w-40">${i.title || i.description}</span>
                    <div class="flex gap-1">
                        <button onclick="editItem('${i.id}', '${i.title || i.description}')" class="bg-blue-500 text-white text-[9px] px-2 py-1 rounded-lg">تعديل</button>
                        <button onclick="deleteItem('assignments', '${i.id}')" class="bg-red-500 text-white text-[9px] px-2 py-1 rounded-lg">حذف</button>
                    </div>
                </div>
            `).join('');

            // تحميل الطلاب للإدارة
            const { data: students } = await supabase.from('students').select('*').order('full_name');
            document.getElementById('studentsList').innerHTML = students.map(s => `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border">
                    <span class="text-xs font-black">${s.full_name}</span>
                    <div class="flex gap-1">
                        <button onclick="addEx('${s.id}')" class="bg-purple-600 text-white text-[9px] px-2 py-1 rounded-lg">+ علامة</button>
                        <button onclick="toggleStar('${s.id}', ${s.is_star})" class="${s.is_star ? '' : 'grayscale'} text-lg">⭐</button>
                        <button onclick="deleteItem('students', '${s.id}')" class="text-lg">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        window.deleteItem = async (table, id) => { if(confirm("حذف نهائي؟")) { await supabase.from(table).delete().eq('id', id); location.reload(); } };
        
        window.editItem = async (id, old) => {
            const n = prompt("تعديل المحتوى:", old);
            if(n) { await supabase.from('assignments').update({ title: n, description: n }).eq('id', id); location.reload(); }
        };

        window.addStudent = async () => {
            const n = document.getElementById('s_name').value;
            const u = document.getElementById('s_user').value;
            const p = document.getElementById('s_pass').value;
            await supabase.from('students').insert([{ full_name: n, username: u, password: p }]);
            location.reload();
        };

        window.addEx = async (id) => {
            const sub = prompt("المادة:");
            const sc = prompt("العلامة:");
            if(sub && sc) await supabase.from('exams').insert([{ student_id: id, subject: sub, score: parseInt(sc) }]);
        };

        window.toggleStar = async (id, cur) => { await supabase.from('students').update({ is_star: !cur }).eq('id', id); loadData(); };

        loadData();
    </script>
</body>
</html>
