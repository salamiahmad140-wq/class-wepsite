<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحكم إمبراطورية لبنى | الصف الأول ب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 p-10 font-['Cairo']">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-5xl font-black text-indigo-950">قائمة أساطير الصف الأول ب 👑</h1>
                <p class="text-slate-500 text-xl">إدارة المهمات، النجوم، والطلاب</p>
            </div>
            <button onclick="Admin.add()" class="bg-indigo-600 text-white px-10 py-5 rounded-[30px] font-black text-2xl shadow-xl">إضافة بطل +</button>
        </div>

        <div class="bg-white rounded-[40px] shadow-2xl overflow-hidden border">
            <table class="w-full text-right">
                <thead class="bg-slate-50 border-b">
                    <tr class="text-slate-500 font-bold">
                        <th class="p-8">البطل</th>
                        <th class="p-8 text-center">كود الدخول</th>
                        <th class="p-8 text-center">التقدم</th>
                        <th class="p-8 text-center">إدارة</th>
                    </tr>
                </thead>
                <tbody id="admin-table"></tbody>
            </table>
        </div>
    </div>

<script>
    const DB_KEY = 'LUBNA_V4_ULTIMATE';
    const Admin = {
        get() { return JSON.parse(localStorage.getItem(DB_KEY)) || []; },
        save(data) { localStorage.setItem(DB_KEY, JSON.stringify(data)); this.render(); },

        render() {
            const db = this.get();
            document.getElementById('admin-table').innerHTML = db.map(s => `
                <tr class="border-b hover:bg-slate-50 transition">
                    <td class="p-8 font-black text-2xl">${s.name}</td>
                    <td class="p-8 text-center"><span class="bg-indigo-100 text-indigo-700 px-6 py-2 rounded-xl font-mono font-black">${s.code}</span></td>
                    <td class="p-8 text-center">
                        <div class="text-amber-500 font-black">⭐ ${s.stars} | 💰 ${s.coins}</div>
                        <div class="text-sm text-slate-400">مراحل مفتوحة: ${s.progress.math + s.progress.arabic}</div>
                    </td>
                    <td class="p-8 text-center">
                        <button onclick="Admin.del('${s.code}')" class="text-red-500 font-bold">حذف 🗑️</button>
                    </td>
                </tr>
            `).join('');
        },

        add() {
            const name = prompt("اسم الطالب الجديد:");
            if(name) {
                const db = this.get();
                const code = "B-" + Math.floor(1000 + Math.random()*9000);
                db.push({
                    name, code, stars: 0, coins: 0,
                    progress: { math: 0, arabic: 0 }
                });
                this.save(db);
                alert("تم! الكود هو: " + code);
            }
        },

        del(code) {
            if(confirm("حذف الطالب؟")) {
                this.save(this.get().filter(s => s.code !== code));
            }
        }
    };
    Admin.render();
</script>
</body>
</html>
