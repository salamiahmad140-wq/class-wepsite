<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>غرفة قيادة الأساطير | أستاذة لبنى</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 p-10 font-['Cairo']">

    <div class="max-w-5xl mx-auto">
        <header class="bg-indigo-600 rounded-[3rem] p-10 text-white shadow-2xl flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-black">مركز إدارة الطلاب 👑</h1>
                <p class="opacity-80">أهلاً بكِ أستاذة لبنى. اصنعي الأكواد ووزعي النجوم!</p>
            </div>
            <button onclick="Admin.add()" class="bg-white text-indigo-600 px-10 py-5 rounded-2xl font-black shadow-xl hover:scale-105 transition">
                + إضافة طالب جديد
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12 text-center">
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-8 border-blue-500">
                <p class="text-slate-400">عدد الأساطير</p>
                <h3 id="stat-count" class="text-5xl font-black">0</h3>
            </div>
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-8 border-yellow-500">
                <p class="text-slate-400">إجمالي النجوم</p>
                <h3 id="stat-stars" class="text-5xl font-black">0</h3>
            </div>
            <button onclick="Admin.reset()" class="bg-red-100 text-red-600 p-8 rounded-[2rem] font-black border-b-8 border-red-500">
                تصفير النظام ⚠️
            </button>
        </div>

        <div class="bg-white rounded-[3rem] shadow-xl overflow-hidden">
            <table class="w-full text-right">
                <thead class="bg-slate-100">
                    <tr>
                        <th class="p-6">البطل</th>
                        <th class="p-6">كود الدخول</th>
                        <th class="p-6">النجوم ⭐</th>
                        <th class="p-6">التحكم</th>
                    </tr>
                </thead>
                <tbody id="student-list">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const Admin = {
            students: JSON.parse(localStorage.getItem('lubna_students')) || [],

            render() {
                const list = document.getElementById('student-list');
                const sCount = document.getElementById('stat-count');
                const sStars = document.getElementById('stat-stars');
                
                sCount.innerText = this.students.length;
                sStars.innerText = this.students.reduce((a, b) => a + b.stars, 0);

                list.innerHTML = this.students.map((s, i) => `
                    <tr class="border-b hover:bg-slate-50 transition">
                        <td class="p-6 font-black text-xl">${s.name}</td>
                        <td class="p-6"><span class="bg-indigo-100 text-indigo-600 px-4 py-2 rounded-xl font-mono font-bold">${s.code}</span></td>
                        <td class="p-6 font-black text-blue-600 text-2xl">${s.stars}</td>
                        <td class="p-6 flex gap-2">
                            <button onclick="Admin.gift(${i})" class="bg-yellow-400 p-3 rounded-xl">🎁 هدية</button>
                            <button onclick="Admin.delete(${i})" class="bg-red-50 text-red-500 p-3 rounded-xl">حذف</button>
                        </td>
                    </tr>
                `).join('');
            },

            add() {
                const name = prompt("اسم الطالب:");
                if(name) {
                    const code = "LUB-" + Math.floor(100 + Math.random() * 900);
                    this.students.push({ name, code, stars: 0, coins: 0, avatar: '🐱' });
                    this.save();
                    alert(`تم! كود الطالب ${name} هو: ${code}`);
                }
            },

            gift(i) {
                this.students[i].stars += 10;
                this.save();
            },

            delete(i) {
                if(confirm("هل تريدين حذف هذا الطالب؟")) {
                    this.students.splice(i, 1);
                    this.save();
                }
            },

            reset() {
                if(confirm("سيتم مسح كل البيانات! هل أنتِ متأكدة؟")) {
                    this.students = [];
                    this.save();
                }
            },

            save() {
                localStorage.setItem('lubna_students', JSON.stringify(this.students));
                this.render();
            }
        };

        Admin.render();
    </script>
</body>
</html>
