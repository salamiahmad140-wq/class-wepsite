<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنصة | لبنى سلامي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; color: #1e293b; }
        .admin-card { background: white; border-radius: 2.5rem; border: 1px solid #e2e8f0; padding: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        input, textarea, select { width: 100%; padding: 1.2rem; border-radius: 1.5rem; border: 2px solid #f1f5f9; background: #f8fafc; font-weight: bold; outline: none; transition: 0.3s; margin-bottom: 1rem; }
        input:focus { border-color: #6366f1; background: white; }
        .btn-primary { background: #6366f1; color: white; padding: 1.2rem; border-radius: 1.5rem; font-weight: 900; width: 100%; shadow: 0 10px 15px rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body class="p-6 md:p-12">
    <header class="max-w-6xl mx-auto flex justify-between items-center mb-12">
        <h1 class="text-3xl font-black text-slate-800 tracking-tighter">مركز التحكم <span class="text-indigo-600">بالمنصة</span></h1>
        <div class="bg-indigo-600 text-white p-4 px-8 rounded-3xl font-black shadow-xl">المعلمة لبنى سلامي</div>
    </header>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="admin-card lg:col-span-2">
            <h2 class="text-xl font-black mb-6 text-indigo-600">📢 إضافة محتوى جديد (فيديو/صور/مهام)</h2>
            <div class="grid grid-cols-2 gap-4">
                <select id="type">
                    <option value="news">إعلان رسمي</option>
                    <option value="hw">وظيفة جديدة</option>
                    <option value="video">فعالية (فيديو)</option>
                    <option value="photo">فعالية (صور)</option>
                </select>
                <input id="title" placeholder="عنوان الفعالية أو الإعلان">
            </div>
            <textarea id="desc" placeholder="اكتبي تفاصيل الوظيفة أو الإعلان هنا..." rows="4"></textarea>
            <input id="url" placeholder="رابط الصورة أو رابط الفيديو (MP4/YouTube)">
            <p class="text-[10px] text-slate-400 mb-4">* لرفع الفيديو: ضعي رابط الفيديو المباشر أو رابط من الدرايف/يوتيوب.</p>
            <button onclick="publish()" class="btn-primary">نشر الآن على الموقع ✅</button>
        </div>

        <div class="admin-card">
            <h2 class="text-xl font-black mb-6 text-slate-700">👤 إضافة طالب جديد</h2>
            <input id="sName" placeholder="الاسم الكامل">
            <input id="sUser" placeholder="اسم المستخدم">
            <input id="sPass" placeholder="كلمة المرور">
            <button onclick="addStudent()" class="btn-primary bg-slate-800">حفظ الطالب +</button>
        </div>

        <div class="admin-card lg:col-span-3">
            <h2 class="text-xl font-black mb-8 border-b pb-4">إدارة طلاب صف أول "ب"</h2>
            <div id="studentGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';
        
        window.publish = async () => {
            const { error } = await supabase.from('assignments').insert([{
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                image_url: document.getElementById('url').value
            }]);
            if(!error) { alert("تم النشر بنجاح!"); location.reload(); }
        };

        window.addStudent = async () => {
            await supabase.from('students').insert([{
                full_name: document.getElementById('sName').value,
                username: document.getElementById('sUser').value,
                password: document.getElementById('sPass').value
            }]);
            location.reload();
        };

        async function load() {
            const { data } = await supabase.from('students').select('*').order('full_name');
            document.getElementById('studentGrid').innerHTML = data.map(s => `
                <div class="border-2 border-f1f5f9 p-6 rounded-[2rem] text-center hover:border-indigo-200 transition-all">
                    <p class="font-black mb-4">${s.full_name}</p>
                    <div class="flex justify-center gap-3">
                        <button onclick="toggleStar('${s.id}', ${s.is_star})" class="text-2xl">${s.is_star?'⭐':'☆'}</button>
                        <button onclick="deleteS('${s.id}')" class="text-red-400">🗑️</button>
                    </div>
                </div>
            `).join('');
        }
        window.toggleStar = async (id, cur) => { await supabase.from('students').update({is_star:!cur}).eq('id',id); load(); };
        window.deleteS = async (id) => { if(confirm("حذف الطالب نهائياً؟")) { await supabase.from('students').delete().eq('id',id); load(); } };
        load();
    </script>
</body>
</html>
