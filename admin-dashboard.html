<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحكم الأستاذة لبنى الملكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 p-10 font-sans text-right">
    <div class="max-w-4xl mx-auto bg-white p-10 rounded-[60px] shadow-2xl border-[10px] border-green-100">
        <h1 class="text-5xl font-black text-green-600 mb-8 text-center">بوابة إدارة الصف الأول ب 👑</h1>
        <button onclick="Admin.add()" class="w-full py-6 bg-blue-500 text-white rounded-full font-black text-3xl mb-10 shadow-xl">إضافة بطل جديد +</button>
        <div id="admin-list" class="space-y-4"></div>
    </div>
<script>
    const DB_KEY = 'LUBNA_ULTIMATE_SAFE_V3';
    const Admin = {
        get() { return JSON.parse(localStorage.getItem(DB_KEY)) || []; },
        render() {
            const db = this.get();
            document.getElementById('admin-list').innerHTML = db.map(s => `
                <div class="p-6 bg-white border-4 border-green-50 rounded-[35px] flex justify-between items-center shadow-sm">
                    <div>
                        <div class="text-3xl font-black text-indigo-900">${s.name}</div>
                        <div class="text-blue-500 font-bold text-2xl">الكود: ${s.code}</div>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="Admin.gift('${s.code}')" class="bg-amber-400 text-white px-8 py-3 rounded-2xl font-bold">هدية 💰</button>
                        <button onclick="Admin.del('${s.code}')" class="text-red-400 font-bold">حذف 🗑️</button>
                    </div>
                </div>
            `).join('');
        },
        add() {
            const name = prompt("اسم بطل الصف الأول ب:");
            if(name) {
                const db = this.get();
                const code = "LUBNA-" + Math.floor(1000 + Math.random()*9000);
                db.push({name, code, stars:0, coins:200, inventory:[], tag:'', avatar:'🦁', doneLevels:{math:[], arabic:[]}});
                localStorage.setItem(DB_KEY, JSON.stringify(db));
                this.render();
                alert("تم! كود البطل هو: " + code);
            }
        },
        gift(code) {
            const db = this.get();
            const idx = db.findIndex(s => s.code === code);
            db[idx].coins += 500;
            localStorage.setItem(DB_KEY, JSON.stringify(db));
            this.render();
            alert("تم إرسال 500 كوينز هدية!");
        },
        del(code) { if(confirm("حذف الطالب؟")) { 
            const db = this.get().filter(s => s.code !== code);
            localStorage.setItem(DB_KEY, JSON.stringify(db));
            this.render();
        }}
    };
    Admin.render();
</script>
</body>
</html>
