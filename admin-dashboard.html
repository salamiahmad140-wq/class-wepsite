<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحكم الأستاذة لبنى الفرفوشة</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-50 p-10 font-sans">
    <div class="max-w-4xl mx-auto bg-white p-10 rounded-[70px] shadow-2xl border-[15px] border-pink-100">
        <h1 class="text-6xl font-black text-pink-500 mb-10 text-center">بوابة التحكم الملكية 👑</h1>
        <button onclick="Admin.add()" class="w-full py-6 bg-blue-500 text-white rounded-[40px] font-black text-4xl mb-12 shadow-2xl">إضافة بطل جديد +</button>
        <div id="admin-list" class="space-y-6"></div>
    </div>
<script>
    const DB_KEY = 'LUBNA_FUN_V4';
    const Admin = {
        get() { return JSON.parse(localStorage.getItem(DB_KEY)) || []; },
        render() {
            const db = this.get();
            document.getElementById('admin-list').innerHTML = db.map(s => `
                <div class="p-8 bg-white border-4 border-pink-50 rounded-[50px] flex justify-between items-center shadow-lg">
                    <div>
                        <div class="text-4xl font-black text-indigo-900">${s.name}</div>
                        <div class="text-blue-500 font-bold text-3xl">الكود: ${s.code}</div>
                    </div>
                    <div class="flex gap-6">
                        <button onclick="Admin.gift('${s.code}')" class="bg-yellow-400 text-white px-10 py-4 rounded-3xl font-black text-2xl">هدية 💰</button>
                        <button onclick="Admin.del('${s.code}')" class="text-red-400 font-black text-2xl">حذف</button>
                    </div>
                </div>
            `).join('');
        },
        add() {
            const name = prompt("اسم بطل الصف الأول ب:");
            if(name) {
                const db = this.get();
                const code = "FUN-" + Math.floor(1000 + Math.random()*9000);
                db.push({name, code, stars:0, coins:500, inventory:[], tag:'', avatar:'🦁', done:{math:[], arabic:[]}});
                localStorage.setItem(DB_KEY, JSON.stringify(db));
                this.render();
                alert("تم! الكود هو: " + code);
            }
        },
        gift(code) {
            const db = this.get(); const idx = db.findIndex(s => s.code === code);
            db[idx].coins += 1000; localStorage.setItem(DB_KEY, JSON.stringify(db));
            this.render();
        },
        del(code) { if(confirm("حذف؟")) { 
            const db = this.get().filter(s => s.code !== code);
            localStorage.setItem(DB_KEY, JSON.stringify(db)); this.render();
        }}
    };
    Admin.render();
</script>
</body>
</html>
