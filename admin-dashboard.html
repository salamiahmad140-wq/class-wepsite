<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنصة | لبنى سلامي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f1f5f9; padding: 20px; }
        .admin-card { background: white; border-radius: 2.5rem; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; border: 3px solid white; }
        input, textarea, select { border: 3px solid #e2e8f0; border-radius: 1.5rem; padding: 15px; width: 100%; margin-bottom: 12px; font-weight: 900; color: #1e293b; font-size: 1rem; }
        input:focus { border-color: #4f46e5; outline: none; background: #f8fafc; }
        .btn-main { background: #4f46e5; color: white; padding: 20px; border-radius: 1.5rem; font-weight: 900; width: 100%; font-size: 1.2rem; transition: 0.2s; shadow: 0 10px 20px rgba(79, 70, 229, 0.3); }
        .btn-main:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <header class="text-center mb-10">
        <h1 class="text-3xl font-black text-indigo-700 underline decoration-wavy decoration-orange-400">مركز إدارة النجوم 👩‍🏫</h1>
        <button onclick="location.href='index.html'" class="mt-4 text-indigo-500 font-black border-2 border-indigo-500 px-6 py-2 rounded-full hover:bg-indigo-50 transition">معاينة الموقع 🏠</button>
    </header>

    <div class="max-w-3xl mx-auto">
        <div class="admin-card border-r-8 border-green-500">
            <h3 class="font-black text-xl text-green-700 mb-6 flex items-center gap-2">✨ ماذا تريدين أن تنشري اليوم؟</h3>
            <select id="p_type" class="bg-green-50">
                <option value="news">📢 إعلان جديد (يظهر بالرئيسية)</option>
                <option value="hw">📚 وظيفة بيتية (يظهر بالوظائف)</option>
                <option value="event">📸 فعالية أو صورة (يظهر بالفعاليات)</option>
            </select>
            <input id="p_title" placeholder="العنوان (للإعلان أو الفعالية)">
            <textarea id="p_desc" placeholder="اكتبي نص الوظيفة هنا (للوظائف فقط)" rows="3"></textarea>
            <input id="p_img" placeholder="رابط الصورة (URL) للفعاليات فقط">
            <button onclick="publish()" class="btn-main bg-green-600 shadow-green-200">نشر الآن على المنصة 🚀</button>
        </div>

        <div class="admin-card border-r-8 border-orange-500">
            <h3 class="font-black text-xl text-orange-700 mb-6">📦 التحكم بالمنشورات:</h3>
            <div id="contentList" class="space-y-4"></div>
        </div>

        <div class="admin-card border-r-8 border-indigo-600">
            <h3 class="font-black text-xl text-indigo-700 mb-6 italic">👥 إدارة أبطال الصف:</h3>
            <div class="bg-slate-50 p-6 rounded-[2rem] border-2 border-indigo-100 mb-6">
                <input id="s_name" placeholder="الاسم الثلاثي للطالب">
                <div class="grid grid-cols-2 gap-4">
                    <input id="s_user" placeholder="اسم المستخدم">
                    <input id="s_pass" placeholder="كلمة السر">
                </div>
                <button onclick="addStudent()" class="btn-main text-sm py-3 mt-2">إضافة طالب جديد +</button>
            </div>
            <div id="studentsList" class="space-y-3"></div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        window.publish = async () => {
            const t = document.getElementById('p_type').value;
            const { error } = await supabase.from('assignments').insert([{
                title: (t==='news'||t==='event') ? document.getElementById('p_title').value : null,
                description: (t==='hw') ? document.getElementById('p_desc').value : null,
                image_url: (t==='event') ? document.getElementById('p_img').value : null
            }]);
            if(!error) { alert("تم النشر بنجاح! 🎉"); location.reload(); }
            else alert("خطأ! تأكدي من السياسات (Disable RLS)");
        };

        async function load() {
            const { data: ads } = await supabase.from('assignments').select('*').order('created_at', {ascending: false});
            document.getElementById('contentList').innerHTML = ads.map(i => `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border-2 border-slate-200">
                    <span class="font-black text-slate-700 text-sm truncate w-40">${i.title || i.description}</span>
                    <button onclick="del('assignments', '${i.id}')" class="bg-red-100 text-red-600 px-4 py-2 rounded-xl font-black text-xs btn-click">حذف 🗑️</button>
                </div>
            `).join('');

            const { data: stds } = await supabase.from('students').select('*').order('full_name');
            document.getElementById('studentsList').innerHTML = stds.map(s => `
                <div class="flex justify-between items-center bg-indigo-50 p-4 rounded-2xl border-2 border-indigo-100">
                    <span class="font-black text-indigo-900 text-sm">${s.full_name}</span>
                    <div class="flex gap-2 items-center">
                        <button onclick="addEx('${s.id}')" class="bg-indigo-600 text-white px-3 py-2 rounded-xl text-[10px] font-black">+ علامة</button>
                        <button onclick="tStar('${s.id}', ${s.is_star})" class="text-2xl ${s.is_star?'':'grayscale'} btn-click">⭐</button>
                        <button onclick="del('students', '${s.id}')" class="text-xl">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        window.del = async (t, id) => { if(confirm("حذف نهائي؟")) { await supabase.from(t).delete().eq('id', id); load(); } };
        window.addStudent = async () => {
            const n = document.getElementById('s_name').value, u = document.getElementById('s_user').value, p = document.getElementById('s_pass').value;
            if(n && u && p) { await supabase.from('students').insert([{ full_name: n, username: u, password: p }]); location.reload(); }
        };
        window.addEx = async (id) => {
            const m = prompt("اسم المادة:"), s = prompt("العلامة:");
            if(m && s) await supabase.from('exams').insert([{ student_id: id, subject: m, score: parseInt(s) }]);
        };
        window.tStar = async (id, cur) => { await supabase.from('students').update({ is_star: !cur }).eq('id', id); load(); };

        load();
    </script>
</body>
</html>
