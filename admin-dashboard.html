<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المعلمة لبنى</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding-bottom: 50px; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .shimmer-text {
            background: linear-gradient(90deg, #818cf8, #f472b6, #fbbf24, #818cf8);
            background-size: 200% auto; -webkit-background-clip: text; color: transparent;
            animation: shimmer 5s linear infinite;
        }
        @keyframes shimmer { to { background-position: 200% center; } }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        input, textarea, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
    </style>
</head>
<body>

    <header class="p-6 glass sticky top-0 z-50 flex justify-between items-center border-b border-indigo-500/30">
        <div>
            <h1 class="text-xl font-900 shimmer-text font-black">لوحة التحكم الذكية</h1>
            <p class="text-[10px] opacity-50 font-bold uppercase tracking-widest">المعلمة المبدعة: لبنى</p>
        </div>
        <div class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center shadow-lg">👑</div>
    </header>

    <main class="p-5 max-w-4xl mx-auto space-y-8">
        
        <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
            <button onclick="showTab('newsTab')" class="tab-btn bg-indigo-600 px-6 py-2 rounded-xl font-bold text-sm whitespace-nowrap">إعلان جديد</button>
            <button onclick="showTab('hwTab')" class="tab-btn bg-white/5 px-6 py-2 rounded-xl font-bold text-sm whitespace-nowrap">إضافة وظيفة</button>
            <button onclick="showTab('eventTab')" class="tab-btn bg-white/5 px-6 py-2 rounded-xl font-bold text-sm whitespace-nowrap">رفع فعالية</button>
            <button onclick="showTab('starsTab')" class="tab-btn bg-white/5 px-6 py-2 rounded-xl font-bold text-sm whitespace-nowrap">تحديث النجوم</button>
        </div>

        <section id="newsTab" class="tab-content active space-y-4">
            <h2 class="text-2xl font-black">📢 نشر خبر هام</h2>
            <div class="glass p-6 rounded-3xl space-y-4">
                <input type="text" id="newsTitle" placeholder="اكتبي عنوان الخبر هنا..." class="w-full p-4 rounded-2xl outline-none font-bold">
                <button onclick="postData('news')" class="w-full bg-indigo-600 p-4 rounded-2xl font-black shadow-xl">نشر الخبر الآن ✅</button>
            </div>
        </section>

        <section id="hwTab" class="tab-content space-y-4">
            <h2 class="text-2xl font-black">📚 توزيع المهام والوظائف</h2>
            <div class="glass p-6 rounded-3xl space-y-4">
                <textarea id="hwDesc" rows="4" placeholder="اكتبي تفاصيل الوظيفة أو المهمة..." class="w-full p-4 rounded-2xl outline-none font-bold"></textarea>
                <button onclick="postData('hw')" class="w-full bg-purple-600 p-4 rounded-2xl font-black shadow-xl">تحديث ركن الوظائف ✅</button>
            </div>
        </section>

        <section id="eventTab" class="tab-content space-y-4">
            <h2 class="text-2xl font-black">📸 توثيق الفعاليات</h2>
            <div class="glass p-6 rounded-3xl space-y-4">
                <input type="text" id="eventTitle" placeholder="عنوان الفعالية (مثال: رحلة الطبيعة)" class="w-full p-4 rounded-2xl outline-none font-bold">
                <input type="text" id="eventUrl" placeholder="رابط الصورة أو الفيديو..." class="w-full p-4 rounded-2xl outline-none font-bold">
                <button onclick="postData('event')" class="w-full bg-pink-600 p-4 rounded-2xl font-black shadow-xl">إضافة للمعرض ✅</button>
            </div>
        </section>

        <section id="starsTab" class="tab-content space-y-4">
            <h2 class="text-2xl font-black">💎 إدارة نجوم الصف</h2>
            <div class="glass p-6 rounded-3xl space-y-6">
                <select id="studentSelect" class="w-full p-4 rounded-2xl font-bold outline-none"></select>
                <div class="flex gap-4">
                    <button onclick="updateStatus('is_star', true)" class="flex-1 bg-yellow-500 text-black font-black p-4 rounded-2xl">تتويج كنجم 💎</button>
                    <button onclick="updateStatus('is_star', false)" class="flex-1 bg-white/10 font-black p-4 rounded-2xl">إزالة النجمة</button>
                </div>
                <hr class="opacity-10">
                <input type="number" id="examScore" placeholder="رصد علامة جديدة..." class="w-full p-4 rounded-2xl outline-none font-bold">
                <input type="text" id="examSubject" placeholder="الموضوع (عربي، حساب...)" class="w-full p-4 rounded-2xl outline-none font-bold">
                <button onclick="postScore()" class="w-full bg-green-600 p-4 rounded-2xl font-black shadow-xl">حفظ العلامة 📊</button>
            </div>
        </section>

    </main>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        // تبديل التبويبات
        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.replace('bg-indigo-600', 'bg-white/5'));
            event.target.classList.replace('bg-white/5', 'bg-indigo-600');
        };

        // تحميل قائمة الطلاب
        async function loadStudents() {
            const { data } = await supabase.from('students').select('*').order('full_name');
            document.getElementById('studentSelect').innerHTML = data.map(s => `<option value="${s.id}">${s.full_name}</option>`).join('');
        }
        loadStudents();

        // وظائف النشر العامة
        window.postData = async (type) => {
            let payload = {};
            if(type === 'news') payload = { title: document.getElementById('newsTitle').value };
            if(type === 'hw') payload = { description: document.getElementById('hwDesc').value };
            if(type === 'event') payload = { title: document.getElementById('eventTitle').value, image_url: document.getElementById('eventUrl').value };

            const { error } = await supabase.from('assignments').insert([payload]);
            if(!error) { alert("تم النشر بنجاح يا أستاذة لبنى! ✨"); location.reload(); }
        };

        // تحديث حالة الطالب (نجم أم لا)
        window.updateStatus = async (field, value) => {
            const id = document.getElementById('studentSelect').value;
            const { error } = await supabase.from('students').update({ [field]: value }).eq('id', id);
            if(!error) alert("تم تحديث حالة البطل! 💎");
        };

        // رصد علامة
        window.postScore = async () => {
            const sid = document.getElementById('studentSelect').value;
            const score = document.getElementById('examScore').value;
            const sub = document.getElementById('examSubject').value;
            const { error } = await supabase.from('exams').insert([{ student_id: sid, score: score, subject: sub }]);
            if(!error) alert("تم رصد العلامة بنجاح! 📊");
        };
    </script>
</body>
</html>
