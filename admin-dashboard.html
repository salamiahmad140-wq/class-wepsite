<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة قيادة الإمبراطورة لبنى | Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: white; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-active { border-bottom: 4px solid #f59e0b; color: #f59e0b; }
        @media print { .no-print { display: none; } body { background: white; color: black; } }
    </style>
</head>
<body class="p-6">

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-10 no-print">
            <div>
                <h1 class="text-5xl font-black text-amber-400">تحكم المعلمة لبنى 🛡️</h1>
                <p class="text-slate-400 mt-2 text-xl">إدارة الـ 200 مرحلة وأبطال الصف الأول</p>
            </div>
            <div class="flex gap-4">
                <button onclick="Admin.addNew()" class="bg-indigo-600 hover:bg-indigo-500 px-8 py-4 rounded-2xl font-black text-xl transition shadow-xl">إضافة بطل جديد +</button>
                <button onclick="window.print()" class="bg-slate-700 px-6 py-4 rounded-2xl font-bold">طباعة التقارير 🖨️</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 no-print text-center">
            <div class="glass-card p-8 rounded-[40px]">
                <div class="text-slate-400 text-lg">إجمالي الطلاب</div>
                <div id="count-total" class="text-5xl font-black">0</div>
            </div>
            <div class="glass-card p-8 rounded-[40px] border-amber-500/30">
                <div class="text-slate-400 text-lg">مجموع النجوم الموزعة</div>
                <div id="count-stars" class="text-5xl font-black text-amber-400">0 ⭐</div>
            </div>
            <div class="glass-card p-8 rounded-[40px]">
                <div class="text-slate-400 text-lg">مراحل تم إنجازها</div>
                <div id="count-levels" class="text-5xl font-black text-blue-400">0</div>
            </div>
        </div>

        <div class="glass-card rounded-[50px] overflow-hidden shadow-2xl">
            <div class="p-8 bg-white/5 border-b border-white/10 flex justify-between items-center no-print">
                <h2 class="text-3xl font-black">قائمة أساطير الصف</h2>
                <input type="text" oninput="Admin.search(this.value)" placeholder="بحث عن اسم..." class="bg-slate-800 border border-slate-700 rounded-2xl px-6 py-3 w-80 outline-none focus:border-amber-400 transition">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-slate-800/50 text-slate-400 text-xl">
                            <th class="p-8">البطل</th>
                            <th class="p-8">الكود الدائم</th>
                            <th class="p-8 text-center">الرصيد</th>
                            <th class="p-8">التقدم (200 مرحلة)</th>
                            <th class="p-8 text-center no-print">الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="admin-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal-edit" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden z-[1000] items-center justify-center p-4">
        <div class="glass-card max-w-lg w-full p-10 rounded-[50px] border-indigo-500/50">
            <h2 class="text-3xl font-black mb-8 text-indigo-400">تعديل بيانات البطل ⚙️</h2>
            <div class="space-y-6">
                <div>
                    <label class="block text-slate-400 mb-2">رصيد النجوم</label>
                    <input type="number" id="edit-stars" class="w-full bg-slate-800 p-5 rounded-2xl text-2xl font-bold outline-none border-2 border-transparent focus:border-amber-400 transition">
                </div>
                <div>
                    <label class="block text-slate-400 mb-2">رصيد الذهب</label>
                    <input type="number" id="edit-coins" class="w-full bg-slate-800 p-5 rounded-2xl text-2xl font-bold outline-none border-2 border-transparent focus:border-amber-400 transition">
                </div>
                <div class="flex gap-4 pt-6">
                    <button onclick="Admin.save()" class="flex-1 bg-indigo-600 py-5 rounded-3xl font-black text-xl hover:bg-indigo-500 transition">حفظ التغييرات</button>
                    <button onclick="Admin.closeModal()" class="flex-1 bg-slate-700 py-5 rounded-3xl font-black text-xl">إلغاء</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const DB_KEY = 'LUBNA_ULTIMATE_DB';
    let currentCode = null;

    const Admin = {
        get() { return JSON.parse(localStorage.getItem(DB_KEY)) || []; },
        saveDB(data) { localStorage.setItem(DB_KEY, JSON.stringify(data)); this.render(); },

        render(filterData = null) {
            const students = filterData || this.get();
            const body = document.getElementById('admin-body');
            let tStars = 0, tLevels = 0;

            body.innerHTML = students.map(s => {
                tStars += s.stars;
                tLevels += (s.progress.math + s.progress.arabic);
                const totalProgress = ((s.progress.math + s.progress.arabic) / 200 * 100).toFixed(0);

                return `
                <tr class="border-b border-white/5 hover:bg-white/5 transition">
                    <td class="p-8">
                        <div class="flex items-center gap-5">
                            <span class="text-5xl bg-slate-800 w-20 h-20 rounded-3xl flex items-center justify-center border border-white/10">${s.avatar || '👤'}</span>
                            <div>
                                <div class="font-black text-2xl">${s.name}</div>
                                <div class="text-indigo-400 font-bold">بطل إمبراطورية لبنى</div>
                            </div>
                        </div>
                    </td>
                    <td class="p-8 font-mono text-2xl text-amber-400 font-bold">${s.code}</td>
                    <td class="p-8 text-center font-black">
                        <div class="text-amber-400">💰 ${s.coins}</div>
                        <div class="text-blue-400">⭐ ${s.stars}</div>
                    </td>
                    <td class="p-8">
                        <div class="w-full bg-slate-800 h-4 rounded-full overflow-hidden mb-2">
                            <div class="bg-gradient-to-r from-blue-500 to-indigo-500 h-full" style="width: ${totalProgress}%"></div>
                        </div>
                        <span class="text-sm font-bold text-slate-400">أتم ${s.progress.math + s.progress.arabic} من 200 مرحلة</span>
                    </td>
                    <td class="p-8 text-center no-print">
                        <div class="flex justify-center gap-3">
                            <button onclick="Admin.openEdit('${s.code}')" class="bg-indigo-500/20 text-indigo-400 px-4 py-2 rounded-xl border border-indigo-500/30 hover:bg-indigo-500 hover:text-white transition">تعديل ⚙️</button>
                            <button onclick="Admin.del('${s.code}')" class="bg-red-500/20 text-red-500 px-4 py-2 rounded-xl border border-red-500/30 hover:bg-red-500 hover:text-white transition">حذف 🗑️</button>
                        </div>
                    </td>
                </tr>
                `;
            }).join('');

            document.getElementById('count-total').innerText = students.length;
            document.getElementById('count-stars').innerText = tStars;
            document.getElementById('count-levels').innerText = tLevels;
        },

        addNew() {
            const name = prompt("ما اسم البطل الجديد؟");
            if(name) {
                const db = this.get();
                const code = "LUB-" + Math.floor(1000 + Math.random()*9000);
                db.push({ name, code, avatar: '🦁', stars: 0, coins: 0, progress: { math: 0, arabic: 0 } });
                this.saveDB(db);
                alert("تمت الإضافة! الكود: " + code);
            }
        },

        openEdit(code) {
            currentCode = code;
            const s = this.get().find(x => x.code === code);
            document.getElementById('edit-stars').value = s.stars;
            document.getElementById('edit-coins').value = s.coins;
            document.getElementById('modal-edit').style.display = 'flex';
        },

        closeModal() { document.getElementById('modal-edit').style.display = 'none'; },

        save() {
            const db = this.get();
            const idx = db.findIndex(s => s.code === currentCode);
            db[idx].stars = parseInt(document.getElementById('edit-stars').value);
            db[idx].coins = parseInt(document.getElementById('edit-coins').value);
            this.saveDB(db);
            this.closeModal();
        },

        del(code) {
            if(confirm("هل أنتِ متأكدة؟ سيتم حذف البطل تماماً!")) {
                const filtered = this.get().filter(s => s.code !== code);
                this.saveDB(filtered);
            }
        },

        search(val) {
            const filtered = this.get().filter(s => s.name.includes(val) || s.code.includes(val));
            this.render(filtered);
        }
    };

    Admin.render();
</script>
</body>
</html>
