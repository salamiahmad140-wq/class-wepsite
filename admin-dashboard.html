<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة لبنى سلامي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f1f5f9; color: #1e293b; transition: 0.4s; padding: 15px; }
        .dark body { background: #0f172a; color: #f1f5f9; }
        .admin-card { background: white; border-radius: 2.5rem; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; border: 3px solid white; transition: 0.4s; }
        .dark .admin-card { background: #1e293b; border-color: #334155; }
        
        /* إصلاح ألوان المدخلات في الداكن */
        input, textarea, select { border: 3px solid #e2e8f0; border-radius: 1.5rem; padding: 15px; width: 100%; margin-bottom: 12px; font-weight: 900; color: #1e293b; }
        .dark input, .dark textarea, .dark select { background: #0f172a !important; border-color: #475569 !important; color: #f8fafc !important; }
        
        .btn-main { background: #4f46e5; color: white; padding: 15px; border-radius: 1.5rem; font-weight: 900; width: 100%; cursor: pointer; border: none; }
    </style>
</head>
<body>

    <header class="flex justify-between items-center mb-8 px-4">
        <button onclick="toggleDark()" class="text-3xl">🌓</button>
        <h1 class="text-2xl font-black text-indigo-700 dark:text-indigo-400">لوحة تحكم الأستاذة لبنى 👩‍🏫</h1>
    </header>

    <div class="max-w-xl mx-auto">
        <div class="admin-card border-r-8 border-green-500">
            <h3 class="font-black text-green-700 mb-4 italic">✨ إضافة محتوى جديد:</h3>
            <select id="p_type">
                <option value="news">📢 إعلان</option>
                <option value="hw">📚 وظيفة</option>
                <option value="event">📸 فعالية</option>
            </select>
            <input id="p_title" placeholder="العنوان">
            <textarea id="p_desc" placeholder="نص الوظيفة"></textarea>
            <input id="p_img" placeholder="رابط الصورة">
            <button onclick="publish()" class="btn-main bg-green-600">نشر ✅</button>
        </div>

        <div id="contentList" class="space-y-4 mb-10"></div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';
        
        if(localStorage.getItem('dark') === 'true') document.documentElement.classList.add('dark');
        
        window.toggleDark = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('dark', isDark);
        };

        window.publish = async () => {
            const t = document.getElementById('p_type').value;
            await supabase.from('assignments').insert([{
                title: (t!=='hw') ? document.getElementById('p_title').value : null,
                description: (t==='hw') ? document.getElementById('p_desc').value : null,
                image_url: (t==='event') ? document.getElementById('p_img').value : null
            }]);
            location.reload();
        };

        async function load() {
            const { data } = await supabase.from('assignments').select('*').order('created_at', {ascending: false});
            document.getElementById('contentList').innerHTML = data.map(i => `
                <div class="admin-card flex justify-between items-center p-4">
                    <span class="font-bold truncate w-40">${i.title || i.description}</span>
                    <button onclick="del('${i.id}')" class="text-red-500 font-black">حذف 🗑️</button>
                </div>
            `).join('');
        }
        window.del = async (id) => { if(confirm("حذف؟")) { await supabase.from('assignments').delete().eq('id', id); load(); } };
        load();
    </script>
</body>
</html>
