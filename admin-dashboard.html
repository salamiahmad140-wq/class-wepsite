<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنصة | لبنى سلامي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; color: #1e293b; padding: 20px; }
        .box { background: white; border-radius: 2.5rem; padding: 2.5rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.02); }
        input, textarea, select { width: 100%; padding: 1.2rem; border-radius: 1.5rem; border: 2px solid #f1f5f9; background: #f8fafc; font-weight: bold; margin-bottom: 1rem; }
        .btn { background: #6366f1; color: white; padding: 1.2rem; border-radius: 1.5rem; font-weight: 900; width: 100%; transition: 0.3s; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body class="max-w-7xl mx-auto">
    <header class="flex justify-between items-center mb-12">
        <h1 class="text-3xl font-black">مركز التحكم <span class="text-indigo-600">الذكي</span></h1>
        <div class="bg-indigo-600 text-white p-4 px-8 rounded-3xl font-black">المعلمة لبنى</div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        
        <div class="box border-r-8 border-indigo-500">
            <h2 class="text-xl font-black mb-6 flex items-center gap-2">📢 مربع الإعلانات السريعة</h2>
            <input id="newsTitle" placeholder="اكتبي نص الإعلان هنا...">
            <button onclick="addNews()" class="btn">نشر الإعلان الآن ✅</button>
            <div id="newsArchive" class="mt-6 space-y-2 max-h-40 overflow-y-auto"></div>
        </div>

        <div class="box border-r-8 border-purple-500">
            <h2 class="text-xl font-black mb-6 flex items-center gap-2">📚 الوظائف والفعاليات</h2>
            <select id="type">
                <option value="hw">وظيفة بيتية جديدة</option>
                <option value="event">فعالية (صورة أو فيديو)</option>
            </select>
            <input id="pTitle" placeholder="العنوان (للأفلام والفعاليات)">
            <textarea id="pDesc" placeholder="تفاصيل الوظيفة..." rows="2"></textarea>
            <input id="pUrl" placeholder="رابط الصورة أو الفيديو">
            <button onclick="addContent()" class="btn bg-purple-600">نشر المحتوى 🚀</button>
        </div>

        <div class="box lg:col-span-2 border-r-8 border-slate-800">
            <h2 class="text-xl font-black mb-8">👤 إدارة الطلاب والعلامات</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4" id="stdGrid"></div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        // دالة موحدة للنشر تضمن وصول البيانات
        async function push(obj) {
            const { error } = await supabase.from('assignments').insert([obj]);
            if(error) alert("خطأ: " + error.message);
            else { alert("تم النشر!"); location.reload(); }
        }

        window.addNews = () => push({ title: document.getElementById('newsTitle').value });
        
        window.addContent = () => {
            const t = document.getElementById('type').value;
            push({
                title: document.getElementById('pTitle').value || null,
                description: (t==='hw') ? document.getElementById('pDesc').value : null,
                image_url: document.getElementById('pUrl').value || null
            });
        };

        async function load() {
            const { data: stds } = await supabase.from('students').select('*').order('full_name');
            document.getElementById('stdGrid').innerHTML = stds.map(s => `
                <div class="bg-f8fafc p-6 rounded-[2rem] text-center border">
                    <p class="font-black mb-4 text-sm">${s.full_name}</p>
                    <div class="flex justify-center gap-2">
                        <button onclick="tStar('${s.id}', ${s.is_star})" class="text-xl">${s.is_star?'⭐':'☆'}</button>
                        <button onclick="delStudent('${s.id}')" class="opacity-20">🗑️</button>
                    </div>
                </div>
            `).join('');

            const { data: ads } = await supabase.from('assignments').select('*').order('created_at', {ascending: false});
            document.getElementById('newsArchive').innerHTML = ads.filter(a => a.title && !a.description).map(a => `
                <div class="text-xs p-3 bg-slate-50 rounded-xl flex justify-between">
                    <span class="truncate w-40">${a.title}</span>
                    <button onclick="del('${a.id}')" class="text-red-400">حذف</button>
                </div>
            `).join('');
        }
        window.del = async (id) => { await supabase.from('assignments').delete().eq('id', id); load(); };
        window.tStar = async (id, cur) => { await supabase.from('students').update({is_star: !cur}).eq('id', id); load(); };
        load();
    </script>
</body>
</html>
