<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>غرفة قيادة أ. لبنى | الصف الأول ب</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 p-10 font-sans">
    <div class="max-w-4xl mx-auto bg-white p-10 rounded-[50px] shadow-2xl">
        <h1 class="text-5xl font-black text-blue-600 mb-8 text-center">إدارة أساطير الصف الأول ب 👑</h1>
        <button onclick="Admin.add()" class="w-full py-4 bg-pink-500 text-white rounded-3xl font-black text-2xl mb-10 shadow-xl">إضافة بطل جديد +</button>
        <div id="admin-list" class="space-y-4"></div>
    </div>

<script>
    const DB_KEY = 'LUBNA_FINAL_2026_B';
    const Admin = {
        get() { return JSON.parse(localStorage.getItem(DB_KEY)) || []; },
        render() {
            const db = this.get();
            document.getElementById('admin-list').innerHTML = db.map(s => `
                <div class="p-6 border-4 border-blue-100 rounded-3xl flex justify-between items-center">
                    <div>
                        <div class="text-2xl font-black">${s.name}</div>
                        <div class="text-blue-500 font-bold">كود الدخول: ${s.code}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="Admin.gift('${s.code}')" class="bg-amber-400 p-3 rounded-xl font-bold">هدية 💰</button>
                        <button onclick="Admin.del('${s.code}')" class="bg-red-500 text-white p-3 rounded-xl">حذف</button>
                    </div>
                </div>
            `).join('');
        },
        add() {
            const name = prompt("اسم بطل الصف الأول ب:");
            if(name) {
                const db = this.get();
                const code = "LBN-" + Math.floor(1000 + Math.random()*9000);
                db.push({name, code, stars:0, coins:500, inventory:[], tag:'', progress:{math:0, arabic:0}});
                localStorage.setItem(DB_KEY, JSON.stringify(db));
                this.render();
                alert("تم! الكود هو: " + code);
            }
        },
        gift(code) {
            const db = this.get();
            const idx = db.findIndex(s => s.code === code);
            db[idx].coins += 1000;
            localStorage.setItem(DB_KEY, JSON.stringify(db));
            this.render();
        },
        del(code) { if(confirm("حذف؟")) { 
            const db = this.get().filter(s => s.code !== code);
            localStorage.setItem(DB_KEY, JSON.stringify(db));
            this.render();
        }}
    };
    Admin.render();
</script>
</body>
</html>
