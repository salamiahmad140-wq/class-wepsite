<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>غرفة التحكم | أستاذة لبنى</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background: #f0f2f5; }</style>
</head>
<body class="p-8">

    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden">
            <div class="bg-indigo-600 p-8 text-white flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-black">غرفة التحكم بالأساطير 👑</h1>
                    <p class="opacity-70">أهلاً بكِ يا أستاذة لبنى، تحكمي في عالمكِ التعليمي</p>
                </div>
                <button onclick="addStudent()" class="bg-white text-indigo-600 px-8 py-4 rounded-2xl font-black shadow-lg hover:scale-105 transition">
                    + إضافة طالب جديد
                </button>
            </div>

            <div class="grid grid-cols-4 gap-6 p-8 bg-slate-50">
                <div class="bg-white p-6 rounded-3xl shadow-sm border-b-4 border-blue-500">
                    <p class="text-slate-400 text-sm">إجمالي الطلاب</p>
                    <h3 class="text-3xl font-black" id="stat-total">2</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border-b-4 border-yellow-500">
                    <p class="text-slate-400 text-sm">النجوم الممنوحة</p>
                    <h3 class="text-3xl font-black">1,450</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border-b-4 border-green-500">
                    <p class="text-slate-400 text-sm">أكواد نشطة</p>
                    <h3 class="text-3xl font-black">8</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border-b-4 border-pink-500">
                    <p class="text-slate-400 text-sm">مستوى التفاعل</p>
                    <h3 class="text-3xl font-black">98%</h3>
                </div>
            </div>

            <div class="p-8">
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="text-slate-400 border-b">
                            <th class="p-4">اسم الطالب</th>
                            <th class="p-4">كود الدخول</th>
                            <th class="p-4">النجوم ⭐</th>
                            <th class="p-4">الكوينز 💰</th>
                            <th class="p-4">الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let students = [
            { id: 1, name: "أمير الأساطير", code: "LUB-201", stars: 150, coins: 2000 },
            { id: 2, name: "ليان المبدعة", code: "LUB-202", stars: 120, coins: 1500 }
        ];

        function render() {
            const table = document.getElementById('admin-table');
            document.getElementById('stat-total').innerText = students.length;
            table.innerHTML = students.map(s => `
                <tr class="border-b hover:bg-slate-50 transition">
                    <td class="p-4 font-black text-slate-700">${s.name}</td>
                    <td class="p-4"><span class="bg-indigo-100 text-indigo-600 px-3 py-1 rounded-lg font-mono font-bold">${s.code}</span></td>
                    <td class="p-4 font-bold text-yellow-600">${s.stars}</td>
                    <td class="p-4 font-bold text-green-600">${s.coins}</td>
                    <td class="p-4">
                        <button onclick="edit(${s.id})" class="bg-blue-500 text-white p-2 rounded-lg text-xs">تعديل</button>
                        <button onclick="del(${s.id})" class="bg-red-500 text-white p-2 rounded-lg text-xs">حذف</button>
                    </td>
                </tr>
            `).join('');
        }

        function addStudent() {
            const name = prompt("اسم الطالب:");
            if(name) {
                const code = "LUB-" + Math.floor(Math.random()*900 + 100);
                students.push({ id: Date.now(), name, code, stars: 0, coins: 100 });
                render();
            }
        }

        function del(id) {
            students = students.filter(s => s.id !== id);
            render();
        }

        render();
    </script>
</body>
</html>
