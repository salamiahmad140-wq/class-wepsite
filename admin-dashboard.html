<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم الشاملة | لبنى سلامي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f1f5f9; padding: 20px; }
        .box { background: white; border-radius: 2rem; padding: 2rem; border: 1px solid #e2e8f0; height: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: 0.3s; }
        .box:hover { box-shadow: 0 10px 30px rgba(99, 102, 241, 0.1); }
        input, textarea, select { width: 100%; padding: 1rem; border-radius: 1.2rem; border: 2px solid #f1f5f9; background: #f8fafc; font-weight: bold; margin-bottom: 0.8rem; outline: none; }
        input:focus { border-color: #6366f1; }
        .btn { background: #6366f1; color: white; padding: 1rem; border-radius: 1.2rem; font-weight: 900; width: 100%; transition: 0.3s; cursor: pointer; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="max-w-7xl mx-auto">

    <header class="flex justify-between items-center mb-10">
        <h1 class="text-3xl font-black text-slate-800">مركز القيادة <span class="text-indigo-600">الرقمي</span></h1>
        <div class="bg-white p-4 px-8 rounded-3xl shadow-sm border font-black">المعلمة لبنى سلامي ✨</div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        
        <div class="box">
            <h2 class="text-xl font-black mb-4 text-indigo-600">📢 الإعلانات</h2>
            <input id="news" placeholder="اكتبي الإعلان هنا...">
            <button onclick="addNews()" class="btn">نشر الإعلان ✅</button>
            <div id="newsList" class="mt-4 space-y-2 max-h-40 overflow-y-auto"></div>
        </div>

        <div class="box">
            <h2 class="text-xl font-black mb-4 text-orange-600">📚 الوظائف</h2>
            <textarea id="hw" placeholder="نص الوظيفة..." rows="3"></textarea>
            <button onclick="addHw()" class="btn bg-orange-500">نشر الوظيفة ✅</button>
            <div id="hwList" class="mt-4 space-y-2 max-h-40 overflow-y-auto"></div>
        </div>

        <div class="box">
            <h2 class="text-xl font-black mb-4 text-purple-600">📸 الفعاليات</h2>
            <input id="evTitle" placeholder="العنوان">
            <input id="evUrl" placeholder="رابط الصورة أو الفيديو">
            <button onclick="addEv()" class="btn bg-purple-600">نشر الفعالية ✅</button>
            <div id="evList" class="mt-4 space-y-2 max-h-40 overflow-y-auto"></div>
        </div>

        <div class="box">
            <h2 class="text-xl font-black mb-4 text-emerald-600">👤 إضافة طالب</h2>
            <input id="sName" placeholder="الاسم الكامل">
            <input id="sUser" placeholder="اسم المستخدم">
            <input id="sPass" placeholder="كلمة المرور">
            <button onclick="addStudent()" class="btn bg-emerald-600">حفظ الطالب +</button>
        </div>

        <div class="box lg:col-span-2">
            <h2 class="text-xl font-black mb-6">👥 قائمة الطلاب (تعديل، نجوم، علامات)</h2>
            <div id="studentsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        // وظائف النشر الشاملة
        window.addNews = async () => { await supabase.from('assignments').insert([{ title: document.getElementById('news').value }]); location.reload(); };
        window.addHw = async () => { await supabase.from('assignments').insert([{ description: document.getElementById('hw').value }]); location.reload(); };
        window.addEv = async () => { await supabase.from('assignments').insert([{ title: document.getElementById('evTitle').value, image_url: document.getElementById('evUrl').value }]); location.reload(); };
        window.addStudent = async () => { await supabase.from('students').insert([{ full_name: document.getElementById('sName').value, username: document.getElementById('sUser').value, password: document.getElementById('sPass').value }]); location.reload(); };

        async function load() {
            const { data: ads } = await supabase.from('assignments').select('*').order('created_at', {ascending: false});
            const { data: stds } = await supabase.from('students').select('*').order('full_name');

            // الأرشيف في المربعات
            document.getElementById('newsList').innerHTML = ads.filter(a => a.title && !a.description && !a.image_url).map(a => `<div class="text-xs p-2 bg-slate-50 rounded flex justify-between"><span>${a.title}</span><button onclick="del('${a.id}')" class="text-red-500">حذف</button></div>`).join('');
            document.getElementById('hwList').innerHTML = ads.filter(a => a.description).map(a => `<div class="text-xs p-2 bg-slate-50 rounded flex justify-between"><span class="truncate w-32">${a.description}</span><button onclick="del('${a.id}')" class="text-red-500">حذف</button></div>`).join('');
            document.getElementById('evList').innerHTML = ads.filter(a => a.image_url).map(a => `<div class="text-xs p-2 bg-slate-50 rounded flex justify-between"><span class="truncate w-32">${a.title}</span><button onclick="del('${a.id}')" class="text-red-500">حذف</button></div>`).join('');

            // شبكة الطلاب
            document.getElementById('studentsGrid').innerHTML = stds.map(s => `
                <div class="border p-4 rounded-2xl">
                    <p class="font-black text-sm mb-2">${s.full_name}</p>
                    <div class="grid grid-cols-2 gap-1 mb-3 text-[10px]">
                        <input value="${s.username}" onchange="upS('${s.id}', 'username', this.value)" class="p-1 mb-0">
                        <input value="${s.password}" onchange="upS('${s.id}', 'password', this.value)" class="p-1 mb-0">
                    </div>
                    <div class="flex gap-2">
                        <button onclick="addExam('${s.id}')" class="bg-indigo-100 text-indigo-600 px-3 py-1 rounded-lg text-[10px] font-black">+ علامة</button>
                        <button onclick="tStar('${s.id}', ${s.is_star})" class="text-lg">${s.is_star?'⭐':'☆'}</button>
                        <button onclick="delS('${s.id}')" class="text-red-300">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        window.del = async (id) => { await supabase.from('assignments').delete().eq('id', id); load(); };
        window.delS = async (id) => { if(confirm("حذف الطالب؟")) { await supabase.from('students').delete().eq('id', id); load(); } };
        window.tStar = async (id, cur) => { await supabase.from('students').update({is_star: !cur}).eq('id', id); load(); };
        window.upS = async (id, col, val) => { await supabase.from('students').update({[col]: val}).eq('id', id); };
        window.addExam = async (sid) => {
            const sub = prompt("المادة؟"), sc = prompt("العلامة؟");
            if(sub && sc) await supabase.from('exams').insert([{student_id: sid, subject: sub, score: sc}]);
        };

        load();
    </script>
</body>
</html>
