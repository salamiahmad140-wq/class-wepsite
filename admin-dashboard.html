<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة القائدة | إدارة الأساطير</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #fdfcf0; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 2px solid #f1f5f9; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10 bg-white p-8 rounded-[40px] shadow-sm border-2 border-yellow-100">
            <div>
                <h1 class="text-4xl font-black text-slate-800">إدارة أبطال 1-ب 👑</h1>
                <p class="text-yellow-600 font-bold">بإمكانكِ إضافة الأبطال وتعديل أكوادهم هنا</p>
            </div>
            <button onclick="Admin.showAdd()" class="bg-yellow-400 text-white px-8 py-4 rounded-3xl font-black text-xl shadow-lg hover:scale-105 transition">+ إضافة بطل</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="students-list">
            </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/40 hidden flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[40px] w-full max-w-md shadow-2xl">
            <h2 class="text-3xl font-black mb-6">بطل جديد ✨</h2>
            <input type="text" id="m-name" placeholder="اسم الطالب" class="w-full p-4 mb-4 bg-slate-50 rounded-2xl border-2 border-slate-100 outline-none focus:border-yellow-400 font-bold">
            <input type="text" id="m-code" placeholder="الكود (مثلاً: 2024)" class="w-full p-4 mb-6 bg-slate-50 rounded-2xl border-2 border-slate-100 outline-none focus:border-yellow-400 font-bold">
            <div class="flex gap-4">
                <button onclick="Admin.save()" class="flex-1 bg-yellow-400 text-white py-4 rounded-2xl font-black">حفظ</button>
                <button onclick="Admin.hide()" class="flex-1 bg-slate-100 text-slate-400 py-4 rounded-2xl font-black">إلغاء</button>
            </div>
        </div>
    </div>

<script>
    const DB_KEY = 'LEGENDS_V5_MEGA';
    const Admin = {
        get() { return JSON.parse(localStorage.getItem(DB_KEY)) || []; },
        render() {
            const db = this.get();
            const list = document.getElementById('students-list');
            list.innerHTML = db.map(s => `
                <div class="bg-white p-6 rounded-[35px] shadow-sm border-2 border-slate-50 flex justify-between items-center">
                    <div>
                        <div class="text-2xl font-black text-slate-700">${s.name}</div>
                        <div class="text-blue-500 font-bold">الكود: <span class="bg-blue-50 px-2 rounded">${s.code}</span></div>
                        <div class="mt-2 text-slate-400">⭐ ${s.stars} | 💰 ${s.coins}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="Admin.edit('${s.code}')" class="bg-slate-100 p-3 rounded-2xl">✏️</button>
                        <button onclick="Admin.del('${s.code}')" class="bg-red-50 p-3 rounded-2xl">🗑️</button>
                    </div>
                </div>
            `).join('');
        },
        showAdd() { document.getElementById('modal').style.display = 'flex'; },
        hide() { document.getElementById('modal').style.display = 'none'; },
        save() {
            const name = document.getElementById('m-name').value;
            const code = document.getElementById('m-code').value;
            if(!name || !code) return;
            const db = this.get();
            db.push({name, code, stars:0, coins:100, done:[], inventory:[], equipped:''});
            localStorage.setItem(DB_KEY, JSON.stringify(db));
            this.render(); this.hide();
        },
        del(code) {
            if(confirm('حذف الطالب؟')) {
                const db = this.get().filter(s => s.code !== code);
                localStorage.setItem(DB_KEY, JSON.stringify(db));
                this.render();
            }
        }
    };
    Admin.render();
</script>
</body>
</html>
