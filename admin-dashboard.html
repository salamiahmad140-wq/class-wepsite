<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة كرنفال 1-ب</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 p-10">
    <div class="max-w-4xl mx-auto bg-white p-12 rounded-[60px] shadow-2xl border-t-[20px] border-blue-500">
        <h1 class="text-6xl font-black text-slate-800 mb-12 text-center">بوابة الأبطال 🏰</h1>
        <button onclick="Admin.add()" class="w-full py-8 bg-blue-500 text-white rounded-full font-black text-4xl mb-12 shadow-xl">إضافة بطل جديد +</button>
        <div id="admin-list" class="space-y-6"></div>
    </div>
<script>
    const DB_KEY = 'CARNIVAL_1B_V1';
    const Admin = {
        get() { return JSON.parse(localStorage.getItem(DB_KEY)) || []; },
        render() {
            const db = this.get();
            document.getElementById('admin-list').innerHTML = db.map(s => `
                <div class="p-8 bg-slate-50 rounded-[40px] flex justify-between items-center border-2 border-white">
                    <div>
                        <div class="text-4xl font-black text-slate-800">${s.name}</div>
                        <div class="text-blue-500 font-bold text-2xl mt-2 italic">كود: ${s.code}</div>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="Admin.gift('${s.code}')" class="bg-amber-400 text-white px-8 py-3 rounded-full font-black text-2xl">هدية 💰</button>
                        <button onclick="Admin.del('${s.code}')" class="text-red-400 font-black text-2xl">حذف</button>
                    </div>
                </div>
            `).join('');
        },
        add() {
            const name = prompt("اسم البطل:");
            if(name) {
                const db = this.get();
                const code = "LEGEND-" + Math.floor(1000 + Math.random()*9000);
                db.push({name, code, stars:0, coins:200, inventory:[], equipped:'', avatar:'👤', done:{math:[], arabic:[]}});
                localStorage.setItem(DB_KEY, JSON.stringify(db)); this.render();
            }
        },
        gift(code) {
            const db = this.get(); const idx = db.findIndex(s => s.code === code);
            db[idx].coins += 1000; localStorage.setItem(DB_KEY, JSON.stringify(db)); this.render();
        },
        del(code) { if(confirm("حذف البطل؟")) { 
            const db = this.get().filter(s => s.code !== code);
            localStorage.setItem(DB_KEY, JSON.stringify(db)); this.render();
        }}
    };
    Admin.render();
</script>
</body>
</html>
