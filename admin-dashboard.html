<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المعلمة لبنى</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f1f5f9; padding: 15px; transition: 0.4s; }
        .dark body { background: #0f172a; color: #f1f5f9; }
        .admin-card { background: white; border-radius: 2rem; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 2px solid white; }
        .dark .admin-card { background: #1e293b; border-color: #334155; }
        input, textarea, select { border: 2px solid #e2e8f0; border-radius: 1rem; padding: 12px; width: 100%; margin-bottom: 10px; font-weight: bold; }
        .dark input, .dark textarea, .dark select { background: #0f172a; border-color: #444; color: white; }
        .btn-main { background: #4f46e5; color: white; padding: 15px; border-radius: 1rem; font-weight: 900; cursor: pointer; border: none; width: 100%; }
    </style>
</head>
<body>
    <header class="flex justify-between items-center mb-6">
        <button onclick="toggle()" class="text-2xl">🌓</button>
        <h1 class="text-xl font-black text-indigo-700 dark:text-indigo-400">لوحة تحكم الأستاذة لبنى 👩‍🏫</h1>
    </header>

    <div class="max-w-xl mx-auto">
        <div class="admin-card border-r-8 border-green-500">
            <h3 class="font-black text-green-600 mb-4">✨ إضافة جديد:</h3>
            <select id="t"><option value="news">📢 إعلان</option><option value="hw">📚 وظيفة</option><option value="event">📸 فعالية</option></select>
            <input id="title" placeholder="العنوان">
            <textarea id="desc" placeholder="نص الوظيفة"></textarea>
            <input id="img" placeholder="رابط الصورة">
            <button onclick="pub()" class="btn-main bg-green-600">نشر ✅</button>
        </div>

        <div class="admin-card border-r-8 border-indigo-600">
            <h3 class="font-black text-indigo-700 mb-4 text-center">👥 إدارة الطلاب والنجوم</h3>
            <div id="studentsList" class="space-y-3"></div>
        </div>

        <div class="admin-card border-r-8 border-orange-500">
            <h3 class="font-black text-orange-700 mb-4 text-center">🗑️ الأرشيف</h3>
            <div id="contentList" class="space-y-3"></div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';
        if(localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        window.toggle = () => { document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); };

        window.pub = async () => {
            const type = document.getElementById('t').value;
            await supabase.from('assignments').insert([{
                title: (type!=='hw') ? document.getElementById('title').value : null,
                description: (type==='hw') ? document.getElementById('desc').value : null,
                image_url: (type==='event') ? document.getElementById('img').value : null
            }]);
            location.reload();
        };

        async function load() {
            const { data: ads } = await supabase.from('assignments').select('*').order('created_at', {ascending: false});
            document.getElementById('contentList').innerHTML = ads.map(i => `<div class="flex justify-between p-3 bg-slate-50 dark:bg-slate-900 rounded-xl"><span>${i.title || i.description}</span><button onclick="del('assignments','${i.id}')" class="text-red-500">حذف</button></div>`).join('');
            const { data: stds } = await supabase.from('students').select('*').order('full_name');
            document.getElementById('studentsList').innerHTML = stds.map(s => `<div class="flex justify-between p-3 bg-indigo-50 dark:bg-slate-900 rounded-xl"><span>${s.full_name}</span><div class="flex gap-2"><button onclick="star('${s.id}',${s.is_star})">${s.is_star?'⭐':'☆'}</button><button onclick="del('students','${s.id}')">🗑️</button></div></div>`).join('');
        }
        window.del = async (t, id) => { if(confirm("حذف؟")) { await supabase.from(t).delete().eq('id', id); load(); } };
        window.star = async (id, cur) => { await supabase.from('students').update({ is_star: !cur }).eq('id', id); load(); };
        load();
    </script>
</body>
</html>
