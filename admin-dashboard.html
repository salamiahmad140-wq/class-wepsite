<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الصف الأول "ب" | المعلمة لبنى</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background: #f8fafc; }</style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10 bg-white p-6 rounded-3xl shadow-sm">
            <h1 class="text-3xl font-black text-blue-600">لوحة تحكم الأستاذة لبنى 👩‍🏫</h1>
            <button onclick="location.href='index.html'" class="text-slate-400">معاينة الموقع</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="space-y-6">
                <div class="bg-blue-600 p-6 rounded-[2rem] text-white">
                    <h3 class="font-bold mb-4">📢 الإعلان الرئيسي (يظهر بشكل كبير)</h3>
                    <input id="advTitle" placeholder="مثال: موعد اختبار العلوم القادم" class="w-full p-3 rounded-xl mb-3 text-blue-900">
                    <button id="postAdv" class="w-full bg-yellow-400 text-blue-900 font-bold py-2 rounded-xl">تحديث الإعلان</button>
                </div>

                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                    <h3 class="font-bold mb-4 text-blue-600">🏠 إضافة وظيفة بيتية</h3>
                    <textarea id="taskContent" class="w-full p-3 bg-slate-50 rounded-xl mb-3 h-24" placeholder="اكتبي تفاصيل الوظيفة..."></textarea>
                    <button id="postTask" class="w-full bg-blue-600 text-white font-bold py-2 rounded-xl">نشر الوظيفة</button>
                </div>
            </div>

            <div class="lg:col-span-2 bg-white p-8 rounded-[2rem] shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-xl">👥 إدارة الطلاب والدرجات</h3>
                    <button onclick="document.getElementById('addModal').classList.toggle('hidden')" class="bg-green-100 text-green-600 px-4 py-2 rounded-full font-bold">+ إضافة طالب</button>
                </div>
                <table class="w-full text-right">
                    <thead><tr class="text-slate-400 border-b"><th>الطالب</th><th class="text-center">العلامة</th><th class="text-center">متميز؟</th><th>حفظ</th></tr></thead>
                    <tbody id="adminTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        // وظيفة تحديث الإعلان
        document.getElementById('postAdv').onclick = async () => {
            const title = document.getElementById('advTitle').value;
            await supabase.from('assignments').insert([{ title: title, content: "إعلان هام" }]);
            alert("تم تحديث الإعلان الكبير! 🎉");
        };

        // وظيفة نشر الوظيفة
        document.getElementById('postTask').onclick = async () => {
            const content = document.getElementById('taskContent').value;
            await supabase.from('assignments').insert([{ content: content }]);
            alert("تم نشر الوظيفة بنجاح! ✅");
        };

        // عرض الطلاب
        async function loadAdmin() {
            const { data } = await supabase.from('students').select('*').order('full_name');
            document.getElementById('adminTable').innerHTML = data.map(s => `
                <tr class="border-b">
                    <td class="py-4 font-bold">${s.full_name}</td>
                    <td class="py-4 text-center"><input id="g-${s.id}" value="${s.grade || 0}" class="w-12 text-center bg-slate-100 rounded"></td>
                    <td class="py-4 text-center">
                        <button onclick="window.toggleStar('${s.id}', ${s.is_star})" class="text-xl ${s.is_star ? '' : 'grayscale'}">⭐</button>
                    </td>
                    <td class="py-4"><button onclick="window.updateS('${s.id}')" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-xs">حفظ</button></td>
                </tr>
            `).join('');
        }

        window.updateS = async (id) => {
            const g = document.getElementById('g-'+id).value;
            await supabase.from('students').update({ grade: parseInt(g) }).eq('id', id);
            alert("تم تحديث العلامة!");
        };

        window.toggleStar = async (id, current) => {
            await supabase.from('students').update({ is_star: !current }).eq('id', id);
            loadAdmin();
        };

        window.onload = loadAdmin;
    </script>
</body>
</html>
