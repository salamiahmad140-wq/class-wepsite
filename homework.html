<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجباتي الممتعة | أول "ب"</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; transition: 0.3s; }
        .light { background: #fffcf0; color: #1e293b; }
        .dark { background: #0f172a; color: #f1f5f9; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 50; }
        .dark .nav-bottom { background: #1e293b; border-top: 1px solid #334155; }
        .hw-card { border-radius: 2.5rem; border: 3px solid #fde047; transition: 0.3s; }
        .dark .hw-card { background: #1e293b; border-color: #713f12; }
    </style>
</head>
<body class="light pb-24" id="bodyTag">
    <nav class="p-4 flex justify-between items-center bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-40">
        <button onclick="toggleTheme()" class="text-2xl">🌓</button>
        <span class="font-black text-yellow-600">دفتر الوظائف 📚</span>
    </nav>

    <div class="p-6">
        <header class="bg-yellow-400 p-8 rounded-[3rem] text-indigo-900 text-center mb-8 shadow-lg">
            <h1 class="text-3xl font-black italic">وظائفنا اليومية ✏️</h1>
            <p class="font-bold opacity-80">همة عالية يا أبطال!</p>
        </header>

        <div id="homeworkList" class="grid gap-6">
            </div>
    </div>

    <div class="nav-bottom">
        <a href="index.html" class="flex flex-col items-center gap-1 text-slate-400"><span class="text-xl">🏠</span><span class="text-[10px] font-bold">الرئيسية</span></a>
        <a href="homework.html" class="flex flex-col items-center gap-1 text-indigo-600"><span class="text-xl">📚</span><span class="text-[10px] font-bold">الوظائف</span></a>
        <a href="events.html" class="flex flex-col items-center gap-1 text-slate-400"><span class="text-xl">📸</span><span class="text-[10px] font-bold">الفعاليات</span></a>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';
        window.toggleTheme = () => { document.getElementById('bodyTag').classList.toggle('light'); document.getElementById('bodyTag').classList.toggle('dark'); };
        async function loadHW() {
            const { data } = await supabase.from('assignments').select('*').not('description', 'is', null).order('created_at', {ascending: false});
            document.getElementById('homeworkList').innerHTML = data.length ? data.map(h => `
                <div class="hw-card p-6 bg-white shadow-md relative">
                    <p class="font-black text-lg leading-relaxed dark:text-white">${h.description}</p>
                    <div class="mt-4 text-[10px] text-slate-400 flex justify-between">
                        <span>📅 ${new Date(h.created_at).toLocaleDateString('ar-EG')}</span>
                        <span class="text-yellow-600 font-bold">وظيفة جديدة</span>
                    </div>
                </div>
            `).join('') : '<p class="text-center text-slate-400 italic">لا يوجد وظائف اليوم، استمتعوا باللعب! 🎈</p>';
        }
        loadHW();
    </script>
</body>
</html>
