<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مجرّة الأساطير التعليمية | المنهج العربي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-bg: #030712; --accent: #6366f1; --gold: #f59e0b; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: var(--main-bg); color: white; overflow: hidden; }

        /* الأنظمة الأساسية */
        .app-screen { position: fixed; inset: 0; display: none; flex-direction: column; overflow: hidden; z-index: 10; }
        .screen-active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* الخريطة الكونبة المتسعة */
        #mapCanvas {
            width: 3000px; height: 3000px; 
            background: url('https://www.transparenttextures.com/patterns/dark-matter.png'), 
                        radial-gradient(circle at center, #1e1b4b 0%, #030712 100%);
            position: relative; cursor: grab; transition: transform 0.1s;
        }

        /* العالم (World) */
        .world-sector {
            position: absolute; padding: 40px; border-radius: 100px;
            background: rgba(255, 255, 255, 0.03); border: 2px dashed rgba(255,255,255,0.1);
        }

        /* المرحلة (Node) */
        .node {
            width: 110px; height: 110px; border-radius: 35px; background: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 10px 0 #d1d5db, 0 20px 40px rgba(0,0,0,0.5);
            position: absolute; cursor: pointer; transition: 0.3s; z-index: 20;
        }
        .node:active { transform: translateY(8px) scale(0.95); box-shadow: 0 2px 0 #d1d5db; }
        .node.locked { filter: grayscale(1); opacity: 0.4; pointer-events: none; }
        .node-label { position: absolute; top: 120%; white-space: nowrap; font-weight: 900; font-size: 13px; color: white; text-shadow: 0 2px 10px black; }

        /* لوحة الصدارة والقوائم */
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* تصميم الأجهزة المختلفة */
        @media (max-width: 768px) { .node { width: 90px; height: 90px; } }
    </style>
</head>
<body>

    <div id="loginScreen" class="app-screen screen-active justify-center items-center bg-[url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?auto=format&fit=crop&w=1920')] bg-cover">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div class="relative z-20 glass-panel p-10 rounded-[3.5rem] w-[90%] max-w-md text-center border-t-4 border-indigo-500">
            <h1 class="text-5xl font-black mb-2 tracking-tighter shimmer">الأساطير</h1>
            <p class="text-indigo-400 font-bold mb-8 text-sm">مجرّة الصف الأول ب التعليمية</p>
            <input type="text" id="uName" placeholder="اسم المستخدم" class="w-full p-4 mb-3 rounded-2xl bg-white/5 border border-white/10 text-center text-white font-bold">
            <input type="password" id="uPass" placeholder="كلمة السر" class="w-full p-4 mb-8 rounded-2xl bg-white/5 border border-white/10 text-center text-white font-bold">
            <button onclick="doLogin()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-5 rounded-2xl font-black text-xl shadow-[0_10px_30px_rgba(79,70,229,0.4)] transition-all">دخول الأبطال 🚀</button>
            <button onclick="openAdmin()" class="mt-6 text-[10px] opacity-20 uppercase tracking-widest">Master Control Panel</button>
        </div>
    </div>

    <div id="mainMapScreen" class="app-screen">
        <header class="fixed top-0 inset-x-0 p-4 z-[100] flex justify-between items-start pointer-events-none">
            <div class="pointer-events-auto glass-panel p-3 rounded-[2rem] flex items-center gap-4 shadow-2xl">
                <div class="w-14 h-14 bg-gradient-to-tr from-indigo-600 to-purple-600 rounded-2xl border-2 border-white/20 flex items-center justify-center text-3xl">👤</div>
                <div>
                    <p id="p_name" class="font-black text-white text-sm">لبنى</p>
                    <div class="flex items-center gap-2">
                        <div class="h-2 w-24 bg-white/10 rounded-full overflow-hidden"><div id="p_xp_bar" class="h-full bg-indigo-500" style="width: 40%"></div></div>
                        <span class="text-[10px] font-black text-indigo-300">LVL 5</span>
                    </div>
                </div>
            </div>
            <div class="flex flex-col gap-2 pointer-events-auto">
                <button onclick="showLeaderboard()" class="w-14 h-14 glass-panel rounded-2xl flex items-center justify-center text-2xl">🏆</button>
                <button onclick="location.reload()" class="w-14 h-14 glass-panel rounded-2xl flex items-center justify-center text-2xl">⚙️</button>
            </div>
        </header>

        <div id="worldContainer" class="w-full h-full overflow-auto">
            <div id="mapCanvas">
                
                <div class="world-sector" style="top: 200px; left: 300px; width: 800px; height: 600px;">
                    <h2 class="text-6xl font-black opacity-10 absolute -top-10">لغتي العربية</h2>
                    <div class="node bg-pink-500" style="top: 100px; left: 100px;" onclick="playGame('arabic_1')">
                        <span class="text-5xl">🍎</span>
                        <div class="node-label text-pink-400">قطف الحروف</div>
                    </div>
                    <div class="node bg-indigo-500" style="top: 300px; left: 400px;" onclick="playGame('arabic_2')">
                        <span class="text-5xl">🐛</span>
                        <div class="node-label text-indigo-400">دودة المدود</div>
                    </div>
                </div>

                <div class="world-sector" style="top: 1000px; left: 1200px; width: 800px; height: 600px;">
                    <h2 class="text-6xl font-black opacity-10 absolute -top-10">وادي الحساب</h2>
                    <div class="node bg-blue-500" style="top: 150px; left: 200px;" onclick="playGame('math_1')">
                        <span class="text-5xl">🚀</span>
                        <div class="node-label text-blue-400">جمع الصواريخ</div>
                    </div>
                    <div class="node bg-orange-500 locked" style="top: 400px; left: 500px;">
                        <span class="text-5xl">👾</span>
                        <div class="node-label text-orange-400">وحش الأرقام</div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="leaderboardOverlay" class="app-screen bg-black/90 backdrop-blur-xl z-[1000] p-6">
        <div class="max-w-md mx-auto w-full pt-10">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-4xl font-black text-yellow-500 italic">أبطال المجرّة 🏆</h2>
                <button onclick="hideLeaderboard()" class="text-2xl">✕</button>
            </div>
            <div id="rankings" class="space-y-4">
                </div>
        </div>
    </div>

    <div id="adminScreen" class="app-screen bg-slate-950 z-[2000] p-8 overflow-y-auto">
        <div class="max-w-5xl mx-auto">
            <header class="flex justify-between items-center mb-12 border-b border-white/10 pb-6">
                <h1 class="text-3xl font-black text-indigo-400">نظام إدارة الأساطير v17</h1>
                <button onclick="showScreen('loginScreen')" class="bg-red-500/20 text-red-400 px-6 py-2 rounded-xl">خروج</button>
            </header>
            
            <div class="grid lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 glass-panel p-8 rounded-[2.5rem]">
                    <h2 class="text-xl font-black mb-6 flex items-center gap-2">👥 إدارة الطلاب والنتائج</h2>
                    <div id="admin_student_list" class="space-y-4"></div>
                </div>
                <div class="glass-panel p-8 rounded-[2.5rem]">
                    <h2 class="text-xl font-black mb-6">⚙️ إعدادات العوالم</h2>
                    <button onclick="unlockWorld('all')" class="w-full bg-green-600 py-4 rounded-2xl font-black mb-4">فتح جميع المراحل 🔓</button>
                    <div class="p-4 bg-white/5 rounded-2xl">
                        <p class="text-xs opacity-50 mb-2">تغيير خلفية المجرّة</p>
                        <select class="w-full bg-transparent border border-white/10 p-2 rounded-lg">
                            <option>الفضاء الأزرق</option>
                            <option>الغابة الخضراء</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        // نظام السحب للمجرّة (Drag to Scroll)
        const container = document.getElementById('worldContainer');
        let isDown = false; let startX, startY, scrollLeft, scrollTop;

        container.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - container.offsetLeft; startY = e.pageY - container.offsetTop; scrollLeft = container.scrollLeft; scrollTop = container.scrollTop; container.style.cursor = 'grabbing'; });
        container.addEventListener('mouseleave', () => { isDown = false; container.style.cursor = 'grab'; });
        container.addEventListener('mouseup', () => { isDown = false; container.style.cursor = 'grab'; });
        container.addEventListener('mousemove', (e) => { if (!isDown) return; e.preventDefault(); const x = e.pageX - container.offsetLeft; const y = e.pageY - container.offsetTop; const walkX = (x - startX) * 2; const walkY = (y - startY) * 2; container.scrollLeft = scrollLeft - walkX; container.scrollTop = scrollTop - walkY; });

        // الدخول
        window.doLogin = async () => {
            const u = document.getElementById('uName').value;
            const p = document.getElementById('uPass').value;
            const { data } = await supabase.from('students').select('*').eq('username', u).eq('password', p).maybeSingle();
            
            if(data) {
                localStorage.setItem('legend_user', JSON.stringify(data));
                document.getElementById('p_name').innerText = data.full_name;
                showScreen('mainMapScreen');
            } else alert("البطل غير موجود، تأكد من البيانات!");
        };

        window.openAdmin = () => {
            const p = prompt("كلمة سر المعلمة:");
            if(p === "lubna2024") { showScreen('adminScreen'); loadAdminData(); }
        };

        async function loadAdminData() {
            const { data } = await supabase.from('students').select('*').order('full_name');
            document.getElementById('admin_student_list').innerHTML = data.map(s => `
                <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                    <span class="font-bold">${s.full_name}</span>
                    <div class="flex gap-2">
                        <input type="number" value="${s.is_star ? 1000 : 0}" class="w-20 bg-black p-1 text-center rounded-lg text-xs m-0">
                        <button class="bg-indigo-600 px-3 py-1 rounded-lg text-[10px]">تحديث XP</button>
                    </div>
                </div>
            `).join('');
        }

        window.showLeaderboard = async () => {
            const { data } = await supabase.from('students').select('*').order('is_star', {ascending: false});
            document.getElementById('rankings').innerHTML = data.map((s, i) => `
                <div class="flex items-center gap-4 p-5 glass-panel rounded-3xl ${i === 0 ? 'border-2 border-yellow-500 shadow-[0_0_20px_rgba(234,179,8,0.3)]' : ''}">
                    <span class="text-2xl font-black ${i===0?'text-yellow-500':'opacity-30'}">#${i+1}</span>
                    <div class="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center text-xl">👤</div>
                    <div class="flex-grow"><p class="font-black text-sm">${s.full_name}</p></div>
                    <div class="text-right"><p class="text-yellow-500 font-black text-xs">2450 XP</p></div>
                </div>
            `).join('');
            showScreen('leaderboardOverlay');
        };

        function showScreen(id) {
            document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('screen-active'));
            document.getElementById(id).classList.add('screen-active');
        }

        window.hideLeaderboard = () => showScreen('mainMapScreen');
        window.playGame = (id) => alert("فتح محرك الألعاب المدمج للمرحلة: " + id);
    </script>
</body>
</html>
