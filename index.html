<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الصف الأول "ب" | المنصة الرسمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #6366f1; }
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: white; overflow-x: hidden; }
        
        /* تأثير الخلفية المتغيرة */
        .dynamic-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%); }
        .glow { position: absolute; width: 300px; height: 300px; background: var(--accent); filter: blur(120px); border-radius: 50%; opacity: 0.2; pointer-events: none; }

        /* البطاقات الزجاجية المتطورة */
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 2.5rem; }
        .hero-title { background: linear-gradient(to bottom, #fff 30%, #94a3b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* أنيميشن الدخول */
        .reveal { animation: reveal 0.8s cubic-bezier(0.2, 1, 0.2, 1) forwards; }
        @keyframes reveal { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* نافذة الفيديو */
        video { width: 100%; border-radius: 1.5rem; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="dynamic-bg"><div class="glow" style="top:10%; right:10%"></div><div class="glow" style="bottom:10%; left:10%"></div></div>

    <div id="loginGate" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass-panel p-12 w-full max-w-md text-center reveal">
            <div class="mb-8 relative inline-block">
                <div class="absolute inset-0 bg-indigo-500 blur-2xl opacity-20"></div>
                <h1 class="text-3xl font-black hero-title">موقع الصف الأول "ب"</h1>
                <p class="text-indigo-400 font-bold mt-2">المسيرة التعليمية الرقمية</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="u" placeholder="اسم المستخدم" class="w-full p-5 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-indigo-500 transition-all font-bold">
                <input type="password" id="p" placeholder="كلمة السر" class="w-full p-5 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-indigo-500 transition-all font-bold">
                <button id="loginBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-5 rounded-2xl font-black text-xl transition-all shadow-2xl shadow-indigo-500/20 active:scale-95">دخول المنصة 🚀</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="p-6 sticky top-0 z-50 backdrop-blur-md border-b border-white/5">
            <div class="flex justify-between items-center max-w-5xl mx-auto">
                <div class="flex items-center gap-4 cursor-pointer group" onclick="showProfile()">
                    <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-indigo-600 to-purple-600 flex items-center justify-center font-bold shadow-lg group-hover:rotate-12 transition-transform">👤</div>
                    <div class="hidden md:block">
                        <p class="text-[10px] text-slate-400 font-black">طالب متميز</p>
                        <p id="userName" class="font-black text-sm">جاري التحميل...</p>
                    </div>
                </div>
                <h2 id="pageHeaderTitle" class="text-lg font-black tracking-tighter">الرئيسية</h2>
                <button onclick="toggleDarkMode()" class="text-2xl p-2 glass-panel">🌓</button>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto p-6 space-y-12">
            <section id="homePage" class="page active-page space-y-10">
                <div class="text-center py-10 reveal">
                    <h1 class="text-5xl font-black hero-title mb-4">أهلاً بك في موقع <br> الصف الأول "ب" المبدع</h1>
                    <p class="text-slate-400 font-bold italic">تحت إشراف المربية لبنى سلامي</p>
                </div>
                
                <div id="newsList" class="grid gap-6"></div>
                
                <div class="glass-panel p-8">
                    <h3 class="text-2xl font-black mb-6 flex items-center gap-3">🌟 قائمة النجوم <span class="h-[1px] flex-1 bg-white/10"></span></h3>
                    <div id="starsGrid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
                </div>
            </section>

            <section id="homeworkPage" class="page hidden space-y-8">
                <div class="glass-panel p-10 bg-indigo-600/10 border-indigo-500/20 text-center">
                    <h2 class="text-4xl font-black hero-title tracking-widest uppercase">ركن الوظائف المدرسية</h2>
                </div>
                <div id="hwList" class="space-y-6"></div>
            </section>

            <section id="eventsPage" class="page hidden space-y-8">
                <div class="glass-panel p-10 bg-purple-600/10 border-purple-500/20 text-center">
                    <h2 class="text-4xl font-black hero-title tracking-widest uppercase">معرض الفعاليات والنشاطات</h2>
                </div>
                <div id="eventsGrid" class="grid grid-cols-1 gap-12"></div>
            </section>
        </main>

        <div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md h-20 glass-panel border-white/10 flex justify-around items-center px-6 shadow-2xl">
            <button onclick="showPage('homePage', 'الرئيسية', this)" class="text-2xl p-4 transition-all opacity-100 scale-110 text-indigo-400">🏠</button>
            <button onclick="showPage('homeworkPage', 'الوظائف', this)" class="text-2xl p-4 transition-all opacity-50">📚</button>
            <button onclick="showPage('eventsPage', 'الفعاليات', this)" class="text-2xl p-4 transition-all opacity-50">📸</button>
        </div>
    </div>

    <div id="profileModal" class="fixed inset-0 bg-black/90 hidden items-center justify-center p-6 z-[2000] backdrop-blur-2xl">
        <div class="glass-panel p-10 w-full max-w-md border-white/10 text-center">
            <h2 class="text-2xl font-black mb-6">بطاقة الطالب الرقمية</h2>
            <div class="space-y-4 mb-8">
                <div class="bg-white/5 p-4 rounded-2xl text-right">
                    <p class="text-xs text-slate-500 font-bold">الاسم الكامل</p>
                    <p id="profName" class="font-black text-indigo-400"></p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white/5 p-4 rounded-2xl text-right">
                        <p class="text-xs text-slate-500 font-bold">اسم المستخدم</p>
                        <p id="profUser" class="font-black text-sm"></p>
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl text-right">
                        <p class="text-xs text-slate-500 font-bold">كلمة السر</p>
                        <p id="profPass" class="font-black text-sm">••••••</p>
                    </div>
                </div>
            </div>
            <div id="examsList" class="space-y-2 max-h-48 overflow-y-auto mb-8 px-2"></div>
            <button onclick="hideProfile()" class="w-full py-4 rounded-2xl bg-white/10 font-black hover:bg-white/20 transition-all">عودة للمنصة</button>
            <button onclick="logout()" class="mt-4 text-red-500 text-xs font-bold opacity-50">تسجيل الخروج</button>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';
        
        window.showPage = (id, title, btn) => {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('pageHeaderTitle').innerText = title;
            document.querySelectorAll('button').forEach(b => b.classList.add('opacity-50'));
            btn.classList.remove('opacity-50');
            btn.classList.add('scale-110', 'text-indigo-400');
        };

        const session = JSON.parse(localStorage.getItem('edu_session'));
        if(session) loginOk(session);

        document.getElementById('loginBtn').onclick = async () => {
            const u = document.getElementById('u').value, p = document.getElementById('p').value;
            const { data } = await supabase.from('students').select('*').eq('username', u).eq('password', p).single();
            if(data) { localStorage.setItem('edu_session', JSON.stringify(data)); loginOk(data); }
        };

        function loginOk(user) {
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').innerText = user.full_name;
            loadContent();
        }

        async function loadContent() {
            const { data: ads } = await supabase.from('assignments').select('*').order('created_at', {ascending: false});
            
            // الوظائف
            document.getElementById('hwList').innerHTML = ads.filter(a => a.description).map(a => `
                <div class="glass-panel p-8 hover:bg-white/[0.05] transition-all reveal">
                    <p class="text-2xl font-black leading-relaxed">${a.description}</p>
                    <div class="mt-4 text-xs text-indigo-400 font-black italic">نُشر بتاريخ: ${new Date(a.created_at).toLocaleDateString('ar-EG')}</div>
                </div>
            `).join('');

            // الفعاليات (دعم الفيديو والصور)
            document.getElementById('eventsGrid').innerHTML = ads.filter(a => a.image_url).map(a => {
                const isVideo = a.image_url.includes('mp4') || a.image_url.includes('youtube') || a.image_url.includes('drive.google');
                return `
                <div class="glass-panel p-6 reveal">
                    <h3 class="text-2xl font-black mb-4 text-purple-400">${a.title || 'لحظة مميزة'}</h3>
                    <div class="rounded-3xl overflow-hidden shadow-2xl">
                        ${isVideo ? `<video controls src="${a.image_url}"></video>` : `<img src="${a.image_url}" class="w-full h-auto">`}
                    </div>
                </div>`;
            }).join('');

            const { data: stars } = await supabase.from('students').select('*').eq('is_star', true);
            document.getElementById('starsGrid').innerHTML = stars.map(s => `
                <div class="glass-panel p-6 text-center border-indigo-500/20">
                    <div class="text-4xl mb-2">⭐</div>
                    <p class="font-black text-xs">${s.full_name.split(' ')[0]}</p>
                </div>
            `).join('');
        }

        window.showProfile = async () => {
            const user = JSON.parse(localStorage.getItem('edu_session'));
            document.getElementById('profileModal').classList.replace('hidden', 'flex');
            document.getElementById('profName').innerText = user.full_name;
            document.getElementById('profUser').innerText = user.username;
            document.getElementById('profPass').innerText = user.password;
            const { data } = await supabase.from('exams').select('*').eq('student_id', user.id);
            document.getElementById('examsList').innerHTML = data.map(e => `
                <div class="flex justify-between bg-white/5 p-3 rounded-xl">
                    <span class="font-black text-xs">${e.subject}</span>
                    <span class="text-indigo-400 font-black">${e.score}</span>
                </div>
            `).join('');
        };
        window.hideProfile = () => document.getElementById('profileModal').classList.replace('flex', 'hidden');
        window.logout = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
</html>
