<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة النجوم | أول "ب"</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --p-color: #6366f1; --s-color: #a855f7; }
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; color: #1e293b; overflow-x: hidden; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .dark body { background: #020617; color: #f8fafc; }

        /* خلفية متحركة فخمة */
        .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; filter: blur(80px); }
        .mesh-1 { position: absolute; top: -10%; left: -10%; width: 50%; height: 50%; background: var(--p-color); border-radius: 50%; }
        .mesh-2 { position: absolute; bottom: -10%; right: -10%; width: 50%; height: 50%; background: var(--s-color); border-radius: 50%; }

        /* تأثير الزجاج الشفاف */
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); }

        .hero-card { background: linear-gradient(135deg, var(--p-color), var(--s-color)); border-radius: 2.5rem; position: relative; overflow: hidden; }
        .hero-card::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: rgba(255,255,255,0.15); transform: rotate(45deg); pointer-events: none; }

        /* القائمة السفلية العائمة */
        .floating-dock { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 70px; border-radius: 2rem; display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        .nav-item { position: relative; transition: 0.3s; }
        .nav-item.active { transform: translateY(-10px); color: var(--p-color); }
        .nav-item.active::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 6px; height: 6px; background: var(--p-color); border-radius: 50%; box-shadow: 0 0 10px var(--p-color); }

        .page { display: none; transform: translateY(20px); opacity: 0; transition: 0.5s; }
        .page.active-page { display: block; transform: translateY(0); opacity: 1; }

        /* انيميشن النجوم */
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
        .float-anim { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body>
    <div class="mesh-bg"><div class="mesh-1"></div><div class="mesh-2"></div></div>

    <div id="loginGate" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass p-10 rounded-[3rem] shadow-2xl w-full max-w-md text-center">
            <div class="text-7xl mb-6 float-anim">✨</div>
            <h1 class="text-4xl font-black mb-2 bg-gradient-to-r from-indigo-500 to-purple-500 bg-clip-text text-transparent">منصة النجوم</h1>
            <p class="text-slate-400 font-bold mb-8 italic">مستقبلك يبدأ من هنا</p>
            <div class="space-y-4">
                <input type="text" id="u" placeholder="اسم المستخدم" class="w-full p-5 rounded-2xl glass font-bold outline-none border-none focus:ring-2 ring-indigo-500 transition-all">
                <input type="password" id="p" placeholder="كلمة السر" class="w-full p-5 rounded-2xl glass font-bold outline-none border-none focus:ring-2 ring-indigo-500 transition-all">
                <button id="loginBtn" class="w-full hero-card text-white py-5 rounded-2xl font-black text-xl shadow-lg hover:shadow-indigo-500/50 transition-all active:scale-95">دخول البطل 🚀</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="p-6 sticky top-0 z-50 glass mb-4">
            <div class="flex justify-between items-center max-w-4xl mx-auto">
                <button onclick="toggleDarkMode()" class="w-12 h-12 glass rounded-2xl flex items-center justify-center text-2xl shadow-sm">🌓</button>
                <div class="flex flex-col items-center">
                    <span id="pageHeaderTitle" class="text-xs font-black text-slate-400 uppercase tracking-widest">الرئيسية</span>
                    <span class="text-xl font-black">أول "ب" المتميز</span>
                </div>
                <div onclick="showProfile()" class="flex items-center gap-3 glass p-1 pr-4 rounded-2xl cursor-pointer hover:scale-105 transition-all">
                    <span id="userName" class="font-black text-sm">البطل</span>
                    <div class="w-10 h-10 hero-card rounded-xl flex items-center justify-center text-white font-bold">👤</div>
                </div>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto px-6">
            <section id="homePage" class="page active-page">
                <div class="hero-card p-12 text-white mb-10 text-center shadow-2xl">
                    <h1 class="text-4xl font-black mb-3">مرحباً بك في بيتك الثاني ✨</h1>
                    <p class="text-indigo-100 font-bold">بإشراف المبدعة لبنى سلامي</p>
                </div>
                <div id="newsList" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10"></div>
                <h3 class="text-2xl font-black mb-6 flex items-center gap-3">🏆 لوحة الشرف <span class="h-1 flex-1 bg-slate-200 dark:bg-slate-800 rounded-full"></span></h3>
                <div id="starsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </section>

            <section id="homeworkPage" class="page">
                <div id="hwList" class="space-y-6"></div>
            </section>

            <section id="eventsPage" class="page">
                <div id="eventsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </section>
        </main>

        <div class="floating-dock glass">
            <button onclick="showPage('homePage', 'الرئيسية', this)" class="nav-item active flex flex-col items-center">
                <span class="text-2xl">🏠</span>
            </button>
            <button onclick="showPage('homeworkPage', 'الوظائف', this)" class="nav-item flex flex-col items-center">
                <span class="text-2xl">📚</span>
            </button>
            <button onclick="showPage('eventsPage', 'الفعاليات', this)" class="nav-item flex flex-col items-center">
                <span class="text-2xl">📸</span>
            </button>
        </div>
    </div>

    <div id="profileModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center p-6 z-[2000] backdrop-blur-xl">
        <div class="glass p-10 rounded-[3.5rem] w-full max-w-sm text-center shadow-2xl relative">
            <button onclick="hideProfile()" class="absolute top-6 left-6 text-2xl opacity-50">✕</button>
            <div class="w-24 h-24 hero-card mx-auto rounded-[2rem] flex items-center justify-center text-4xl mb-6 shadow-xl">👤</div>
            <h2 id="profName" class="text-3xl font-black mb-8"></h2>
            <div id="examsList" class="space-y-4 mb-10 overflow-y-auto max-h-60 px-2"></div>
            <button onclick="logout()" class="text-red-500 font-bold hover:underline">تسجيل الخروج</button>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';
        
        if(localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        
        window.toggleDarkMode = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        window.showPage = (pid, title, btn) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pid).classList.add('active-page');
            document.getElementById('pageHeaderTitle').innerText = title;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
        };

        const savedUser = JSON.parse(localStorage.getItem('student_session'));
        if(savedUser) loginOk(savedUser);

        document.getElementById('loginBtn').onclick = async () => {
            const u = document.getElementById('u').value, p = document.getElementById('p').value;
            const { data } = await supabase.from('students').select('*').eq('username', u).eq('password', p).single();
            if(data) {
                localStorage.setItem('student_session', JSON.stringify(data));
                loginOk(data);
            } else alert("البيانات غير صحيحة");
        };

        function loginOk(user) {
            document.getElementById('loginGate').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').innerText = user.full_name.split(' ')[0];
            loadData();
        }

        async function loadData() {
            const { data: ads } = await supabase.from('assignments').select('*').order('created_at', {ascending: false});
            
            document.getElementById('newsList').innerHTML = ads.filter(a => a.title && !a.image_url && !a.description).map(a => `
                <div class="glass p-6 rounded-[2rem] border-r-4 border-indigo-500 shadow-sm hover:shadow-md transition-all">
                    <span class="text-indigo-500 font-black mb-2 block text-xs">📢 إعلان هام</span>
                    <p class="font-bold text-lg">${a.title}</p>
                </div>
            `).join('');

            document.getElementById('hwList').innerHTML = ads.filter(a => a.description).map(a => `
                <div class="glass p-8 rounded-[2.5rem] border-b-4 border-purple-500 shadow-xl relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-2 h-full bg-purple-500"></div>
                    <p class="font-black text-xl leading-relaxed">${a.description}</p>
                </div>
            `).join('');

            document.getElementById('eventsGrid').innerHTML = ads.filter(a => a.image_url).map(a => `
                <div class="glass p-4 rounded-[2.5rem] shadow-lg group">
                    <div class="overflow-hidden rounded-[2rem] mb-4 h-64 shadow-inner">
                        <img src="${a.image_url}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                    </div>
                    <p class="font-black text-center text-xl pb-2">${a.title || 'فعالية ممتعة'}</p>
                </div>
            `).join('');

            const { data: stars } = await supabase.from('students').select('*').eq('is_star', true);
            document.getElementById('starsGrid').innerHTML = stars.map(s => `
                <div class="glass p-6 rounded-[2.5rem] text-center shadow-sm border border-white dark:border-slate-800">
                    <div class="text-4xl mb-2">⭐</div>
                    <p class="font-black">${s.full_name.split(' ')[0]}</p>
                </div>
            `).join('');
        }

        window.showProfile = async () => {
            const user = JSON.parse(localStorage.getItem('student_session'));
            document.getElementById('profileModal').classList.replace('hidden', 'flex');
            document.getElementById('profName').innerText = user.full_name;
            const { data } = await supabase.from('exams').select('*').eq('student_id', user.id);
            document.getElementById('examsList').innerHTML = data.map(e => `
                <div class="flex justify-between items-center glass p-4 rounded-2xl">
                    <span class="font-black text-sm">${e.subject}</span>
                    <span class="bg-indigo-500 text-white px-4 py-1 rounded-full text-xs font-black shadow-lg shadow-indigo-500/30">${e.score}</span>
                </div>
            `).join('') || '<p class="text-slate-400 font-bold italic">لا توجد نتائج</p>';
        };
        window.hideProfile = () => document.getElementById('profileModal').classList.replace('flex', 'hidden');
        window.logout = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
</html>
