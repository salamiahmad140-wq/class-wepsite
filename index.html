<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أساطير الأول ب | الإصدار الأسطوري</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p-blue: #0ea5e9; --p-green: #22c55e; --p-gold: #f59e0b; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: #020617; overflow: hidden; touch-action: none; }

        /* حاوية العالم الضخم - قابلة للسحب والتمرير */
        #worldContainer {
            width: 100vw; height: 100vh; overflow: auto;
            background: url('https://www.transparenttextures.com/patterns/clean-gray-paper.png'), #0ea5e9;
            cursor: grab; scroll-behavior: smooth;
        }

        .mega-map {
            width: 2000px; height: 2000px; position: relative;
            background: radial-gradient(circle at 50% 50%, #22c55e 0%, #166534 30%, #0369a1 60%, #020617 100%);
        }

        /* تصميم الطرق (Paths) */
        .road {
            position: absolute; border: 12px dashed rgba(255,255,255,0.3);
            border-radius: 100px; z-index: 1;
        }

        /* المراحل (الأيقونات الضخمة) */
        .stage {
            position: absolute; width: 150px; height: 150px;
            background: white; border-radius: 40px; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 15px 0 #cbd5e1, 0 20px 40px rgba(0,0,0,0.3);
            transition: 0.2s; cursor: pointer; border: 6px solid #f8fafc;
        }
        .stage:active { transform: translateY(10px); box-shadow: 0 5px 0 #cbd5e1; }
        .stage.locked { filter: grayscale(1); opacity: 0.6; cursor: not-allowed; }
        .stage.locked::before { content: '🔒'; position: absolute; top: -20px; font-size: 30px; }

        .stage-icon { font-size: 60px; margin-bottom: 5px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2)); }
        .stage-title { font-weight: 900; color: #1e293b; font-size: 14px; text-align: center; line-height: 1; }

        /* واجهة اللعبة (Game Engine UI) */
        #gameInterface {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: none; flex-direction: column;
        }
        canvas { background: #111; width: 100%; height: 100%; }

        .shimmer { animation: shimmer 2s infinite linear; background: linear-gradient(90deg, #f59e0b, #fff, #f59e0b); background-size: 200% auto; -webkit-background-clip: text; color: transparent; }
        @keyframes shimmer { to { background-position: 200% center; } }
    </style>
</head>
<body>

    <div id="worldContainer">
        <div class="mega-map" id="mapArea">
            
            <div class="absolute top-[200px] left-[300px] text-white font-black text-4xl opacity-20 uppercase tracking-widest">Forest of Letters</div>
            <div class="stage bg-green-500" style="top: 300px; left: 400px;" onclick="initGame('letters_catch')">
                <div class="stage-icon">🍎</div>
                <div class="stage-title">صيد الحركات</div>
            </div>

            <div class="road" style="width: 300px; height: 20px; top: 370px; left: 550px; transform: rotate(10deg);"></div>

            <div class="stage bg-emerald-600" style="top: 400px; left: 850px;" onclick="initGame('word_build')">
                <div class="stage-icon">🐛</div>
                <div class="stage-title">دودة الكلمات</div>
            </div>

            <div class="absolute top-[800px] left-[1200px] text-white font-black text-4xl opacity-20 uppercase tracking-widest">Number Galaxy</div>
            <div class="stage bg-blue-500" style="top: 900px; left: 1300px;" onclick="initGame('math_rocket')">
                <div class="stage-icon">🚀</div>
                <div class="stage-title">صاروخ الجمع</div>
            </div>

            <div class="road" style="width: 400px; height: 20px; top: 1000px; left: 1450px; transform: rotate(-20deg);"></div>

            <div class="stage bg-indigo-600 locked" style="top: 850px; left: 1800px;">
                <div class="stage-icon">👾</div>
                <div class="stage-title">وحش الطرح</div>
            </div>

        </div>
    </div>

    <div id="gameInterface">
        <div class="p-4 bg-slate-900 flex justify-between items-center border-b-4 border-blue-500">
            <button onclick="closeGame()" class="bg-red-500 text-white px-8 py-2 rounded-2xl font-black shadow-lg">خروج ✕</button>
            <div id="scoreBoard" class="text-2xl font-black text-yellow-400">XP: 0</div>
            <div class="text-white font-bold" id="gameInfo">جاري التحميل...</div>
        </div>
        <div id="gameZone" class="relative flex-grow bg-blue-400 overflow-hidden flex items-center justify-center">
            <div id="targetTask" class="absolute top-10 glass p-6 rounded-3xl text-center bg-white/20 backdrop-blur-md">
                <h2 class="text-white text-5xl font-black" id="taskText">...</h2>
            </div>
            <div id="entities" class="w-full h-full relative"></div>
        </div>
    </div>

    <div class="fixed top-6 left-6 right-6 z-[5000] flex justify-between">
        <div class="bg-white/10 backdrop-blur-md p-4 rounded-[2rem] border-2 border-white/20 flex items-center gap-4">
            <div class="w-14 h-14 bg-gradient-to-tr from-yellow-400 to-orange-500 rounded-2xl flex items-center justify-center text-3xl shadow-xl border-2 border-white">👤</div>
            <div>
                <p class="font-black text-white leading-none mb-1">المعلمة لبنى</p>
                <div class="h-3 w-32 bg-black/30 rounded-full overflow-hidden">
                    <div class="h-full bg-green-400 w-[60%] shadow-[0_0_10px_#4ade80]"></div>
                </div>
            </div>
        </div>
        <div class="flex gap-3">
            <button class="w-14 h-14 bg-white/10 backdrop-blur-md rounded-2xl flex items-center justify-center text-2xl border-2 border-white/20">🏆</button>
            <button class="w-14 h-14 bg-white/10 backdrop-blur-md rounded-2xl flex items-center justify-center text-2xl border-2 border-white/20">⚙️</button>
        </div>
    </div>

    <script>
        let xp = 0;
        const gameZone = document.getElementById('entities');

        function initGame(type) {
            document.getElementById('gameInterface').style.display = 'flex';
            if(type === 'letters_catch') startLettersGame();
            if(type === 'math_rocket') startMathGame();
        }

        function startLettersGame() {
            document.getElementById('gameInfo').innerText = "صيد حركات الفتحة";
            document.getElementById('taskText').innerText = "بَ";
            spawnObjects('letter');
        }

        function spawnObjects(type) {
            gameZone.innerHTML = '';
            const items = type === 'letter' ? ["بَ", "بُ", "بِ", "ب"] : ["10+5", "8+2", "3+1"];
            const correct = type === 'letter' ? "بَ" : "10+5";

            for(let i=0; i<15; i++) {
                const el = document.createElement('div');
                el.className = 'absolute cursor-pointer transition-all duration-500';
                const val = items[Math.floor(Math.random() * items.length)];
                el.innerHTML = `<div class="p-6 bg-white rounded-3xl shadow-2xl text-3xl font-black text-blue-600 border-4 border-blue-200">${val}</div>`;
                
                el.style.left = Math.random() * 80 + 10 + '%';
                el.style.top = Math.random() * 80 + 10 + '%';

                el.onclick = () => {
                    if(val === correct) {
                        xp += 50;
                        el.style.transform = 'scale(0) rotate(360deg)';
                        document.getElementById('scoreBoard').innerText = `XP: ${xp}`;
                        if(xp % 200 === 0) alert("بطل أسطوري! استمر في التقدم 🌟");
                    } else {
                        el.style.background = 'red';
                        setTimeout(() => el.style.background = 'white', 200);
                    }
                };
                gameZone.appendChild(el);
            }
        }

        function startMathGame() {
            document.getElementById('gameInfo').innerText = "صاروخ الجمع الذكي";
            document.getElementById('taskText').innerText = "15";
            spawnObjects('math');
        }

        function closeGame() {
            document.getElementById('gameInterface').style.display = 'none';
            gameZone.innerHTML = '';
        }

        // سحب الخريطة بالماوس/اللمس
        let isDown = false; let startX; let startY; let scrollLeft; let scrollTop;
        const slider = document.getElementById('worldContainer');

        slider.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - slider.offsetLeft; startY = e.pageY - slider.offsetTop; scrollLeft = slider.scrollLeft; scrollTop = slider.scrollTop; });
        slider.addEventListener('mouseleave', () => isDown = false);
        slider.addEventListener('mouseup', () => isDown = false);
        slider.addEventListener('mousemove', (e) => { if(!isDown) return; e.preventDefault(); const x = e.pageX - slider.offsetLeft; const y = e.pageY - slider.offsetTop; const walkX = (x - startX) * 2; const walkY = (y - startY) * 2; slider.scrollLeft = scrollLeft - walkX; slider.scrollTop = scrollTop - walkY; });
    </script>
</body>
</html>
