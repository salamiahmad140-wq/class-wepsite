<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أساطير لبنى | التطبيق الرسمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f0fdf4; }
        * { user-select: none; font-family: 'Fredoka', 'Cairo', sans-serif; box-sizing: border-box; }
        body { background: var(--bg); margin: 0; overflow: hidden; height: 100vh; }
        
        /* واجهات النظام الموسع */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; z-index: 10; overflow-y: auto; background-color: #f8fafc; }
        .screen-active { display: flex; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* خريطة المراحل الـ 100 */
        .level-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 20px; padding: 20px; }
        .level-btn { aspect-ratio: 1; border-radius: 25px; background: white; box-shadow: 0 8px 0 #cbd5e1; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; cursor: pointer; transition: 0.2s; position: relative; }
        .level-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #cbd5e1; }
        .locked { filter: grayscale(1); opacity: 0.5; pointer-events: none; }
        .locked::after { content: '🔒'; position: absolute; font-size: 1.5rem; }
        .completed { border: 4px solid #10b981; color: #10b981; }

        /* شريط التنقل السفلي */
        .bottom-nav { position: fixed; bottom: 0; inset-x: 0; background: white; padding: 20px; display: flex; justify-content: space-around; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 1000; border-top-left-radius: 40px; border-top-right-radius: 40px; }
        .nav-btn { font-size: 2.5rem; opacity: 0.4; transition: 0.3s; cursor: pointer; }
        .nav-btn.active { opacity: 1; transform: translateY(-10px) scale(1.2); }
    </style>
</head>
<body>

    <div id="scr-login" class="screen screen-active bg-gradient-to-b from-blue-400 to-indigo-600 justify-center items-center">
        <div class="bg-white/10 backdrop-blur-lg p-12 rounded-[50px] border-4 border-white/30 text-center w-[90%] max-w-lg shadow-2xl">
            <h1 class="text-7xl font-black text-white drop-shadow-lg mb-4">أساطير لبنى</h1>
            <p class="text-xl text-blue-100 mb-10 font-bold tracking-wider">مغامرة التعلم المشوقة</p>
            <input type="text" id="student-code" placeholder="أدخل الكود السري" class="w-full text-center text-4xl p-6 rounded-3xl font-black mb-6 text-indigo-900 outline-none uppercase tracking-widest shadow-inner">
            <button onclick="App.login()" class="w-full bg-amber-400 hover:bg-amber-300 text-indigo-900 py-6 rounded-3xl text-3xl font-black shadow-[0_8px_0_#b45309] active:translate-y-2 active:shadow-none transition-all">ابدأ المغامرة 🚀</button>
        </div>
    </div>

    <div id="scr-profile" class="screen pb-32">
        <div class="bg-indigo-600 p-12 text-center text-white rounded-b-[60px] shadow-xl">
            <div id="p-avatar" class="text-[120px] bg-white w-48 h-48 rounded-full flex items-center justify-center mx-auto shadow-2xl border-8 border-indigo-300 mb-6">👤</div>
            <h2 id="p-name" class="text-6xl font-black mb-2">اسم البطل</h2>
            <p id="p-code" class="text-2xl font-mono text-indigo-200 bg-indigo-800/50 inline-block px-6 py-2 rounded-full">CODE</p>
        </div>
        <div class="max-w-4xl mx-auto w-full p-8 grid grid-cols-2 gap-8 mt-8">
            <div class="bg-white p-8 rounded-[40px] shadow-lg text-center border-b-8 border-amber-400">
                <div class="text-2xl text-slate-400 font-bold mb-4">صندوق الذهب</div>
                <div id="p-coins" class="text-6xl font-black text-amber-500">0 💰</div>
            </div>
            <div class="bg-white p-8 rounded-[40px] shadow-lg text-center border-b-8 border-blue-400">
                <div class="text-2xl text-slate-400 font-bold mb-4">نجوم التميز</div>
                <div id="p-stars" class="text-6xl font-black text-blue-500">0 ⭐</div>
            </div>
        </div>
    </div>

    <div id="scr-worlds" class="screen pb-32 bg-sky-50">
        <h2 class="text-5xl font-black text-center text-slate-800 mt-12 mb-12">اختر كوكبك 🪐</h2>
        <div class="flex flex-col gap-8 px-8 max-w-2xl mx-auto w-full">
            <div onclick="App.openWorld('math')" class="bg-white p-10 rounded-[40px] shadow-xl flex items-center gap-8 cursor-pointer active:scale-95 transition border-l-[15px] border-blue-500">
                <div class="text-[80px]">🧮</div>
                <div>
                    <h3 class="text-4xl font-black text-blue-600">عالم الحساب</h3>
                    <p class="text-xl font-bold text-slate-400 mt-2">100 مرحلة لاكتشاف الأرقام</p>
                </div>
            </div>
            <div onclick="App.openWorld('arabic')" class="bg-white p-10 rounded-[40px] shadow-xl flex items-center gap-8 cursor-pointer active:scale-95 transition border-l-[15px] border-emerald-500">
                <div class="text-[80px]">📖</div>
                <div>
                    <h3 class="text-4xl font-black text-emerald-600">عالم العربية</h3>
                    <p class="text-xl font-bold text-slate-400 mt-2">100 مرحلة لاكتشاف الحروف</p>
                </div>
            </div>
        </div>
    </div>

    <div id="scr-levels" class="screen pb-32">
        <div class="p-8 flex justify-between items-center bg-white shadow-sm sticky top-0 z-50">
            <h2 id="world-title" class="text-4xl font-black text-indigo-900">المراحل</h2>
            <button onclick="App.nav('scr-worlds')" class="text-3xl bg-slate-100 p-4 rounded-2xl">عودة 🔙</button>
        </div>
        <div id="levels-container" class="level-grid max-w-5xl mx-auto w-full mt-8"></div>
    </div>

    <div id="scr-game" class="screen bg-slate-900 items-center justify-center relative">
        <button onclick="App.nav('scr-levels')" class="absolute top-8 right-8 text-4xl bg-red-500 text-white w-16 h-16 rounded-full shadow-lg z-50">❌</button>
        <div class="absolute top-8 left-8 bg-white/90 px-8 py-4 rounded-3xl font-black text-3xl text-indigo-900 shadow-lg z-50" id="game-info">المرحلة 1</div>
        
        <div id="game-board" class="w-full max-w-4xl p-8 flex flex-col items-center justify-center text-center">
            </div>
    </div>

    <nav id="student-nav" class="bottom-nav hidden">
        <div class="nav-btn active" onclick="App.nav('scr-profile', this)">👤</div>
        <div class="nav-btn" onclick="App.nav('scr-worlds', this)">🪐</div>
        <div class="nav-btn" onclick="location.reload()">🚪</div>
    </nav>

<script>
    const DB_KEY = 'LUBNA_OMNIVERSE_DB_2026';
    
    const App = {
        user: null,
        currentWorld: null,

        login() {
            const code = document.getElementById('student-code').value.trim().toUpperCase();
            const data = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            const foundUser = data.find(s => s.code === code);
            
            if(foundUser) {
                this.user = foundUser;
                document.getElementById('student-nav').classList.remove('hidden');
                this.updateProfileData();
                this.nav('scr-profile', document.querySelectorAll('.nav-btn')[0]);
            } else {
                alert("عذراً! الكود غير صحيح أو لم تقم الأستاذة لبنى بتسجيلك بعد.");
            }
        },

        updateProfileData() {
            document.getElementById('p-name').innerText = this.user.name;
            document.getElementById('p-code').innerText = this.user.code;
            document.getElementById('p-avatar').innerText = this.user.avatar;
            document.getElementById('p-coins').innerText = this.user.coins + " 💰";
            document.getElementById('p-stars').innerText = this.user.stars + " ⭐";
        },

        saveProgress() {
            const data = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            const index = data.findIndex(s => s.code === this.user.code);
            if(index !== -1) {
                data[index] = this.user;
                localStorage.setItem(DB_KEY, JSON.stringify(data));
                this.updateProfileData();
            }
        },

        nav(screenId, navEl = null) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('screen-active'));
            document.getElementById(screenId).classList.add('screen-active');
            
            if(navEl) {
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
                navEl.classList.add('active');
            }
        },

        openWorld(world) {
            this.currentWorld = world;
            document.getElementById('world-title').innerText = world === 'math' ? 'جبل الحساب 🧮' : 'وادي الحروف 📖';
            
            const container = document.getElementById('levels-container');
            container.innerHTML = '';
            
            const currentProgress = this.user.progress[world];

            for(let i = 1; i <= 100; i++) {
                const btn = document.createElement('div');
                const isLocked = i > currentProgress + 1;
                const isCompleted = i <= currentProgress;
                
                btn.className = `level-btn ${isLocked ? 'locked' : ''} ${isCompleted ? 'completed text-emerald-500' : 'text-indigo-600'}`;
                btn.innerText = i;
                
                if(!isLocked) {
                    btn.onclick = () => GameEngine.start(i, world);
                }
                container.appendChild(btn);
            }
            this.nav('scr-levels');
        }
    };

    // ==========================================
    // محرك الألعاب المصغر (قابل للتوسع اللانهائي)
    // ==========================================
    const GameEngine = {
        level: 1,
        world: '',

        start(lvl, w) {
            this.level = lvl;
            this.world = w;
            document.getElementById('game-info').innerText = `المرحلة ${lvl}`;
            App.nav('scr-game');
            this.loadLogic();
        },

        loadLogic() {
            const board = document.getElementById('game-board');
            
            // مولد ألعاب بسيط للتوضيح يعتمد على نوع العالم
            const target = this.world === 'math' ? Math.floor(Math.random() * 10) + 1 : ['أ','ب','ت','ث','ج'][Math.floor(Math.random()*5)];
            
            board.innerHTML = `
                <div class="text-white text-5xl font-black mb-12">ابحث عن: <span class="text-amber-400 text-7xl inline-block mx-4 animate-bounce">${target}</span></div>
                <div class="flex flex-wrap gap-8 justify-center max-w-2xl">
                    ${this.generateOptions(target)}
                </div>
            `;
        },

        generateOptions(correctAnswer) {
            let options = [correctAnswer];
            while(options.length < 4) {
                let fake = this.world === 'math' ? Math.floor(Math.random() * 10) + 1 : ['ح','خ','د','ر','س'][Math.floor(Math.random()*5)];
                if(!options.includes(fake)) options.push(fake);
            }
            options.sort(() => Math.random() - 0.5); // خلط الخيارات

            return options.map(opt => `
                <div onclick="GameEngine.checkAnswer('${opt}', '${correctAnswer}', this)" 
                     class="w-32 h-32 bg-white text-indigo-900 rounded-[30px] flex items-center justify-center text-6xl font-black cursor-pointer shadow-[0_10px_0_#cbd5e1] active:translate-y-2 active:shadow-none transition-all">
                    ${opt}
                </div>
            `).join('');
        },

        checkAnswer(selected, correct, element) {
            if(selected === correct) {
                confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
                element.style.backgroundColor = '#10b981'; // أخضر
                element.style.color = 'white';
                
                setTimeout(() => {
                    App.user.coins += 20;
                    App.user.stars += 5;
                    // تحديث التقدم إذا كانت هذه أعلى مرحلة ينجزها
                    if(App.user.progress[this.world] < this.level) {
                        App.user.progress[this.world] = this.level;
                    }
                    App.saveProgress();
                    App.openWorld(this.world); // العودة للخريطة
                }, 1500);
            } else {
                element.style.backgroundColor = '#ef4444'; // أحمر
                element.style.color = 'white';
                element.classList.add('opacity-50', 'pointer-events-none');
                setTimeout(() => {
                    element.style.backgroundColor = 'white';
                    element.style.color = '#312e81';
                    element.classList.remove('opacity-50', 'pointer-events-none');
                }, 800);
            }
        }
    };
</script>
</body>
</html>
