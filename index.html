<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المبدعين | ابن رشد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; }
        body { font-family: 'Cairo', sans-serif; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); overflow-x: hidden; }
        
        body.dark { background: #020617; color: white; }
        body.light { background: #f8fafc; color: #1e293b; }

        .glass { backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .dark .glass { background: rgba(15, 23, 42, 0.75); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .light .glass { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.03); }

        .hero-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%); background-size: 200% 200%; animation: gradientMove 6s ease infinite; }
        @keyframes gradientMove { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        .page { display: none; animation: revealUp 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
        .active-page { display: block; }
        @keyframes revealUp { from { opacity: 0; transform: translateY(40px); filter: blur(10px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }

        .nav-dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; height: 80px; border-radius: 2.5rem; z-index: 1000; display: flex; justify-content: space-around; align-items: center; }
        
        .student-card { transition: all 0.4s ease; border: 1px solid transparent; }
        .student-card:hover { transform: scale(1.05) translateY(-5px); border-color: var(--primary); }
    </style>
</head>
<body class="dark">

    <div id="loginGate" class="min-h-screen flex items-center justify-center p-6 bg-slate-950">
        <div class="glass p-12 rounded-[4rem] w-full max-w-md text-center relative overflow-hidden">
            <h1 class="text-4xl font-black mb-2 tracking-tight">بوابة الصف الأول "ب"</h1>
            <p class="text-indigo-400 font-bold mb-10 text-sm uppercase">مدرسة ابن رشد الابتدائية</p>
            
            <div class="space-y-4">
                <input type="text" id="userInput" placeholder="اسم المستخدم" class="w-full p-5 rounded-[1.5rem] bg-white/5 border border-white/10 outline-none font-bold focus:ring-2 ring-indigo-500 transition-all text-center text-white">
                <input type="password" id="passInput" placeholder="كلمة السر" class="w-full p-5 rounded-[1.5rem] bg-white/5 border border-white/10 outline-none font-bold focus:ring-2 ring-indigo-500 transition-all text-center text-white">
                <button id="submitLogin" class="w-full hero-gradient text-white py-5 rounded-[1.5rem] font-black text-xl shadow-2xl hover:brightness-110 active:scale-95 transition-all">دخول الأبطال 🚀</button>
            </div>
            <button onclick="toggleTheme()" class="mt-8 opacity-40 text-xs font-bold uppercase">تبديل المظهر 🌓</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="p-6 sticky top-0 z-50 glass mb-6">
            <div class="flex justify-between items-center max-w-6xl mx-auto">
                <div class="flex items-center gap-4 cursor-pointer" onclick="openProfile()">
                    <div class="w-14 h-14 rounded-2xl hero-gradient flex items-center justify-center text-white shadow-lg">👤</div>
                    <div class="text-right">
                        <p class="text-[10px] opacity-40 font-black">الملف الشخصي</p>
                        <p id="navName" class="font-black text-sm">...</p>
                    </div>
                </div>
                <h2 id="currentTitle" class="text-xl font-black">الرئيسية</h2>
                <button onclick="toggleTheme()" class="text-2xl w-12 h-12 glass rounded-2xl flex items-center justify-center">🌓</button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto px-6 pb-40">
            <section id="homePage" class="page active-page space-y-16">
                <div class="hero-gradient p-20 rounded-[4rem] text-white text-center shadow-2xl relative">
                    <h1 class="text-5xl md:text-6xl font-black mb-6 leading-tight">أهلاً بك في فضاء الإبداع</h1>
                    <p class="text-indigo-100 text-xl font-bold opacity-90">الصف الأول ب - مدرسة ابن رشد الابتدائية</p>
                </div>
                <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
                <div class="glass p-12 rounded-[4rem]">
                    <h3 class="text-3xl font-black mb-10 flex items-center gap-4">💎 الطلاب المتميزون</h3>
                    <div id="starsGrid" class="grid grid-cols-2 md:grid-cols-5 gap-6"></div>
                </div>
            </section>

            <section id="hwPage" class="page space-y-10">
                <h2 class="text-5xl font-black text-center hero-gradient bg-clip-text text-transparent">ركن الوظائف المدرسية</h2>
                <div id="hwArea" class="grid gap-8"></div>
            </section>

            <section id="eventsPage" class="page space-y-12">
                <h2 class="text-5xl font-black text-center text-purple-400">معرض الفعاليات</h2>
                <div id="eventsArea" class="space-y-20"></div>
            </section>
        </main>

        <div class="nav-dock glass border-white/10 shadow-2xl">
            <button onclick="changePage('homePage', 'الرئيسية', this)" class="text-3xl transition-all text-indigo-500 scale-125">🏠</button>
            <button onclick="changePage('hwPage', 'الوظائف', this)" class="text-3xl opacity-30 transition-all">📚</button>
            <button onclick="changePage('eventsPage', 'الفعاليات', this)" class="text-3xl opacity-30 transition-all">📸</button>
        </div>
    </div>

    <div id="profileModal" class="fixed inset-0 bg-black/95 hidden items-center justify-center p-4 z-[2000] backdrop-blur-3xl">
        <div class="glass w-full max-w-sm rounded-[4rem] overflow-hidden">
            <div class="h-32 hero-gradient"></div>
            <div class="p-10 -mt-16 text-center">
                <div class="w-24 h-24 rounded-[2.5rem] bg-slate-950 border-4 border-white mx-auto flex items-center justify-center text-white text-4xl shadow-2xl mb-4">👤</div>
                <h2 id="pFullName" class="text-2xl font-black mb-6"></h2>
                <div id="pExams" class="space-y-2 max-h-40 overflow-y-auto text-right"></div>
                <button onclick="logout()" class="mt-8 text-red-500 font-black text-xs uppercase opacity-40 hover:opacity-100 transition-all">خروج</button>
                <button onclick="closeProfile()" class="block w-full mt-4 font-bold opacity-20">إغلاق</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        // 1. نظام الثيم
        window.toggleTheme = () => {
            const isDark = document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
            localStorage.setItem('ibn_theme', isDark ? 'dark' : 'light');
        };
        if(localStorage.getItem('ibn_theme') === 'light') toggleTheme();

        // 2. التنقل بين الصفحات
        window.changePage = (id, title, btn) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.getElementById('currentTitle').innerText = title;
            document.querySelectorAll('.nav-dock button').forEach(b => { b.classList.add('opacity-30'); b.classList.remove('scale-125', 'text-indigo-500'); });
            btn.classList.remove('opacity-30'); btn.classList.add('scale-125', 'text-indigo-500');
        };

        // 3. التحقق من الدخول
        const session = JSON.parse(localStorage.getItem('ibn_rushd_session'));
        if(session) loginOk(session);

        // 4. معالجة الضغط على زر الدخول (الإصلاح هنا)
        document.getElementById('submitLogin').addEventListener('click', async () => {
            const u = document.getElementById('userInput').value.trim();
            const p = document.getElementById('passInput').value.trim();

            if(!u || !p) return alert("يرجى إدخال اسم المستخدم وكلمة السر");

            const { data, error } = await supabase
                .from('students')
                .select('*')
                .eq('username', u)
                .eq('password', p)
                .maybeSingle();

            if (error) {
                console.error("Supabase Error:", error);
                alert("حدث خطأ في الاتصال");
            } else if (data) {
                localStorage.setItem('ibn_rushd_session', JSON.stringify(data));
                loginOk(data);
            } else {
                alert("اسم المستخدم أو كلمة السر غير صحيحة");
            }
        });

        function loginOk(user) {
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('navName').innerText = user.full_name;
            loadData();
        }

        async function loadData() {
            const { data: ads } = await supabase.from('assignments').select('*').order('created_at', {ascending: false});
            const { data: stds } = await supabase.from('students').select('*').order('full_name');

            if(ads) {
                document.getElementById('newsGrid').innerHTML = ads.filter(a => a.title && !a.description && !a.image_url).map(a => `<div class="glass p-10 rounded-[3.5rem] border-l-8 border-indigo-500 shadow-2xl"><span class="text-indigo-400 font-black text-xs block mb-3 uppercase">إعلان رسمي</span><p class="text-2xl font-black">${a.title}</p></div>`).join('');
                document.getElementById('hwArea').innerHTML = ads.filter(a => a.description).map(a => `<div class="glass p-12 rounded-[4rem] border-b-8 border-indigo-600/50 shadow-inner"><p class="text-3xl font-black">${a.description}</p></div>`).join('');
                document.getElementById('eventsArea').innerHTML = ads.filter(a => a.image_url).map(a => {
                    const isV = a.image_url.includes('mp4') || a.image_url.includes('youtu');
                    return `<div class="space-y-8 max-w-4xl mx-auto"><h4 class="text-4xl font-black text-center hero-gradient bg-clip-text text-transparent">${a.title || ''}</h4><div class="glass p-4 rounded-[3rem] overflow-hidden">${isV ? `<video src="${a.image_url}" controls class="w-full rounded-[2rem]"></video>` : `<img src="${a.image_url}" class="w-full rounded-[2rem]">`}</div></div>`;
                }).join('');
            }
            if(stds) {
                document.getElementById('starsGrid').innerHTML = stds.filter(s => s.is_star).map(s => `<div class="glass p-8 rounded-[3rem] text-center student-card"><div class="text-4xl mb-3">💎</div><p class="font-black text-xs">${s.full_name.split(' ')[0]}</p></div>`).join('');
            }
        }

        window.openProfile = async () => {
            const user = JSON.parse(localStorage.getItem('ibn_rushd_session'));
            document.getElementById('profileModal').classList.replace('hidden', 'flex');
            document.getElementById('pFullName').innerText = user.full_name;
            const { data } = await supabase.from('exams').select('*').eq('student_id', user.id).order('created_at', {ascending: false});
            document.getElementById('pExams').innerHTML = data ? data.map(e => `<div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl mb-2"><span class="font-black text-xs opacity-60">${e.subject}</span><span class="hero-gradient text-white px-5 py-1.5 rounded-full font-black text-[10px]">${e.score}</span></div>`).join('') : '';
        };
        window.closeProfile = () => document.getElementById('profileModal').classList.replace('flex', 'hidden');
        window.logout = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
</html>
