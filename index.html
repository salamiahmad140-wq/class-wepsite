<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أساطير لبنى | المنظومة الكونية 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --p-math: #3B82F6; --p-lang: #10B981; --p-bg: #EEF2FF;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { user-select: none; font-family: 'Fredoka', 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--p-bg); margin: 0; overflow: hidden; height: 100vh; color: #1E293B; }

        /* بوابة الدخول السحرية */
        .portal-bg { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .magic-input { background: rgba(255,255,255,0.2); border: 3px solid rgba(255,255,255,0.4); backdrop-filter: blur(10px); color: white; transition: 0.3s; }
        .magic-input:focus { background: white; color: #6366f1; transform: scale(1.05); }

        /* نظام الشاشات */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; z-index: 10; overflow: hidden; }
        .active { display: flex; animation: zoomIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        /* خريطة الأكوان المتطورة */
        .universe-orb {
            width: 380px; height: 480px; background: white; border-radius: 80px;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.1); border: 12px solid white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.4s; cursor: pointer; position: relative;
        }
        .universe-orb:hover { transform: translateY(-30px); border-color: #6366f1; }
        .orb-icon { font-size: 160px; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.1)); animation: float 5s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-20px) rotate(5deg); } }

        /* مراحل التشويق */
        .level-card {
            width: 220px; height: 220px; background: white; border-radius: 50px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; box-shadow: 0 15px 0 #cbd5e1; cursor: pointer; transition: 0.2s;
        }
        .locked-step { filter: grayscale(1); opacity: 0.4; cursor: not-allowed; }
        .locked-step::after { content: '🔒'; position: absolute; font-size: 50px; }
        .coming-soon-badge { position: absolute; top: -10px; background: #ef4444; color: white; padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: 900; }

        /* شريط الأدوات */
        .bottom-dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
            padding: 15px 50px; border-radius: 100px; display: flex; gap: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15); z-index: 1000;
        }
        .dock-btn { font-size: 2.8rem; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0.3; }
        .dock-btn.active { opacity: 1; transform: translateY(-20px) scale(1.4); }

        /* المحرك الرسومي */
        canvas { width: 100%; height: 100%; cursor: none; }
    </style>
</head>
<body>

    <div id="scr-login" class="screen active portal-bg">
        <div class="m-auto text-center space-y-10">
            <div class="relative">
                <span class="text-[180px] block animate-pulse">👑</span>
                <div class="absolute -top-10 -right-10 bg-white p-4 rounded-full shadow-2xl animate-bounce text-4xl">✨</div>
            </div>
            <h1 class="text-8xl font-black text-white drop-shadow-2xl">أساطير لبنى</h1>
            <p class="text-white/70 text-2xl font-bold tracking-[0.5em] uppercase">The Legend Starts Here</p>
            
            <div class="w-[500px] mx-auto space-y-6">
                <input type="text" id="p-code" placeholder="اكتب كودك السحري هنا" 
                    class="w-full p-8 rounded-[40px] text-center text-4xl font-black magic-input outline-none uppercase">
                <button onclick="Core.login()" 
                    class="w-full py-8 bg-white text-indigo-600 rounded-[40px] text-4xl font-black shadow-[0_15px_0_#cbd5e1] active:translate-y-2 active:shadow-none transition-all">
                    فتح البوابة 🔓
                </button>
            </div>
            <button onclick="Core.nav('scr-admin')" class="text-white/30 hover:text-white transition font-bold">إدارة المعلمة لبنى</button>
        </div>
    </div>

    <div id="scr-multiverse" class="screen bg-indigo-50 p-20">
        <header class="text-center mb-20">
            <h2 class="text-7xl font-black text-slate-800">اختر عالمك يا بطل! 🌌</h2>
        </header>
        <div class="flex justify-center gap-16">
            <div class="universe-orb" onclick="Core.enterUniverse('math')">
                <div class="orb-icon">🧮</div>
                <h3 class="text-5xl font-black text-blue-500 mt-12">عالم الحساب</h3>
                <p class="text-slate-400 font-bold mt-4">20 مرحلة شيقة</p>
            </div>
            <div class="universe-orb" onclick="Core.enterUniverse('lang')">
                <div class="orb-icon">📖</div>
                <h3 class="text-5xl font-black text-emerald-500 mt-12">عالم العربية</h3>
                <p class="text-slate-400 font-bold mt-4">20 مرحلة شيقة</p>
            </div>
        </div>
    </div>

    <div id="scr-map" class="screen bg-white overflow-y-auto p-20">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-center mb-20">
                <h2 id="uni-title" class="text-6xl font-black text-indigo-900">المراحل</h2>
                <div class="flex gap-4">
                    <div class="bg-amber-100 text-amber-600 px-10 py-5 rounded-full text-3xl font-black">💰 <span id="u-coins">0</span></div>
                    <div class="bg-blue-100 text-blue-600 px-10 py-5 rounded-full text-3xl font-black">⭐ <span id="u-stars">0</span></div>
                </div>
            </div>
            <div id="map-grid" class="grid grid-cols-4 gap-12">
                </div>
        </div>
    </div>

    <div id="scr-game" class="screen bg-slate-900">
        <div class="absolute top-10 inset-x-10 flex justify-between items-start z-[100] pointer-events-none">
            <div class="bg-white/90 backdrop-blur p-6 rounded-[40px] shadow-2xl flex items-center gap-6 pointer-events-auto">
                <div id="game-timer" class="w-20 h-20 bg-indigo-600 rounded-full flex items-center justify-center text-white text-3xl font-black">120</div>
                <div>
                    <h3 id="game-task" class="text-4xl font-black text-indigo-900">أين الرقم 5؟</h3>
                    <p class="text-indigo-400 font-bold uppercase tracking-widest">المهمة جارية...</p>
                </div>
            </div>
            <button onclick="Core.nav('scr-map')" class="bg-red-500 text-white p-6 rounded-full text-3xl pointer-events-auto shadow-2xl">❌</button>
        </div>
        <canvas id="stage"></canvas>
    </div>

    <div id="scr-store" class="screen bg-pink-50 pt-32 p-10 overflow-y-auto">
        <h2 class="text-7xl font-black text-center text-pink-500 mb-20">متجر الأبطال 🛍️</h2>
        <div id="store-grid" class="grid grid-cols-4 gap-10 max-w-6xl mx-auto"></div>
    </div>

    <div id="scr-admin" class="screen bg-slate-100 p-12 overflow-y-auto !text-slate-900">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-10 bg-white p-10 rounded-[50px] shadow-xl border-l-[20px] border-indigo-600">
                <h1 class="text-5xl font-black">مكتب الأستاذة لبنى 👑</h1>
                <button onclick="Admin.addStudent()" class="bg-indigo-600 text-white px-10 py-5 rounded-3xl font-black text-xl">إضافة بطل جديد +</button>
            </div>
            <div class="bg-white rounded-[50px] shadow-2xl overflow-hidden">
                <table class="w-full text-right text-xl">
                    <thead class="bg-slate-50 border-b">
                        <tr>
                            <th class="p-8">البطل</th>
                            <th class="p-8">الكود</th>
                            <th class="p-8">التقدم</th>
                            <th class="p-8">التحكم</th>
                        </tr>
                    </thead>
                    <tbody id="admin-list"></tbody>
                </table>
            </div>
            <button onclick="Core.nav('scr-login')" class="mt-10 opacity-30">خروج</button>
        </div>
    </div>

    <nav id="navbar" class="bottom-dock hidden">
        <div class="dock-btn active" onclick="Core.nav('scr-multiverse', this)">🪐</div>
        <div class="dock-btn" onclick="Core.nav('scr-store', this)">🛍️</div>
        <div class="dock-btn" onclick="Core.nav('scr-admin', this)">⚙️</div>
        <div class="dock-btn" onclick="location.reload()">🔒</div>
    </nav>

<script>
    // ==========================================
    // ⚙️ نظام البيانات (Database Engine)
    // ==========================================
    const DB = {
        save: (d) => localStorage.setItem('LUBNA_GOD_MODE_2026', JSON.stringify(d)),
        load: () => JSON.parse(localStorage.getItem('LUBNA_GOD_MODE_2026')) || [],
        store: [
            {id:1, n:'تاج ذهبي', i:'👑', p:200}, {id:2, n:'مركبة فضاء', i:'🚀', p:500},
            {id:3, n:'قطة ذكية', i:'🐱', p:100}, {id:4, n:'رداء القوة', i:'🦸', p:1000}
        ]
    };

    // ==========================================
    // 🧠 منطق التشغيل (Core System)
    // ==========================================
    const Core = {
        user: null,
        uni: 'math',

        login() {
            const code = document.getElementById('p-code').value.trim().toUpperCase();
            const students = DB.load();
            const found = students.find(s => s.code === code);
            if(found) {
                this.user = found;
                this.nav('scr-multiverse');
                document.getElementById('navbar').classList.remove('hidden');
                this.updateUI();
            } else alert("الكود خطأ! اطلب الكود من أستاذتك لبنى 👑");
        },

        nav(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) {
                document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
            }
            if(id === 'scr-store') this.renderStore();
            if(id === 'scr-admin') Admin.render();
        },

        enterUniverse(u) {
            this.uni = u;
            document.getElementById('uni-title').innerText = u === 'math' ? 'كوكب الحساب 🧮' : 'كوكب العربية 📖';
            this.renderMap();
            this.nav('scr-map');
        },

        updateUI() {
            document.getElementById('u-coins').innerText = this.user.coins;
            document.getElementById('u-stars').innerText = this.user.stars;
            // حفظ البيانات
            const students = DB.load();
            const idx = students.findIndex(s => s.code === this.user.code);
            students[idx] = this.user;
            DB.save(students);
        },

        renderMap() {
            const grid = document.getElementById('map-grid');
            grid.innerHTML = '';
            const progress = this.user.progress[this.uni] || 0;

            for(let i=1; i<=20; i++) {
                const isLocked = i > (progress + 1);
                const isNext = i === (progress + 2);
                
                const card = document.createElement('div');
                card.className = `level-card ${isLocked ? 'locked-step' : ''}`;
                card.innerHTML = `
                    ${isNext ? '<div class="coming-soon-badge">قريباً جداً ⏳</div>' : ''}
                    <span class="text-7xl font-black ${isLocked?'text-slate-300':'text-indigo-600'}">${i}</span>
                    <span class="mt-4 font-bold opacity-30">مهمة ${i}</span>
                `;
                if(!isLocked) card.onclick = () => Game.init(i);
                grid.appendChild(card);
            }
        },

        renderStore() {
            const grid = document.getElementById('store-grid');
            grid.innerHTML = DB.store.map(it => `
                <div class="bg-white p-10 rounded-[50px] shadow-xl text-center">
                    <div class="text-[100px] mb-6">${it.i}</div>
                    <div class="text-3xl font-black mb-6">${it.n}</div>
                    <button class="w-full bg-pink-500 text-white py-5 rounded-3xl font-black text-2xl">${it.p} 💰</button>
                </div>
            `).join('');
        }
    };

    // ==========================================
    // 🎮 محرك الألعاب (The Ultimate Game Engine)
    // ==========================================
    const Game = {
        canvas: document.getElementById('stage'),
        ctx: document.getElementById('stage').getContext('2d'),
        active: false,
        items: [],
        target: null,
        timer: 120,

        init(lvl) {
            this.active = true;
            this.timer = 120;
            this.items = [];
            this.canvas.width = window.innerWidth;
            this.canvas.height = window.innerHeight;
            
            this.setTarget();
            Core.nav('scr-game');
            this.loop();
            this.countdown();
        },

        setTarget() {
            if(Core.uni === 'math') {
                this.target = Math.floor(Math.random()*20);
                document.getElementById('game-task').innerText = "أين الرقم: " + this.target;
            } else {
                const letters = ['أ','ب','ت','ث','ج','ح','خ','د'];
                this.target = letters[Math.floor(Math.random()*letters.length)];
                document.getElementById('game-task').innerText = "أين الحرف: " + this.target;
            }
        },

        countdown() {
            const intv = setInterval(() => {
                if(!this.active) { clearInterval(intv); return; }
                this.timer--;
                document.getElementById('game-timer').innerText = this.timer;
                if(this.timer <= 0) this.end();
            }, 1000);
        },

        loop() {
            if(!this.active) return;
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

            if(Math.random() < 0.05) {
                this.items.push({
                    x: Math.random()*this.canvas.width,
                    y: -100,
                    v: Core.uni === 'math' ? Math.floor(Math.random()*20) : ['أ','ب','ت','ث'][Math.floor(Math.random()*4)],
                    s: 3 + Math.random()*5,
                    c: `hsl(${Math.random()*360}, 70%, 50%)`
                });
            }

            this.items.forEach((it, idx) => {
                it.y += it.s;
                this.ctx.fillStyle = it.c;
                this.ctx.beginPath();
                this.ctx.arc(it.x, it.y, 60, 0, Math.PI*2);
                this.ctx.fill();
                this.ctx.fillStyle = "white";
                this.ctx.font = "bold 50px Cairo";
                this.ctx.textAlign = "center";
                this.ctx.fillText(it.v, it.x, it.y + 20);

                if(it.y > this.canvas.height + 100) this.items.splice(idx, 1);
            });

            requestAnimationFrame(() => this.loop());
        },

        end() {
            this.active = false;
            confetti({ particleCount: 200, spread: 100 });
            Core.user.coins += 100;
            Core.user.stars += 10;
            Core.user.progress[Core.uni]++;
            Core.updateUI();
            alert("رائع يا بطل! لقد ختمت المهمة ✨");
            Core.nav('scr-map');
        }
    };

    window.addEventListener('mousedown', (e) => {
        if(!Game.active) return;
        Game.items.forEach((it, idx) => {
            const dist = Math.hypot(it.x - e.clientX, it.y - e.clientY);
            if(dist < 80) {
                if(it.v == Game.target) {
                    Game.items = [];
                    Game.end();
                } else {
                    it.s = 20; // هروب عند الخطأ
                }
            }
        });
    });

    // ==========================================
    // 👩‍🏫 لوحة الإدارة (Admin Dashboard)
    // ==========================================
    const Admin = {
        render() {
            const list = document.getElementById('admin-list');
            const students = DB.load();
            list.innerHTML = students.map(s => `
                <tr class="border-b">
                    <td class="p-8 font-black">${s.name}</td>
                    <td class="p-8"><span class="bg-indigo-100 text-indigo-600 px-6 py-2 rounded-2xl font-mono">${s.code}</span></td>
                    <td class="p-8">حساب: ${s.progress.math} | عربية: ${s.progress.lang}</td>
                    <td class="p-8"><button class="text-red-500 underline" onclick="Admin.del('${s.code}')">حذف</button></td>
                </tr>
            `).join('');
        },
        addStudent() {
            const n = prompt("اسم البطل الجديد:");
            if(n) {
                const students = DB.load();
                const code = "LUB-" + Math.floor(100+Math.random()*900);
                students.push({name: n, code: code, coins: 100, stars: 0, progress: {math:0, lang:0}});
                DB.save(students);
                this.render();
                alert("كود البطل هو: " + code);
            }
        },
        del(c) {
            if(confirm("حذف الطالب؟")) {
                const students = DB.load().filter(s => s.code !== c);
                DB.save(students);
                this.render();
            }
        }
    };

    // تشغيل تجريبي
    if(DB.load().length === 0) {
        DB.save([{name: "بطل تجريبي", code: "TEST", coins: 0, stars: 0, progress: {math:0, lang:0}}]);
    }
</script>
</body>
</html>
