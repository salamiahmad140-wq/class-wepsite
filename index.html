<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مملكة الأستاذة لبنى السحرية 🌸</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Fredoka:wght@600&display=swap" rel="stylesheet">

    <style>
        :root { --soft-pink: #ffafcc; --soft-blue: #a2d2ff; --soft-green: #b5e48c; --gold: #ffd60a; }
        * { font-family: 'Fredoka', 'Cairo', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: linear-gradient(135deg, #fef9e7 0%, #f0fdf4 100%);
            height: 100vh; overflow: hidden; margin: 0;
        }

        /* غيوم وفقاعات خلفية */
        .bg-element { position: absolute; pointer-events: none; z-index: 0; opacity: 0.5; }
        
        /* تأثير الصفحات السحابي */
        .page { position: absolute; inset: 0; display: none; flex-direction: column; padding: 20px; overflow-y: auto; padding-bottom: 120px; z-index: 10; }
        .page-active { display: flex; animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* خريطة المراحل المطورة */
        .lvl-btn { 
            width: 90px; height: 90px; border-radius: 30px; background: white; 
            display: flex; items: center; justify-content: center; font-size: 2.5rem;
            font-weight: 900; color: #475569; border: 6px solid #e2e8f0;
            box-shadow: 0 10px 0 #cbd5e1; cursor: pointer; transition: 0.3s;
            position: relative;
        }
        .lvl-btn.done { background: var(--soft-green); border-color: #7db342; color: white; box-shadow: 0 10px 0 #558b2f; }
        .lvl-btn.active-now { border-color: var(--soft-pink); animation: pulseLvl 1.5s infinite; }
        @keyframes pulseLvl { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        /* المتجر والبطاقات */
        .shop-card { 
            background: white; border-radius: 35px; border: 5px solid #fce7f3; 
            padding: 15px; text-align: center; cursor: pointer; transition: 0.3s;
            box-shadow: 0 8px 0 #fbcfe8;
        }
        .shop-card:hover { transform: translateY(-5px); background: #fff1f2; }
        .shop-card.owned { border-color: var(--soft-green); box-shadow: 0 8px 0 #d9f99d; }

        /* شريط التحكم الكرتوني */
        .bottom-nav { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            padding: 12px 35px; border-radius: 50px; display: flex; gap: 30px;
            border: 5px solid var(--soft-blue); z-index: 1000; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .nav-item { font-size: 2.8rem; cursor: pointer; transition: 0.4s; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1)); }
        .nav-item.active { transform: translateY(-15px) scale(1.3); }

        /* شاشة اللعبة */
        #game-arena { position: fixed; inset: 0; background: #fff; z-index: 5000; display: none; background: radial-gradient(circle, #fdfcfb 0%, #e2d1c3 100%); }
        .game-target { background: white; border: 8px solid var(--soft-pink); padding: 20px 50px; border-radius: 50px; font-size: 4rem; font-weight: 900; color: #db2777; box-shadow: 0 15px 30px rgba(219, 39, 119, 0.2); }
    </style>
</head>
<body>

    <div class="bg-element" style="top:10%; left:5%;">☁️</div>
    <div class="bg-element" style="top:20%; right:10%;">🌸</div>
    <div class="bg-element" style="bottom:30%; left:15%;">🦋</div>

    <div id="p-login" class="page page-active justify-center items-center">
        <div class="bg-white/90 p-12 rounded-[60px] border-[12px] border-pink-200 text-center w-[90%] max-w-lg shadow-2xl">
            <div class="text-9xl mb-4 animate-bounce">🎈</div>
            <h1 class="text-7xl font-black text-pink-400 mb-2">عالم لبنى</h1>
            <p class="text-blue-400 font-bold text-2xl mb-10">مرحباً بك يا بطل الصف الأول!</p>
            <input type="text" id="user-code" placeholder="أدخل كودك السحري" class="w-full text-center text-3xl p-6 rounded-full border-4 border-blue-100 outline-none focus:border-pink-300 mb-8 font-black bg-blue-50/50">
            <button onclick="App.login()" class="w-full py-6 bg-gradient-to-r from-pink-400 to-pink-500 text-white rounded-full text-4xl font-black shadow-[0_12px_0_#db2777] active:translate-y-2 active:shadow-none transition-all">هيا بنا! ✨</button>
        </div>
    </div>

    <div id="p-home" class="page items-center">
        <div class="w-full max-w-4xl bg-white/70 backdrop-blur-md rounded-[70px] p-10 border-[10px] border-white shadow-2xl mt-10 relative">
            <div class="flex justify-between w-full mb-10">
                <div class="bg-white px-8 py-3 rounded-full border-4 border-amber-300 text-3xl font-black text-amber-500 shadow-sm">💰 <span id="u-coins">0</span></div>
                <div class="bg-white px-8 py-3 rounded-full border-4 border-blue-300 text-3xl font-black text-blue-500 shadow-sm">⭐ <span id="u-stars">0</span></div>
            </div>
            
            <div class="relative group">
                <div id="u-avatar" class="w-56 h-56 bg-gradient-to-b from-pink-50 to-white rounded-full flex items-center justify-center text-[110px] border-8 border-pink-100 shadow-inner">👤</div>
                <div id="u-tag" class="absolute -top-8 -right-8 text-9xl animate-pulse"></div>
            </div>
            
            <h2 id="u-name" class="text-7xl font-black text-indigo-900 mt-6 mb-12 italic">البطل المبدع</h2>
            
            <div class="grid grid-cols-2 gap-8 w-full">
                <button onclick="App.nav('p-worlds')" class="bg-blue-400 text-white p-8 rounded-[45px] text-4xl font-black border-b-[15px] border-blue-600 active:translate-y-2 active:border-b-0 transition-all">الخريطة 🗺️</button>
                <button onclick="App.nav('p-shop')" class="bg-pink-400 text-white p-8 rounded-[45px] text-4xl font-black border-b-[15px] border-pink-600 active:translate-y-2 active:border-b-0 transition-all">المتجر 🎁</button>
            </div>
        </div>
    </div>

    <div id="p-shop" class="page">
        <h2 class="text-6xl font-black text-center text-pink-500 mb-10 mt-5">هدايا الأبطال 🛍️</h2>
        <div id="shop-grid" class="grid grid-cols-2 md:grid-cols-5 gap-6 max-w-6xl mx-auto p-4"></div>
    </div>

    <div id="p-leader" class="page items-center">
        <h2 class="text-6xl font-black text-blue-500 mb-10 mt-5">أوائل الصف الأول ب 🏆</h2>
        <div id="leader-list" class="w-full max-w-3xl space-y-4"></div>
    </div>

    <div id="p-worlds" class="page items-center justify-center">
        <h2 class="text-6xl font-black text-indigo-900 mb-16">اختر مغامرتك السحرية 🌈</h2>
        <div class="flex flex-wrap justify-center gap-12">
            <div onclick="App.openMap('math')" class="w-80 bg-white p-12 rounded-[60px] border-b-[20px] border-blue-300 text-center cursor-pointer hover:scale-105 transition shadow-xl">
                <div class="text-[130px] mb-4">🧮</div>
                <h3 class="text-4xl font-black text-blue-500">عالم الأرقام</h3>
            </div>
            <div onclick="App.openMap('arabic')" class="w-80 bg-white p-12 rounded-[60px] border-b-[20px] border-pink-300 text-center cursor-pointer hover:scale-105 transition shadow-xl">
                <div class="text-[130px] mb-4">📖</div>
                <h3 class="text-4xl font-black text-pink-500">عالم الحروف</h3>
            </div>
        </div>
    </div>

    <div id="p-map" class="page">
        <div class="flex justify-between items-center p-8 bg-white/50 backdrop-blur-md rounded-full mb-10">
            <h2 id="map-title" class="text-5xl font-black text-indigo-900">المراحل</h2>
            <button onclick="App.nav('p-worlds')" class="bg-pink-400 text-white px-10 py-4 rounded-full font-black text-2xl">رجوع</button>
        </div>
        <div id="map-grid" class="flex flex-wrap justify-center gap-10"></div>
    </div>

    <div id="game-arena">
        <div class="absolute top-10 inset-x-10 flex justify-between items-center z-[6000]">
            <div class="bg-blue-500 text-white px-10 py-5 rounded-full text-4xl font-black shadow-lg">⭐ <span id="g-count">0</span> / 5</div>
            <div id="g-task" class="game-target">...</div>
            <button onclick="Game.exit()" class="bg-red-400 text-white w-24 h-24 rounded-full text-5xl font-black shadow-xl">✕</button>
        </div>
        <div id="play-field" class="w-full h-full relative overflow-hidden"></div>
    </div>

    <nav id="main-nav" class="bottom-nav hidden">
        <div class="nav-item active" onclick="App.nav('p-home', this)">🏠</div>
        <div class="nav-item" onclick="App.nav('p-leader', this)">🏆</div>
        <div class="nav-item" onclick="App.nav('p-shop', this)">🎁</div>
        <div class="nav-item" onclick="App.nav('p-worlds', this)">🎮</div>
    </nav>

<script>
/**
 * 💡 المحرك الذكي (App Smart Engine)
 */
const App = {
    dbKey: 'LUBNA_ULTIMATE_SAFE_V3',
    user: null,
    items: [
        {id:1, n:'تاج الأميرات', e:'👑', p:100}, {id:2, n:'خوذة بطل', e:'🪖', p:100},
        {id:3, n:'فراشة وردية', e:'🦋', p:150}, {id:4, n:'روبوت ذكي', e:'🤖', p:150},
        {id:5, n:'عصا النجوم', e:'🪄', p:200}, {id:6, n:'سيارة برق', e:'⚡', p:200},
        // توليد 44 عنصر إضافي لجعلها 50
        ...Array.from({length: 44}, (_, i) => ({
            id: i+7, n: 'هدية ' + (i+7), e: ['🍭','🎈','🚀','🦄','🦁','💎','🚁','🧸','🎸','🚲','⚽','🍦'][i%12], p: (i+5)*20
        }))
    ],

    login() {
        const code = document.getElementById('user-code').value.trim().toUpperCase();
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const found = db.find(s => s.code === code);
        
        if(found) {
            this.user = found;
            if(!this.user.inventory) this.user.inventory = [];
            if(!this.user.doneLevels) this.user.doneLevels = { math: [], arabic: [] };
            this.nav('p-home');
            document.getElementById('main-nav').classList.remove('hidden');
            this.sync();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else alert("يا بطل! الكود غير موجود، تأكد من معلمتك لبنى.");
    },

    nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
        document.getElementById(id).classList.add('page-active');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
        if(id === 'p-shop') this.renderShop();
        if(id === 'p-leader') this.renderLeaderboard();
    },

    sync() {
        document.getElementById('u-name').innerText = this.user.name;
        document.getElementById('u-stars').innerText = this.user.stars;
        document.getElementById('u-coins').innerText = this.user.coins;
        document.getElementById('u-tag').innerText = this.user.tag || '';
        
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const idx = db.findIndex(s => s.code === this.user.code);
        db[idx] = this.user;
        localStorage.setItem(this.dbKey, JSON.stringify(db));
    },

    renderShop() {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = this.items.map(item => {
            const owned = this.user.inventory.includes(item.id);
            return `
                <div class="shop-card ${owned?'owned':''}" onclick="App.buy(${item.id})">
                    <div class="text-7xl mb-2">${item.e}</div>
                    <div class="font-black text-xl text-indigo-900">${item.n}</div>
                    <div class="bg-amber-400 text-white rounded-full px-4 py-1 mt-2 font-black inline-block">${item.p} 💰</div>
                </div>
            `;
        }).join('');
    },

    buy(id) {
        const item = this.items.find(i => i.id === id);
        if(this.user.inventory.includes(id)) {
            this.user.tag = item.e;
            this.sync();
            alert("تم التغيير إلى: " + item.e);
            return;
        }
        if(this.user.coins >= item.p) {
            this.user.coins -= item.p;
            this.user.inventory.push(id);
            this.user.tag = item.e;
            this.sync();
            this.renderShop();
            confetti({ particleCount: 100 });
        } else alert("نقودك لا تكفي، العب أكثر لتجمع الكوينز!");
    },

    renderLeaderboard() {
        const db = (JSON.parse(localStorage.getItem(this.dbKey)) || []).sort((a,b) => b.stars - a.stars);
        document.getElementById('leader-list').innerHTML = db.map((s, i) => `
            <div class="flex justify-between items-center p-6 bg-white rounded-[35px] border-4 border-blue-50 shadow-md ${s.code===this.user.code?'border-pink-300 bg-pink-50':''}">
                <div class="flex items-center gap-6">
                    <span class="text-4xl font-black text-blue-300">#${i+1}</span>
                    <span class="text-6xl">${s.avatar || '🦁'}</span>
                    <div class="text-3xl font-black text-indigo-900">${s.name} <span class="text-5xl ml-2">${s.tag || ''}</span></div>
                </div>
                <div class="text-4xl font-black text-amber-500">${s.stars} ⭐</div>
            </div>
        `).join('');
    },

    openMap(world) {
        this.currentWorld = world;
        document.getElementById('map-title').innerText = world === 'math' ? 'مغامرة الحساب' : 'مغامرة العربية';
        const grid = document.getElementById('map-grid');
        grid.innerHTML = '';
        for(let i=1; i<=100; i++) {
            const isDone = this.user.doneLevels[world].includes(i);
            const isLocked = i > 5;
            const btn = document.createElement('div');
            btn.className = `lvl-btn ${isDone ? 'done' : ''} ${isLocked ? 'opacity-40' : 'active-now'}`;
            btn.innerHTML = isLocked ? '🔒' : (isDone ? '✅' : i);
            if(!isLocked) btn.onclick = () => Game.start(i, world);
            else btn.onclick = () => alert("هذه المرحلة ستفتحها المعلمة لبنى قريباً! 🔥");
            grid.appendChild(btn);
        }
        this.nav('p-map');
    }
};

/**
 * 🎮 محرك الألعاب المتطور (Game Engine)
 */
const Game = {
    lvl: 0, world: '', score: 0, target: null, active: false,
    data: {
        math: [
            {q:'10 + 5', a:15}, {q:'8 + 7', a:15}, {q:'20 - 4', a:16}, {q:'12 + 3', a:15}, {q:'9 - 4', a:5}
        ],
        arabic: [
            {q:'مَـ + ـدْرَ + سَـ + ـة', a:'مدرسة'}, {q:'قَـ + ـلَـ + ـم', a:'قلم'}, {q:'بَـ + ـيْـ + ـت', a:'بيت'}, {q:'كِـ + ـتَـ + ـا + ب', a:'كتاب'}, {q:'نُـ + ـجُـ + ـو + م', a:'نجوم'}
        ]
    },

    start(lvl, world) {
        this.lvl = lvl; this.world = world; this.score = 0; this.active = true;
        document.getElementById('game-arena').style.display = 'block';
        this.next();
    },

    next() {
        const field = document.getElementById('play-field');
        field.innerHTML = '';
        const q = this.data[this.world][Math.floor(Math.random()*5)];
        this.target = q.a;
        document.getElementById('g-task').innerText = q.q;
        document.getElementById('g-count').innerText = this.score;

        this.loop = setInterval(() => { if(this.active) this.spawn(); }, 1400);
    },

    spawn() {
        const bubble = document.createElement('div');
        const isRight = Math.random() > 0.6;
        let val;
        
        if(this.world === 'math') val = isRight ? this.target : Math.floor(Math.random()*20);
        else val = isRight ? this.target : 'شجرة';

        bubble.className = "absolute w-32 h-32 bg-white/90 rounded-full flex items-center justify-center text-4xl font-black border-4 border-pink-200 shadow-xl cursor-pointer text-indigo-900";
        bubble.innerText = val;
        bubble.style.left = Math.random() * (window.innerWidth - 150) + 'px';
        bubble.style.top = window.innerHeight + 'px';
        document.getElementById('play-field').appendChild(bubble);

        gsap.to(bubble, {
            y: -window.innerHeight - 200, 
            duration: 6, 
            onComplete: () => bubble.remove()
        });

        bubble.onclick = () => {
            if(val == this.target) {
                this.score++;
                confetti({ particleCount: 40, origin: { x: bubble.offsetLeft/window.innerWidth, y: bubble.offsetTop/window.innerHeight } });
                bubble.remove();
                if(this.score >= 5) this.win();
                else { clearInterval(this.loop); this.next(); }
            } else {
                gsap.to(bubble, { x: 15, repeat: 3, yoyo: true, duration: 0.1 });
                bubble.style.borderColor = "red";
            }
        };
    },

    win() {
        this.active = false; clearInterval(this.loop);
        confetti({ particleCount: 300, spread: 100 });
        if(!App.user.doneLevels[this.world].includes(this.lvl)) {
            App.user.doneLevels[this.world].push(this.lvl);
            App.user.stars += 20;
            App.user.coins += 50;
        }
        App.sync();
        setTimeout(() => {
            document.getElementById('game-arena').style.display = 'none';
            App.openMap(this.world);
        }, 2000);
    },

    exit() {
        this.active = false; clearInterval(this.loop);
        document.getElementById('game-arena').style.display = 'none';
    }
};
</script>
</body>
</html>
