<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم لبنى السحري | الصف الأول ب</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Fredoka:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { --pink: #ff85a2; --blue: #70d6ff; --gold: #ffd60a; --garden: #ccff33; }
        * { font-family: 'Fredoka', 'Cairo', sans-serif; user-select: none; }
        
        body { 
            background: linear-gradient(to bottom, #a2d2ff, #ffffff); 
            height: 100vh; overflow: hidden; margin: 0;
            background-image: url('https://www.transparenttextures.com/patterns/puffy-puffs.png');
        }

        /* الفراشات والورود المتحركة */
        .butterfly { position: absolute; pointer-events: none; z-index: 1; font-size: 2rem; animation: fly 10s linear infinite; }
        @keyframes fly {
            0% { transform: translate(-100px, 100vh) rotate(0deg); }
            100% { transform: translate(120vw, -100px) rotate(360deg); }
        }

        /* الأقسام السحرية */
        .page { position: absolute; inset: 0; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 120px; z-index: 10; }
        .page-active { display: flex; animation: zoomIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }

        /* المتجر الفخم */
        .item-card { 
            background: white; border-radius: 40px; border: 5px solid var(--pink); 
            transition: 0.3s; cursor: pointer; position: relative;
            box-shadow: 0 15px 0 #ffdae0;
        }
        .item-card:hover { transform: translateY(-10px) rotate(2deg); }
        .item-card.owned { border-color: var(--garden); opacity: 0.8; }
        .price-tag { background: var(--gold); color: #856404; padding: 5px 15px; border-radius: 20px; font-weight: 900; }

        /* لوحة الصدارة */
        .leader-row {
            background: rgba(255, 255, 255, 0.9); border-radius: 30px; 
            margin-bottom: 15px; border: 3px solid #bde0fe;
            transition: 0.3s;
        }
        .leader-row:hover { transform: scale(1.02); background: white; }

        /* شريط التحكم (Dock) */
        .dock { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px);
            padding: 15px 40px; border-radius: 100px; display: flex; gap: 30px;
            border: 5px solid var(--blue); z-index: 1000;
        }
        .dock-btn { font-size: 2.5rem; cursor: pointer; transition: 0.3s; }
        .dock-btn:hover { transform: scale(1.3) rotate(-10deg); }
        .dock-btn.active { filter: drop-shadow(0 0 10px var(--pink)); transform: translateY(-10px); }

        /* المراحل */
        .lvl-bubble {
            width: 100px; height: 100px; border-radius: 50%; background: white;
            display: flex; items: center; justify-content: center; font-size: 2.5rem;
            font-weight: 900; color: var(--pink); border: 6px solid var(--pink);
            box-shadow: 0 10px 0 #ffdae0; cursor: pointer; transition: 0.3s;
        }
        .lvl-bubble.locked { background: #eee; border-color: #ccc; color: #aaa; box-shadow: none; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="butterfly" style="top:20%; left:-10%; animation-delay: 0s;">🦋</div>
    <div class="butterfly" style="top:50%; left:-10%; animation-delay: 3s;">🌸</div>
    <div class="butterfly" style="top:80%; left:-10%; animation-delay: 6s;">🌻</div>

    <div id="p-login" class="page page-active justify-center items-center">
        <div class="bg-white/80 p-12 rounded-[60px] border-8 border-pink-300 text-center w-[90%] max-w-lg shadow-2xl">
            <div class="text-8xl mb-4 animate-bounce">🏰</div>
            <h1 class="text-6xl font-black text-pink-500 mb-2">مملكة لبنى</h1>
            <p class="text-blue-400 font-bold text-2xl mb-8">أهلاً بأبطال الصف الأول ب</p>
            <input type="text" id="login-code" placeholder="اكتب كودك السحري" class="w-full text-center text-3xl p-5 rounded-full border-4 border-blue-200 outline-none focus:border-pink-400 mb-6 font-black">
            <button onclick="App.login()" class="w-full py-5 bg-gradient-to-r from-pink-400 to-pink-600 text-white rounded-full text-3xl font-black shadow-[0_10px_0_#db2777] active:translate-y-2 active:shadow-none transition-all">دخول للمملكة ✨</button>
        </div>
    </div>

    <div id="p-home" class="page p-8">
        <div class="max-w-4xl mx-auto w-full">
            <div class="bg-white rounded-[60px] p-10 border-8 border-blue-200 shadow-xl flex flex-col items-center relative">
                <div class="absolute top-5 left-5 text-4xl">⭐ <span id="u-stars">0</span></div>
                <div class="absolute top-5 right-5 text-4xl">💰 <span id="u-coins">0</span></div>
                
                <div class="relative">
                    <div id="u-avatar" class="w-48 h-48 bg-pink-100 rounded-full flex items-center justify-center text-[100px] border-8 border-pink-400">👤</div>
                    <div id="u-tag" class="absolute -top-5 -right-5 text-7xl animate-pulse"></div>
                </div>
                <h2 id="u-name" class="text-6xl font-black text-blue-500 mt-6 italic">اسم البطل</h2>
                
                <div class="grid grid-cols-2 gap-6 mt-10 w-full">
                    <div onclick="App.nav('p-worlds')" class="bg-garden rounded-[40px] p-8 text-center border-b-8 border-lime-600 cursor-pointer active:scale-95 transition">
                        <div class="text-7xl">🗺️</div>
                        <div class="text-3xl font-black text-lime-900 mt-2">خريطة العوالم</div>
                    </div>
                    <div onclick="App.nav('p-shop')" class="bg-pink-300 rounded-[40px] p-8 text-center border-b-8 border-pink-600 cursor-pointer active:scale-95 transition">
                        <div class="text-7xl">🎁</div>
                        <div class="text-3xl font-black text-pink-900 mt-2">متجر الهدايا</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="p-shop" class="page p-10">
        <h2 class="text-6xl font-black text-center text-pink-500 mb-10">متجر أبطال ب السحري 🛍️</h2>
        <div id="shop-grid" class="grid grid-cols-2 md:grid-cols-5 gap-6 max-w-6xl mx-auto">
            </div>
    </div>

    <div id="p-leader" class="page p-10">
        <h2 class="text-6xl font-black text-center text-blue-500 mb-10">أوائل مملكة لبنى 🏆</h2>
        <div id="leader-container" class="max-w-4xl mx-auto w-full">
            </div>
    </div>

    <div id="p-worlds" class="page p-10 items-center">
        <h2 class="text-6xl font-black text-pink-500 mb-16">اختر مغامرتك اليوم 🎈</h2>
        <div class="flex flex-wrap justify-center gap-12">
            <div onclick="App.openMap('math')" class="w-80 bg-white p-10 rounded-[60px] border-b-[20px] border-blue-400 text-center cursor-pointer hover:scale-105 transition">
                <div class="text-[120px] mb-4">🔢</div>
                <h3 class="text-4xl font-black text-blue-600">عالم الحساب</h3>
            </div>
            <div onclick="App.openMap('arabic')" class="w-80 bg-white p-10 rounded-[60px] border-b-[20px] border-pink-400 text-center cursor-pointer hover:scale-105 transition">
                <div class="text-[120px] mb-4">🅰️</div>
                <h3 class="text-4xl font-black text-pink-600">عالم العربية</h3>
            </div>
        </div>
    </div>

    <div id="p-map" class="page">
        <div class="p-8 flex justify-between">
            <h2 id="map-name" class="text-5xl font-black text-blue-500">الخريطة</h2>
            <button onclick="App.nav('p-worlds')" class="bg-white px-8 py-3 rounded-full font-black shadow-lg">رجوع</button>
        </div>
        <div id="map-bubbles" class="flex flex-wrap justify-center gap-8 p-10"></div>
    </div>

    <nav id="dock" class="dock hidden">
        <div class="dock-btn active" onclick="App.nav('p-home', this)">🏠</div>
        <div class="dock-btn" onclick="App.nav('p-leader', this)">🏆</div>
        <div class="dock-btn" onclick="App.nav('p-shop', this)">🎁</div>
        <div class="dock-btn" onclick="App.nav('p-worlds', this)">🎮</div>
    </nav>

<script>
/**
 * 🛠️ محرك الإمبراطورية (The Magical Core)
 */
const App = {
    dbKey: 'LUBNA_FINAL_2026_B',
    user: null,
    // قائمة الـ 50 عنصر (بنات وأولاد)
    items: [
        {id:1, n:'تاج وردي', e:'👑', p:100, g:'f'}, {id:2, n:'سيف ذهبي', e:'⚔️', p:150, g:'m'},
        {id:3, n:'جناح فراشة', e:'🦋', p:200, g:'f'}, {id:4, n:'خوذة نينجا', e:'🥷', p:250, g:'m'},
        {id:5, n:'عصا سحرية', e:'🪄', p:300, g:'f'}, {id:6, n:'سيارة سباق', e:'🏎️', p:400, g:'m'},
        {id:7, n:'نظارة قلب', e:'🕶️', p:120, g:'f'}, {id:8, n:'قبعة قرصان', e:'🏴‍☠️', p:180, g:'m'},
        {id:9, n:'يونيكورن', e:'🦄', p:1000, g:'f'}, {id:10, n:'تنين نار', e:'🐉', p:1000, g:'m'},
        // ... تكملة الـ 50 برمجياً للسهولة
        ...Array.from({length: 40}, (_, i) => ({
            id: i+11, n: 'هدية سحرية ' + (i+11), e: ['🍭','🧸','🚀','🚁','💎','🎀','🥎','🎸','🚲','🦁','🐼','🐙'][i%12], p: (i+1)*50, g: 'a'
        }))
    ],

    login() {
        const code = document.getElementById('login-code').value.trim().toUpperCase();
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const found = db.find(s => s.code === code);
        
        if(found) {
            this.user = found;
            if(!this.user.inventory) this.user.inventory = [];
            if(!this.user.tag) this.user.tag = '';
            this.nav('p-home');
            document.getElementById('dock').classList.remove('hidden');
            this.sync();
        } else alert("الكود خطأ يا بطل الصف الأول! اسأل معلمتك لبنى.");
    },

    nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
        document.getElementById(id).classList.add('page-active');
        if(el) {
            document.querySelectorAll('.dock-btn').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }
        if(id === 'p-shop') this.renderShop();
        if(id === 'p-leader') this.renderLeaderboard();
    },

    sync() {
        document.getElementById('u-name').innerText = this.user.name;
        document.getElementById('u-stars').innerText = this.user.stars;
        document.getElementById('u-coins').innerText = this.user.coins;
        document.getElementById('u-tag').innerText = this.user.tag;
        
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const idx = db.findIndex(s => s.code === this.user.code);
        db[idx] = this.user;
        localStorage.setItem(this.dbKey, JSON.stringify(db));
    },

    renderShop() {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = this.items.map(item => {
            const owned = this.user.inventory.includes(item.id);
            return `
                <div class="item-card p-6 text-center ${owned?'owned':''}" onclick="App.buy(${item.id})">
                    <div class="text-7xl mb-2">${item.e}</div>
                    <div class="font-black text-sm">${item.n}</div>
                    <div class="price-tag mt-2 inline-block">${item.p} 💰</div>
                    ${owned ? '<div class="text-xs text-green-500 font-bold">تم الشراء</div>' : ''}
                </div>
            `;
        }).join('');
    },

    buy(id) {
        const item = this.items.find(i => i.id === id);
        if(this.user.inventory.includes(id)) {
            this.user.tag = item.e;
            this.sync();
            alert("لقد ارتديت: " + item.n);
            return;
        }
        if(this.user.coins >= item.p) {
            this.user.coins -= item.p;
            this.user.inventory.push(id);
            this.user.tag = item.e;
            this.sync();
            this.renderShop();
            confetti({ particleCount: 100 });
        } else alert("نقودك لا تكفي! العب واجمع المزيد.");
    },

    renderLeaderboard() {
        const db = (JSON.parse(localStorage.getItem(this.dbKey)) || []).sort((a,b) => b.stars - a.stars);
        document.getElementById('leader-container').innerHTML = db.map((s, i) => `
            <div class="leader-row p-6 flex justify-between items-center ${s.code===this.user.code?'border-pink-500 bg-pink-50':''}">
                <div class="flex items-center gap-4">
                    <span class="text-4xl font-black text-blue-400 w-12">#${i+1}</span>
                    <span class="text-5xl">${s.avatar || '🦁'}</span>
                    <div>
                        <div class="text-2xl font-black">${s.name} <span class="text-4xl">${s.tag || ''}</span></div>
                    </div>
                </div>
                <div class="text-4xl font-black text-pink-500">${s.stars} ⭐</div>
            </div>
        `).join('');
    },

    openMap(world) {
        this.currentWorld = world;
        document.getElementById('map-name').innerText = world === 'math' ? 'عالم الحساب السحري' : 'عالم الكلمات الممتع';
        const container = document.getElementById('map-bubbles');
        container.innerHTML = '';
        for(let i=1; i<=100; i++) {
            const isLocked = i > 5; // أول 5 مراحل فقط
            const bubble = document.createElement('div');
            bubble.className = `lvl-bubble ${isLocked?'locked':''}`;
            bubble.innerHTML = isLocked ? '🔒' : i;
            if(i > 5) {
                bubble.onclick = () => alert("ترقبوا.. هذه المرحلة ستفتح قريباً بمفاجأة من المعلمة لبنى! ✨");
            }
            container.appendChild(bubble);
        }
        this.nav('p-map');
    }
};
</script>
</body>
</html>
