<script type="module">
    import { supabase } from './supabaseClient.js';
    document.getElementById('btnLogin').onclick = async () => {
        const user = document.getElementById('loginUser').value;
        const pass = document.getElementById('loginPass').value;
        const { data, error } = await supabase.from('students').select('*').eq('username', user).eq('password', pass).single();
        
        if (data) {
            // سنقوم بتحزين اسم الطالب لنعرضه له في الصفحة التالية
            localStorage.setItem('studentName', data.full_name);
            localStorage.setItem('studentGrade', data.grade);
            localStorage.setItem('isStar', data.is_star);
            
            alert("أهلاً بك يا بطل: " + data.full_name + "! 🌟 درجتك الحالية: " + data.grade);
        } else {
            alert("بيانات الدخول غير صحيحة، حاول مجدداً يا بطل!");
        }
    };
</script>
