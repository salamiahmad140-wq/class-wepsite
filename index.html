<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lubna Legends OS | الإصدار الملحمي 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-indigo: #4f46e5; --p-pink: #db2777; --p-gold: #fbbf24; --p-sky: #0ea5e9; --p-green: #22c55e; }
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; cursor: url('https://cdn-icons-png.flaticon.com/32/1077/1077114.png'), auto; }
        body { font-family: 'Cairo', sans-serif; background: #020617; color: white; margin: 0; overflow: hidden; height: 100vh; }

        /* الأنظمة الأساسية */
        .app-container { position: relative; width: 100%; height: 100%; overflow: hidden; }
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); background-size: cover; background-position: center; }
        .screen-active { display: flex; animation: appEntry 0.6s ease; }
        @keyframes appEntry { from { opacity: 0; transform: scale(1.1); filter: blur(10px); } to { opacity: 1; transform: scale(1); filter: blur(0); } }

        /* واجهة المستخدم الفخمة (Glassmorphism) */
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
        .btn-legend { background: white; color: #020617; border-radius: 1.5rem; border-bottom: 6px solid #cbd5e1; transition: 0.1s; font-weight: 900; }
        .btn-legend:active { transform: translateY(4px); border-bottom-width: 2px; }

        /* خريطة العالم (Infinite Drag) */
        #world-map { width: 5000px; height: 1000px; background: url('https://www.transparenttextures.com/patterns/stardust.png'), linear-gradient(to right, #1e1b4b, #312e81, #1e1b4b); position: relative; cursor: grab; }
        .level-marker { width: 100px; height: 100px; background: white; border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; position: absolute; display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 4px solid var(--p-indigo); }
        .level-line { position: absolute; height: 10px; background: rgba(255,255,255,0.1); z-index: 0; transform-origin: left center; }

        /* محرك الألعاب (Game Physics Assets) */
        #game-stage { position: relative; width: 100%; height: 100%; background: #0c4a6e; overflow: hidden; }
        .character { position: absolute; transition: 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); z-index: 100; font-size: 4rem; }
        .game-item { position: absolute; cursor: pointer; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* نظام الملابس (Inventory) */
        .inventory-slot { width: 100px; height: 100px; background: rgba(255,255,255,0.05); border-radius: 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; border: 2px solid transparent; }
        .slot-active { border-color: var(--p-gold); background: rgba(251, 191, 36, 0.1); }

        /* لوحة التحكم السفلية */
        .taskbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; height: 80px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border-radius: 2.5rem; display: flex; justify-content: space-around; align-items: center; padding: 0 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 1000; }
        .nav-btn { font-size: 1.8rem; filter: grayscale(1); transition: 0.3s; cursor: pointer; }
        .nav-btn-active { filter: grayscale(0); transform: translateY(-10px) scale(1.2); color: var(--p-gold); }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="scr-gate" class="screen screen-active justify-center items-center bg-[#020617]">
        <div class="text-center p-10 max-w-lg">
            <div class="mb-6 flex justify-center gap-4">
                <span class="text-7xl animate-bounce">🦁</span>
                <span class="text-7xl animate-bounce" style="animation-delay: 0.2s">🚀</span>
            </div>
            <h1 class="text-6xl font-900 mb-4 bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-pink-500">أساطير لبنى</h1>
            <p class="text-white/40 mb-12 font-bold italic">أقوى منصة تعليمية للصف الأول في العالم</p>
            
            <div class="glass p-8 space-y-6 border-t-4 border-indigo-500">
                <input type="text" id="player-code" placeholder="أدخل كود البطل (مثال: LUB-123)" class="w-full p-5 bg-white/5 border border-white/10 rounded-2xl text-center text-xl font-black focus:border-indigo-500 outline-none transition-all uppercase">
                <button onclick="bootSystem()" class="w-full btn-legend p-6 text-2xl shadow-[0_10px_40px_rgba(79,70,229,0.3)] bg-indigo-500 text-white border-indigo-700">دخول الملحمة 🛡️</button>
            </div>
        </div>
    </div>

    <div id="hud" class="fixed top-0 inset-x-0 h-24 p-6 z-[1000] flex justify-between items-start pointer-events-none hidden">
        <div class="pointer-events-auto flex items-center gap-4 glass p-2 pr-6 border-l-4 border-indigo-500">
            <div class="relative">
                <div id="p-avatar" class="text-4xl">🐱</div>
                <div id="p-hat" class="absolute -top-4 -right-2 text-2xl"></div>
            </div>
            <div>
                <p id="p-name" class="font-900 text-sm">بطل الأساطير</p>
                <div class="flex gap-1 mt-1">
                    <div class="h-1.5 w-20 bg-white/10 rounded-full overflow-hidden"><div id="xp-bar" class="h-full bg-indigo-500" style="width: 30%"></div></div>
                </div>
            </div>
        </div>
        <div class="pointer-events-auto flex gap-3">
            <div class="glass px-4 py-2 flex items-center gap-2 border-b-2 border-yellow-500">
                <span class="text-yellow-500 font-900" id="stat-coins">150</span>
                <span class="text-xl">💰</span>
            </div>
            <div class="glass px-4 py-2 flex items-center gap-2 border-b-2 border-blue-400">
                <span class="text-blue-400 font-900" id="stat-stars">12</span>
                <span class="text-xl">⭐</span>
            </div>
        </div>
    </div>

    <div id="scr-map" class="screen overflow-hidden">
        <div id="map-drag-container" class="w-full h-full overflow-x-auto overflow-y-hidden">
            <div id="world-map">
                </div>
        </div>
    </div>

    <div id="scr-game" class="screen">
        <div class="p-4 flex justify-between items-center bg-slate-900/80 border-b border-white/10 z-[200]">
            <button onclick="quitGame()" class="bg-red-500 px-4 py-2 rounded-xl font-black text-xs">انسحاب</button>
            <div class="text-center">
                <p id="game-instr" class="text-[10px] uppercase text-white/40">المهمة</p>
                <h2 id="game-target" class="text-3xl font-black text-yellow-400">...</h2>
            </div>
            <div id="timer" class="text-2xl font-black text-indigo-400">30</div>
        </div>
        <div id="game-stage">
            <div id="player-char" class="character">🐸</div>
            </div>
    </div>

    <div id="scr-shop" class="screen pt-32 p-8">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-5xl font-900 mb-10 text-center text-indigo-400 italic">خزانة الأبطال 👕</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6" id="shop-grid">
                </div>
        </div>
    </div>

    <div id="scr-admin" class="screen pt-32 p-8 bg-slate-950">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black">إدارة الحسابات 👩‍🏫</h2>
                <button onclick="addStudent()" class="bg-indigo-600 px-6 py-3 rounded-2xl font-black">+ إضافة طالب</button>
            </div>
            <div class="glass overflow-hidden">
                <table class="w-full text-right">
                    <thead class="bg-white/5">
                        <tr class="text-white/40 text-xs">
                            <th class="p-6">الطالب</th>
                            <th class="p-6">كود الدخول</th>
                            <th class="p-6">النجوم</th>
                            <th class="p-6">العملات</th>
                            <th class="p-6">الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <nav id="taskbar" class="taskbar hidden">
        <div class="nav-btn nav-btn-active" onclick="showApp('scr-map', this)">🗺️<span>العالم</span></div>
        <div class="nav-btn" onclick="showApp('scr-shop', this)">👕<span>الملابس</span></div>
        <div class="nav-btn" onclick="showApp('scr-admin', this)">👑<span>الإدارة</span></div>
        <div class="nav-btn" onclick="location.reload()">🔒<span>خروج</span></div>
    </nav>

</div>

<script>
    // --- STATE MANAGEMENT ---
    let gameState = {
        player: { name: 'بطل لبنى', code: 'LUB-001', coins: 500, stars: 10, avatar: '🦁', hat: '', unlocked: 5 },
        students: [
            { name: 'أحمد محمد', code: 'LUB-101', stars: 45, coins: 1200 },
            { name: 'سارة خالد', code: 'LUB-102', stars: 38, coins: 950 }
        ],
        currentWorld: 'arabic'
    };

    const items = [
        { id: 1, type: 'hat', img: '👑', price: 100, name: 'تاج الملك' },
        { id: 2, type: 'hat', img: '🎓', price: 200, name: 'قبعة الذكاء' },
        { id: 3, type: 'hat', img: '🤠', price: 150, name: 'قبعة المغامر' },
        { id: 4, type: 'hat', img: '🚀', price: 500, name: 'خوذة الفضاء' }
    ];

    // --- SYSTEM BOOT ---
    function bootSystem() {
        const code = document.getElementById('player-code').value;
        if(!code) return alert("أدخل كود الدخول يا بطل!");
        
        gameState.player.code = code;
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('taskbar').classList.remove('hidden');
        updateUI();
        initWorldMap();
        showApp('scr-map');
    }

    function updateUI() {
        document.getElementById('stat-coins').innerText = gameState.player.coins;
        document.getElementById('stat-stars').innerText = gameState.player.stars;
        document.getElementById('p-avatar').innerText = gameState.player.avatar;
        document.getElementById('p-hat').innerText = gameState.player.hat;
    }

    function showApp(id, btn = null) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('screen-active'));
        document.getElementById(id).classList.add('screen-active');
        if(btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-btn-active'));
            btn.classList.add('nav-btn-active');
        }
        if(id === 'scr-shop') renderShop();
        if(id === 'scr-admin') renderAdmin();
    }

    // --- WORLD MAP ENGINE ---
    function initWorldMap() {
        const map = document.getElementById('world-map');
        map.innerHTML = '';
        for(let i=1; i<=50; i++) {
            const level = document.createElement('div');
            level.className = `level-marker ${i > gameState.player.unlocked ? 'opacity-30 grayscale' : 'cursor-pointer'}`;
            level.style.left = (i * 250) + "px";
            level.style.top = (300 + Math.sin(i) * 150) + "px";
            level.innerHTML = i;
            
            if(i <= gameState.player.unlocked) {
                level.onclick = () => startMission(i);
            }
            map.appendChild(level);
        }
    }

    // --- GAME ENGINE (V25 PHYSICS) ---
    function startMission(lvl) {
        showApp('scr-game');
        const stage = document.getElementById('game-stage');
        const targetText = document.getElementById('game-target');
        const frog = document.getElementById('player-char');
        
        // تنظيف المرحلة
        document.querySelectorAll('.game-item').forEach(e => e.remove());
        
        const target = Math.floor(Math.random() * 10) + 1;
        targetText.innerText = "فجر الرقم " + target;
        
        // فيزياء الضفدع
        frog.style.left = "10%";
        frog.style.bottom = "10%";

        for(let i=0; i<15; i++) {
            const item = document.createElement('div');
            item.className = 'game-item text-5xl p-4 bg-white/5 rounded-full backdrop-blur-sm';
            const val = Math.random() > 0.3 ? Math.floor(Math.random()*10)+1 : target;
            item.innerText = val;
            item.style.left = (20 + Math.random() * 70) + "%";
            item.style.top = (10 + Math.random() * 70) + "%";
            
            item.onclick = () => {
                // قفزة الضفدع لمكان العنصر
                frog.style.left = item.style.left;
                frog.style.top = item.style.top;
                
                if(val == target) {
                    item.innerHTML = "✨";
                    gameState.player.coins += 20;
                    gameState.player.stars += 1;
                    updateUI();
                    setTimeout(() => startMission(lvl), 500);
                } else {
                    frog.classList.add('animate-shake');
                    setTimeout(() => frog.classList.remove('animate-shake'), 500);
                }
            };
            stage.appendChild(item);
        }
    }

    function quitGame() { showApp('scr-map'); }

    // --- SHOP & INVENTORY ---
    function renderShop() {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = items.map(item => `
            <div class="glass p-6 text-center border-2 border-transparent hover:border-indigo-500 transition-all">
                <div class="text-6xl mb-4">${item.img}</div>
                <p class="font-bold mb-4">${item.name}</p>
                <button onclick="buyItem(${item.id})" class="w-full py-3 bg-indigo-600 rounded-xl font-black">
                    ${item.price} 💰
                </button>
            </div>
        `).join('');
    }

    function buyItem(id) {
        const item = items.find(i => i.id === id);
        if(gameState.player.coins >= item.price) {
            gameState.player.coins -= item.price;
            gameState.player.hat = item.img;
            updateUI();
            alert("تم الشراء! أنت الآن بطل أنيق ✨");
        } else alert("تحتاج لمزيد من العملات! العب أكثر 🕹️");
    }

    // --- ADMIN ENGINE ---
    function renderAdmin() {
        const table = document.getElementById('admin-table');
        table.innerHTML = gameState.students.map(s => `
            <tr class="border-b border-white/5 hover:bg-white/5">
                <td class="p-6 font-bold text-indigo-400">${s.name}</td>
                <td class="p-6 font-mono text-yellow-500">${s.code}</td>
                <td class="p-6">${s.stars} ⭐</td>
                <td class="p-6">${s.coins} 💰</td>
                <td class="p-6">
                    <button class="bg-blue-600/20 text-blue-400 px-3 py-1 rounded-lg text-xs" onclick="modifyStars('${s.code}')">+ نجمة</button>
                </td>
            </tr>
        `).join('');
    }

    function addStudent() {
        const name = prompt("اسم الطالب:");
        if(name) {
            const code = "LUB-" + Math.floor(100+Math.random()*900);
            gameState.students.push({ name, code, stars: 0, coins: 100 });
            renderAdmin();
        }
    }

</script>
</body>
</html>
