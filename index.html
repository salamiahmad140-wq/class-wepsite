<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lubna Legends | الأسطورة التعليمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Fredoka:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --main: #6366f1; --soft: #f0f2f5; --gold: #fbbf24; }
        * { user-select: none; font-family: 'Cairo', 'Fredoka', sans-serif; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: #0f172a; color: white; margin: 0; overflow: hidden; height: 100vh; }

        /* الأنظمة الأساسية */
        .app-view { position: absolute; inset: 0; display: none; flex-direction: column; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .view-active { display: flex; animation: viewIn 0.5s ease; }
        @keyframes viewIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* واجهة البطاقات (Glassmorphism) */
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2.5rem; }
        .btn-game { background: white; color: #0f172a; border-radius: 1.5rem; border-bottom: 6px solid #cbd5e1; transition: 0.1s; font-weight: 900; cursor: pointer; }
        .btn-game:active { transform: translateY(4px); border-bottom-width: 2px; }

        /* شريط المهام السفلي المطور */
        .dock { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); height: 85px; background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 2.5rem; display: flex; align-items: center; padding: 0 25px; gap: 25px; z-index: 2000; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .dock-item { font-size: 2.2rem; transition: 0.3s; cursor: pointer; filter: drop-shadow(0 0 5px rgba(255,255,255,0.1)); }
        .dock-active { transform: translateY(-20px) scale(1.3); filter: drop-shadow(0 10px 15px var(--main)); }

        /* محرك الألعاب (The Canvas) */
        #game-canvas { width: 100%; height: 100%; background: radial-gradient(circle, #1e293b, #0f172a); }

        /* خريطة العالم (Horizontal World) */
        .world-map { width: 5000px; height: 100%; position: relative; background: url('https://www.transparenttextures.com/patterns/stardust.png'); }
        .level-point { width: 130px; height: 130px; position: absolute; display: flex; align-items: center; justify-content: center; background: white; border-radius: 40%; border: 6px solid var(--main); box-shadow: 0 15px 0 rgba(0,0,0,0.2); cursor: pointer; transition: 0.3s; }
        .level-point:hover { transform: scale(1.1) rotate(5deg); }
    </style>
</head>
<body>

    <div id="view-login" class="app-view view-active justify-center items-center p-6 bg-slate-950">
        <div class="text-center space-y-8">
            <div class="text-9xl animate-bounce">🏰</div>
            <h1 class="text-6xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-pink-500">أساطير لبنى</h1>
            <div class="glass p-10 w-80 md:w-96 space-y-6">
                <input type="text" id="entry-code" placeholder="كود البطل (مثال: LUB-123)" class="w-full p-5 bg-white/5 border-2 border-white/10 rounded-2xl text-center text-xl font-black text-white outline-none focus:border-indigo-500 transition-all uppercase">
                <button onclick="Core.login()" class="w-full btn-game p-5 text-2xl bg-indigo-500 text-white border-indigo-700">دخول الأكاديمية 🚀</button>
            </div>
            <button onclick="Core.showView('view-admin')" class="text-white/20 text-xs mt-10">دخول المعلمة 👩‍🏫</button>
        </div>
    </div>

    <div id="hud" class="fixed top-0 inset-x-0 p-6 z-[1000] flex justify-between items-start pointer-events-none hidden">
        <div class="pointer-events-auto glass p-3 pr-8 flex items-center gap-4 border-l-4 border-indigo-500">
            <div class="relative">
                <div id="u-avatar" class="text-5xl">🐱</div>
                <div id="u-hat" class="absolute -top-4 -right-2 text-3xl"></div>
            </div>
            <div>
                <p id="u-name" class="font-900 text-xl leading-none">بطل الأساطير</p>
                <div id="u-xp" class="w-24 h-2 bg-white/10 rounded-full mt-2 overflow-hidden"><div class="h-full bg-indigo-500 w-1/3"></div></div>
            </div>
        </div>
        <div class="pointer-events-auto flex gap-3">
            <div class="glass px-6 py-3 flex items-center gap-2 border-b-4 border-amber-500 font-black text-xl text-amber-500">
                <span id="u-coins">0</span> 💰
            </div>
            <div class="glass px-6 py-3 flex items-center gap-2 border-b-4 border-blue-400 font-black text-xl text-blue-400">
                <span id="u-stars">0</span> ⭐
            </div>
        </div>
    </div>

    <div id="view-map" class="app-view overflow-x-auto overflow-y-hidden">
        <div class="world-map" id="map-container">
            </div>
    </div>

    <div id="view-shop" class="app-view pt-32 p-8">
        <div class="max-w-4xl mx-auto w-full">
            <h2 class="text-5xl font-black text-center mb-10 text-indigo-400">خزانة الأبطال 🛍️</h2>
            <div id="shop-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
                </div>
        </div>
    </div>

    <div id="view-rank" class="app-view pt-32 p-8">
        <div class="max-w-2xl mx-auto w-full">
            <h2 class="text-5xl font-black text-center mb-10">أقوى 10 أساطير 🏆</h2>
            <div id="leaderboard" class="space-y-4">
                </div>
        </div>
    </div>

    <div id="view-game" class="app-view !p-0">
        <div class="absolute top-28 inset-x-0 z-50 text-center">
            <h3 id="game-instr" class="text-white/40 text-xs uppercase font-bold">المهمة الحالية</h3>
            <h2 id="game-target" class="text-4xl font-black text-white drop-shadow-lg">...</h2>
        </div>
        <canvas id="game-canvas"></canvas>
        <button onclick="Core.showView('view-map')" class="absolute bottom-32 left-1/2 -translate-x-1/2 bg-red-500/20 text-red-500 px-8 py-3 rounded-full font-black border border-red-500/50">إيقاف المغامرة</button>
    </div>

    <div id="view-admin" class="app-view bg-slate-100 text-slate-900 p-8">
        <div class="max-w-5xl mx-auto w-full">
            <header class="flex justify-between items-center mb-10">
                <h1 class="text-3xl font-black">إدارة الأساطير 👩‍🏫</h1>
                <div class="flex gap-4">
                    <button onclick="Admin.add()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold">+ طالب جديد</button>
                    <button onclick="Core.showView('view-login')" class="bg-slate-200 px-6 py-3 rounded-xl font-bold">خروج</button>
                </div>
            </header>
            <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
                <table class="w-full text-right">
                    <thead class="bg-slate-50 border-b">
                        <tr>
                            <th class="p-6">البطل</th>
                            <th class="p-6">الكود</th>
                            <th class="p-6">النجوم</th>
                            <th class="p-6">الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="admin-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <nav id="navbar" class="dock hidden">
        <div class="dock-item dock-active" onclick="Core.showView('view-map', this)">🗺️</div>
        <div class="dock-item" onclick="Core.showView('view-shop', this)">🛍️</div>
        <div class="dock-item" onclick="Core.showView('view-rank', this)">🏆</div>
        <div class="dock-item" onclick="location.reload()">🔒</div>
    </nav>

<script>
    // --- بيانات النظام (The Database) ---
    const DB = {
        students: JSON.parse(localStorage.getItem('lubna_v26_students')) || [
            { name: "أمير الأساطير", code: "LUB-001", stars: 150, coins: 500, avatar: "🦁", hat: "👑" },
            { name: "ليان المبدعة", code: "LUB-002", stars: 120, coins: 300, avatar: "🦊", hat: "" }
        ],
        shop: [
            { id: 'h1', name: 'تاج الملك', img: '👑', price: 200 },
            { id: 'h2', name: 'خوذة فضاء', img: '🚀', price: 500 },
            { id: 'h3', name: 'قبعة سحرية', img: '🎩', price: 150 },
            { id: 'h4', name: 'نظارة البطل', img: '🕶️', price: 100 }
        ]
    };

    // --- المحرك الأساسي (Core Engine) ---
    const Core = {
        player: null,

        login() {
            const code = document.getElementById('entry-code').value.toUpperCase();
            const s = DB.students.find(x => x.code === code);
            if(s) {
                this.player = s;
                this.showView('view-map');
                document.getElementById('hud').classList.remove('hidden');
                document.getElementById('navbar').classList.remove('hidden');
                this.updateUI();
                this.renderMap();
            } else alert("الكود خطأ يا بطل! اسأل المعلمة لبنى 👑");
        },

        showView(id, el) {
            document.querySelectorAll('.app-view').forEach(v => v.classList.remove('view-active'));
            document.getElementById(id).classList.add('view-active');
            if(el) {
                document.querySelectorAll('.dock-item').forEach(i => i.classList.remove('dock-active'));
                el.classList.add('dock-active');
            }
            if(id === 'view-shop') this.renderShop();
            if(id === 'view-rank') this.renderRank();
            if(id === 'view-admin') Admin.render();
            if(id === 'view-game') GameBox.init();
        },

        updateUI() {
            document.getElementById('u-name').innerText = this.player.name;
            document.getElementById('u-stars').innerText = this.player.stars;
            document.getElementById('u-coins').innerText = this.player.coins;
            document.getElementById('u-avatar').innerText = this.player.avatar;
            document.getElementById('u-hat').innerText = this.player.hat;
            localStorage.setItem('lubna_v26_students', JSON.stringify(DB.students));
        },

        renderMap() {
            const container = document.getElementById('map-container');
            container.innerHTML = '';
            for(let i=1; i<=30; i++) {
                const p = document.createElement('div');
                p.className = 'level-point';
                p.style.left = (i * 250) + "px";
                p.style.top = (350 + Math.sin(i*0.8)*150) + "px";
                p.innerHTML = `<span class="text-4xl font-black text-slate-800">${i}</span>`;
                p.onclick = () => {
                    GameBox.type = i % 2 === 0 ? 'CATCH' : 'MEMORY';
                    this.showView('view-game');
                };
                container.appendChild(p);
            }
        },

        renderShop() {
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = DB.shop.map(item => `
                <div class="glass p-6 text-center border-2 border-transparent hover:border-indigo-500 transition">
                    <div class="text-7xl mb-4">${item.img}</div>
                    <p class="font-black mb-4">${item.name}</p>
                    <button onclick="Core.buy('${item.img}', ${item.price})" class="w-full py-3 bg-amber-500 rounded-xl font-black text-slate-900">${item.price} 💰</button>
                </div>
            `).join('');
        },

        buy(img, price) {
            if(this.player.coins >= price) {
                this.player.coins -= price;
                this.player.hat = img;
                this.updateUI();
                alert("تم التجهيز! شكلك رائع ✨");
            } else alert("اجمع مزيداً من الكوينز!");
        },

        renderRank() {
            const list = document.getElementById('leaderboard');
            const sorted = [...DB.students].sort((a,b) => b.stars - a.stars).slice(0, 10);
            list.innerHTML = sorted.map((s, i) => `
                <div class="glass p-5 flex items-center gap-6 border-r-8 ${i===0?'border-yellow-500':'border-indigo-500'}">
                    <span class="text-3xl font-black opacity-20">#${i+1}</span>
                    <span class="text-4xl">${s.avatar}</span>
                    <span class="flex-grow font-black text-xl">${s.name}</span>
                    <span class="text-blue-400 font-black">${s.stars} ⭐</span>
                </div>
            `).join('');
        }
    };

    // --- محرك الألعاب المتعدد (The Game Hub) ---
    const GameBox = {
        type: 'CATCH', canvas: null, ctx: null, items: [], playerX: 0, target: 0,
        
        init() {
            this.canvas = document.getElementById('game-canvas');
            this.ctx = this.canvas.getContext('2d');
            this.canvas.width = window.innerWidth;
            this.canvas.height = window.innerHeight;
            this.items = [];
            this.playerX = this.canvas.width / 2;
            
            if(this.type === 'CATCH') this.startCatch();
            else this.startMemory();
        },

        startCatch() {
            this.target = Math.floor(Math.random() * 10) + 1;
            document.getElementById('game-target').innerText = "اصطاد الرقم " + this.target;
            this.loopCatch();
        },

        loopCatch() {
            if(Core.player.currentScreen !== 'view-game') {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // إضافة عناصر تسقط
                if(Math.random() < 0.05) {
                    this.items.push({ x: Math.random()*this.canvas.width, y: -50, val: Math.floor(Math.random()*10)+1 });
                }

                this.items.forEach((it, idx) => {
                    it.y += 5;
                    this.ctx.fillStyle = "white";
                    this.ctx.font = "bold 40px Cairo";
                    this.ctx.fillText(it.val, it.x, it.y);

                    // التصادم
                    if(it.y > this.canvas.height - 150 && Math.abs(it.x - this.playerX) < 50) {
                        if(it.val === this.target) {
                            Core.player.coins += 10;
                            Core.player.stars += 1;
                            Core.updateUI();
                            this.items.splice(idx, 1);
                            this.target = Math.floor(Math.random()*10)+1;
                            document.getElementById('game-target').innerText = "اصطاد الرقم " + this.target;
                        } else {
                            this.items.splice(idx, 1);
                        }
                    }
                });

                // رسم سلة اللاعب
                this.ctx.font = "80px Cairo";
                this.ctx.fillText("🗑️", this.playerX - 40, this.canvas.height - 80);

                requestAnimationFrame(() => this.loopCatch());
            }
        }
    };

    // التحكم باللمس
    window.addEventListener('mousemove', (e) => GameBox.playerX = e.clientX);
    window.addEventListener('touchmove', (e) => GameBox.playerX = e.touches[0].clientX);

    // --- لوحة المعلمة (Admin Engine) ---
    const Admin = {
        render() {
            const list = document.getElementById('admin-list');
            list.innerHTML = DB.students.map((s, i) => `
                <tr class="border-b">
                    <td class="p-6 font-bold">${s.name}</td>
                    <td class="p-6 font-mono text-indigo-600">${s.code}</td>
                    <td class="p-6">${s.stars} ⭐</td>
                    <td class="p-6">
                        <button onclick="Admin.gift(${i})" class="bg-yellow-500 text-white px-3 py-1 rounded-lg">هدية 🎁</button>
                        <button onclick="Admin.del(${i})" class="bg-red-500 text-white px-3 py-1 rounded-lg">حذف</button>
                    </td>
                </tr>
            `).join('');
        },
        add() {
            const name = prompt("اسم البطل الجديد:");
            if(name) {
                const code = "LUB-" + Math.floor(100 + Math.random()*899);
                DB.students.push({ name, code, stars: 0, coins: 100, avatar: "🐱", hat: "" });
                this.render();
                localStorage.setItem('lubna_v26_students', JSON.stringify(DB.students));
            }
        },
        gift(i) {
            DB.students[i].stars += 50;
            this.render();
            localStorage.setItem('lubna_v26_students', JSON.stringify(DB.students));
        }
    };

</script>
</body>
</html>
