<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>خريطة الأساطير | الصف الأول ب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* ستايل خريطة المغامرة الاحترافية */
        body { font-family: 'Cairo', sans-serif; background: #0c4a6e; overflow-x: hidden; color: white; }
        .adventure-map { min-height: 200vh; background: linear-gradient(to bottom, #0ea5e9, #22c55e, #eab308, #f97316); position: relative; padding-top: 120px; }
        .node { position: absolute; left: 50%; transform: translateX(-50%); width: 110px; height: 110px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; cursor: pointer; transition: 0.3s; border: 6px solid white; box-shadow: 0 10px 0 rgba(0,0,0,0.2); }
        .node.locked { filter: grayscale(1); background: #475569 !important; }
        .node.locked::after { content: '🔒'; position: absolute; font-size: 24px; bottom: -15px; }
        .active-node { animation: float 2s ease-in-out infinite; box-shadow: 0 0 40px #fde047; }
        @keyframes float { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-20px); } }
        .label { position: absolute; bottom: -50px; background: white; color: #0c4a6e; padding: 5px 15px; border-radius: 15px; font-weight: 900; font-size: 13px; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="adventure-map">
        <div class="node active-node bg-pink-500" style="top: 150px; margin-left: -90px;" onclick="startLevel('worm')">
            <span class="text-5xl">🐛</span>
            <div class="label">دودة الحروف</div>
        </div>

        <div class="node bg-blue-500" style="top: 450px; margin-left: 90px;" onclick="startLevel('math_steps')">
            <span class="text-5xl">👣</span>
            <div class="label">خطوات المستخدم</div>
        </div>

        <div class="node bg-orange-500" style="top: 750px; margin-left: -70px;" onclick="startLevel('balloons')">
            <span class="text-5xl">🎈</span>
            <div class="label">منطاد الأرقام</div>
        </div>

        <div class="node locked bg-purple-500" style="top: 1050px; margin-left: 80px;">
            <span class="text-5xl">🧩</span>
            <div class="label">تركيب الجمل</div>
        </div>
    </div>

    <div id="gameScreen" class="fixed inset-0 bg-white z-[10000] hidden flex flex-col items-center justify-center">
        <div class="w-full p-6 bg-slate-800 text-white flex justify-between items-center">
            <h3 id="lvlTitle" class="font-black text-xl">المرحلة</h3>
            <button onclick="closeGame()" class="bg-red-500 px-6 py-2 rounded-xl">خروج ✕</button>
        </div>
        <div id="gameArena" class="flex-grow w-full flex flex-col items-center justify-center p-10">
            </div>
    </div>

    <script>
        const App = {
            user: { name: 'بطل 1-ب', xp: 1250 },
            startLevel(type) {
                document.getElementById('gameScreen').classList.remove('hidden');
                const arena = document.getElementById('gameArena');
                arena.innerHTML = '';
                
                if(type === 'worm') {
                    document.getElementById('lvlTitle').innerText = "دودة الحروف";
                    arena.innerHTML = `<h2 class="text-4xl font-black mb-10 text-slate-700">كون كلمة "كـتاب"</h2>
                                      <div class="flex gap-4">
                                        <button onclick="win()" class="text-6xl bg-indigo-100 p-8 rounded-3xl">كـ</button>
                                        <button class="text-6xl bg-indigo-100 p-8 rounded-3xl opacity-50">مـ</button>
                                      </div>`;
                }
                // يمكن إضافة بقية المحركات للألعاب الأخرى هنا
            }
        };

        function win() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            alert("أحسنت يا بطل! لقد ربحت 50 XP");
            closeGame();
        }

        function closeGame() {
            document.getElementById('gameScreen').classList.add('hidden');
        }
    </script>
</body>
</html>
