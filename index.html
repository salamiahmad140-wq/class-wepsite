<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lubna Legends World | عالم أساطير لبنى</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6B4EE6; --secondary: #FF6B6B; --accent: #FFD93D;
            --soft-bg: #F0F4FF; --card-radius: 40px;
        }

        * {
            user-select: none; -webkit-tap-highlight-color: transparent;
            font-family: 'Fredoka', 'Cairo', sans-serif; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            background: var(--soft-bg); margin: 0; overflow: hidden; height: 100vh;
            background-image: radial-gradient(#6b4ee622 2px, transparent 2px); background-size: 40px 40px;
        }

        /* نظام الشاشات المحترف */
        .screen {
            position: absolute; inset: 0; display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }
        .screen.active { display: flex; animation: slideIn 0.6s both; }

        @keyframes slideIn {
            from { transform: translateY(100vh) rotate(10deg); opacity: 0; }
            to { transform: translateY(0) rotate(0deg); opacity: 1; }
        }

        /* تصميم كيديو لاند - البطاقات الطافية */
        .bouncy-card {
            background: white; border-radius: var(--card-radius);
            box-shadow: 0 25px 0 rgba(0,0,0,0.05), 0 40px 80px rgba(107, 78, 230, 0.15);
            border: 8px solid white;
        }

        /* الخريطة الأسطورية */
        #map-container {
            width: 100%; height: 100%; overflow-x: auto; overflow-y: hidden;
            white-space: nowrap; padding: 100px 50px; scroll-behavior: smooth;
        }
        .level-circle {
            width: 180px; height: 180px; display: inline-flex; margin: 0 50px;
            border-radius: 60px; position: relative; cursor: pointer;
            background: white; border: 10px solid white; box-shadow: 0 15px 0 #ddd;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .level-circle.locked { filter: grayscale(1); opacity: 0.5; cursor: not-allowed; }
        .level-circle.completed::after {
            content: '👑'; position: absolute; -top: 30px; -right: -20px; font-size: 50px;
        }

        /* المتجر ولوحة الصدارة */
        .grid-store { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .shop-item {
            background: #f8f9ff; padding: 20px; border-radius: 30px; border: 4px solid transparent;
        }
        .shop-item:hover { border-color: var(--primary); transform: scale(1.05); }

        /* شريط الأدوات السفلي المطور */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            padding: 15px 40px; border-radius: 50px; display: flex; gap: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); z-index: 1000;
        }
        .nav-icon { font-size: 2.5rem; cursor: pointer; transition: 0.3s; opacity: 0.4; }
        .nav-icon.active { opacity: 1; transform: translateY(-15px) scale(1.2); }

        /* الألعاب */
        #game-stage { width: 90%; height: 70%; background: #fff; border-radius: 50px; position: relative; overflow: hidden; }
        .falling-obj { position: absolute; font-size: 4rem; cursor: pointer; transition: 0.1s linear; }

        /* واجهة المعلمة */
        .admin-table th { background: var(--primary); color: white; padding: 20px; }
        .admin-table td { padding: 20px; border-bottom: 2px solid #f0f0f0; }

    </style>
</head>
<body>

    <audio id="sound-click" src="https://assets.mixkit.co/sfx/preview/mixkit-simple-game-countdown-921.mp3"></audio>
    <audio id="sound-win" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>

    <div id="scr-home" class="screen active bg-indigo-50">
        <div class="text-center">
            <div class="relative inline-block mb-10">
                <span class="text-[150px] animate-bounce inline-block">🏰</span>
                <span class="absolute -top-5 -right-5 text-6xl">✨</span>
            </div>
            <h1 class="text-8xl font-black text-indigo-900 mb-4">أساطير لبنى</h1>
            <p class="text-2xl text-indigo-400 font-bold mb-10 tracking-widest">LUBNA LEGENDS WORLD</p>
            
            <div class="bouncy-card p-12 w-[450px] mx-auto space-y-6">
                <input type="text" id="p-login-code" placeholder="أدخل كود البطل العجيب" 
                    class="w-full p-6 rounded-[30px] bg-indigo-50 text-center text-3xl font-black border-4 border-transparent focus:border-indigo-400 outline-none">
                <button onclick="System.login()" 
                    class="w-full py-6 bg-indigo-600 text-white rounded-[30px] text-3xl font-black shadow-[0_12px_0_#4338ca] active:translate-y-2 active:shadow-none transition-all">
                    هيا نلعب! 🚀
                </button>
            </div>
            <button onclick="System.nav('scr-admin')" class="mt-12 text-indigo-300 font-bold hover:text-indigo-600 transition">⚙️ بوابة المعلمة لبنى</button>
        </div>
    </div>

    <div id="scr-map" class="screen bg-sky-100">
        <div id="map-container">
            </div>
        
        <div class="fixed top-8 inset-x-8 flex justify-between items-start pointer-events-none">
            <div class="pointer-events-auto bouncy-card py-3 px-8 flex items-center gap-5 border-l-[12px] border-indigo-500">
                <div id="u-avatar" class="text-6xl">🐱</div>
                <div>
                    <h3 id="u-name" class="text-2xl font-black text-indigo-900">البطل الصغير</h3>
                    <div class="w-32 h-3 bg-indigo-100 rounded-full mt-1 overflow-hidden">
                        <div id="u-progress-bar" class="h-full bg-indigo-500 w-0"></div>
                    </div>
                </div>
            </div>
            <div class="flex gap-4 pointer-events-auto">
                <div class="bouncy-card py-4 px-8 text-3xl font-black text-amber-500 flex items-center gap-3">
                    <span id="u-coins">0</span> 💰
                </div>
                <div class="bouncy-card py-4 px-8 text-3xl font-black text-blue-500 flex items-center gap-3">
                    <span id="u-stars">0</span> ⭐
                </div>
            </div>
        </div>
    </div>

    <div id="scr-shop" class="screen bg-pink-50 pt-32 p-10">
        <div class="max-w-6xl w-full">
            <h2 class="text-7xl font-black text-center text-pink-500 mb-16">متجر القبعات السحري 🛍️</h2>
            <div id="shop-grid" class="grid-store">
                </div>
        </div>
    </div>

    <div id="scr-rank" class="screen bg-amber-50 pt-32 p-10">
        <div class="max-w-4xl w-full">
            <h2 class="text-7xl font-black text-center text-amber-600 mb-16">قائمة العظماء 🏆</h2>
            <div id="rank-list" class="space-y-6">
                </div>
        </div>
    </div>

    <div id="scr-game" class="screen bg-white">
        <div class="text-center mb-10">
            <h2 id="g-task" class="text-6xl font-black text-indigo-600 mb-2"></h2>
            <p id="g-sub" class="text-2xl text-slate-400 font-bold uppercase tracking-widest"></p>
        </div>
        <div id="game-stage">
            <div id="game-player" class="absolute bottom-10 left-1/2 -translate-x-1/2 text-[100px] transition-all">🐱</div>
            <div id="game-objects" class="w-full h-full"></div>
        </div>
        <button onclick="System.nav('scr-map')" class="mt-10 text-red-400 font-black text-2xl">❌ إغلاق اللعبة</button>
    </div>

    <div id="scr-admin" class="screen bg-slate-50 overflow-y-auto p-12">
        <div class="max-w-7xl w-full">
            <header class="flex justify-between items-center mb-12 bg-white p-10 rounded-[50px] shadow-xl">
                <div>
                    <h1 class="text-5xl font-black text-slate-800 italic">لوحة القائدة لبنى 👑</h1>
                    <p class="text-slate-400 text-xl mt-2">إدارة كاملة لصف الأساطير (الأول أ)</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="Admin.addStudent()" class="bg-indigo-600 text-white px-10 py-5 rounded-[30px] font-black text-xl shadow-lg shadow-indigo-200 hover:scale-105 transition">إضافة بطل +</button>
                    <button onclick="System.nav('scr-home')" class="bg-slate-100 text-slate-500 px-10 py-5 rounded-[30px] font-black text-xl">خروج</button>
                </div>
            </header>

            <div class="grid grid-cols-4 gap-8 mb-12">
                <div class="bg-white p-10 rounded-[50px] shadow-sm border-b-[15px] border-indigo-500">
                    <p class="text-slate-400 font-bold uppercase">الطلاب</p>
                    <h2 id="adm-count" class="text-6xl font-black text-indigo-600">0</h2>
                </div>
                <div class="bg-white p-10 rounded-[50px] shadow-sm border-b-[15px] border-amber-500">
                    <p class="text-slate-400 font-bold uppercase">إجمالي النجوم</p>
                    <h2 id="adm-stars" class="text-6xl font-black text-amber-500">0</h2>
                </div>
                <div class="bg-white p-10 rounded-[50px] shadow-sm border-b-[15px] border-green-500">
                    <p class="text-slate-400 font-bold uppercase">متوسط المستوى</p>
                    <h2 id="adm-lvl" class="text-6xl font-black text-green-500">0</h2>
                </div>
                <div class="bg-white p-10 rounded-[50px] shadow-sm border-b-[15px] border-red-500">
                    <p class="text-slate-400 font-bold uppercase">تصفير النظام</p>
                    <button onclick="Admin.resetAll()" class="mt-4 text-red-500 font-black underline">مسح الكل ⚠️</button>
                </div>
            </div>

            <div class="bg-white rounded-[50px] shadow-2xl overflow-hidden">
                <table class="w-full text-right admin-table text-xl">
                    <thead>
                        <tr>
                            <th>البطل</th>
                            <th>كود الدخول</th>
                            <th>النجوم والذهب</th>
                            <th>المستوى الحالي</th>
                            <th>التحكم</th>
                        </tr>
                    </thead>
                    <tbody id="adm-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <nav id="navbar" class="bottom-nav hidden">
        <div class="nav-icon active" onclick="System.nav('scr-map', this)">🗺️</div>
        <div class="nav-icon" onclick="System.nav('scr-shop', this)">🛍️</div>
        <div class="nav-icon" onclick="System.nav('scr-rank', this)">🏆</div>
        <div class="nav-icon" onclick="location.reload()">🔒</div>
    </nav>

<script>
    // ==========================================
    // ⚙️ نظام البيانات (The Engine Data)
    // ==========================================
    const DB = {
        get() { return JSON.parse(localStorage.getItem('LUBNA_LEGENDS_V26')) || []; },
        save(data) { localStorage.setItem('LUBNA_LEGENDS_V26', JSON.stringify(data)); },
        shop: [
            { id: 1, name: 'تاج الملك', img: '👑', price: 200 },
            { id: 2, name: 'خوذة فضاء', img: '🚀', price: 500 },
            { id: 3, name: 'أرنب لطيف', img: '🐰', price: 100 },
            { id: 4, name: 'أسد شجاع', img: '🦁', price: 300 },
            { id: 5, name: 'رداء القوة', img: '🦸', price: 1000 },
            { id: 6, name: 'نظارة ذكية', img: '🕶️', price: 50 }
        ],
        levels: Array.from({length: 30}, (_, i) => ({
            id: i + 1,
            title: i % 2 === 0 ? 'صيد الأرقام' : 'فجر البالونات',
            task: i % 2 === 0 ? Math.floor(Math.random()*20) : ['أ','ب','ت','ث'][i%4],
            color: ['#FF6B6B', '#6B4EE6', '#FFD93D', '#4ECDC4', '#FF9F43'][i % 5]
        }))
    };

    // ==========================================
    // 🧠 منطق النظام (Core Logic)
    // ==========================================
    const System = {
        user: null,

        login() {
            const code = document.getElementById('p-login-code').value.trim().toUpperCase();
            const students = DB.get();
            const found = students.find(s => s.code === code);

            if(found) {
                this.user = found;
                this.nav('scr-map');
                document.getElementById('navbar').classList.remove('hidden');
                this.updateUI();
                this.renderMap();
                this.playSound('sound-click');
            } else {
                alert("أوووه! الكود غير صحيح، تأكدي من الأستاذة لبنى 👑");
            }
        },

        nav(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            target.classList.add('active');

            if(el) {
                document.querySelectorAll('.nav-icon').forEach(n => n.classList.remove('active'));
                el.classList.add('active');
            }

            if(id === 'scr-shop') this.renderShop();
            if(id === 'scr-rank') this.renderRank();
            if(id === 'scr-admin') Admin.render();
            this.playSound('sound-click');
        },

        updateUI() {
            document.getElementById('u-name').innerText = this.user.name;
            document.getElementById('u-avatar').innerText = this.user.avatar || '🐱';
            document.getElementById('u-stars').innerText = this.user.stars;
            document.getElementById('u-coins').innerText = this.user.coins;
            
            const progress = (this.user.level / 30) * 100;
            document.getElementById('u-progress-bar').style.width = progress + '%';

            // حفظ في التخزين
            const students = DB.get();
            const idx = students.findIndex(s => s.code === this.user.code);
            students[idx] = this.user;
            DB.save(students);
        },

        renderMap() {
            const container = document.getElementById('map-container');
            container.innerHTML = '';
            DB.levels.forEach((lvl, i) => {
                const isLocked = i > this.user.level;
                const isCompleted = i < this.user.level;
                
                const card = document.createElement('div');
                card.className = `level-circle ${isLocked ? 'locked' : ''} ${isCompleted ? 'completed' : ''}`;
                card.style.borderColor = lvl.color;
                card.innerHTML = `
                    <span class="text-6xl font-black" style="color:${lvl.color}">${lvl.id}</span>
                    <span class="text-sm font-bold opacity-40 mt-2">${lvl.title}</span>
                `;
                if(!isLocked) card.onclick = () => Game.init(lvl);
                container.appendChild(card);
            });
            // التمرير للمرحلة الحالية
            container.scrollLeft = this.user.level * 230;
        },

        renderShop() {
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = DB.shop.map(item => `
                <div class="bouncy-card p-8 text-center hover:scale-105 cursor-pointer" onclick="System.buy('${item.img}', ${item.price})">
                    <div class="text-[100px] mb-6">${item.img}</div>
                    <h3 class="text-2xl font-black mb-4">${item.name}</h3>
                    <div class="bg-amber-100 text-amber-600 py-3 rounded-2xl font-black text-2xl">${item.price} 💰</div>
                </div>
            `).join('');
        },

        buy(img, price) {
            if(this.user.coins >= price) {
                this.user.coins -= price;
                this.user.avatar = img;
                this.updateUI();
                this.playSound('sound-win');
                alert("تم التجهيز! شكلك مذهل يا بطل 🌟");
            } else {
                alert("رصيدك لا يكفي، العب واجمع المزيد من الذهب! 💰");
            }
        },

        renderRank() {
            const list = document.getElementById('rank-list');
            const sorted = DB.get().sort((a,b) => b.stars - a.stars);
            list.innerHTML = sorted.map((s, i) => `
                <div class="bouncy-card p-6 flex items-center gap-8 border-r-[15px] ${i===0?'border-amber-400':'border-indigo-400'}">
                    <span class="text-4xl font-black text-slate-300 w-12">#${i+1}</span>
                    <span class="text-6xl">${s.avatar || '🐱'}</span>
                    <div class="flex-grow">
                        <h4 class="text-3xl font-black text-slate-800">${s.name}</h4>
                        <p class="text-indigo-400 font-bold uppercase">الرتبة: أسطورة المستوى ${s.level}</p>
                    </div>
                    <div class="text-right">
                        <div class="text-3xl font-black text-blue-500">${s.stars} ⭐</div>
                        <div class="text-xl font-bold text-amber-500">${s.coins} 💰</div>
                    </div>
                </div>
            `).join('');
        },

        playSound(id) {
            const s = document.getElementById(id);
            s.currentTime = 0;
            s.play().catch(() => {});
        }
    };

    // ==========================================
    // 🎮 محرك الألعاب (The Game Engine)
    // ==========================================
    const Game = {
        lvl: null, items: [], active: false, timer: null,

        init(lvl) {
            this.lvl = lvl;
            System.nav('scr-game');
            document.getElementById('g-task').innerText = "ابحث عن: " + lvl.target;
            document.getElementById('g-sub').innerText = "المهمة رقم " + lvl.id;
            document.getElementById('game-objects').innerHTML = '';
            document.getElementById('game-player').innerText = System.user.avatar || '🐱';
            this.active = true;
            this.spawn();
        },

        spawn() {
            if(!this.active) return;
            const stage = document.getElementById('game-objects');
            
            this.timer = setInterval(() => {
                const item = document.createElement('div');
                item.className = 'falling-obj';
                const isTarget = Math.random() < 0.3;
                item.innerText = isTarget ? this.lvl.target : Math.floor(Math.random()*50);
                item.style.left = Math.random() * 90 + '%';
                item.style.top = '-100px';
                
                stage.appendChild(item);

                // حركة السقوط
                anime({
                    targets: item,
                    translateY: window.innerHeight * 0.7,
                    duration: 3000 + (Math.random()*2000),
                    easing: 'linear',
                    complete: () => item.remove()
                });

                item.onclick = () => {
                    if(item.innerText == this.lvl.target) {
                        this.win();
                    } else {
                        item.style.filter = 'grayscale(1)';
                        item.innerText = '❌';
                    }
                };
            }, 1000);
        },

        win() {
            clearInterval(this.timer);
            this.active = false;
            System.playSound('sound-win');
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
            
            System.user.stars += 20;
            System.user.coins += 50;
            if(System.user.level < this.lvl.id) {
                System.user.level = this.lvl.id;
            }
            
            System.updateUI();
            setTimeout(() => System.nav('scr-map'), 3000);
        }
    };

    // ==========================================
    // 👩‍🏫 إدارة المعلمة (Teacher Dashboard)
    // ==========================================
    const Admin = {
        render() {
            const students = DB.get();
            document.getElementById('adm-count').innerText = students.length;
            document.getElementById('adm-stars').innerText = students.reduce((a, b) => a + b.stars, 0);
            document.getElementById('adm-lvl').innerText = (students.reduce((a, b) => a + b.level, 0) / (students.length || 1)).toFixed(1);
            
            const list = document.getElementById('adm-list');
            list.innerHTML = students.map((s, i) => `
                <tr>
                    <td class="font-black">${s.name}</td>
                    <td><span class="bg-indigo-100 text-indigo-600 px-4 py-2 rounded-xl font-mono">${s.code}</span></td>
                    <td>
                        <div class="text-blue-500 font-black">${s.stars} ⭐</div>
                        <div class="text-amber-500 font-black">${s.coins} 💰</div>
                    </td>
                    <td> المرحلة ${s.level} / 30</td>
                    <td class="space-x-2">
                        <button onclick="Admin.gift(${i})" class="bg-amber-400 text-white p-3 rounded-2xl hover:scale-110">هدية 🎁</button>
                        <button onclick="Admin.delete(${i})" class="bg-red-100 text-red-500 p-3 rounded-2xl">حذف</button>
                    </td>
                </tr>
            `).join('');
        },

        addStudent() {
            const name = prompt("ما اسم البطل الجديد؟");
            if(name) {
                const students = DB.get();
                const code = "LUB-" + (Math.floor(100 + Math.random()*900));
                students.push({ name, code, stars: 0, coins: 100, level: 0, avatar: '🐱' });
                DB.save(students);
                this.render();
                alert(`تم بنجاح! كود الطالب ${name} هو: ${code}`);
            }
        },

        gift(i) {
            const students = DB.get();
            students[i].stars += 100;
            students[i].coins += 200;
            DB.save(students);
            this.render();
        },

        delete(i) {
            if(confirm("هل أنتِ متأكدة؟ سيتم حذف البطل وإنجازاته!")) {
                const students = DB.get();
                students.splice(i, 1);
                DB.save(students);
                this.render();
            }
        },

        resetAll() {
            if(confirm("تحذير! سيتم مسح كافة البيانات للأبد!")) {
                DB.save([]);
                this.render();
            }
        }
    };

    // التحكم باللاعب
    window.addEventListener('mousemove', (e) => {
        const player = document.getElementById('game-player');
        if(player) player.style.left = e.clientX + 'px';
    });

</script>
</body>
</html>
