<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أكاديمية الأساطير - الصف الأول ب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p-blue: #3b82f6; --p-green: #22c55e; --p-gold: #f59e0b; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: #0f172a; color: white; overflow: hidden; }
        
        /* نظام الفريمات (Screens) */
        .frame { position: fixed; inset: 0; display: none; flex-direction: column; overflow-y: auto; z-index: 10; padding: 20px; }
        .frame-active { display: flex; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* الأزرار والعناصر */
        .card-btn { background: white; border-radius: 30px; border-bottom: 8px solid #cbd5e1; transition: 0.2s; cursor: pointer; color: #1e293b; text-align: center; }
        .card-btn:active { transform: translateY(4px); border-bottom-width: 4px; }
        
        /* خريطة المراحل */
        .level-path { display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 100px 0; }
        .level-circle { 
            width: 80px; height: 80px; border-radius: 50%; background: white; color: #1e293b; 
            display: flex; items-center justify-center; font-size: 24px; font-weight: 900;
            border: 6px solid #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); cursor: pointer;
        }
        .level-locked { background: #475569; border-color: #1e293b; color: #94a3b8; opacity: 0.6; cursor: not-allowed; }

        /* شريط المعلومات العلوي */
        .top-hud { position: fixed; top: 0; left: 0; right: 0; height: 70px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: 2px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    </style>
</head>
<body>

    <div id="frameLogin" class="frame frame-active items-center justify-center bg-slate-900">
        <div class="w-full max-w-md p-8 bg-white/5 rounded-[3rem] border border-white/10 text-center">
            <h1 class="text-4xl font-black mb-8 text-blue-400">مرحباً بك يا بطل!</h1>
            <input type="text" id="playerName" placeholder="اكتب اسمك هنا" class="w-full p-4 rounded-2xl bg-white/10 mb-6 text-center text-xl outline-none border-2 border-transparent focus:border-blue-500">
            
            <p class="mb-4 font-bold opacity-60">اختر شخصيتك:</p>
            <div class="grid grid-cols-3 gap-4 mb-8">
                <div class="p-3 bg-white/10 rounded-2xl border-2 border-blue-500 cursor-pointer text-4xl" onclick="selectAvatar('🐱')">🐱</div>
                <div class="p-3 bg-white/10 rounded-2xl border-2 border-transparent cursor-pointer text-4xl" onclick="selectAvatar('🦊')">🦊</div>
                <div class="p-3 bg-white/10 rounded-2xl border-2 border-transparent cursor-pointer text-4xl" onclick="selectAvatar('🦖')">🦖</div>
            </div>
            
            <button onclick="goToFrame('frameWorlds')" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-xl shadow-xl active:scale-95 transition-all">ابدأ المغامرة 🚀</button>
        </div>
    </div>

    <div id="hud" class="top-hud hidden">
        <div class="flex items-center gap-2">
            <div id="avatarCircle" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-xl">🐱</div>
            <span id="displayName" class="font-black text-xs"></span>
        </div>
        <div class="flex gap-4">
            <div class="flex items-center gap-1 bg-yellow-500/20 px-3 py-1 rounded-full border border-yellow-500/50">
                <span class="text-yellow-500">🪙</span> <span id="coins" class="font-black text-sm text-yellow-500">50</span>
            </div>
            <div class="flex items-center gap-1 bg-blue-500/20 px-3 py-1 rounded-full border border-blue-500/50">
                <span class="text-blue-400">⭐</span> <span id="xp" class="font-black text-sm text-blue-400">120</span>
            </div>
        </div>
    </div>

    <div id="frameWorlds" class="frame items-center justify-center pt-24 bg-blue-900">
        <h2 class="text-3xl font-black mb-12">اختر عالمك المفضل</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-2xl">
            <div class="card-btn p-10 bg-pink-100 border-pink-300" onclick="openWorld('language')">
                <div class="text-7xl mb-4">📕</div>
                <h3 class="text-2xl font-black text-pink-600">عالم اللغة العربية</h3>
                <p class="text-xs text-pink-400 mt-2">حروف، كلمات، وقصص</p>
            </div>
            <div class="card-btn p-10 bg-blue-100 border-blue-300" onclick="openWorld('math')">
                <div class="text-7xl mb-4">🔢</div>
                <h3 class="text-2xl font-black text-blue-600">عالم الحساب</h3>
                <p class="text-xs text-blue-400 mt-2">أرقام، جمع، وطرح</p>
            </div>
        </div>
    </div>

    <div id="frameMap" class="frame bg-[url('https://www.transparenttextures.com/patterns/pinstripe.png')] pt-24">
        <div class="flex justify-between items-center mb-6">
            <button onclick="goToFrame('frameWorlds')" class="bg-white/10 px-4 py-2 rounded-xl text-xs font-black">⬅ العودة للعوالم</button>
            <h2 id="worldTitle" class="text-2xl font-black">خريطة المراحل</h2>
        </div>
        
        <div class="level-path" id="levelPathContainer">
            </div>
    </div>

    <div id="frameLeaderboard" class="frame bg-slate-900 pt-24">
        <h2 class="text-4xl font-black text-center mb-10 text-yellow-500">أبطال الصف الأول ب 🏆</h2>
        <div class="max-w-md mx-auto w-full space-y-4" id="leaderList">
            </div>
        <button onclick="goToFrame('frameWorlds')" class="mt-10 bg-white/10 py-4 rounded-2xl font-black">رجوع</button>
    </div>

    <script>
        let currentAvatar = '🐱';
        let currentWorld = '';

        // تبديل الشاشات
        function goToFrame(id) {
            document.querySelectorAll('.frame').forEach(f => f.classList.remove('frame-active'));
            document.getElementById(id).classList.add('frame-active');
            
            // إظهار الـ HUD بعد تسجيل الدخول
            if(id !== 'frameLogin') {
                document.getElementById('hud').classList.remove('hidden');
                document.getElementById('displayName').innerText = document.getElementById('playerName').value || "بطل";
            }
        }

        function selectAvatar(icon) {
            currentAvatar = icon;
            document.getElementById('avatarCircle').innerText = icon;
            // إضافة كود بصري لتحديد الشخصية المختارة
        }

        function openWorld(world) {
            currentWorld = world;
            document.getElementById('worldTitle').innerText = world === 'language' ? 'عالم اللغة العربية' : 'عالم الحساب';
            generateLevels();
            goToFrame('frameMap');
        }

        // توليد المراحل (100 مرحلة)
        function generateLevels() {
            const container = document.getElementById('levelPathContainer');
            container.innerHTML = '';
            
            for(let i = 1; i <= 100; i++) {
                const node = document.createElement('div');
                // أول 10 مراحل مفتوحة، الباقي مقفل
                const isLocked = i > 10;
                node.className = `level-circle ${isLocked ? 'level-locked' : ''}`;
                node.innerHTML = i;
                
                // حركة متعرجة (ZigZag)
                const margin = Math.sin(i) * 50;
                node.style.marginLeft = margin + 'px';

                if(!isLocked) {
                    node.onclick = () => alert(`بدء المرحلة رقم ${i} في عالم ${currentWorld}`);
                }
                
                container.appendChild(node);
            }
        }

        // لوحة الصدارة (نموذج)
        function showLeaderboard() {
            const list = document.getElementById('leaderList');
            const students = [
                {name: "أحمد", xp: 1200, icon: "🦁"},
                {name: "سارة", xp: 1150, icon: "🦋"},
                {name: "لبنى", xp: 1100, icon: "👑"}
            ];
            
            list.innerHTML = students.map((s, i) => `
                <div class="flex justify-between items-center p-6 bg-white/5 rounded-[2rem] border border-white/10">
                    <span class="text-2xl font-black opacity-30">#${i+1}</span>
                    <span class="text-3xl">${s.icon}</span>
                    <span class="flex-grow px-4 font-black">${s.name}</span>
                    <span class="text-yellow-500 font-black">${s.xp} XP</span>
                </div>
            `).join('');
            goToFrame('frameLeaderboard');
        }
    </script>
</body>
</html>
