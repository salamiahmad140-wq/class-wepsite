<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>موقع الصف الأول ب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; overflow-x: hidden; margin: 0; transition: background 0.8s ease; min-height: 100vh; }
        
        /* الأنظمة اللونية */
        body.dark { background: #020617; color: #f8fafc; }
        body.light { background: #f1f5f9; color: #0f172a; }

        /* النجوم الهادئة */
        .stars-container { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: fall linear infinite; }
        @keyframes fall { from { transform: translateY(-10vh); } to { transform: translateY(110vh); } }

        /* زر تبديل اللون الذكي */
        #themeSection { 
            position: fixed; bottom: 100px; left: -200px; /* مخفي جهة اليسار */
            z-index: 3000; transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 10px;
        }
        #themeSection.show { left: 20px; }
        .theme-bubble { background: #6366f1; color: white; padding: 8px 15px; border-radius: 15px; font-size: 10px; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        .glass { backdrop-filter: blur(15px); background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
        .light .glass { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0,0,0,0.05); }

        .page { display: none; width: 100%; }
        .active-page { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* حل مشكلة السواد في المنتصف */
        main { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .content-card { width: 100%; max-width: 500px; margin-bottom: 20px; }

        .shimmer { background: linear-gradient(90deg, #818cf8, #f472b6, #fbbf24, #818cf8); background-size: 200% auto; -webkit-background-clip: text; color: transparent; animation: s 5s linear infinite; }
        @keyframes s { to { background-position: 200% center; } }
    </style>
</head>
<body class="dark">

    <div class="stars-container" id="stars"></div>

    <div id="themeSection">
        <div class="theme-bubble">يمكنك تغيير الألوان من هنا! ✨</div>
        <button onclick="handleThemeClick()" class="w-12 h-12 glass rounded-full flex items-center justify-center text-xl shadow-2xl">🌓</button>
    </div>

    <div id="loginGate" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass p-10 rounded-[3rem] w-full max-w-sm text-center">
            <h1 class="text-3xl font-black mb-8 shimmer">الصف الأول ب</h1>
            <input type="text" id="userInput" placeholder="اسم البطل" class="w-full p-4 mb-4 rounded-2xl bg-white/5 border border-white/10 text-center font-bold outline-none">
            <input type="password" id="passInput" placeholder="كلمة السر" class="w-full p-4 mb-6 rounded-2xl bg-white/5 border border-white/10 text-center font-bold outline-none">
            <button id="submitLogin" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-lg active:scale-95 transition-all">دخول 🚀</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="p-5 flex justify-between items-center glass sticky top-0 z-50">
            <div class="flex items-center gap-3" onclick="openProfile()">
                <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white">👤</div>
                <span id="navName" class="font-bold text-sm"></span>
            </div>
            <h1 class="font-black text-lg shimmer">الصف الأول ب</h1>
            <div class="w-10"></div>
        </header>

        <main class="p-6 pb-32">
            <section id="homePage" class="page active-page space-y-8">
                <div class="text-center py-4"><h2 class="text-3xl font-black">أهلاً بك يا بطل! 👋</h2></div>
                <div class="space-y-4">
                    <h3 class="font-black text-xl pr-2">📢 أخبارنا الهامة</h3>
                    <div id="newsGrid" class="space-y-3"></div>
                </div>
                <div class="space-y-4">
                    <h3 class="font-black text-xl pr-2">💎 نجوم الصف</h3>
                    <div id="starsGrid" class="grid grid-cols-2 gap-3"></div>
                </div>
            </section>

            <section id="hwPage" class="page space-y-6">
                <h2 class="text-center text-3xl font-black shimmer">ركن الوظائف</h2>
                <div id="hwArea" class="w-full space-y-4"></div>
            </section>

            <section id="eventsPage" class="page space-y-10">
                <h2 class="text-center text-3xl font-black shimmer">معرض الفعاليات</h2>
                <div id="eventsArea" class="w-full space-y-12"></div>
            </section>
        </main>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-[380px] glass p-3 rounded-[2.5rem] flex justify-around z-[1000]">
            <button onclick="changePage('homePage', this)" class="text-2xl">🏠</button>
            <button onclick="changePage('hwPage', this)" class="text-2xl opacity-30">📚</button>
            <button onclick="changePage('eventsPage', this)" class="text-2xl opacity-30">📸</button>
        </nav>
    </div>

    <div id="profileModal" class="fixed inset-0 bg-black/95 hidden z-[4000] backdrop-blur-xl p-6 overflow-y-auto">
        <div class="max-w-md mx-auto pt-10">
            <div class="glass p-10 rounded-[3rem] text-center relative">
                <button onclick="closeProfile()" class="absolute top-6 right-6 opacity-30 text-2xl">✕</button>
                <div class="w-20 h-20 rounded-3xl bg-indigo-600 mx-auto mb-4 flex items-center justify-center text-4xl shadow-2xl">👤</div>
                <h2 id="pFullName" class="text-2xl font-black shimmer mb-6"></h2>
                
                <div class="bg-white/5 p-5 rounded-2xl mb-8">
                    <p class="text-xs opacity-50 mb-1">المستوى الحالي</p>
                    <p class="text-xl font-black text-green-400">طالب متميز بطل 🏆</p>
                </div>

                <div class="space-y-3 text-right">
                    <p class="font-black text-sm pr-2 border-r-4 border-indigo-500">📊 نتائج الاختبارات</p>
                    <div id="pExams" class="space-y-2"></div>
                </div>
                <button onclick="logout()" class="mt-12 text-red-500 font-bold text-xs opacity-30">تسجيل الخروج</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        // إعداد النجوم (سرعة أقل)
        const starContainer = document.getElementById('stars');
        for(let i=0; i<40; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 2 + 1 + 'px';
            s.style.width = size; s.style.height = size;
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDuration = Math.random() * 8 + 6 + 's'; // سرعة أبطأ (6-14 ثانية)
            s.style.animationDelay = Math.random() * 5 + 's';
            starContainer.appendChild(s);
        }

        // التعامل مع المظهر (Theme)
        window.handleThemeClick = () => {
            document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
            localStorage.setItem('hasSeenThemeTip', 'true'); // حفظ أن المستخدم ضغط على الزر
            document.getElementById('themeSection').classList.remove('show');
        };

        window.toggleTheme = () => {
            document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
        };

        // تبديل الصفحات
        window.changePage = (id, btn) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('nav button').forEach(b => b.classList.add('opacity-30'));
            btn.classList.remove('opacity-30');
            window.scrollTo({top:0, behavior:'smooth'});
        };

        // الدخول
        document.getElementById('submitLogin').onclick = async () => {
            const u = document.getElementById('userInput').value.trim();
            const p = document.getElementById('passInput').value.trim();
            const { data } = await supabase.from('students').select('*').eq('username', u).eq('password', p).maybeSingle();
            if(data) { 
                localStorage.setItem('v10_session', JSON.stringify(data)); 
                loginOk(data);
                
                // تنبيه تغيير اللون بعد 10 ثواني (إذا لم يره من قبل)
                if (!localStorage.getItem('hasSeenThemeTip')) {
                    setTimeout(() => {
                        document.getElementById('themeSection').classList.add('show');
                    }, 10000);
                }
            } else alert("بيانات الدخول غير صحيحة");
        };

        function loginOk(user) {
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('navName').innerText = user.full_name;
            loadData();
        }

        async function loadData() {
            const { data: ads } = await supabase.from('assignments').select('*').order('created_at', {ascending: false});
            const { data: stds } = await supabase.from('students').select('*').order('full_name');
            
            document.getElementById('newsGrid').innerHTML = ads.filter(a => a.title && !a.description && !a.image_url).map(a => `<div class="glass p-5 rounded-2xl border-r-4 border-indigo-500 shadow-lg"><p class="font-bold text-sm">${a.title}</p></div>`).join('');
            document.getElementById('hwArea').innerHTML = ads.filter(a => a.description).map(a => `<div class="glass p-6 rounded-3xl border-b-4 border-indigo-500/20 shadow-md"><p class="font-bold text-lg leading-relaxed">${a.description}</p></div>`).join('');
            document.getElementById('eventsArea').innerHTML = ads.filter(a => a.image_url).map(a => `<div class="space-y-4"><h4 class="text-xl font-black text-center">${a.title || ''}</h4><div class="glass p-2 rounded-[2rem] overflow-hidden"><img src="${a.image_url}" class="w-full rounded-2xl"></div></div>`).join('');
            document.getElementById('starsGrid').innerHTML = stds.filter(s => s.is_star).map(s => `<div class="glass p-4 rounded-xl text-center shadow-inner"><div class="text-2xl mb-1">💎</div><p class="text-[10px] font-black">${s.full_name.split(' ')[0]}</p></div>`).join('');
        }

        window.openProfile = async () => {
            const u = JSON.parse(localStorage.getItem('v10_session'));
            document.getElementById('profileModal').classList.remove('hidden');
            document.getElementById('pFullName').innerText = u.full_name;
            const { data } = await supabase.from('exams').select('*').eq('student_id', u.id).order('created_at', {ascending: false});
            document.getElementById('pExams').innerHTML = data.map(e => `<div class="flex justify-between bg-white/5 p-3 rounded-xl border border-white/5"><span class="text-xs opacity-40 font-bold">${e.subject}</span><span class="font-black text-indigo-400">${e.score}</span></div>`).join('') || '<p class="text-center opacity-20">لا نتائج حالية</p>';
        };
        window.closeProfile = () => document.getElementById('profileModal').classList.add('hidden');
        window.logout = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
</html>
