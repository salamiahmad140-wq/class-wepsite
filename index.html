<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة أساطير الأول ب التعليمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; margin: 0; background: #0f172a; color: white; overflow-x: hidden; }
        
        /* تصميم الخريطة العملاقة */
        .world-map {
            width: 100%; min-height: 300vh;
            background: url('https://www.transparenttextures.com/patterns/natural-paper.png'), 
                        linear-gradient(to bottom, #0ea5e9, #22c55e, #fbbf24, #ef4444);
            position: relative;
        }

        /* المراحل المضيئة */
        .level-node {
            position: absolute; width: 120px; height: 120px;
            border-radius: 50%; border: 8px solid white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(255,255,255,0.4); z-index: 20; cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .level-node:hover { transform: scale(1.1); }
        .level-node.locked { filter: grayscale(1); opacity: 0.7; }

        /* منطقة اللعبة المدمجة */
        #gameCanvasContainer {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .game-box {
            width: 95%; max-width: 600px; height: 80vh; background: #1e293b;
            border-radius: 2rem; border: 4px solid #3b82f6; position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* واجهة اللعبة - الدودة */
        .worm-segment { width: 40px; height: 40px; background: #22c55e; border-radius: 10px; position: absolute; }
        .target-apple { font-size: 40px; position: absolute; cursor: pointer; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .btn-ui { background: #3b82f6; padding: 10px 25px; border-radius: 15px; font-weight: 900; box-shadow: 0 5px 0 #1d4ed8; transition: 0.2s; }
        .btn-ui:active { transform: translateY(3px); box-shadow: 0 2px 0 #1d4ed8; }
    </style>
</head>
<body>

    <div class="world-map">
        
        <div class="fixed top-4 left-4 right-4 z-[5000] flex justify-between items-center glass p-4 rounded-3xl bg-white/10 backdrop-blur-lg border border-white/20">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-yellow-400 rounded-2xl border-2 border-white flex items-center justify-center text-3xl">👤</div>
                <div>
                    <p class="font-black text-sm">البطل: <span id="pName">لبنى</span></p>
                    <p class="text-[10px] text-yellow-300 font-bold">النقاط: <span id="pPoints">0</span> XP</p>
                </div>
            </div>
            <button onclick="location.reload()" class="bg-white/10 p-2 rounded-xl text-xs">🔄 تحديث</button>
        </div>

        <div class="level-node bg-pink-500" style="top: 250px; left: 20%;" onclick="startWormGame()">
            <span class="text-5xl">🐛</span>
            <p class="mt-2 font-black text-[10px] text-center">1. دودة الحروف<br>(حركات)</p>
        </div>

        <div class="level-node bg-blue-500 locked" style="top: 600px; right: 20%;">
            <span class="text-5xl">🔢</span>
            <p class="mt-2 font-black text-[10px] text-center">2. قلعة الأرقام<br>(جمع حتى 20)</p>
        </div>

        <div class="level-node bg-emerald-500 locked" style="top: 950px; left: 30%;">
            <span class="text-5xl">🧩</span>
            <p class="mt-2 font-black text-[10px] text-center">3. بحيرة الكلمات<br>(تركيب)</p>
        </div>

    </div>

    <div id="gameCanvasContainer">
        <div class="game-box">
            <div class="p-4 bg-white/5 border-b border-white/10 flex justify-between items-center">
                <button onclick="exitGame()" class="text-red-500 font-black">إغلاق ✕</button>
                <div id="gameStatus" class="font-black text-yellow-400">ساعد الدودة! 🐛</div>
                <div id="gameScore" class="font-bold">السكور: 0</div>
            </div>

            <div id="playArea" class="relative flex-grow bg-slate-900 overflow-hidden">
                <div id="questionContainer" class="absolute top-10 inset-x-0 text-center z-50">
                    <p class="text-xs opacity-60">أطعم الدودة الكلمة التي تبدأ بحرف:</p>
                    <h2 id="targetChar" class="text-4xl font-black text-white">بـ</h2>
                </div>
            </div>

            <div class="p-6 grid grid-cols-3 gap-2 bg-slate-800">
                <div></div>
                <button onclick="moveWorm('up')" class="btn-ui">⬆️</button>
                <div></div>
                <button onclick="moveWorm('left')" class="btn-ui">⬅️</button>
                <button onclick="moveWorm('down')" class="btn-ui">⬇️</button>
                <button onclick="moveWorm('right')" class="btn-ui">➡️</button>
            </div>
        </div>
    </div>

    <script>
        let score = 0;
        let currentTarget = "ب";
        const letters = ["أ", "ب", "ت", "ث", "ج", "ح"];
        
        // وظائف اللعبة
        function startWormGame() {
            document.getElementById('gameCanvasContainer').style.display = 'flex';
            resetGame();
        }

        function resetGame() {
            score = 0;
            updateScore();
            spawnApples();
        }

        function spawnApples() {
            const area = document.getElementById('playArea');
            // إفراغ المنطقة ما عدا السؤال
            const q = document.getElementById('questionContainer');
            area.innerHTML = '';
            area.appendChild(q);

            currentTarget = letters[Math.floor(Math.random() * letters.length)];
            document.getElementById('targetChar').innerText = currentTarget;

            // توليد تفاحات (خيارات)
            for(let i=0; i<4; i++) {
                const apple = document.createElement('div');
                apple.className = 'target-apple';
                apple.style.top = Math.random() * 60 + 20 + '%';
                apple.style.left = Math.random() * 80 + 10 + '%';
                
                const isCorrect = (i === 0);
                const char = isCorrect ? currentTarget : letters[Math.floor(Math.random() * letters.length)];
                
                apple.innerHTML = `🍎<span class="absolute top-full left-1/2 -translate-x-1/2 text-sm font-black">${char}</span>`;
                
                apple.onclick = () => {
                    if(char === currentTarget) {
                        score += 100;
                        alert("أحسنت! البطلة ذكية جداً 🌟");
                        updateScore();
                        spawnApples();
                    } else {
                        alert("حاول مرة أخرى يا بطل! 🐛");
                    }
                };
                area.appendChild(apple);
            }
        }

        function updateScore() {
            document.getElementById('gameScore').innerText = "السكور: " + score;
            document.getElementById('pPoints').innerText = score;
        }

        function exitGame() {
            document.getElementById('gameCanvasContainer').style.display = 'none';
        }

        // تحكم بسيط للدودة (نموذج)
        function moveWorm(dir) {
            console.log("Moving worm: " + dir);
            // هنا يمكن إضافة حركة حقيقية للدودة
        }
    </script>
</body>
</html>
