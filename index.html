<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أساطير 1-ب | المنصة المتكاملة</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Fredoka:wght@600&display=swap" rel="stylesheet">

    <style>
        :root { --p: #FF4757; --s: #2ED573; --a: #1E90FF; --bg: #F0F2F5; --text: #2F3542; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #0f172a; margin: 0; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        
        #app-shell { width: 100%; max-width: 480px; height: 100%; background: var(--bg); position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 100px rgba(0,0,0,0.5); }

        .screen { position: absolute; inset: 0; display: none; flex-direction: column; padding: 25px; padding-bottom: 100px; overflow-y: auto; z-index: 10; background: var(--bg); }
        .screen.active { display: flex; animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        @keyframes slideIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* نيو-روبو المطور (Premium SVG) */
        .robo-wrap { position: fixed; bottom: 110px; right: 20px; z-index: 1000; pointer-events: none; transition: 0.5s; transform: scale(0); }
        .robo-wrap.active { transform: scale(1); }
        .robo-bubble { position: absolute; bottom: 100px; right: 10px; background: white; color: var(--text); padding: 15px; border-radius: 25px 25px 0 25px; border: 4px solid var(--a); font-weight: 900; width: 180px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        /* أزرار العوالم (العربي والحساب) */
        .world-card { border-radius: 40px; padding: 30px; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; color: white; position: relative; overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .world-math { background: linear-gradient(135deg, #1e90ff, #00d2ff); }
        .world-arabic { background: linear-gradient(135deg, #ff4757, #ff6b81); }
        .world-card:active { transform: scale(0.95); }

        /* شريط التقدم نحو 180 نجمة */
        .progress-container { width: 100%; height: 12px; background: #e2e8f0; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: #fbbf24; width: 0%; transition: 1s ease-out; }

        /* التنقل السفلي */
        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 85px; background: white; display: flex; justify-content: space-around; align-items: center; border-radius: 35px 35px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 100; }
        .nav-item { font-size: 1.8rem; filter: grayscale(1); opacity: 0.3; transition: 0.3s; cursor: pointer; }
        .nav-item.active { filter: grayscale(0); opacity: 1; transform: translateY(-8px); }

        /* دودة الحروف ومنطاد الأرقام (تأثيرات بصرية) */
        .game-icon { font-size: 4rem; margin-bottom: 10px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>

<div id="app-shell">
    
    <div id="neo-robo" class="robo-wrap">
        <div class="robo-bubble" id="robo-text">مستعد للمغامرة؟</div>
        <svg width="90" height="90" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="90" fill="#1E90FF" />
            <rect x="40" y="60" width="120" height="80" rx="30" fill="white" />
            <circle cx="70" cy="95" r="12" fill="#2F3542"><animate attributeName="cy" values="95;90;95" dur="3s" repeatCount="indefinite"/></circle>
            <circle cx="130" cy="95" r="12" fill="#2F3542"><animate attributeName="cy" values="95;90;95" dur="3s" repeatCount="indefinite"/></circle>
            <path d="M80 120 Q100 135 120 120" stroke="#FF4757" stroke-width="8" fill="none" stroke-linecap="round" />
        </svg>
    </div>

    <div id="sc-login" class="screen active justify-center bg-white p-10">
        <div class="text-center">
            <div class="text-8xl mb-6">⭐</div>
            <h1 class="text-4xl font-black text-slate-800">أساطير 1-ب</h1>
            <p class="text-slate-400 font-bold mb-10 italic">بوابتك نحو النجوم</p>
            <input type="text" id="login-code" placeholder="كود البطل" class="w-full p-5 rounded-3xl bg-slate-100 text-center text-3xl font-black mb-6 outline-none border-4 border-transparent focus:border-blue-400 uppercase">
            <button onclick="App.login()" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-xl shadow-xl active:scale-95 transition">انطلاق 🚀</button>
        </div>
    </div>

    <div id="sc-home" class="screen">
        <div class="flex justify-between items-center mb-6">
            <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-xs font-bold text-slate-400">هدفك: 180 نجمة</p>
                <div class="progress-container"><div id="p-bar" class="progress-bar"></div></div>
            </div>
            <div class="text-right">
                <span id="u-stars" class="text-2xl font-black text-amber-500">0</span> <span class="text-sm font-bold">⭐</span>
            </div>
        </div>

        <div class="text-center mb-8">
            <div id="u-avatar" class="w-24 h-24 mx-auto bg-white rounded-full border-4 border-blue-400 flex items-center justify-center text-5xl mb-2 shadow-lg">👦</div>
            <h2 id="u-name" class="text-2xl font-black">البطل الأسطوري</h2>
        </div>

        <div class="grid gap-4">
            <div onclick="App.openWorld('arabic')" class="world-card world-arabic">
                <div class="game-icon">🐛</div>
                <h3 class="text-2xl font-black">عالم لغتي</h3>
                <p class="font-bold opacity-90">مغامرة دودة الحروف</p>
            </div>
            <div onclick="App.openWorld('math')" class="world-card world-math">
                <div class="game-icon">🎈</div>
                <h3 class="text-2xl font-black">عالم الحساب</h3>
                <p class="font-bold opacity-90">تحدي منطاد الأرقام</p>
            </div>
        </div>
    </div>

    <div id="sc-map" class="screen bg-slate-50">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="App.nav('sc-home', 0)" class="text-2xl bg-white p-2 rounded-2xl shadow-sm">🔙</button>
            <h2 id="map-title" class="text-2xl font-black">خريطة التحدي</h2>
        </div>
        <div id="levels-list" class="flex flex-col gap-4"></div>
    </div>

    <div id="sc-game" class="screen z-[2000] p-0 bg-white">
        <div class="p-6 bg-slate-800 text-white flex justify-between items-center">
            <div id="g-lives" class="text-2xl">❤️❤️❤️</div>
            <div id="g-info" class="font-black">مرحلة 1</div>
            <button onclick="App.nav('sc-map')" class="underline text-sm">انسحاب</button>
        </div>
        <div class="p-8 text-center"><h3 id="g-task" class="text-2xl font-black leading-relaxed">...</h3></div>
        <div id="g-arena" class="flex-1 p-6 flex flex-col gap-4"></div>
    </div>

    <div id="nav-bar" class="nav-bar hidden">
        <div class="nav-item active" onclick="App.nav('sc-home', 0)">🏠</div>
        <div class="nav-item" onclick="App.nav('sc-shop', 1)">🛍️</div>
        <div class="nav-item" onclick="App.nav('sc-lead', 2)">🏆</div>
    </div>

</div>

<script>
const DB_KEY = 'LEGENDS_ULTIMATE_V7';

// --- نيو-روبو التفاعلي ---
const Robo = {
    say(text, time = 4000) {
        const el = document.getElementById('neo-robo');
        document.getElementById('robo-text').innerText = text;
        el.classList.add('active');
        clearTimeout(this.t);
        this.t = setTimeout(() => el.classList.remove('active'), time);
    }
};

// --- محرك التطبيق ---
const App = {
    user: null,
    worlds: {
        arabic: { title: 'عالم لغتي 🐛', levels: ['دودة الحروف', 'السبب والنتيجة', 'ترتيب الجمل'] },
        math: { title: 'عالم الحساب 🎈', levels: ['منطاد الأرقام', 'خطوات المستخدم', 'التوازي 1'] }
    },
    login() {
        const code = document.getElementById('login-code').value.trim().toUpperCase();
        const db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        const u = db.find(x => x.code === code);
        if(u) {
            this.user = u; this.sync();
            document.getElementById('nav-bar').classList.remove('hidden');
            this.nav('sc-home', 0);
            Robo.say(`أهلاً بطل 1-ب ${u.name}! نيو-روبو جاهز لجمع 180 نجمة!`, 5000);
            confetti();
        } else {
            Robo.say("الكود غير صحيح، تأكد من معلمتك 🧐");
        }
    },
    sync() {
        document.getElementById('u-name').innerText = this.user.name;
        document.getElementById('u-stars').innerText = this.user.stars;
        document.getElementById('u-avatar').innerText = this.user.avatar || '👦';
        const progress = Math.min((this.user.stars / 180) * 100, 100);
        document.getElementById('p-bar').style.width = progress + '%';
        
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        const idx = db.findIndex(x => x.code === this.user.code);
        if(idx !== -1) db[idx] = this.user; else db.push(this.user);
        localStorage.setItem(DB_KEY, JSON.stringify(db));
    },
    nav(id, idx) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(idx !== undefined) document.querySelectorAll('.nav-item').forEach((l, i) => l.classList.toggle('active', i === idx));
    },
    openWorld(type) {
        const w = this.worlds[type];
        document.getElementById('map-title').innerText = w.title;
        const list = document.getElementById('levels-list');
        list.innerHTML = w.levels.map((lvl, i) => `
            <div onclick="Game.start('${lvl}')" class="bg-white p-6 rounded-[30px] flex justify-between items-center shadow-sm border-l-8 ${type==='arabic'?'border-red-400':'border-blue-400'}">
                <span class="font-black text-xl">${i+1}. ${lvl}</span>
                <span class="text-2xl">✨</span>
            </div>
        `).join('');
        this.nav('sc-map');
    }
};

// --- محرك الألعاب (Game Engine) ---
const Game = {
    lives: 3,
    start(name) {
        this.lives = 3;
        App.nav('sc-game');
        document.getElementById('g-info').innerText = name;
        this.renderTask(name);
    },
    renderTask(name) {
        document.getElementById('g-lives').innerText = "❤️".repeat(this.lives);
        const arena = document.getElementById('g-arena');
        arena.innerHTML = '';
        
        let q, opts, correct;
        if(name === 'السبب والنتيجة') {
            q = "رميت الحجر على النافذة، ماذا حدث؟"; correct = "انكسر الزجاج";
            opts = ["انكسر الزجاج", "طار العصفور", "نزل المطر"];
        } else if(name === 'خطوات المستخدم') {
            q = "لأغسل يدي، ماذا أفعل أولاً؟"; correct = "أفتح الصنبور";
            opts = ["أفتح الصنبور", "أجفف يدي", "أذهب للنوم"];
        } else if(name === 'منطاد الأرقام') {
            q = "أي منطاد يحمل الرقم الأكبر؟"; correct = "9";
            opts = ["9", "5", "3"];
        } else {
            q = "أكمل النمط: 🔴 🔵 🔴 ..."; correct = "🔵";
            opts = ["🔵", "🔴", "🟡"];
        }

        document.getElementById('g-task').innerText = q;
        opts.sort(() => Math.random() - 0.5).forEach(o => {
            const b = document.createElement('div');
            b.className = "bg-slate-100 p-6 rounded-2xl text-center text-xl font-black cursor-pointer active:scale-95 transition border-2 border-transparent hover:border-blue-400";
            b.innerText = o;
            b.onclick = () => {
                if(o === correct) {
                    confetti(); Robo.say("عبقري! إجابة صحيحة!");
                    App.user.stars += 30; App.sync();
                    setTimeout(() => App.nav('sc-map'), 2000);
                } else {
                    this.lives--; document.getElementById('g-lives').innerText = "❤️".repeat(this.lives);
                    if(this.lives === 0) App.nav('sc-map'); else Robo.say("ركز يا بطل، أنت تستطيع!");
                }
            };
            arena.appendChild(b);
        });
    }
};
</script>
</body>
</html>
