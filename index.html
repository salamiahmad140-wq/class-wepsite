<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أبطال أول "ب"</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; transition: 0.3s; }
        .light-mode { background: #fdf2f8; color: #1e293b; }
        .dark-mode { background: #0f172a; color: #f1f5f9; }
        .hero-card { border-radius: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .nav-fixed { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px; border-top: 2px solid #e2e8f0; z-index: 100; }
        .dark-mode .nav-fixed { background: #1e293b; border-top-color: #334155; }
    </style>
</head>
<body class="light-mode pb-20">

    <nav class="p-4 flex justify-between items-center bg-white/50 backdrop-blur-md sticky top-0">
        <button id="themeToggle" class="text-2xl">🌓</button>
        <span class="font-black text-indigo-600">نجوم أول "ب" ⭐</span>
    </nav>

    <div id="loginGate" class="p-6 max-w-sm mx-auto mt-10 bg-white rounded-[2rem] shadow-xl">
        <h2 class="text-2xl font-black text-center mb-6">مرحباً يا بطل! 🚀</h2>
        <input type="text" id="u" placeholder="اسم المستخدم" class="w-full p-4 mb-4 rounded-xl bg-slate-100 border-none">
        <input type="password" id="p" placeholder="كلمة السر" class="w-full p-4 mb-4 rounded-xl bg-slate-100 border-none">
        <div class="flex items-center gap-2 mb-6 text-sm">
            <input type="checkbox" id="rememberMe"> <label for="rememberMe">تذكرني على هذا الجهاز</label>
        </div>
        <button id="loginBtn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-indigo-200">هيا بنا! 🎈</button>
    </div>

    <div id="content" class="hidden p-4">
        <header class="hero-card p-8 text-center bg-indigo-600 text-white mb-8">
            <h1 class="text-2xl font-black">أهلاً بكم في موقع صفنا! 🌟</h1>
            <p class="text-sm opacity-80 mt-2">مساحة الإبداع والمرح مع المعلمة لبنى</p>
        </header>

        <section class="mb-8">
            <h3 class="text-xl font-black text-red-500 mb-4">⚠️ هام جداً:</h3>
            <div id="news" class="space-y-3"></div>
        </section>

        <section>
            <h3 class="text-xl font-black text-indigo-600 mb-4">🏆 أبطال الأسبوع:</h3>
            <div id="stars" class="grid grid-cols-2 gap-4"></div>
        </section>
    </div>

    <div class="nav-fixed">
        <a href="index.html" class="text-indigo-600 flex flex-col items-center text-xs font-bold"><span>🏠</span>الرئيسية</a>
        <a href="homework.html" class="text-slate-400 flex flex-col items-center text-xs font-bold"><span>📚</span>الوظائف</a>
        <a href="events.html" class="text-slate-400 flex flex-col items-center text-xs font-bold"><span>📸</span>الفعاليات</a>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';
        
        // خيار تغيير الطابع
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.onclick = () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        };

        // التحقق من تذكرني
        window.onload = () => {
            if(localStorage.getItem('rememberedUser')) {
                document.getElementById('loginGate').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                loadData();
            }
        };

        document.getElementById('loginBtn').onclick = async () => {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            const { data } = await supabase.from('students').select('*').eq('username', user).eq('password', pass).single();
            
            if(data) {
                if(document.getElementById('rememberMe').checked) localStorage.setItem('rememberedUser', user);
                document.getElementById('loginGate').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                loadData();
            } else alert("خطأ في البيانات!");
        };

        async function loadData() {
            const { data: news } = await supabase.from('assignments').select('title').not('title', 'is', null);
            document.getElementById('news').innerHTML = news.map(n => `<div class="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-red-500 font-bold">${n.title}</div>`).join('');
            
            const { data: stars } = await supabase.from('students').select('full_name').eq('is_star', true);
            document.getElementById('stars').innerHTML = stars.map(s => `<div class="bg-white p-4 rounded-2xl text-center shadow-sm">⭐<p class="font-bold text-xs">${s.full_name}</p></div>`).join('');
        }
    </script>
</body>
</html>
