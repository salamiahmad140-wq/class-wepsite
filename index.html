<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية أساطير لبنى | الإصدار العاشر</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Fredoka:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #4F46E5; --accent: #F59E0B; --bg: #F8FAFC; }
        * { user-select: none; font-family: 'Cairo', 'Fredoka', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; overflow: hidden; height: 100vh; }

        /* الأنظمة */
        .page { position: absolute; inset: 0; display: none; flex-direction: column; z-index: 10; overflow: hidden; }
        .page-active { display: flex; animation: slideIn 0.5s both; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* تصميم الأكوان الـ 100 */
        .level-node {
            width: 140px; height: 140px; border-radius: 40px; background: white;
            display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
            box-shadow: 0 12px 0 #e2e8f0; cursor: pointer; position: relative;
        }
        .level-locked { filter: grayscale(1); opacity: 0.3; cursor: not-allowed; }
        .level-done::after { content: '✅'; position: absolute; -top: 20px; -right: 20px; font-size: 30px; }

        /* واجهة الألعاب */
        #game-box { width: 100%; height: 100%; position: relative; background: #fff; overflow: hidden; }
        .game-ui { position: absolute; top: 20px; inset-x: 20px; display: flex; justify-content: space-between; z-index: 100; pointer-events: none; }
        .hud-stat { background: rgba(255,255,255,0.9); padding: 15px 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); pointer-events: auto; }

        /* القائمة السفلية */
        .dock {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: white; padding: 10px 40px; border-radius: 60px;
            display: flex; gap: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.15); z-index: 500;
        }
        .dock-item { font-size: 2.5rem; cursor: pointer; transition: 0.3s; opacity: 0.3; }
        .dock-item.active { opacity: 1; transform: translateY(-15px) scale(1.2); }

    </style>
</head>
<body>

    <div id="scr-entry" class="page page-active bg-indigo-600 flex items-center justify-center">
        <div class="text-center text-white">
            <h1 class="text-9xl font-black mb-10 drop-shadow-2xl">LUBNA<br>LEGENDS</h1>
            <div class="bg-white/10 p-10 rounded-[60px] backdrop-blur-xl border border-white/20 w-[500px]">
                <input type="text" id="p-code" placeholder="كود البطل" class="w-full p-6 rounded-3xl text-center text-4xl font-black text-indigo-900 outline-none mb-6">
                <button onclick="System.login()" class="w-full py-6 bg-amber-400 text-indigo-900 rounded-3xl text-3xl font-black shadow-lg hover:bg-amber-300 transition">انطلاق 🚀</button>
            </div>
            <p onclick="System.nav('scr-admin')" class="mt-10 opacity-40 cursor-pointer">بوابة الإدارة</p>
        </div>
    </div>

    <div id="scr-multiverse" class="page bg-slate-50">
        <header class="p-20 text-center">
            <h2 class="text-7xl font-black text-indigo-900">اختر عالمك</h2>
        </header>
        <div class="flex justify-center gap-10">
            <div onclick="System.enterWorld('math')" class="w-[400px] h-[500px] bg-white rounded-[70px] border-8 border-white shadow-2xl flex flex-col items-center justify-center cursor-pointer hover:-translate-y-4 transition">
                <span class="text-[150px]">🧮</span>
                <h3 class="text-5xl font-black text-indigo-600 mt-10">عالم الحساب</h3>
                <p class="text-slate-400 font-bold mt-4">100 مرحلة</p>
            </div>
            <div onclick="System.enterWorld('arabic')" class="w-[400px] h-[500px] bg-white rounded-[70px] border-8 border-white shadow-2xl flex flex-col items-center justify-center cursor-pointer hover:-translate-y-4 transition">
                <span class="text-[150px]">📖</span>
                <h3 class="text-5xl font-black text-emerald-600 mt-10">عالم العربية</h3>
                <p class="text-slate-400 font-bold mt-4">100 مرحلة</p>
            </div>
        </div>
    </div>

    <div id="scr-levels" class="page bg-indigo-50 overflow-y-auto p-20">
        <div id="levels-grid" class="grid grid-cols-5 gap-10 max-w-6xl mx-auto">
            </div>
        <button onclick="System.nav('scr-multiverse')" class="fixed top-10 right-10 text-5xl">🔙</button>
    </div>

    <div id="scr-game" class="page">
        <div class="game-ui">
            <div class="hud-stat text-3xl font-black text-indigo-600">
                <span id="g-info">المرحلة 1</span>
            </div>
            <div class="hud-stat text-3xl font-black text-amber-500">
                ⭐ <span id="u-stars">0</span>
            </div>
            <button onclick="System.nav('scr-levels')" class="hud-stat text-3xl">❌</button>
        </div>
        <div id="game-box"></div>
    </div>

    <div id="scr-admin" class="page bg-white p-20 overflow-y-auto !text-slate-900">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-6xl font-black">غرفة الأستاذة لبنى 👑</h1>
            <button onclick="Admin.addStudent()" class="bg-indigo-600 text-white px-10 py-5 rounded-3xl font-black text-xl">إضافة طالب +</button>
        </div>
        <div class="bg-slate-100 rounded-[50px] p-10">
            <table class="w-full text-right text-2xl">
                <thead><tr class="border-b-2">
                    <th class="p-6">الاسم</th><th class="p-6">الكود</th><th class="p-6">النجوم</th><th class="p-6">التحكم</th>
                </tr></thead>
                <tbody id="admin-list"></tbody>
            </table>
        </div>
    </div>

    <nav id="nav" class="dock hidden">
        <div class="dock-item active" onclick="System.nav('scr-multiverse', this)">🪐</div>
        <div class="dock-item" onclick="System.nav('scr-admin', this)">⚙️</div>
        <div class="dock-item" onclick="location.reload()">🔒</div>
    </nav>

<script>
    // ==========================================
    // 🏦 نظام حفظ البيانات (Data Fortress)
    // ==========================================
    const DB = {
        save: (data) => localStorage.setItem('LUBNA_EMPIRE_V10', JSON.stringify(data)),
        load: () => JSON.parse(localStorage.getItem('LUBNA_EMPIRE_V10')) || []
    };

    // ==========================================
    // 🧠 المحرك الرئيسي (The System Core)
    // ==========================================
    const System = {
        user: null,
        world: 'math',

        login() {
            const code = document.getElementById('p-code').value.toUpperCase();
            const students = DB.load();
            const found = students.find(s => s.code === code);
            if(found) {
                this.user = found;
                this.nav('scr-multiverse');
                document.getElementById('nav').classList.remove('hidden');
            } else alert("الكود غير موجود!");
        },

        nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.getElementById(id).classList.add('page-active');
            if(el) {
                document.querySelectorAll('.dock-item').forEach(d => d.classList.remove('active'));
                el.classList.add('active');
            }
        },

        enterWorld(w) {
            this.world = w;
            this.renderLevels();
            this.nav('scr-levels');
        },

        renderLevels() {
            const grid = document.getElementById('levels-grid');
            grid.innerHTML = '';
            const progress = this.user.progress[this.world] || 0;

            for(let i=1; i<=100; i++) {
                const node = document.createElement('div');
                const isLocked = i > (progress + 1);
                node.className = `level-node ${isLocked ? 'level-locked' : ''} ${i <= progress ? 'level-done' : ''}`;
                node.innerHTML = i;
                if(!isLocked) node.onclick = () => Game.start(i);
                grid.appendChild(node);
            }
        }
    };

    // ==========================================
    // 🎮 محرك الألعاب المتنوع (Multi-Game Engine)
    // ==========================================
    const Game = {
        lvl: 1,
        active: false,

        start(lvlNum) {
            this.lvl = lvlNum;
            System.nav('scr-game');
            document.getElementById('g-info').innerText = `المرحلة ${lvlNum}`;
            document.getElementById('u-stars').innerText = System.user.stars;
            
            // اختيار نوع اللعبة بناءً على الرقم (كل مستوى لعبة مختلفة)
            const gameType = (lvlNum % 5) || 5; 
            this.loadGame(gameType);
        },

        loadGame(type) {
            const box = document.getElementById('game-box');
            box.innerHTML = '';
            this.active = true;

            if(type === 1) this.game_catch(box);
            if(type === 2) this.game_sort(box);
            if(type === 3) this.game_balloons(box);
            if(type === 4) this.game_memory(box);
            if(type === 5) this.game_pattern(box);
        },

        // --- النوع 1: الصيد الحركي ---
        game_catch(box) {
            box.innerHTML = `<div id="p" style="position:absolute; bottom:20px; left:50%; font-size:80px">🐱</div>`;
            const p = box.querySelector('#p');
            let score = 0;
            const target = 5;

            const spawn = setInterval(() => {
                if(!this.active) { clearInterval(spawn); return; }
                const item = document.createElement('div');
                item.style.cssText = `position:absolute; top:-100px; left:${Math.random()*90}%; font-size:60px; transition: 3s linear`;
                item.innerHTML = System.world === 'math' ? Math.floor(Math.random()*10) : 'أ';
                box.appendChild(item);
                setTimeout(() => item.style.top = '1000px', 10);

                const check = setInterval(() => {
                    const rect = item.getBoundingClientRect();
                    const prect = p.getBoundingClientRect();
                    if(rect.top > prect.top - 50 && Math.abs(rect.left - prect.left) < 60) {
                        score++;
                        item.remove();
                        clearInterval(check);
                        if(score >= target) this.win();
                    }
                }, 50);
            }, 1500);

            window.onmousemove = (e) => p.style.left = e.clientX + 'px';
        },

        // --- النوع 2: فرز المجموعات ---
        game_sort(box) {
            box.innerHTML = `
                <div class="flex h-full items-center justify-around">
                    <div id="bin-1" class="w-60 h-60 border-8 border-dashed border-indigo-200 rounded-full flex items-center justify-center text-4xl">سلة الأرقام</div>
                    <div id="obj" class="text-[100px] cursor-pointer animate-bounce">5</div>
                </div>
            `;
            const obj = box.querySelector('#obj');
            obj.onclick = () => {
                confetti();
                this.win();
            };
        },

        // --- النوع 3: البالونات ---
        game_balloons(box) {
            box.innerHTML = `<div class="p-20 text-center text-4xl">فجر البالونات الصحيحة!</div>`;
            for(let i=0; i<10; i++) {
                const b = document.createElement('div');
                b.style.cssText = `position:absolute; left:${Math.random()*90}%; top:${Math.random()*80}%; background:hsl(${Math.random()*360},70%,50%); width:120px; height:150px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:40px; cursor:pointer`;
                b.innerHTML = i;
                b.onclick = () => {
                    b.style.transform = 'scale(2)'; b.style.opacity = '0';
                    setTimeout(() => { b.remove(); if(box.querySelectorAll('div').length === 1) this.win(); }, 200);
                };
                box.appendChild(b);
            }
        },

        // --- النوع 4: الذاكرة ---
        game_memory(box) {
            box.innerHTML = `<div class="flex items-center justify-center h-full text-5xl font-black">جاري تحضير بطاقات الذاكرة... <button onclick="Game.win()" class="p-10 bg-indigo-500 text-white rounded-3xl">فوز تجريبي</button></div>`;
        },

        // --- النوع 5: إكمال النمط ---
        game_pattern(box) {
            box.innerHTML = `<div class="flex items-center justify-center h-full text-4xl">أكمل النمط: 2 - 4 - 6 - ؟ <button onclick="Game.win()" class="ml-10 p-5 bg-green-500 text-white rounded-2xl">8</button></div>`;
        },

        win() {
            this.active = false;
            confetti({ particleCount: 200, spread: 70 });
            System.user.stars += 50;
            if(System.user.progress[System.world] < this.lvl) {
                System.user.progress[System.world] = this.lvl;
            }
            // حفظ فوري للبيانات
            const students = DB.load();
            const idx = students.findIndex(s => s.code === System.user.code);
            students[idx] = System.user;
            DB.save(students);
            
            setTimeout(() => System.enterWorld(System.world), 2000);
        }
    };

    // ==========================================
    // 👩‍🏫 إدارة المعلمة (Admin Console)
    // ==========================================
    const Admin = {
        addStudent() {
            const name = prompt("اسم الطالب:");
            if(name) {
                const students = DB.load();
                const code = "LUB-" + (Math.floor(100 + Math.random()*900));
                students.push({ name, code, stars: 0, progress: { math: 0, arabic: 0 } });
                DB.save(students);
                this.render();
            }
        },
        render() {
            const list = document.getElementById('admin-list');
            const students = DB.load();
            list.innerHTML = students.map(s => `
                <tr class="border-b">
                    <td class="p-6 font-black">${s.name}</td>
                    <td class="p-6 font-mono text-indigo-600">${s.code}</td>
                    <td class="p-6 text-amber-500">⭐ ${s.stars}</td>
                    <td class="p-6"><button onclick="Admin.delete('${s.code}')" class="text-red-500">حذف</button></td>
                </tr>
            `).join('');
        },
        delete(code) {
            const students = DB.load().filter(s => s.code !== code);
            DB.save(students);
            this.render();
        }
    };
</script>
</body>
</html>
