<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kideo Legends | Lubna Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-bg: #0c4a6e; }
        body { font-family: 'Cairo', sans-serif; background: var(--main-bg); overflow: hidden; color: white; margin: 0; }
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 10; }
        .active-screen { display: flex; animation: zoomIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* عالم الضفدع - القفز */
        #pond { background: #075985; position: relative; flex-grow: 1; overflow: hidden; }
        .lily-pad { width: 100px; height: 80px; background: #166534; border-radius: 50%; position: absolute; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: inset 0 -5px 10px rgba(0,0,0,0.3); transition: 0.3s; }
        .lily-pad:hover { transform: scale(1.1); background: #15803d; }
        #frog { font-size: 50px; position: absolute; transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55); z-index: 50; }

        /* واجهة المستخدم (UI) */
        .game-card { background: white; border-radius: 30px; box-shadow: 0 15px 0 #d1d5db; color: #1e293b; padding: 20px; text-align: center; cursor: pointer; transition: 0.2s; }
        .game-card:active { transform: translateY(8px); box-shadow: 0 5px 0 #d1d5db; }
        .hud-item { background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 20px; display: flex; align-items: center; gap: 8px; font-size: 14px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="game-hud" class="fixed top-0 inset-x-0 p-4 z-[100] flex justify-between items-center hidden">
        <div class="flex gap-2">
            <div class="hud-item text-yellow-400">🪙 <span id="coin-count">0</span></div>
            <div class="hud-item text-blue-300">⭐ <span id="star-count">0</span></div>
        </div>
        <div class="hud-item" id="player-info">👤 <span id="p-name">--</span></div>
    </div>

    <div id="scr-login" class="screen active-screen items-center justify-center p-6 bg-[url('https://www.transparenttextures.com/patterns/pinstripe.png')]">
        <div class="w-full max-w-sm text-center">
            <div class="text-8xl mb-6">🚀</div>
            <h1 class="text-4xl font-900 mb-2">مرحبا بك يا أسطورة</h1>
            <p class="opacity-60 mb-8">أدخل كود الدخول الخاص بك</p>
            <input type="text" id="login-code" placeholder="مثلاً: LUB-101" class="w-full p-5 rounded-3xl bg-white/10 border-2 border-white/20 text-center text-2xl font-black outline-none focus:border-yellow-400 mb-6 uppercase">
            <button onclick="checkCode()" class="w-full bg-yellow-400 text-sky-900 p-5 rounded-3xl font-black text-2xl shadow-xl hover:bg-yellow-300 active:scale-95 transition-all">انطلاق!</button>
        </div>
    </div>

    <div id="scr-menu" class="screen pt-24 p-6 overflow-y-auto">
        <h2 class="text-center text-3xl font-black mb-8 italic">العوالم السحرية 🌈</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="game-card" onclick="startFrogGame()">
                <div class="text-7xl mb-4">🐸</div>
                <h3 class="text-2xl font-black">قفزة الضفدع الذكي</h3>
                <p class="text-sm opacity-60">ساعد الضفدع في اختيار الجواب الصحيح</p>
            </div>
            <div class="game-card" onclick="alert('لعبة الحقيبة قادمة!')">
                <div class="text-7xl mb-4">🎒</div>
                <h3 class="text-2xl font-black">جامع الكنوز</h3>
                <p class="text-sm opacity-60">صنف الكلمات داخل الحقيبة</p>
            </div>
        </div>
    </div>

    <div id="scr-frog-game" class="screen">
        <div class="p-6 flex justify-between items-center bg-sky-900/50 backdrop-blur-md">
            <button onclick="goMenu()" class="bg-red-500 p-2 rounded-xl text-xs font-black">خروج</button>
            <div class="text-center">
                <p class="text-[10px] uppercase opacity-50">أين يختبئ رقم</p>
                <h2 id="target-val" class="text-4xl font-black text-yellow-400">10</h2>
            </div>
            <div class="w-10"></div>
        </div>
        <div id="pond">
            <div id="frog">🐸</div>
            </div>
    </div>

    <script>
        let pData = { name: '', coins: 0, stars: 0 };

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function checkCode() {
            const code = document.getElementById('login-code').value;
            if(code.length > 2) {
                pData.name = "بطل " + code;
                document.getElementById('p-name').innerText = pData.name;
                document.getElementById('game-hud').classList.remove('hidden');
                switchScreen('scr-menu');
            }
        }

        function startFrogGame() {
            switchScreen('scr-frog-game');
            setupFrogLevel();
        }

        function setupFrogLevel() {
            const pond = document.getElementById('pond');
            const targetDisplay = document.getElementById('target-val');
            const frog = document.getElementById('frog');
            
            // تنظيف الحوض
            document.querySelectorAll('.lily-pad').forEach(p => p.remove());
            
            const target = Math.floor(Math.random() * 20) + 1;
            targetDisplay.innerText = target;
            
            // وضع الضفدع في البداية
            frog.style.bottom = "20px";
            frog.style.left = "50%";
            frog.style.transform = "translateX(-50%)";

            // إنشاء أوراق الشجر
            for(let i=0; i<4; i++) {
                const pad = document.createElement('div');
                pad.className = 'lily-pad';
                const isCorrect = i === Math.floor(Math.random()*4);
                pad.innerText = isCorrect ? target : (target + Math.floor(Math.random()*5) + 1);
                
                pad.style.top = (150 + (i * 100)) + "px";
                pad.style.left = (20 + (Math.random() * 60)) + "%";

                pad.onclick = () => {
                    // تحريك الضفدع للورقة
                    const rect = pad.getBoundingClientRect();
                    frog.style.top = (rect.top - 40) + "px";
                    frog.style.left = (rect.left + 20) + "px";
                    
                    if(pad.innerText == target) {
                        setTimeout(() => {
                            alert("قفزة أسطورية! ✨");
                            pData.coins += 10;
                            document.getElementById('coin-count').innerText = pData.coins;
                            setupFrogLevel();
                        }, 600);
                    } else {
                        setTimeout(() => {
                            alert("أووه! حاول ثانية");
                            frog.style.bottom = "20px";
                            frog.style.top = "auto";
                        }, 600);
                    }
                };
                pond.appendChild(pad);
            }
        }

        function goMenu() { switchScreen('scr-menu'); }
    </script>
</body>
</html>
