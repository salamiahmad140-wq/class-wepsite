<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أساطير 1-ب | عالم المغامرة</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Fredoka:wght@600&display=swap" rel="stylesheet">

    <style>
        :root { --p-blue: #00b4d8; --p-pink: #ff85a1; --p-yellow: #ffd60a; --p-green: #72efdd; }
        * { font-family: 'Cairo', 'Fredoka', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { background: #e0f2fe; overflow: hidden; height: 100vh; margin: 0; }

        /* غيوم متحركة في الخلفية */
        .cloud { position: absolute; background: white; border-radius: 50px; opacity: 0.6; z-index: -1; animation: moveCloud 20s linear infinite; }
        @keyframes moveCloud { from { transform: translateX(-200px); } to { transform: translateX(100vw); } }

        .page { position: absolute; inset: 0; display: none; flex-direction: column; padding: 20px; transition: 0.5s; }
        .page-active { display: flex; animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* شخصية فوكا */
        #fooka {
            position: fixed; bottom: -200px; left: 20px; width: 180px; z-index: 1000;
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bubble {
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
            background: white; padding: 15px 25px; border-radius: 20px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.05); width: 220px; text-align: center;
            font-weight: bold; display: none; border: 3px solid var(--p-blue);
        }

        /* تصميم الكروت الرهيب */
        .card-gaming {
            background: white; border-radius: 35px; border-bottom: 12px solid #cbd5e1;
            transition: 0.1s; cursor: pointer; position: relative; overflow: hidden;
        }
        .card-gaming:active { transform: translateY(8px); border-bottom-width: 4px; }
        .card-gaming::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 50%; background: rgba(255,255,255,0.2); }

        /* تأثير النقر (الفقاعة) */
        .tap-effect { position: absolute; width: 20px; height: 20px; background: rgba(255,255,255,0.8); border-radius: 50%; pointer-events: none; animation: tap 0.4s ease-out; }
        @keyframes tap { to { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body onclick="createTap(event)">

    <div class="cloud w-32 h-12 top-10 left-[-100px]" style="animation-duration: 25s;"></div>
    <div class="cloud w-48 h-16 top-40 left-[-150px]" style="animation-duration: 35s;"></div>
    <div class="cloud w-24 h-10 top-80 left-[-80px]" style="animation-duration: 45s;"></div>

    <div id="fooka">
        <div class="bubble" id="fooka-msg">أهلاً بك يا بطل! أنا فوكا، سأكون مرشدك في هذه المغامرة!</div>
        <img src="https://cdn-icons-png.flaticon.com/512/4392/4392471.png" class="w-full">
    </div>

    <div id="p-login" class="page page-active justify-center items-center">
        <div class="card-gaming p-10 w-full max-w-md text-center border-blue-200">
            <h1 class="text-5xl font-black text-blue-500 mb-4 italic">أساطير 1-ب</h1>
            <p class="text-slate-400 font-bold mb-8 italic">مغامرة العلم تبدأ هنا!</p>
            <input type="text" id="u-code" placeholder="كود البطل السري" class="w-full p-5 rounded-3xl bg-blue-50 border-4 border-blue-100 text-center text-2xl font-black outline-none focus:border-blue-400 mb-6">
            <button onclick="App.login()" class="w-full py-5 bg-blue-500 text-white rounded-3xl text-3xl font-black shadow-[0_10px_0_#0077b6] active:shadow-none transition">دخول المغامرة ✨</button>
        </div>
    </div>

    <div id="p-home" class="page items-center">
        <div class="w-full max-w-4xl flex justify-between p-4">
            <div class="card-gaming px-6 py-2 bg-yellow-400 text-white font-black text-xl">💰 <span id="u-coins">0</span></div>
            <div class="card-gaming px-6 py-2 bg-pink-400 text-white font-black text-xl">⭐ <span id="u-stars">0</span></div>
        </div>

        <div class="text-center mt-10">
            <div id="u-avatar" class="w-48 h-48 bg-white rounded-full inline-flex items-center justify-center text-8xl shadow-2xl border-8 border-white">🧒</div>
            <h2 id="u-name" class="text-4xl font-black mt-4 text-slate-700">بطل الأساطير</h2>
        </div>

        <div class="grid grid-cols-2 gap-6 w-full max-w-xl mt-12 px-4">
            <div onclick="App.nav('p-worlds')" class="card-gaming p-8 bg-blue-400 text-white text-center border-blue-600">
                <div class="text-6xl mb-2">🗺️</div>
                <div class="text-2xl font-black">الخريطة</div>
            </div>
            <div onclick="App.nav('p-shop')" class="card-gaming p-8 bg-pink-400 text-white text-center border-pink-600">
                <div class="text-6xl mb-2">🛍️</div>
                <div class="text-2xl font-black">المتجر</div>
            </div>
            <div onclick="App.showLeaderboard()" class="card-gaming p-8 bg-yellow-400 text-white text-center border-yellow-600 col-span-2">
                <div class="text-4xl font-black">🏆 لوحة الصدارة</div>
            </div>
        </div>
    </div>

    <div id="p-worlds" class="page">
        <div class="flex justify-between items-center mb-8">
            <button onclick="App.nav('p-home')" class="card-gaming px-6 py-2 bg-red-400 text-white font-bold">رجوع</button>
            <h2 class="text-3xl font-black text-slate-700">عوالم المغامرة</h2>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 p-4">
            <div onclick="App.openMap('math')" class="card-gaming p-10 bg-white border-blue-200 text-center">
                <div class="text-8xl mb-4">🔢</div>
                <div class="text-3xl font-black text-blue-500">مملكة الأرقام</div>
            </div>
            <div onclick="App.openMap('arabic')" class="card-gaming p-10 bg-white border-pink-200 text-center">
                <div class="text-8xl mb-4">🖋️</div>
                <div class="text-3xl font-black text-pink-500">واحة الحروف</div>
            </div>
        </div>
    </div>

    <div id="game-view" class="fixed inset-0 bg-white z-[5000] hidden flex-col">
        <div class="p-6 flex justify-between items-center bg-blue-50">
            <div id="g-lives" class="text-4xl">❤️❤️❤️</div>
            <div id="g-task" class="text-4xl font-black text-blue-600 bg-white px-10 py-4 rounded-3xl shadow-sm italic">...</div>
            <div class="text-2xl font-black text-slate-400">المهمة <span id="g-step">1</span>/5</div>
        </div>
        <div id="g-arena" class="flex-1 relative overflow-hidden bg-slate-50 flex items-center justify-center p-10">
            </div>
    </div>

    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<script>
const App = {
    dbKey: 'LEGENDS_V5_MEGA',
    user: null,

    init() {
        this.fooka("أهلاً بك! أدخل كودك لنبدأ المغامرة!", 4000);
    },

    fooka(msg, time) {
        const f = document.getElementById('fooka');
        const m = document.getElementById('fooka-msg');
        f.style.bottom = "0px"; m.innerText = msg; m.style.display = "block";
        setTimeout(() => { f.style.bottom = "-200px"; m.style.display = "none"; }, time);
    },

    login() {
        const code = document.getElementById('u-code').value.trim();
        let db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const user = db.find(u => u.code === code);
        
        if(user) {
            this.user = user;
            this.playSound('snd-click');
            this.nav('p-home');
            this.sync();
            this.fooka(`مرحباً يا ${user.name}! اشتقنا لك!`, 3000);
        } else {
            this.fooka("أوه! الكود غير صحيح، تأكد منه يا بطل.", 3000);
        }
    },

    nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
        document.getElementById(id).classList.add('page-active');
        this.playSound('snd-click');
    },

    sync() {
        document.getElementById('u-name').innerText = this.user.name;
        document.getElementById('u-stars').innerText = this.user.stars;
        document.getElementById('u-coins').innerText = this.user.coins;
        document.getElementById('u-avatar').innerText = this.user.equipped || '🧒';
        // حفظ في التخزين
        let db = JSON.parse(localStorage.getItem(this.dbKey));
        const idx = db.findIndex(u => u.code === this.user.code);
        db[idx] = this.user;
        localStorage.setItem(this.dbKey, JSON.stringify(db));
    },

    openMap(world) {
        this.currentWorld = world;
        this.fooka(world === 'math' ? "لننطلق إلى عالم الأرقام الممتع!" : "لنستكشف حروفنا الجميلة!", 3000);
        Game.start(world);
    },

    playSound(id) { document.getElementById(id).play().catch(()=>{}); }
};

/**
 * 🕹️ محرك الألعاب (Game Engine) - منطقي ومتنوع
 */
const Game = {
    step: 1, world: '', lives: 3, target: '',
    
    start(world) {
        this.world = world; this.step = 1; this.lives = 3;
        document.getElementById('game-view').style.display = 'flex';
        this.loadLevel();
    },

    loadLevel() {
        document.getElementById('g-step').innerText = this.step;
        document.getElementById('g-lives').innerText = "❤️".repeat(this.lives);
        const arena = document.getElementById('g-arena');
        arena.innerHTML = ''; arena.className = "flex-1 relative flex flex-wrap gap-6 justify-center items-center p-10";

        const type = Math.floor(Math.random() * 3); // 3 أنواع ألعاب مختلفة

        if(this.world === 'math') {
            if(type === 0) this.gameMathSum(arena);
            else if(type === 1) this.gameIdentify(arena, "أين الرقم 5؟", "5", ["3","5","8","2"]);
            else this.gameCount(arena);
        } else {
            if(type === 0) this.gameIdentify(arena, "أين حرف (أ)؟", "أ", ["ب","أ","ت","ج"]);
            else if(type === 1) this.gameIdentify(arena, "ما هو إيموجي الأسد؟", "🦁", ["🐱","🦁","🐯","🐶"]);
            else this.gameIdentify(arena, "أكمل: (تفـ..ـاحة)", "اح", ["اح","اخ","ات","ار"]);
        }
    },

    gameIdentify(arena, q, target, opts) {
        document.getElementById('g-task').innerText = q;
        opts.sort(()=>Math.random()-0.5).forEach(o => {
            const b = document.createElement('div');
            b.className = "card-gaming p-10 text-6xl bg-white w-40 h-40 flex items-center justify-center border-blue-100";
            b.innerText = o;
            b.onclick = () => o === target ? this.winStep(b) : this.failStep(b);
            arena.appendChild(b);
        });
    },

    gameMathSum(arena) {
        const n1 = Math.floor(Math.random()*5);
        const n2 = Math.floor(Math.random()*5);
        document.getElementById('g-task').innerText = `${n1} + ${n2} = ؟`;
        const correct = n1 + n2;
        [correct, correct+1, correct-1, 10].sort(()=>Math.random()-0.5).forEach(o => {
            if(o < 0) o = 9;
            const b = document.createElement('div');
            b.className = "card-gaming p-10 text-6xl bg-white w-40 h-40 flex items-center justify-center";
            b.innerText = o;
            b.onclick = () => o === correct ? this.winStep(b) : this.failStep(b);
            arena.appendChild(b);
        });
    },

    winStep(el) {
        App.playSound('snd-win');
        confetti({ particleCount: 50, spread: 30, origin: { y: 0.8 } });
        gsap.to(el, { scale: 1.2, duration: 0.2, yoyo: true, repeat: 1 });
        setTimeout(() => {
            this.step++;
            if(this.step > 5) this.finishGame();
            else this.loadLevel();
        }, 800);
    },

    failStep(el) {
        this.lives--;
        document.getElementById('g-lives').innerText = "❤️".repeat(this.lives);
        gsap.to(el, { x: 10, duration: 0.1, yoyo: true, repeat: 5 });
        if(this.lives <= 0) {
            alert("انتهت الأرواح! حاول مرة أخرى.");
            this.quit();
        }
    },

    finishGame() {
        alert("أنت بطل حقيقي! فزت بـ 100 نجمة 🌟");
        App.user.stars += 100; App.user.coins += 50;
        App.sync();
        this.quit();
    },

    quit() { document.getElementById('game-view').style.display = 'none'; }
};

function createTap(e) {
    const d = document.createElement('div');
    d.className = 'tap-effect'; d.style.left = e.pageX - 10 + 'px'; d.style.top = e.pageY - 10 + 'px';
    document.body.appendChild(d); setTimeout(()=>d.remove(), 400);
}

App.init();
</script>
</body>
</html>
