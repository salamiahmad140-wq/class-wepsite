<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة الأساطير | عالم نيو-روبو</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Fredoka:wght@600&display=swap" rel="stylesheet">

    <style>
        :root { --p: #6366f1; --s: #f43f5e; --a: #10b981; --bg: #0f172a; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; height: 100vh; overflow: hidden; color: white; }

        /* حاوية التطبيق الذكية */
        #main-wrapper { width: 100%; max-width: 500px; height: 100%; margin: 0 auto; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); position: relative; overflow: hidden; display: flex; flex-direction: column; }

        /* شاشات التنقل السلس */
        .page { position: absolute; inset: 0; display: none; flex-direction: column; padding: 20px; padding-bottom: 100px; overflow-y: auto; z-index: 10; }
        .page-active { display: flex; animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* تصميم نيو-روبو (Neo-Robo) */
        .robo-container { position: fixed; bottom: 90px; right: 20px; z-index: 1000; pointer-events: none; transition: 0.5s; transform: scale(0); }
        .robo-container.active { transform: scale(1); }
        .robo-body { width: 80px; height: 80px; background: white; border-radius: 20px; position: relative; border: 4px solid var(--p); box-shadow: 0 0 20px var(--p); animation: roboFloat 3s infinite ease-in-out; }
        .robo-eye { position: absolute; top: 25%; width: 15px; height: 15px; background: #000; border-radius: 50%; animation: blink 4s infinite; }
        .robo-eye.left { left: 15%; } .robo-eye.right { right: 15%; }
        .robo-mouth { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); width: 30px; height: 5px; background: var(--p); border-radius: 10px; }
        .robo-msg { position: absolute; bottom: 100px; right: 0; background: white; color: #333; padding: 10px 15px; border-radius: 20px 20px 0 20px; width: 180px; font-weight: 900; box-shadow: 0 10px 20px rgba(0,0,0,0.3); border: 2px solid var(--p); }
        @keyframes roboFloat { 0%, 100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-15px) rotate(5deg); } }
        @keyframes blink { 0%, 90%, 100% { height: 15px; } 95% { height: 2px; } }

        /* الأزرار العصرية 3D Neon */
        .neo-btn { background: var(--p); border-radius: 20px; padding: 15px; font-weight: 900; text-align: center; border-bottom: 5px solid #4338ca; transition: 0.1s; cursor: pointer; color: white; position: relative; overflow: hidden; }
        .neo-btn:active { transform: translateY(3px); border-bottom-width: 2px; }
        .neo-btn::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: 0.5s; }
        .neo-btn:hover::after { left: 100%; }

        /* البطاقات والشبكة */
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 20px; }
        .bottom-nav { position: absolute; bottom: 15px; left: 15px; right: 15px; height: 70px; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(20px); border-radius: 25px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .nav-item { font-size: 1.5rem; opacity: 0.4; transition: 0.3s; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--p); transform: translateY(-5px); }
    </style>
</head>
<body>

<div id="main-wrapper">
    
    <div id="neo-robo" class="robo-container">
        <div class="robo-msg" id="robo-text">أهلاً بك!</div>
        <div class="robo-body">
            <div class="robo-eye left"></div>
            <div class="robo-eye right"></div>
            <div class="robo-mouth"></div>
        </div>
    </div>

    <div id="pg-login" class="page page-active justify-center">
        <div class="text-center">
            <div class="text-8xl mb-4">✨</div>
            <h1 class="text-5xl font-black mb-2 tracking-tight">أساطير 1-ب</h1>
            <p class="text-indigo-300 font-bold mb-10">مستقبلك يبدأ مع نيو-روبو</p>
            <div class="glass-card mb-6">
                <input type="text" id="user-code" placeholder="أدخل الكود السري" class="w-full bg-transparent border-b-2 border-indigo-500 text-center text-3xl font-black py-4 outline-none text-white uppercase">
            </div>
            <div onclick="App.login()" class="neo-btn text-2xl">انطلاق 🚀</div>
        </div>
    </div>

    <div id="pg-home" class="page">
        <div class="flex justify-between items-center mb-10">
            <div class="glass-card py-2 px-5 flex items-center gap-2"><span class="text-yellow-400">💰</span> <span id="u-coins" class="font-black">0</span></div>
            <div class="glass-card py-2 px-5 flex items-center gap-2"><span class="text-rose-400">⭐</span> <span id="u-stars" class="font-black">0</span></div>
        </div>
        
        <div class="text-center mb-10">
            <div id="u-avatar" class="w-32 h-32 mx-auto rounded-full border-4 border-indigo-500 flex items-center justify-center text-7xl shadow-[0_0_30px_rgba(99,102,241,0.5)] mb-4 bg-slate-800">👦</div>
            <h2 id="u-name" class="text-3xl font-black">أهلاً أيها البطل</h2>
        </div>

        <div class="grid grid-cols-1 gap-5">
            <div onclick="World.open('math')" class="glass-card flex items-center gap-6 cursor-pointer hover:bg-white/10 transition">
                <div class="text-6xl">🔢</div>
                <div><h3 class="text-2xl font-black">عالم الرياضيات</h3><p class="text-indigo-300">أرقام وتحديات ذكية</p></div>
            </div>
            <div onclick="World.open('arabic')" class="glass-card flex items-center gap-6 cursor-pointer hover:bg-white/10 transition">
                <div class="text-6xl">🖋️</div>
                <div><h3 class="text-2xl font-black">عالم لغتي</h3><p class="text-rose-300">حروف وكلمات ممتعة</p></div>
            </div>
        </div>
    </div>

    <div id="pg-map" class="page">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="App.nav('pg-home', 0)" class="text-3xl">🔙</button>
            <h2 id="map-title" class="text-3xl font-black">المراحل</h2>
        </div>
        <div id="map-path" class="grid grid-cols-2 gap-6 pb-10"></div>
    </div>

    <div id="pg-game" class="page bg-slate-900 z-50 p-0">
        <div class="p-5 flex justify-between items-center bg-slate-800">
            <div id="g-lives" class="text-2xl">❤️❤️❤️</div>
            <div class="font-black" id="g-info">مرحلة 1</div>
            <button onclick="Game.quit()" class="bg-rose-600 px-4 py-1 rounded-xl font-bold">خروج</button>
        </div>
        <div class="p-8 text-center"><h2 id="g-task" class="text-3xl font-black leading-relaxed italic">...</h2></div>
        <div id="g-arena" class="flex-1 flex flex-col items-center justify-center p-6"></div>
    </div>

    <div id="nav-bar" class="bottom-nav hidden">
        <div class="nav-item active" onclick="App.nav('pg-home', 0)">🏠</div>
        <div class="nav-item" onclick="App.nav('pg-shop', 1); Shop.render()">🛍️</div>
        <div class="nav-item" onclick="App.nav('pg-lead', 2); Lead.render()">🏆</div>
    </div>

</div>

<script>
const DB_KEY = 'LEGENDS_NEO_V6';

// --- إدارة التطبيق ---
const App = {
    user: null,
    login() {
        const code = document.getElementById('user-code').value.trim().toUpperCase();
        const db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        const found = db.find(u => u.code === code);
        
        if(found) {
            this.user = found; this.sync();
            document.getElementById('nav-bar').classList.remove('hidden');
            this.nav('pg-home', 0);
            Robo.say(`أهلاً بك يا بطل ${found.name}! أنا نيو-روبو، سأرشدك في مغامرتك!`, 5000);
            confetti({particleCount: 150, spread: 70});
        } else {
            Robo.say("أوه! هذا الكود غير مسجل، اطلب الكود من معلمتك.");
        }
    },
    sync() {
        document.getElementById('u-name').innerText = this.user.name;
        document.getElementById('u-stars').innerText = this.user.stars;
        document.getElementById('u-coins').innerText = this.user.coins;
        document.getElementById('u-avatar').innerText = this.user.avatar || '👦';
        let db = JSON.parse(localStorage.getItem(DB_KEY));
        db[db.findIndex(u => u.code === this.user.code)] = this.user;
        localStorage.setItem(DB_KEY, JSON.stringify(db));
    },
    nav(id, idx) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
        document.getElementById(id).classList.add('page-active');
        document.querySelectorAll('.nav-item').forEach((item, i) => {
            item.classList.toggle('active', i === idx);
        });
    }
};

// --- نيو-روبو الذكي ---
const Robo = {
    say(text, time = 4000) {
        const el = document.getElementById('neo-robo');
        document.getElementById('robo-text').innerText = text;
        el.classList.add('active');
        clearTimeout(this.t);
        this.t = setTimeout(() => el.classList.remove('active'), time);
    }
};

// --- نظام العوالم والمراحل ---
const World = {
    type: '',
    open(type) {
        this.type = type;
        document.getElementById('map-title').innerText = type === 'math' ? 'عالم الرياضيات 🔢' : 'عالم لغتي 🖋️';
        const grid = document.getElementById('map-path');
        grid.innerHTML = '';
        
        for(let i=1; i<=10; i++) {
            const unlocked = i <= (App.user.progress[type] + 1);
            const done = i <= App.user.progress[type];
            const node = document.createElement('div');
            node.className = `glass-card h-32 flex flex-col items-center justify-center gap-2 cursor-pointer transition ${!unlocked ? 'opacity-30 grayscale' : 'hover:scale-105 border-indigo-500'}`;
            node.innerHTML = `
                <div class="text-3xl font-black">${unlocked ? i : '🔒'}</div>
                <div class="text-xs font-bold text-indigo-400">${done ? 'مكتمل ✅' : (unlocked ? 'متاح' : 'مقفل')}</div>
            `;
            if(unlocked) node.onclick = () => Game.start(type, i);
            grid.appendChild(node);
        }
        App.nav('pg-map');
        Robo.say("اختر مرحلة لنبدأ التحدي يا أسطورة!");
    }
};

// --- محرك الألعاب (Game Engine) ---
const Game = {
    world: '', level: 1, lives: 3,
    start(w, l) {
        this.world = w; this.level = l; this.lives = 3;
        App.nav('pg-game'); this.render();
    },
    render() {
        document.getElementById('g-lives').innerText = "❤️".repeat(this.lives);
        document.getElementById('g-info').innerText = `المرحلة ${this.level}`;
        const arena = document.getElementById('g-arena');
        arena.innerHTML = '';

        // تنويع الألعاب بناءً على المستوى
        const mode = this.level % 3;
        if(mode === 1) this.gamePick(arena);
        else if(mode === 2) this.gameMemory(arena);
        else this.gameFall(arena);
    },

    gamePick(arena) {
        const isMath = this.world === 'math';
        let q, ans, options;
        if(isMath) {
            const a = Math.floor(Math.random()*10); const b = Math.floor(Math.random()*10);
            q = `كم يساوي ${a} + ${b} ؟`; ans = a + b;
            options = [ans, ans+1, ans+2, ans-1].sort(() => Math.random()-0.5);
        } else {
            q = "ما هو الحرف الأول في كلمة (أسد)؟"; ans = "أ";
            options = ["أ", "ب", "ت", "ج"].sort(() => Math.random()-0.5);
        }
        document.getElementById('g-task').innerText = q;
        arena.className = "grid grid-cols-2 gap-4 w-full";
        options.forEach(o => {
            const b = document.createElement('div');
            b.className = "neo-btn text-4xl py-10";
            b.innerText = o;
            b.onclick = () => o === ans ? this.win() : this.lose();
            arena.appendChild(b);
        });
    },

    gameMemory(arena) {
        document.getElementById('g-task').innerText = "طابق الصور المتشابهة بسرعة!";
        arena.className = "grid grid-cols-3 gap-2";
        let items = ['🍎','🍎','🚀','🚀','⭐','⭐'].sort(() => Math.random()-0.5);
        let flipped = [], count = 0;
        items.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = "w-24 h-24 bg-slate-800 rounded-2xl flex items-center justify-center text-4xl cursor-pointer border-2 border-slate-700 transition-all";
            card.innerHTML = "?";
            card.onclick = () => {
                if(flipped.length < 2 && !card.dataset.open) {
                    card.innerHTML = item; card.classList.add('bg-white', 'text-black');
                    flipped.push({el: card, val: item});
                    if(flipped.length === 2) {
                        if(flipped[0].val === flipped[1].val) {
                            count += 2; flipped = [];
                            if(count === items.length) this.win();
                        } else {
                            setTimeout(() => {
                                flipped.forEach(f => { f.el.innerHTML = "?"; f.el.classList.remove('bg-white', 'text-black'); });
                                flipped = []; this.lose();
                            }, 800);
                        }
                    }
                }
            };
            arena.appendChild(card);
        });
    },

    win() {
        confetti(); Robo.say("رائع! إجابة مذهلة يا بطل 🌟");
        App.user.stars += 50; App.user.coins += 20;
        if(App.user.progress[this.world] < this.level) App.user.progress[this.world] = this.level;
        App.sync();
        setTimeout(() => { this.quit(); World.open(this.world); }, 2000);
    },
    lose() {
        this.lives--; this.render();
        if(this.lives <= 0) { Robo.say("لا بأس، حاول مرة أخرى لتتعلم أكثر!"); this.quit(); }
    },
    quit() { App.nav('pg-map'); }
};

App.login(); // تهيئة الدخول
</script>
</body>
</html>
