<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أكاديمية الأساطير 2026 | الأستاذة لبنى</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #ec4899; --accent: #f59e0b; --bg: #020617; }
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; }

        /* الشاشات الرئيسية */
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 10; transition: 0.5s; }
        .active-screen { display: flex; animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes zoomIn { from { transform: scale(1.1); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* الهيدر العلوي HUD */
        .hud { height: 80px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border-bottom: 2px solid rgba(255,255,255,0.1); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; z-index: 100; position: fixed; top: 0; width: 100%; }
        
        /* خريطة المراحل الاحترافية */
        .map-container { flex: 1; overflow-y: auto; padding: 120px 20px 100px; background: url('https://www.transparenttextures.com/patterns/stardust.png'); }
        .path-line { width: 10px; background: rgba(255,255,255,0.1); margin: 0 auto; position: relative; border-radius: 20px; }
        
        .level-node {
            width: 90px; height: 90px; border-radius: 30px; background: white; color: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 900; font-size: 24px; position: relative; margin-bottom: 40px;
            box-shadow: 0 10px 0 #cbd5e1, 0 20px 30px rgba(0,0,0,0.5); cursor: pointer; transition: 0.2s;
        }
        .level-node:active { transform: translateY(5px); box-shadow: 0 5px 0 #cbd5e1; }
        .level-locked { background: #334155; color: #64748b; cursor: not-allowed; border: 4px solid #1e293b; }
        .level-locked::after { content: '🔒'; position: absolute; font-size: 14px; top: -10px; }

        /* بطاقات العوالم */
        .world-card {
            height: 200px; border-radius: 40px; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: 0.4s; border: 4px solid rgba(255,255,255,0.1);
        }
        .world-card:hover { transform: scale(1.02); border-color: var(--primary); }
        .world-card h3 { font-size: 32px; font-weight: 900; z-index: 2; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .world-overlay { position: absolute; inset: 0; background: linear-gradient(45deg, rgba(0,0,0,0.7), transparent); z-index: 1; }

        /* منطقة الألعاب */
        #game-arena { background: radial-gradient(circle, #1e293b, #020617); }
        .game-obj { position: absolute; transition: 0.3s; cursor: pointer; }

        /* القائمة السفلية */
        .bottom-nav { height: 70px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 1000; }
        .nav-item { font-size: 24px; opacity: 0.5; transition: 0.3s; cursor: pointer; }
        .nav-active { opacity: 1; color: var(--primary); transform: scale(1.2); }
    </style>
</head>
<body>

    <div id="hud" class="hud hidden">
        <div class="flex items-center gap-3 bg-white/5 p-2 pr-4 rounded-full border border-white/10">
            <div id="p-avatar" class="text-2xl">🐱</div>
            <div>
                <p id="p-name" class="text-[10px] font-bold opacity-50 leading-none uppercase">Legend</p>
                <p id="p-display-name" class="font-900 text-xs">البطل</p>
            </div>
        </div>
        <div class="flex gap-3">
            <div class="bg-yellow-500/10 px-4 py-1 rounded-full border border-yellow-500/30 flex items-center gap-2">
                <span class="text-yellow-500 font-black" id="p-coins">500</span>
                <span>💰</span>
            </div>
            <div class="bg-blue-500/10 px-4 py-1 rounded-full border border-blue-500/30 flex items-center gap-2">
                <span class="text-blue-400 font-black" id="p-xp">1250</span>
                <span>⭐</span>
            </div>
        </div>
    </div>

    <div id="screen-login" class="screen active-screen justify-center items-center p-6">
        <div class="w-full max-w-md text-center">
            <h1 class="text-6xl font-900 mb-2 tracking-tighter">أساطير</h1>
            <p class="text-indigo-400 font-bold mb-10">منصة الصف الأول ب التعليمية</p>
            
            <input type="text" id="input-name" placeholder="ما اسمك يا بطل؟" class="w-full p-5 bg-white/5 border border-white/10 rounded-3xl text-center text-xl font-bold mb-6 outline-none focus:border-indigo-500 transition-all">
            
            <div class="grid grid-cols-4 gap-4 mb-10">
                <div class="avatar-opt p-4 bg-white/5 rounded-2xl border-2 border-transparent cursor-pointer text-3xl hover:border-indigo-500" onclick="setAvatar('🐱', this)">🐱</div>
                <div class="avatar-opt p-4 bg-white/5 rounded-2xl border-2 border-transparent cursor-pointer text-3xl hover:border-indigo-500" onclick="setAvatar('🦊', this)">🦊</div>
                <div class="avatar-opt p-4 bg-white/5 rounded-2xl border-2 border-transparent cursor-pointer text-3xl hover:border-indigo-500" onclick="setAvatar('🦖', this)">🦖</div>
                <div class="avatar-opt p-4 bg-white/5 rounded-2xl border-2 border-transparent cursor-pointer text-3xl hover:border-indigo-500" onclick="setAvatar('🦄', this)">🦄</div>
            </div>

            <button onclick="login()" class="w-full bg-indigo-600 p-5 rounded-[2rem] font-black text-2xl shadow-2xl active:scale-95 transition-all">دخول المجرّة 🚀</button>
        </div>
    </div>

    <div id="screen-worlds" class="screen pt-[100px] p-6 space-y-6">
        <h2 class="text-3xl font-900 text-center mb-4">اختر كوكبك 🪐</h2>
        
        <div class="world-card bg-[url('https://images.unsplash.com/photo-1579546678183-a9a1a4b88d66?auto=format&fit=crop&w=800')]" onclick="openWorld('arabic')">
            <div class="world-overlay"></div>
            <h3>📕 عالم اللغة</h3>
        </div>

        <div class="world-card bg-[url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&w=800')]" onclick="openWorld('math')">
            <div class="world-overlay"></div>
            <h3>🔢 عالم الحساب</h3>
        </div>

        <div class="world-card opacity-50 grayscale">
            <div class="world-overlay"></div>
            <h3>🧪 مختبر العلوم (قريباً)</h3>
        </div>
    </div>

    <div id="screen-map" class="screen map-container">
        <div class="flex justify-between items-center mb-10">
            <button onclick="changeScreen('screen-worlds')" class="bg-white/10 px-6 py-3 rounded-2xl font-black text-xs">⬅ العوالم</button>
            <h2 id="current-world-name" class="text-2xl font-black">العالم</h2>
        </div>
        
        <div class="path-line" id="levels-path">
            </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="p-6 flex justify-between items-center bg-white/5 backdrop-blur-md">
            <button onclick="quitGame()" class="text-red-500 font-black">انسحاب ✕</button>
            <div class="text-center">
                <p id="game-task" class="text-xs opacity-50 uppercase">المهمة</p>
                <p id="game-target" class="text-3xl font-black text-yellow-500">...</p>
            </div>
            <div class="font-black text-xl" id="game-timer">30s</div>
        </div>
        <div id="game-play-area" class="relative flex-grow overflow-hidden">
            </div>
    </div>

    <div id="screen-shop" class="screen pt-[100px] p-6">
        <h2 class="text-4xl font-900 mb-8 text-center text-pink-500">المتجر الملكي 🛍️</h2>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white/5 p-6 rounded-[2.5rem] border border-white/10 text-center">
                <div class="text-5xl mb-4">🐲</div>
                <p class="font-bold mb-2">تنين النار</p>
                <button class="bg-yellow-500 text-black px-4 py-2 rounded-xl font-black text-xs">500 💰</button>
            </div>
            <div class="bg-white/5 p-6 rounded-[2.5rem] border border-white/10 text-center">
                <div class="text-5xl mb-4">🌈</div>
                <p class="font-bold mb-2">الخلفية الملونة</p>
                <button class="bg-yellow-500 text-black px-4 py-2 rounded-xl font-black text-xs">200 💰</button>
            </div>
        </div>
    </div>

    <nav id="bottom-nav" class="bottom-nav hidden">
        <div class="nav-item nav-active" onclick="changeScreen('screen-worlds', this)">🪐</div>
        <div class="nav-item" onclick="changeScreen('screen-shop', this)">🛍️</div>
        <div class="nav-item" onclick="alert('لوحة الصدارة قادمة!')">🏆</div>
        <div class="nav-item" onclick="changeScreen('screen-login', this)">⚙️</div>
    </nav>

    <script>
        // قواعد البيانات والبيانات الحالية
        let user = { name: '', avatar: '🐱', coins: 500, xp: 0 };
        let currentWorld = '';

        // تبديل الشاشات
        function changeScreen(screenId, navEl = null) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
            
            if(navEl) {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
                navEl.classList.add('nav-active');
            }
        }

        // تسجيل الدخول
        function login() {
            const name = document.getElementById('input-name').value;
            if(!name) return alert("من فضلك اكتب اسمك!");
            user.name = name;
            document.getElementById('p-display-name').innerText = name;
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('bottom-nav').classList.remove('hidden');
            changeScreen('screen-worlds');
        }

        function setAvatar(emoji, el) {
            user.avatar = emoji;
            document.getElementById('p-avatar').innerText = emoji;
            document.querySelectorAll('.avatar-opt').forEach(opt => opt.style.borderColor = 'transparent');
            el.style.borderColor = '#6366f1';
        }

        // فتح العوالم وتوليد الخريطة
        function openWorld(world) {
            currentWorld = world;
            document.getElementById('current-world-name').innerText = world === 'arabic' ? 'كوكب اللغة' : 'كوكب الحساب';
            
            const container = document.getElementById('levels-path');
            container.innerHTML = '';
            
            for(let i=1; i<=20; i++) {
                const node = document.createElement('div');
                node.className = `level-node ${i > 5 ? 'level-locked' : ''}`;
                node.innerHTML = i;
                
                // تموضع متعرج احترافي
                const xOffset = Math.sin(i * 0.8) * 80;
                node.style.left = xOffset + 'px';
                
                if(i <= 5) node.onclick = () => startGame(i);
                container.appendChild(node);
            }
            changeScreen('screen-map');
        }

        // ميكانيكا اللعبة المدمجة
        function startGame(level) {
            changeScreen('screen-game');
            const playArea = document.getElementById('game-play-area');
            playArea.innerHTML = '';
            
            const target = currentWorld === 'arabic' ? 'حرف الألف (أ)' : 'العدد 10';
            document.getElementById('game-target').innerText = target;
            
            // توليد أهداف عشوائية تسبح في الشاشة
            for(let i=0; i<10; i++) {
                const obj = document.createElement('div');
                obj.className = 'game-obj text-4xl p-4 bg-white/10 rounded-full shadow-2xl';
                obj.innerText = i === 0 ? (currentWorld === 'arabic' ? 'أ' : '10') : (currentWorld === 'arabic' ? 'ب' : '5');
                obj.style.top = Math.random() * 80 + '%';
                obj.style.left = Math.random() * 80 + '%';
                
                obj.onclick = () => {
                    if(obj.innerText === 'أ' || obj.innerText === '10') {
                        user.coins += 10;
                        user.xp += 20;
                        updateHUD();
                        obj.style.transform = 'scale(0) rotate(360deg)';
                        setTimeout(() => { alert("أحسنت يا بطل! +10 كوينز 💰"); quitGame(); }, 500);
                    } else {
                        obj.style.background = 'rgba(239, 68, 68, 0.2)';
                    }
                };
                playArea.appendChild(obj);
            }
        }

        function quitGame() { changeScreen('screen-map'); }

        function updateHUD() {
            document.getElementById('p-coins').innerText = user.coins;
            document.getElementById('p-xp').innerText = user.xp;
        }
    </script>
</body>
</html>
