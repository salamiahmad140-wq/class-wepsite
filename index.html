<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية لبنى | الصف الأول ب</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Fredoka:wght@700&family=Are-You-Serious&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #fbbf24; --royal: #6366f1; --deep: #020617; }
        * { font-family: 'Fredoka', 'Cairo', sans-serif; box-sizing: border-box; user-select: none; }
        body { background: var(--deep); color: white; overflow: hidden; height: 100vh; }

        /* الأسطح الراقية (Glassmorphism) */
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; }
        .page { position: absolute; inset: 0; display: none; flex-direction: column; padding-bottom: 100px; overflow-y: auto; }
        .page-active { display: flex; animation: ultraFade 0.6s ease-out; }
        @keyframes ultraFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* خريطة المراحل المتطورة */
        .map-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 25px; padding: 40px; }
        .lvl-card { aspect-ratio: 1; border-radius: 35px; background: white; color: var(--deep); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 3rem; font-weight: 900; position: relative; transition: 0.4s; box-shadow: 0 12px 0 #cbd5e1; cursor: pointer; }
        .lvl-card.active-lvl { border: 5px solid var(--gold); animation: levelGlow 2s infinite; }
        @keyframes levelGlow { 0%, 100% { box-shadow: 0 12px 0 #cbd5e1, 0 0 20px rgba(251, 191, 36, 0.4); } 50% { box-shadow: 0 12px 0 #cbd5e1, 0 0 50px rgba(251, 191, 36, 0.8); transform: scale(1.05); } }
        
        /* المراحل القادمة (Coming Soon) */
        .lvl-locked { opacity: 0.3; background: #1e293b; color: #64748b; border: 2px dashed #475569; pointer-events: none; box-shadow: none; }
        .coming-soon-tag { position: absolute; top: -10px; background: var(--gold); color: black; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: bold; }

        /* شريط التحكم الملكي */
        .nav-dock { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); padding: 12px 40px; border-radius: 50px; display: flex; gap: 40px; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8); }
        .nav-item { font-size: 2.2rem; cursor: pointer; transition: 0.3s; opacity: 0.4; }
        .nav-item.active { opacity: 1; transform: translateY(-10px) scale(1.2); filter: drop-shadow(0 0 10px var(--gold)); }

        /* شاشة اللعبة */
        #game-layer { position: fixed; inset: 0; background: radial-gradient(circle, #1e1b4b, #020617); z-index: 5000; display: none; }
        .bubble { position: absolute; cursor: pointer; transition: transform 0.1s; display: flex; align-items: center; justify-content: center; font-weight: 900; color: white; border-radius: 50%; border: 4px solid rgba(255,255,255,0.3); }
    </style>
</head>
<body>

    <div id="p-login" class="page page-active justify-center items-center">
        <div class="glass-panel p-12 text-center w-[90%] max-w-md border-t-4 border-amber-400">
            <h1 class="text-7xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-b from-amber-200 to-amber-500">أساطير ب</h1>
            <p class="text-amber-200/50 mb-10 font-bold tracking-widest">LUBNA SUPREME</p>
            <input type="text" id="user-code" placeholder="كود البطل الملكي" class="w-full text-center text-3xl p-5 rounded-3xl mb-6 bg-white text-indigo-950 font-black outline-none shadow-inner">
            <button onclick="Core.login()" class="w-full py-5 bg-gradient-to-r from-amber-400 to-orange-500 text-indigo-950 rounded-3xl text-3xl font-black shadow-[0_12px_0_#b45309] active:translate-y-2 active:shadow-none transition-all">دخول 🛡️</button>
        </div>
    </div>

    <div id="p-dash" class="page">
        <div class="p-8 max-w-5xl mx-auto w-full">
            <div class="glass-panel p-8 flex items-center gap-8 mb-10 relative overflow-hidden">
                <div class="absolute -right-10 -top-10 text-[200px] opacity-5 rotate-12">👑</div>
                <div id="u-avatar" class="w-40 h-40 bg-white rounded-full flex items-center justify-center text-8xl shadow-2xl border-4 border-amber-400">👤</div>
                <div>
                    <h2 id="u-name" class="text-6xl font-black">البطل القادم</h2>
                    <div class="flex gap-4 mt-4">
                        <div class="bg-amber-400/20 px-6 py-2 rounded-2xl border border-amber-400/30 text-amber-400 font-black text-2xl">💰 <span id="u-coins">0</span></div>
                        <div class="bg-blue-400/20 px-6 py-2 rounded-2xl border border-blue-400/30 text-blue-400 font-black text-2xl">⭐ <span id="u-stars">0</span></div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div onclick="Core.goWorld('math')" class="glass-panel p-10 cursor-pointer hover:bg-white/5 border-b-8 border-blue-500 group">
                    <div class="text-8xl mb-4 group-hover:scale-110 transition">🧮</div>
                    <h3 class="text-4xl font-black">عالم الأرقام</h3>
                    <p class="text-blue-400 font-bold mt-2">5 مراحل مفتوحة • 95 ترقبوا</p>
                </div>
                <div onclick="Core.goWorld('arabic')" class="glass-panel p-10 cursor-pointer hover:bg-white/5 border-b-8 border-emerald-500 group">
                    <div class="text-8xl mb-4 group-hover:scale-110 transition">📖</div>
                    <h3 class="text-4xl font-black">عالم الكلمات</h3>
                    <p class="text-emerald-400 font-bold mt-2">5 مراحل مفتوحة • 95 ترقبوا</p>
                </div>
            </div>
        </div>
    </div>

    <div id="p-map" class="page">
        <div class="p-8 flex justify-between items-center sticky top-0 bg-deep/80 backdrop-blur-md z-50">
            <h2 id="map-title" class="text-5xl font-black text-amber-400 italic">اسم العالم</h2>
            <button onclick="Core.nav('p-dash')" class="bg-white/10 px-8 py-3 rounded-2xl font-black">رجوع 🔙</button>
        </div>
        <div id="map-render" class="map-container"></div>
    </div>

    <div id="game-layer">
        <div class="absolute top-8 inset-x-8 flex justify-between items-center z-[6000]">
            <div class="flex gap-4">
                <div id="g-score" class="bg-white/10 backdrop-blur-xl px-8 py-4 rounded-3xl border border-white/20 text-3xl font-black text-amber-400">0 / 5</div>
            </div>
            <div id="g-task" class="bg-white px-12 py-5 rounded-[40px] text-5xl font-black text-indigo-950 shadow-[0_0_50px_rgba(255,255,255,0.2)]">...</div>
            <button onclick="Engine.quit()" class="bg-red-500/20 hover:bg-red-500 w-16 h-16 rounded-full border border-red-500/50 text-white text-3xl">✕</button>
        </div>
        <div id="arena" class="w-full h-full relative overflow-hidden"></div>
    </div>

    <nav id="royal-nav" class="nav-dock hidden">
        <div class="nav-item active" onclick="Core.nav('p-dash', this)">🏠</div>
        <div class="nav-item" onclick="Core.nav('p-leader', this)">🏆</div>
        <div class="nav-item" onclick="Core.nav('p-shop', this)">🛍️</div>
        <div class="nav-item" onclick="location.reload()">🚪</div>
    </nav>

<script>
/**
 * 🧠 المحرك الأساسي (Core System)
 */
const Core = {
    dbKey: 'LUBNA_V4_ULTIMATE',
    user: null,

    login() {
        const code = document.getElementById('user-code').value.trim().toUpperCase();
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const found = db.find(s => s.code === code);
        if(found) {
            this.user = found;
            this.nav('p-dash');
            document.getElementById('royal-nav').classList.remove('hidden');
            this.sync();
            confetti({ particleCount: 150, spread: 70 });
        } else alert("الكود خطأ يا بطل!");
    },

    nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
        document.getElementById(id).classList.add('page-active');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    },

    sync() {
        document.getElementById('u-name').innerText = this.user.name;
        document.getElementById('u-stars').innerText = this.user.stars;
        document.getElementById('u-coins').innerText = this.user.coins;
        document.getElementById('u-avatar').innerText = this.user.avatar || '👤';
        const db = JSON.parse(localStorage.getItem(this.dbKey));
        const idx = db.findIndex(s => s.code === this.user.code);
        db[idx] = this.user;
        localStorage.setItem(this.dbKey, JSON.stringify(db));
    },

    goWorld(world) {
        this.currentWorld = world;
        document.getElementById('map-title').innerText = world === 'math' ? 'تحدي الأرقام' : 'تحدي الكلمات';
        const render = document.getElementById('map-render');
        render.innerHTML = '';
        
        for(let i=1; i<=100; i++) {
            const card = document.createElement('div');
            const isLocked = i > 5; // 5 مراحل فقط مفتوحة حالياً
            const isDone = i <= this.user.progress[world];
            
            card.className = `lvl-card ${isLocked ? 'lvl-locked' : ''} ${i === this.user.progress[world] + 1 ? 'active-lvl' : ''}`;
            card.innerHTML = i > 5 ? `<span class="coming-soon-tag">قريباً</span>🔒` : i;
            
            if(!isLocked) card.onclick = () => Engine.start(i, world);
            render.appendChild(card);
        }
        this.nav('p-map');
    }
};

/**
 * 🎮 محرك الألعاب المتطور (The Game Engine)
 */
const Engine = {
    active: false, lvl: 0, world: '', score: 0, target: null,
    
    // بيانات المراحل المخصصة
    data: {
        math: [
            {t: '10 + 5', a: 15}, {t: '20 - 4', a: 16}, {t: '8 + 7', a: 15}, {t: '15 - 10', a: 5}, {t: '9 + 9', a: 18}
        ],
        arabic: [
            {t: 'مَـ + ـدْرَ + سَـ + ـة', a: 'مدرسة'}, 
            {t: 'قَـ + ـلَـ + ـم', a: 'قلم'},
            {t: 'بَـ + ـيْـ + ـت', a: 'بيت'},
            {t: 'كِـ + ـتَـ + ـا + ب', a: 'كتاب'},
            {t: 'نُـ + ـجُـ + ـو + م', a: 'نجوم'}
        ]
    },

    start(lvl, world) {
        this.lvl = lvl; this.world = world; this.score = 0; this.active = true;
        document.getElementById('game-layer').style.display = 'block';
        this.nextQuestion();
    },

    nextQuestion() {
        const arena = document.getElementById('arena');
        arena.innerHTML = '';
        const qData = this.data[this.world][Math.floor(Math.random()*5)];
        this.target = qData.a;
        document.getElementById('g-task').innerText = qData.t;
        document.getElementById('g-score').innerText = `${this.score} / 5`;

        this.spawnLoop = setInterval(() => {
            if(!this.active) return;
            this.spawnObject();
        }, 1200);
    },

    spawnObject() {
        const obj = document.createElement('div');
        const isCorrect = Math.random() > 0.7;
        let val;

        if(this.world === 'math') {
            val = isCorrect ? this.target : Math.floor(Math.random()*20);
        } else {
            const fillers = ['تفاح', 'خالد', 'لعب', 'نار'];
            val = isCorrect ? this.target : fillers[Math.floor(Math.random()*fillers.length)];
        }

        obj.className = "bubble w-32 h-32 text-3xl shadow-2xl";
        obj.style.background = `hsla(${Math.random()*360}, 70%, 50%, 0.8)`;
        obj.innerText = val;
        obj.style.left = Math.random() * (window.innerWidth - 150) + "px";
        obj.style.top = window.innerHeight + "px";
        
        document.getElementById('arena').appendChild(obj);

        gsap.to(obj, {
            y: -200, duration: 5, ease: "none",
            onComplete: () => obj.remove()
        });

        obj.onclick = () => {
            if(val == this.target) {
                this.score++;
                confetti({ particleCount: 40, origin: { x: obj.offsetLeft/window.innerWidth, y: obj.offsetTop/window.innerHeight } });
                obj.remove();
                if(this.score >= 5) this.win();
                else {
                    clearInterval(this.spawnLoop);
                    this.nextQuestion();
                }
            } else {
                gsap.to(obj, { x: 20, repeat: 3, yoyo: true, duration: 0.1 });
                obj.style.background = "red";
            }
        };
    },

    win() {
        this.active = false; clearInterval(this.spawnLoop);
        confetti({ particleCount: 300, spread: 100 });
        Core.user.stars += 20;
        Core.user.coins += 100;
        if(Core.user.progress[this.world] < this.lvl) Core.user.progress[this.world] = this.lvl;
        Core.sync();
        
        setTimeout(() => {
            document.getElementById('game-layer').style.display = 'none';
            Core.goWorld(this.world);
        }, 2000);
    },

    quit() {
        this.active = false; clearInterval(this.spawnLoop);
        document.getElementById('game-layer').style.display = 'none';
    }
};
</script>
</body>
</html>
