<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUBNA LEGENDS | الأكاديمية العالمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Fredoka:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --p-indigo: #6366f1; --p-pink: #ec4899; --p-yellow: #f59e0b; --bg-dark: #0f172a; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-dark); color: white; margin: 0; overflow: hidden; height: 100vh; }
        
        /* تصميم النيومورفيزم الفخم */
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; }
        .btn-legend { background: white; color: #0f172a; border-radius: 1.5rem; border-bottom: 6px solid #cbd5e1; transition: 0.1s; font-weight: 900; }
        .btn-legend:active { transform: translateY(4px); border-bottom-width: 2px; }

        /* محرك الخريطة السحابية */
        #world-map { width: 4000px; height: 100vh; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); position: relative; cursor: grab; }
        .level-card { width: 140px; height: 140px; background: white; border-radius: 40%; position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 20px 0 rgba(0,0,0,0.2); border: 6px solid var(--p-indigo); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .level-card:hover { transform: scale(1.1) rotate(5deg); }

        /* شاشة اللعبة - قماش الرسم (Canvas) */
        #game-stage { position: relative; width: 100%; height: 100%; overflow: hidden; background: #0c4a6e; }
        .frog-sprite { font-size: 5rem; position: absolute; z-index: 50; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3)); transition: 0.5s cubic-bezier(0.6, -0.28, 0.735, 0.045); }
        
        /* شريط المهام السفلي (OS style) */
        .dock { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); height: 80px; background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 2.5rem; display: flex; align-items: center; padding: 0 20px; gap: 20px; z-index: 1000; }
        .dock-icon { font-size: 2rem; transition: 0.3s; cursor: pointer; filter: grayscale(1); }
        .active-icon { filter: grayscale(0); transform: translateY(-15px) scale(1.3); }

        .screen { position: absolute; inset: 0; display: none; flex-direction: column; padding-top: 100px; z-index: 10; overflow-y: auto; }
        .screen-active { display: flex; animation: zoomIn 0.5s ease; }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="scr-auth" class="fixed inset-0 z-[2000] bg-slate-950 flex flex-col items-center justify-center p-6">
        <div class="text-center space-y-8 animate-bounce">
            <div class="text-9xl">🚀</div>
            <h1 class="text-6xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-pink-500">أساطير لبنى</h1>
        </div>
        <div class="glass p-10 mt-12 w-full max-w-md space-y-6">
            <input type="text" id="access-code" placeholder="أدخل كود البطل الخاص بك" class="w-full p-6 bg-white/5 border-2 border-white/10 rounded-3xl text-center text-2xl font-black text-white outline-none focus:border-indigo-500 transition-all uppercase">
            <button onclick="App.login()" class="w-full btn-legend p-6 text-2xl bg-indigo-500 text-white border-indigo-700 shadow-xl shadow-indigo-900/50">ابدأ المغامرة 🛡️</button>
        </div>
    </div>

    <div id="hud" class="fixed top-0 inset-x-0 p-6 z-[1000] flex justify-between items-start pointer-events-none hidden">
        <div class="pointer-events-auto glass p-2 pr-6 flex items-center gap-4 border-l-4 border-indigo-500">
            <div class="relative">
                <div id="p-avatar" class="text-5xl">🐱</div>
                <div id="p-hat" class="absolute -top-4 -right-2 text-3xl"></div>
            </div>
            <div>
                <p id="p-name" class="font-900 text-lg leading-none">بطل الأساطير</p>
                <p class="text-[10px] text-blue-400 font-bold uppercase mt-1">المستوى الاحترافي</p>
            </div>
        </div>
        <div class="pointer-events-auto flex gap-3">
            <div class="glass px-5 py-3 border-b-4 border-yellow-500 flex items-center gap-2">
                <span id="p-coins" class="text-yellow-500 font-black text-xl">0</span> 💰
            </div>
            <div class="glass px-5 py-3 border-b-4 border-blue-400 flex items-center gap-2">
                <span id="p-stars" class="text-blue-400 font-black text-xl">0</span> ⭐
            </div>
        </div>
    </div>

    <div id="scr-map" class="screen screen-active !p-0">
        <div id="world-map">
            </div>
    </div>

    <div id="scr-game" class="screen !p-0">
        <div class="absolute top-28 inset-x-0 z-[100] text-center">
            <h2 id="game-task" class="text-4xl font-black text-white drop-shadow-lg">...</h2>
        </div>
        <div id="game-stage">
            <div id="frog" class="frog-sprite">🐸</div>
            <div id="game-objects" class="w-full h-full relative"></div>
        </div>
    </div>

    <div id="scr-leaderboard" class="screen p-8 pt-32">
        <div class="max-w-2xl mx-auto w-full">
            <h2 class="text-5xl font-black text-center mb-10">قائمة العظماء 🏆</h2>
            <div id="leader-list" class="space-y-4">
                </div>
        </div>
    </div>

    <nav id="nav-dock" class="dock hidden">
        <div class="dock-icon active-icon" onclick="App.switch('scr-map', this)">🗺️</div>
        <div class="dock-icon" onclick="App.switch('scr-leaderboard', this)">🏆</div>
        <div class="dock-icon" onclick="alert('المتجر يفتح قريباً!')">🛍️</div>
        <div class="dock-icon" onclick="location.reload()">🔒</div>
    </nav>

    <script>
        const App = {
            player: null,
            students: JSON.parse(localStorage.getItem('lubna_students')) || [],

            login() {
                const code = document.getElementById('access-code').value.toUpperCase();
                const student = this.students.find(s => s.code === code);
                
                if(student) {
                    this.player = student;
                    document.getElementById('scr-auth').style.display = 'none';
                    document.getElementById('hud').classList.remove('hidden');
                    document.getElementById('nav-dock').classList.remove('hidden');
                    this.updateUI();
                    this.renderMap();
                } else {
                    alert("الكود غير صحيح! اطلبي الكود من الأستاذة لبنى 👑");
                }
            },

            updateUI() {
                document.getElementById('p-name').innerText = this.player.name;
                document.getElementById('p-coins').innerText = this.player.coins;
                document.getElementById('p-stars').innerText = this.player.stars;
                document.getElementById('p-avatar').innerText = this.player.avatar || '🐱';
            },

            switch(id, el) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('screen-active'));
                document.getElementById(id).classList.add('screen-active');
                document.querySelectorAll('.dock-icon').forEach(i => i.classList.remove('active-icon'));
                el.classList.add('active-icon');
                if(id === 'scr-leaderboard') this.renderLeaderboard();
            },

            renderMap() {
                const map = document.getElementById('world-map');
                map.innerHTML = '';
                for(let i=1; i<=20; i++) {
                    const node = document.createElement('div');
                    node.className = 'level-card';
                    node.style.left = (i * 200) + "px";
                    node.style.top = (300 + Math.sin(i) * 100) + "px";
                    node.innerHTML = `<span class="text-4xl font-black text-slate-800">${i}</span>`;
                    node.onclick = () => this.startGame(i);
                    map.appendChild(node);
                }
            },

            startGame(level) {
                this.switch('scr-game', document.querySelectorAll('.dock-icon')[0]);
                const objects = document.getElementById('game-objects');
                const frog = document.getElementById('frog');
                objects.innerHTML = '';
                
                const target = Math.floor(Math.random() * 20) + 1;
                document.getElementById('game-task').innerText = "ساعد الضفدع للقفز على رقم " + target;
                
                frog.style.left = "10%";
                frog.style.bottom = "10%";

                for(let i=0; i<6; i++) {
                    const pad = document.createElement('div');
                    pad.className = 'absolute w-32 h-24 bg-green-500 rounded-full flex items-center justify-center text-3xl font-black shadow-xl cursor-pointer hover:scale-110 transition';
                    const val = (i === 0) ? target : Math.floor(Math.random()*30);
                    pad.innerText = val;
                    pad.style.left = (20 + Math.random() * 60) + "%";
                    pad.style.top = (20 + Math.random() * 60) + "%";
                    
                    pad.onclick = () => {
                        // قفزة فيزيائية حقيقية
                        frog.style.left = pad.style.left;
                        frog.style.top = pad.style.top;
                        
                        if(val === target) {
                            setTimeout(() => {
                                alert("قفزة أسطورية! ✨");
                                this.player.coins += 50;
                                this.player.stars += 1;
                                this.saveData();
                                this.startGame(level);
                            }, 500);
                        }
                    };
                    objects.appendChild(pad);
                }
            },

            saveData() {
                const idx = this.students.findIndex(s => s.code === this.player.code);
                this.students[idx] = this.player;
                localStorage.setItem('lubna_students', JSON.stringify(this.students));
                this.updateUI();
            },

            renderLeaderboard() {
                const list = document.getElementById('leader-list');
                const sorted = [...this.students].sort((a,b) => b.stars - a.stars);
                list.innerHTML = sorted.map((s, i) => `
                    <div class="glass p-6 flex items-center gap-6 border-r-8 ${i===0?'border-yellow-500':'border-indigo-500'}">
                        <span class="text-3xl font-black opacity-30">#${i+1}</span>
                        <span class="text-4xl">${s.avatar || '🐱'}</span>
                        <span class="flex-grow text-2xl font-black">${s.name}</span>
                        <span class="text-blue-400 font-black">${s.stars} ⭐</span>
                    </div>
                `).join('');
            }
        };
    </script>
</body>
</html>
