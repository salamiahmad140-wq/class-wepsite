<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أساطير لبنى | Kideoland Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Fredoka:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --p-yellow: #FFDE59; --p-blue: #5CE1E6; --p-pink: #FF914D; --p-green: #7ED957; }
        * { user-select: none; font-family: 'Fredoka', 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #5CE1E6; margin: 0; overflow: hidden; height: 100vh; }

        /* الأنظمة */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; transition: 0.5s; }
        .active { display: flex; animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        @keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* خريطة المراحل (Toca Boca Style) */
        #map-scroll { width: 100%; height: 100%; overflow-x: scroll; overflow-y: hidden; white-space: nowrap; padding: 50px; scroll-behavior: smooth; background: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png'); }
        .level-btn { 
            width: 150px; height: 150px; display: inline-flex; margin: 0 40px; border-radius: 50px; 
            background: white; border: 10px solid #fff; box-shadow: 0 20px 0 rgba(0,0,0,0.1);
            position: relative; cursor: pointer; transition: 0.3s; vertical-align: middle;
        }
        .level-locked { filter: grayscale(1); opacity: 0.6; cursor: not-allowed; }
        .level-completed::after { content: '✅'; position: absolute; -top: 20px; -right: 20px; font-size: 40px; }
        
        /* واجهة اللعبة */
        canvas { background: white; border-radius: 3rem; box-shadow: 0 30px 60px rgba(0,0,0,0.2); }
        
        /* أزرار ممتعة */
        .btn-pop { 
            background: #FF914D; color: white; padding: 20px 40px; border-radius: 30px; 
            font-size: 30px; font-weight: 900; border-bottom: 10px solid #D87030; transition: 0.1s;
        }
        .btn-pop:active { transform: translateY(6px); border-bottom-width: 4px; }
    </style>
</head>
<body>

    <div id="scr-login" class="screen active">
        <div class="text-center">
            <h1 class="text-8xl font-black text-white drop-shadow-xl mb-10">LUBNA<br>LAND</h1>
            <input type="text" id="p-code" placeholder="أدخل كود البطل" class="w-80 p-6 rounded-full text-center text-3xl font-bold border-none shadow-2xl mb-6 outline-none">
            <br>
            <button onclick="Core.login()" class="btn-pop">دخول 🚀</button>
            <p onclick="Core.show('scr-admin')" class="mt-8 text-white/50 cursor-pointer">إدارة المعلمة</p>
        </div>
    </div>

    <div id="scr-map" class="screen bg-blue-400 !flex-row !justify-start !items-center p-0">
        <div id="map-scroll">
            </div>
        <div class="fixed top-6 right-6 flex gap-4">
            <div class="bg-white/90 p-4 rounded-3xl font-black text-2xl text-blue-500 shadow-xl">⭐ <span id="u-stars">0</span></div>
            <div class="bg-white/90 p-4 rounded-3xl font-black text-2xl text-orange-500 shadow-xl">💰 <span id="u-coins">0</span></div>
        </div>
    </div>

    <div id="scr-game" class="screen bg-white">
        <div class="absolute top-10 flex justify-between w-full px-20 items-center">
            <h2 id="g-title" class="text-5xl font-black text-blue-500"></h2>
            <button onclick="Core.show('scr-map')" class="text-4xl">❌</button>
        </div>
        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>

    <div id="scr-admin" class="screen bg-slate-100 !text-slate-900 overflow-y-auto p-10">
        <div class="max-w-4xl w-full">
            <div class="flex justify-between items-center mb-10">
                <h1 class="text-4xl font-black">غرفة القائدة لبنى 👑</h1>
                <button onclick="Admin.add()" class="btn-pop !bg-green-500 !border-green-700 !text-xl p-4">طالب جديد +</button>
            </div>
            <div class="bg-white rounded-[3rem] shadow-2xl p-8">
                <table class="w-full text-right text-2xl">
                    <tbody id="admin-table"></tbody>
                </table>
            </div>
            <button onclick="Core.show('scr-login')" class="mt-10 opacity-30">خروج</button>
        </div>
    </div>

    <audio id="snd-win" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>

<script>
    // --- بيانات النظام ---
    const Core = {
        player: null,
        levels: [
            { id: 1, title: 'صيد الأرقام', type: 'CATCH', target: 5, color: '#FFDE59' },
            { id: 2, title: 'انفجار الحروف', type: 'POP', target: 'أ', color: '#5CE1E6' },
            { id: 3, title: 'جمع النجوم', type: 'CATCH', target: 10, color: '#FF914D' },
            { id: 4, title: 'البطل السريع', type: 'SPEED', target: 20, color: '#7ED957' },
            { id: 5, title: 'تحدي الذكاء', type: 'CATCH', target: 7, color: '#8C52FF' }
        ],

        show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'scr-map') this.renderMap();
        },

        login() {
            const code = document.getElementById('p-code').value.toUpperCase();
            const students = JSON.parse(localStorage.getItem('LUBNA_KIDS')) || [];
            const s = students.find(x => x.code === code);
            if(s) {
                this.player = s;
                this.show('scr-map');
            } else alert("الكود خطأ!");
        },

        renderMap() {
            const container = document.getElementById('map-scroll');
            container.innerHTML = '';
            document.getElementById('u-stars').innerText = this.player.stars;
            document.getElementById('u-coins').innerText = this.player.coins;

            this.levels.forEach((lvl, i) => {
                const isLocked = i > (this.player.completed || 0);
                const isDone = i < (this.player.completed || 0);
                
                const btn = document.createElement('div');
                btn.className = `level-btn ${isLocked ? 'level-locked' : ''} ${isDone ? 'level-completed' : ''}`;
                btn.style.backgroundColor = lvl.color;
                btn.innerHTML = `<span class="text-6xl font-black ${isLocked ? 'text-gray-400' : 'text-white'}">${lvl.id}</span>`;
                
                if(!isLocked) {
                    btn.onclick = () => Game.start(lvl);
                }
                container.appendChild(btn);
            });
        },

        winLevel() {
            document.getElementById('snd-win').play();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            
            this.player.stars += 10;
            this.player.coins += 50;
            if(this.player.completed === Game.currentLevel.id - 1) {
                this.player.completed++;
            }
            
            // حفظ
            const students = JSON.parse(localStorage.getItem('LUBNA_KIDS'));
            const idx = students.findIndex(x => x.code === this.player.code);
            students[idx] = this.player;
            localStorage.setItem('LUBNA_KIDS', JSON.stringify(students));

            setTimeout(() => this.show('scr-map'), 2000);
        }
    };

    // --- محرك الألعاب ---
    const Game = {
        canvas: document.getElementById('gameCanvas'),
        ctx: document.getElementById('gameCanvas').getContext('2d'),
        currentLevel: null,
        items: [],
        playerX: 400,

        start(lvl) {
            this.currentLevel = lvl;
            Core.show('scr-game');
            document.getElementById('g-title').innerText = lvl.title;
            this.items = [];
            this.loop();
        },

        loop() {
            if(!document.getElementById('scr-game').classList.contains('active')) return;
            this.ctx.clearRect(0, 0, 800, 500);

            if(Math.random() < 0.03) {
                this.items.push({ x: Math.random()*700 + 50, y: -50, val: Math.floor(Math.random()*10) });
            }

            this.items.forEach((it, idx) => {
                it.y += 5;
                this.ctx.fillStyle = this.currentLevel.color;
                this.ctx.beginPath();
                this.ctx.arc(it.x, it.y, 40, 0, Math.PI*2);
                this.ctx.fill();
                this.ctx.fillStyle = "#fff";
                this.ctx.font = "bold 40px Cairo";
                this.ctx.textAlign = "center";
                this.ctx.fillText(it.val, it.x, it.y + 15);

                if(it.y > 400 && Math.abs(it.x - this.playerX) < 60) {
                    if(it.val == this.currentLevel.target) {
                        this.items = [];
                        Core.winLevel();
                    }
                    this.items.splice(idx, 1);
                }
            });

            this.ctx.font = "80px Cairo";
            this.ctx.fillText("📦", this.playerX, 480);
            requestAnimationFrame(() => this.loop());
        }
    };

    window.addEventListener('mousemove', (e) => {
        const rect = Game.canvas.getBoundingClientRect();
        Game.playerX = e.clientX - rect.left;
    });

    // --- إدارة المعلمة ---
    const Admin = {
        add() {
            const name = prompt("اسم الطالب:");
            if(name) {
                const code = "LUB-" + Math.floor(100 + Math.random()*900);
                const students = JSON.parse(localStorage.getItem('LUBNA_KIDS')) || [];
                students.push({ name, code, stars: 0, coins: 0, completed: 0 });
                localStorage.setItem('LUBNA_KIDS', JSON.stringify(students));
                this.render();
                alert("تم! كود الطالب: " + code);
            }
        },
        render() {
            const students = JSON.parse(localStorage.getItem('LUBNA_KIDS')) || [];
            document.getElementById('admin-table').innerHTML = students.map(s => `
                <tr class="border-b">
                    <td class="p-6 font-black">${s.name}</td>
                    <td class="p-6 font-mono text-blue-500">${s.code}</td>
                    <td class="p-6">المستوى: ${s.completed}</td>
                </tr>
            `).join('');
        }
    };
</script>
</body>
</html>
