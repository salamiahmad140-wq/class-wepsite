<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أساطير 1-ب | المنصة الشاملة</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Nunito:wght@800&display=swap" rel="stylesheet">

    <style>
        :root { --p: #4f46e5; --s: #ec4899; --w: #f59e0b; --bg: #f8fafc; }
        * { font-family: 'Cairo', sans-serif; user-select: none; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* تصميم يحاكي تطبيق جوال حتى على الشاشات الكبيرة */
        #app-container { width: 100%; max-width: 480px; height: 100%; background: white; position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; background: #f0fdf4; padding-bottom: 80px; overflow-y: auto; animation: fade 0.3s; }
        .screen.active { display: flex; z-index: 10; }
        @keyframes fade { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* شخصية روبيك بصورة حقيقية */
        #robik-box { position: fixed; bottom: 90px; left: 10px; z-index: 999; transform: translateX(-150%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: flex-end; gap: 10px; }
        #robik-box.show { transform: translateX(0); }
        .robik-img { width: 100px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2)); animation: float 3s infinite ease-in-out; }
        .robik-msg { background: white; padding: 12px 18px; border-radius: 20px 20px 20px 0; border: 3px solid var(--p); font-weight: 900; font-size: 1rem; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 200px; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* العناصر المشتركة */
        .glass { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 20px; border: 2px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .btn-3d { border-radius: 20px; font-weight: 900; transition: 0.1s; border-bottom: 6px solid rgba(0,0,0,0.2); cursor: pointer; text-align: center; }
        .btn-3d:active { transform: translateY(6px); border-bottom-width: 0px; margin-bottom: 6px; }
        
        /* شريط التنقل السفلي */
        .bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; height: 75px; background: white; border-top: 2px solid #e2e8f0; display: flex; justify-content: space-around; align-items: center; z-index: 100; border-radius: 30px 30px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        .nav-item { font-size: 1.8rem; filter: grayscale(100%); opacity: 0.5; transition: 0.3s; padding: 10px; }
        .nav-item.active { filter: grayscale(0%); opacity: 1; transform: translateY(-10px) scale(1.2); }

        /* الألعاب */
        .game-card { width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; background: white; border-radius: 15px; box-shadow: 0 5px 0 #cbd5e1; cursor: pointer; }
        .drop-zone { min-height: 100px; border: 4px dashed var(--p); border-radius: 20px; display: flex; gap: 10px; justify-content: center; align-items: center; padding: 10px; background: #e0e7ff; }
        #fall-arena { position: relative; width: 100%; height: 300px; background: #1e293b; border-radius: 20px; overflow: hidden; border: 4px solid var(--p); }
        .fall-item { position: absolute; font-size: 2.5rem; background: white; border-radius: 50%; width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px 0 rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="app-container">
    
    <div id="robik-box">
        <div class="robik-msg" id="r-msg">أهلاً بك!</div>
        <img src="https://cdn-icons-png.flaticon.com/512/8204/8204694.png" class="robik-img" alt="Robik">
    </div>

    <div id="s-login" class="screen active justify-center p-6 bg-indigo-50">
        <div class="glass p-8 text-center">
            <img src="https://cdn-icons-png.flaticon.com/512/3024/3024509.png" class="w-32 mx-auto mb-4 drop-shadow-lg">
            <h1 class="text-4xl font-black text-indigo-600 mb-6">أساطير 1-ب</h1>
            <input type="text" id="login-code" placeholder="أدخل كودك السري" class="w-full p-4 rounded-2xl bg-white border-4 border-indigo-100 text-center text-2xl font-black mb-6 outline-none focus:border-indigo-400">
            <button onclick="App.login()" class="btn-3d bg-indigo-500 text-white w-full py-4 text-2xl">دخول 🚀</button>
        </div>
    </div>

    <div id="s-home" class="screen p-6">
        <div class="flex justify-between mb-6">
            <div class="glass px-4 py-2 font-black text-yellow-600 text-lg">💰 <span id="u-coins">0</span></div>
            <div class="glass px-4 py-2 font-black text-pink-500 text-lg">⭐ <span id="u-stars">0</span></div>
        </div>
        <div class="text-center mb-8">
            <div id="u-avatar" class="text-7xl bg-white w-32 h-32 mx-auto rounded-full flex items-center justify-center border-4 border-indigo-400 shadow-lg mb-2">👦</div>
            <h2 id="u-name" class="text-3xl font-black text-slate-800">البطل</h2>
        </div>
        <h3 class="font-black text-xl mb-4 text-slate-600">العوالم</h3>
        <div class="grid gap-4">
            <div onclick="Map.open('math')" class="glass p-6 flex items-center gap-4 cursor-pointer btn-3d bg-white">
                <div class="text-5xl bg-blue-100 p-3 rounded-2xl">🔢</div>
                <div class="text-right"><h4 class="text-2xl font-black text-blue-600">الرياضيات</h4><p class="text-sm font-bold text-slate-400">تحديات الأرقام</p></div>
            </div>
            <div onclick="Map.open('arabic')" class="glass p-6 flex items-center gap-4 cursor-pointer btn-3d bg-white">
                <div class="text-5xl bg-pink-100 p-3 rounded-2xl">🔤</div>
                <div class="text-right"><h4 class="text-2xl font-black text-pink-600">لغتي</h4><p class="text-sm font-bold text-slate-400">حروف وكلمات</p></div>
            </div>
        </div>
    </div>

    <div id="s-map" class="screen p-6 bg-blue-50">
        <div class="flex items-center gap-4 mb-6">
            <button onclick="App.nav('s-home', 0)" class="bg-white p-2 rounded-xl text-xl shadow">🔙</button>
            <h2 id="map-title" class="text-3xl font-black text-slate-800">المراحل</h2>
        </div>
        <div id="map-grid" class="grid grid-cols-3 gap-4"></div>
    </div>

    <div id="s-shop" class="screen p-6 bg-pink-50">
        <h2 class="text-3xl font-black text-center mb-6 text-pink-600">المتجر 🛍️</h2>
        <div id="shop-grid" class="grid grid-cols-2 gap-4"></div>
    </div>

    <div id="s-lead" class="screen p-6 bg-yellow-50">
        <h2 class="text-3xl font-black text-center mb-6 text-yellow-600">أساطير الأسبوع 🏆</h2>
        <div id="lead-list" class="flex flex-col gap-3"></div>
    </div>

    <div id="s-game" class="screen bg-slate-100 p-4 z-50">
        <div class="flex justify-between items-center mb-4 bg-white p-3 rounded-2xl shadow-sm">
            <div id="g-lives" class="text-2xl">❤️❤️❤️</div>
            <div class="font-black text-indigo-600">مرحلة <span id="g-lvl">1</span></div>
            <button onclick="Game.quit()" class="bg-red-500 text-white px-3 py-1 rounded-lg font-bold">خروج</button>
        </div>
        <div class="glass p-4 text-center mb-6 border-indigo-200 border-4">
            <h2 id="g-task" class="text-2xl font-black text-slate-800">...</h2>
        </div>
        <div id="g-arena" class="flex-1 flex flex-col items-center justify-center gap-6 w-full"></div>
    </div>

    <div id="bottom-nav" class="bottom-nav hidden">
        <div class="nav-item active" onclick="App.nav('s-home', 0)">🏠</div>
        <div class="nav-item" onclick="App.nav('s-shop', 1); Shop.render();">🛍️</div>
        <div class="nav-item" onclick="App.nav('s-lead', 2); Lead.render();">🏆</div>
    </div>

</div>

<script>
const DB_KEY = 'LEGENDS_ULTIMATE_DB';

// --- شخصية روبيك ---
const Robik = {
    timer: null,
    speak(msg, time = 4000) {
        document.getElementById('r-msg').innerText = msg;
        document.getElementById('robik-box').classList.add('show');
        clearTimeout(this.timer);
        this.timer = setTimeout(() => document.getElementById('robik-box').classList.remove('show'), time);
    }
};

// --- التطبيق الأساسي ---
const App = {
    user: null,
    login() {
        const code = document.getElementById('login-code').value.trim().toUpperCase();
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        const u = db.find(x => x.code === code);
        if(u) {
            this.user = u; this.sync();
            document.getElementById('bottom-nav').classList.remove('hidden');
            this.nav('s-home', 0);
            Robik.speak(`أهلاً بك يا بطل ${u.name}! مستعد؟ 😎`);
            confetti();
        } else {
            Robik.speak('الكود خطأ! تأكد من المعلمة 🧐');
        }
    },
    sync() {
        document.getElementById('u-name').innerText = this.user.name;
        document.getElementById('u-stars').innerText = this.user.stars;
        document.getElementById('u-coins').innerText = this.user.coins;
        document.getElementById('u-avatar').innerText = this.user.avatar || '👦';
        let db = JSON.parse(localStorage.getItem(DB_KEY));
        db[db.findIndex(x => x.code === this.user.code)] = this.user;
        localStorage.setItem(DB_KEY, JSON.stringify(db));
    },
    nav(id, navIdx = -1) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(navIdx >= 0) {
            const items = document.querySelectorAll('.nav-item');
            items.forEach(i => i.classList.remove('active'));
            if(items[navIdx]) items[navIdx].classList.add('active');
        }
    }
};

// --- الخريطة ---
const Map = {
    world: '',
    open(w) {
        this.world = w; App.nav('s-map');
        document.getElementById('map-title').innerText = w === 'math' ? 'الرياضيات 🔢' : 'لغتي 🔤';
        const grid = document.getElementById('map-grid'); grid.innerHTML = '';
        for(let i=1; i<=10; i++) {
            const unlocked = i <= (App.user.progress[w] + 1);
            const done = i <= App.user.progress[w];
            const btn = document.createElement('div');
            btn.className = `btn-3d h-24 flex items-center justify-center text-3xl text-white ${done ? 'bg-green-500' : (unlocked ? 'bg-indigo-500' : 'bg-slate-300')}`;
            btn.innerText = unlocked ? i : '🔒';
            if(unlocked) btn.onclick = () => Game.start(w, i);
            grid.appendChild(btn);
        }
        Robik.speak('اختر المرحلة لنبدأ التحدي! 🗺️');
    }
};

// --- محرك الألعاب الشامل (يجمع 4 أنواع) ---
const Game = {
    world: '', lvl: 1, lives: 3, loop: null, step: 0,
    
    start(w, l) {
        this.world = w; this.lvl = l; this.lives = 3; this.step = 0;
        App.nav('s-game'); this.update();
        this.loadType();
    },
    update() {
        document.getElementById('g-lives').innerText = "❤️".repeat(this.lives);
        document.getElementById('g-lvl').innerText = this.lvl;
    },
    
    loadType() {
        // تنويع الألعاب بناء على رقم المرحلة
        const type = this.lvl % 4; 
        if(type === 1) this.gamePick(); // الاختيار (ألوان/حساب/كلمات)
        else if(type === 2) this.gameMemory(); // الذاكرة
        else if(type === 3) this.gameCatch(); // الصيد
        else this.gameDrag(); // السحب والترتيب
    },

    win() {
        confetti({ particleCount: 100, spread: 60 });
        Robik.speak('إجابة صحيحة! بطل الأساطير! 🌟');
        App.user.stars += 50; App.user.coins += 50;
        if(App.user.progress[this.world] < this.lvl) App.user.progress[this.world] = this.lvl;
        App.sync();
        setTimeout(() => { this.quit(); Map.open(this.world); }, 1500);
    },
    lose() {
        this.lives--; this.update();
        if(this.lives <= 0) {
            Robik.speak('انتهت المحاولات! لا بأس، جرب مرة أخرى 💔');
            setTimeout(() => this.quit(), 1500);
        } else {
            Robik.speak('أوه! انتبه وحاول مجدداً 🧐');
        }
    },
    quit() { clearInterval(this.loop); App.nav('s-map'); },

    // 1. لعبة الاختيار (حساب ولغتي)
    gamePick() {
        const a = document.getElementById('g-arena'); a.innerHTML = '';
        a.className = "flex-1 flex flex-wrap justify-center gap-4 w-full";
        
        let q, ans, opts;
        if(this.world === 'math') {
            const n1 = Math.floor(Math.random()*5)+1; const n2 = Math.floor(Math.random()*5)+1;
            q = `${n1} + ${n2} = ؟`; ans = n1+n2;
            opts = [ans, ans+1, ans-1, ans+2].sort(()=>Math.random()-0.5);
        } else {
            q = "أين حرف (م)؟"; ans = "م"; opts = ["ب", "م", "س", "د"].sort(()=>Math.random()-0.5);
        }
        document.getElementById('g-task').innerText = q;
        
        opts.forEach(o => {
            const btn = document.createElement('div');
            btn.className = "btn-3d bg-white border-2 border-indigo-200 text-5xl font-black text-indigo-600 w-32 h-32 flex items-center justify-center";
            btn.innerText = o;
            btn.onclick = () => { if(o === ans) { btn.style.background='#bbf7d0'; this.win(); } else { btn.style.background='#fecdd3'; this.lose(); } };
            a.appendChild(btn);
        });
    },

    // 2. لعبة الذاكرة
    gameMemory() {
        document.getElementById('g-task').innerText = "طابق بين البطاقات";
        const a = document.getElementById('g-arena');
        a.className = "grid grid-cols-3 gap-2 w-full px-4";
        const items = this.world==='math' ? ['1','1','2','2','3','3'] : ['أ','أ','ب','ب','ت','ت'];
        items.sort(()=>Math.random()-0.5);
        
        let flipped = [], matched = 0;
        a.innerHTML = items.map((val, i) => `<div class="btn-3d bg-indigo-500 h-24 text-4xl flex items-center justify-center text-transparent transition-all" data-val="${val}" id="mc-${i}" onclick="Game.flipMemory(${i})">${val}</div>`).join('');
        
        this.flipMemory = (i) => {
            const el = document.getElementById(`mc-${i}`);
            if(flipped.length < 2 && el.classList.contains('text-transparent')) {
                el.classList.remove('text-transparent', 'bg-indigo-500'); el.classList.add('bg-white', 'text-slate-800');
                flipped.push(el);
                if(flipped.length === 2) {
                    if(flipped[0].dataset.val === flipped[1].dataset.val) {
                        matched+=2; flipped=[]; if(matched===items.length) setTimeout(()=>this.win(), 500);
                    } else {
                        setTimeout(() => { flipped.forEach(c => { c.classList.add('text-transparent', 'bg-indigo-500'); c.classList.remove('bg-white', 'text-slate-800'); }); flipped=[]; this.lose(); }, 800);
                    }
                }
            }
        };
    },

    // 3. الصيد المتساقط
    gameCatch() {
        const target = this.world === 'math' ? '5' : 'س';
        document.getElementById('g-task').innerText = `اصطد فقط: [ ${target} ]`;
        const a = document.getElementById('g-arena');
        a.innerHTML = `<div id="fall-arena"></div>`;
        const arena = document.getElementById('fall-arena');
        
        let score = 0;
        const pool = this.world === 'math' ? ['1','3','5','7'] : ['أ','س','م','د'];
        
        this.loop = setInterval(() => {
            if(!document.getElementById('fall-arena')) return clearInterval(this.loop);
            const item = document.createElement('div');
            item.className = 'fall-item text-slate-800 font-black';
            item.innerText = Math.random()>0.5 ? target : pool[Math.floor(Math.random()*pool.length)];
            item.style.left = Math.random() * 80 + '%'; item.style.top = '-60px';
            arena.appendChild(item);
            
            let pos = -60;
            const fall = setInterval(() => {
                pos += 4; item.style.top = pos + 'px';
                if(pos > 300) { clearInterval(fall); item.remove(); }
            }, 30);

            item.ontouchstart = item.onmousedown = () => {
                clearInterval(fall); item.remove();
                if(item.innerText === target) { score++; if(score>=3) { clearInterval(this.loop); this.win(); } } 
                else this.lose();
            };
        }, 1000);
    },

    // 4. السحب والترتيب (Sortable)
    gameDrag() {
        document.getElementById('g-task').innerText = "رتب من اليمين لليسار";
        const a = document.getElementById('g-arena');
        a.className = "flex-1 flex flex-col items-center justify-center w-full px-4";
        
        const nums = this.world === 'math' ? [1, 2, 3] : ['أ', 'ب', 'ت'];
        const mixed = [...nums].sort(()=>Math.random()-0.5);
        
        a.innerHTML = `
            <div id="drop-area" class="drop-zone w-full mb-8"></div>
            <div id="drag-items" class="flex gap-4">
                ${mixed.map(n => `<div class="game-card btn-3d" data-val="${n}">${n}</div>`).join('')}
            </div>
            <button onclick="Game.checkDrag()" class="mt-8 btn-3d bg-green-500 text-white px-8 py-3 text-2xl w-full">تأكيد الترتيب</button>
        `;

        new Sortable(document.getElementById('drag-items'), { group: 'shared', animation: 150 });
        new Sortable(document.getElementById('drop-area'), { group: 'shared', animation: 150 });
        
        this.checkDrag = () => {
            const drop = document.getElementById('drop-area');
            if(drop.children.length !== 3) return Robik.speak('اسحب كل العناصر للمربع بالترتيب الصحيح!');
            const current = Array.from(drop.children).map(c => isNaN(c.dataset.val) ? c.dataset.val : parseInt(c.dataset.val));
            if(JSON.stringify(current) === JSON.stringify(nums)) this.win();
            else this.lose();
        };
    }
};

// --- المتجر ---
const Shop = {
    items: ['🤖','👽','👻','🤡','🤠','🦸‍♂️'],
    render() {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = this.items.map(i => `
            <div class="glass p-4 text-center">
                <div class="text-6xl mb-4">${i}</div>
                <button onclick="Shop.buy('${i}')" class="btn-3d bg-yellow-400 text-white w-full py-2 font-black">شراء (100💰)</button>
            </div>
        `).join('');
    },
    buy(item) {
        if(App.user.coins >= 100) {
            App.user.coins -= 100; App.user.avatar = item; App.sync();
            Robik.speak('مبروك الشخصية الجديدة! 🎉');
            App.nav('s-home', 0);
        } else {
            Robik.speak('تحتاج إلى عملات أكثر يا بطل! 💰');
        }
    }
};

// --- الصدارة ---
const Lead = {
    render() {
        const db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        const list = document.getElementById('lead-list');
        list.innerHTML = db.sort((a,b) => b.stars - a.stars).map((u, i) => `
            <div class="glass p-4 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <span class="text-2xl font-black text-slate-400">#${i+1}</span>
                    <span class="text-4xl">${u.avatar || '👦'}</span>
                    <span class="text-xl font-black text-slate-700">${u.name}</span>
                </div>
                <div class="font-black text-pink-500 text-xl">${u.stars} ⭐</div>
            </div>
        `).join('');
    }
};
</script>
</body>
</html>
