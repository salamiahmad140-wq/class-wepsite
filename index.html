<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أساطير الصف الأول ب</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Fredoka:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { --p: #ff0054; --b: #3f37c9; --g: #4cc9f0; --y: #f9c74f; --v: #7209b7; }
        * { font-family: 'Fredoka', 'Cairo', sans-serif; user-select: none; box-sizing: border-box; }
        
        body { 
            background: #0b090a;
            background-image: linear-gradient(135deg, #6247aa 0%, #a06cd5 100%);
            height: 100vh; overflow: hidden; margin: 0; color: white;
        }

        /* تأثيرات الخلفية الرهيبة */
        .bg-glow { position: absolute; width: 400px; height: 400px; background: var(--g); filter: blur(150px); opacity: 0.3; border-radius: 50%; z-index: 0; animation: pulse 8s infinite alternate; }
        @keyframes pulse { from { transform: scale(1) translate(0,0); } to { transform: scale(1.5) translate(100px, 100px); } }

        /* الصفحات الزجاجية */
        .page { position: absolute; inset: 0; display: none; flex-direction: column; padding: 25px; overflow-y: auto; padding-bottom: 140px; z-index: 10; }
        .page-active { display: flex; animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes slideUp { from { transform: translateY(100%) scale(0.8); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

        /* خريطة "درب التبانة" للمراحل */
        .node {
            width: 120px; height: 120px; border-radius: 35px; background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(15px); border: 2px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; color: white; cursor: pointer; transition: 0.4s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative;
        }
        .node.done { background: linear-gradient(45deg, #4ade80, #22c55e); border-color: #fff; transform: scale(1.1); }
        .node:hover { transform: scale(1.2) rotate(5deg); background: rgba(255,255,255,0.2); }

        /* شريط الملاحة الخارق */
        .neon-nav {
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(25px);
            padding: 15px 50px; border-radius: 100px; display: flex; gap: 50px;
            border: 2px solid rgba(255,255,255,0.1); z-index: 1000;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        .nav-link { font-size: 4rem; cursor: pointer; filter: grayscale(1) opacity(0.5); transition: 0.4s; }
        .nav-link.active { filter: grayscale(0) opacity(1); transform: translateY(-25px) scale(1.3); }

        /* شاشة اللعب الرهيبة */
        #game-arena { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; overflow: hidden; }
        .game-canvas { width: 100%; height: 100%; position: relative; background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1b 100%); }
    </style>
</head>
<body>

    <div class="bg-glow" style="top: -100px; left: -100px;"></div>
    <div class="bg-glow" style="bottom: -100px; right: -100px; background: var(--p);"></div>

    <div id="p-login" class="page page-active justify-center items-center">
        <div class="bg-white/10 backdrop-blur-3xl p-16 rounded-[80px] border border-white/20 text-center w-[90%] max-w-xl shadow-2xl">
            <div class="text-[180px] mb-8 animate-pulse">🌌</div>
            <h1 class="text-8xl font-black bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-fuchsia-500 mb-10">عالم الأبطال</h1>
            <input type="text" id="u-code" placeholder="كود المغامرة" class="w-full text-center text-5xl p-8 rounded-[40px] bg-black/40 border-4 border-white/10 outline-none focus:border-cyan-400 mb-10 text-white tracking-widest">
            <button onclick="App.login()" class="w-full py-8 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-[40px] text-5xl font-black shadow-2xl hover:brightness-125 active:scale-95 transition-all">انطلاق 🚀</button>
        </div>
    </div>

    <div id="p-home" class="page items-center">
        <div class="w-full max-w-5xl bg-white/5 backdrop-blur-2xl rounded-[100px] p-16 border border-white/10 shadow-2xl mt-10 relative overflow-hidden">
            <div class="flex justify-between mb-16">
                <div class="bg-black/40 px-12 py-6 rounded-full border border-yellow-400/50 text-4xl font-black">💰 <span id="u-coins" class="text-yellow-400">0</span></div>
                <div class="bg-black/40 px-12 py-6 rounded-full border border-cyan-400/50 text-4xl font-black">⭐ <span id="u-stars" class="text-cyan-400">0</span></div>
            </div>
            
            <div class="relative mb-12">
                <div id="u-avatar" class="w-80 h-80 bg-gradient-to-b from-white/10 to-transparent rounded-full mx-auto flex items-center justify-center text-[180px] border-4 border-white/20 shadow-2xl">👤</div>
                <div id="u-tag" class="absolute -top-10 right-[25%] text-[150px] drop-shadow-2xl"></div>
            </div>
            
            <h2 id="u-name" class="text-9xl font-black text-center mb-16 italic tracking-tighter">بطل خارق</h2>
            
            <div class="grid grid-cols-2 gap-12">
                <button onclick="App.nav('p-worlds')" class="h-40 bg-gradient-to-br from-blue-500 to-indigo-700 rounded-[50px] text-5xl font-black shadow-xl">الخريطة 🗺️</button>
                <button onclick="App.nav('p-shop')" class="h-40 bg-gradient-to-br from-fuchsia-500 to-purple-700 rounded-[50px] text-5xl font-black shadow-xl">المتجر 🎁</button>
            </div>
        </div>
    </div>

    <div id="p-shop" class="page">
        <h2 class="text-9xl font-black text-center mb-16" style="font-family: 'Cairo';">خزانة الأبطال</h2>
        <div id="shop-grid" class="grid grid-cols-2 md:grid-cols-4 gap-10 max-w-7xl mx-auto p-6"></div>
    </div>

    <div id="p-leader" class="page items-center">
        <h2 class="text-8xl font-black text-center mb-16 text-cyan-400">قاعة المشاهير 🏆</h2>
        <div id="leader-list" class="w-full max-w-4xl space-y-8"></div>
    </div>

    <div id="p-worlds" class="page items-center justify-center">
        <h2 class="text-8xl font-black mb-24">اختر البوابة 🌀</h2>
        <div class="flex gap-20">
            <div onclick="App.openMap('math')" class="w-[450px] h-[550px] bg-white/5 backdrop-blur-3xl rounded-[100px] border-4 border-cyan-400/30 flex flex-col items-center justify-center cursor-pointer hover:scale-105 transition-all shadow-2xl">
                <div class="text-[250px] mb-8 drop-shadow-2xl">⚡</div>
                <h3 class="text-7xl font-black text-cyan-400">مجرة الأرقام</h3>
            </div>
            <div onclick="App.openMap('arabic')" class="w-[450px] h-[550px] bg-white/5 backdrop-blur-3xl rounded-[100px] border-4 border-fuchsia-400/30 flex flex-col items-center justify-center cursor-pointer hover:scale-105 transition-all shadow-2xl">
                <div class="text-[250px] mb-8 drop-shadow-2xl">📖</div>
                <h3 class="text-7xl font-black text-fuchsia-400">كوكب الحروف</h3>
            </div>
        </div>
    </div>

    <div id="p-map" class="page">
        <div class="flex justify-between items-center p-12 bg-black/20 rounded-[60px] mb-20">
            <h2 id="map-title" class="text-7xl font-black">المهمات</h2>
            <button onclick="App.nav('p-worlds')" class="bg-white/10 px-12 py-6 rounded-full text-3xl font-black">رجوع</button>
        </div>
        <div id="map-grid" class="flex flex-wrap justify-center gap-16 px-10"></div>
    </div>

    <div id="game-arena">
        <div class="absolute top-10 inset-x-10 flex justify-between items-center z-[6000]">
            <div class="bg-black/60 backdrop-blur-md border-2 border-cyan-400 px-12 py-6 rounded-full text-5xl font-black text-cyan-400">⭐ <span id="g-score">0</span> / 5</div>
            <div id="g-quest" class="bg-white/10 backdrop-blur-xl border-4 border-white/20 px-24 py-10 rounded-[80px] text-8xl font-black text-white shadow-2xl">...</div>
            <button onclick="Game.quit()" class="bg-red-600 w-28 h-28 rounded-full text-5xl font-black border-4 border-white shadow-2xl">✕</button>
        </div>
        <div id="arena-surface" class="game-canvas"></div>
    </div>

    <nav id="navbar" class="neon-nav hidden">
        <div class="nav-link active" onclick="App.nav('p-home', this)">🏠</div>
        <div class="nav-icon text-7xl cursor-pointer" onclick="App.nav('p-leader', this)">🏆</div>
        <div class="nav-icon text-7xl cursor-pointer" onclick="App.nav('p-shop', this)">🎁</div>
        <div class="nav-icon text-7xl cursor-pointer" onclick="App.nav('p-worlds', this)">🎮</div>
    </nav>

<script>
/**
 * 💡 نظام التشغيل الخارق
 */
const App = {
    dbKey: 'HEROES_1B_ULTRA',
    user: null,
    items: Array.from({length: 50}, (_, i) => ({
        id: i+1, n: 'عنصر أسطوري ' + (i+1), e: ['🔥','💎','⚡','🪐','🚁','🐉','🦄','⚔️','🎭','🛸','🌈','🧸'][i%12], p: (i+5)*50
    })),

    login() {
        const code = document.getElementById('u-code').value.trim().toUpperCase();
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const found = db.find(s => s.code === code);
        
        if(found) {
            this.user = found;
            if(!this.user.done) this.user.done = { math: [], arabic: [] };
            if(!this.user.inventory) this.user.inventory = [];
            this.nav('p-home');
            document.getElementById('navbar').classList.remove('hidden');
            this.sync();
            confetti({ particleCount: 500, spread: 150 });
        } else alert("كود المغامرة غير صحيح!");
    },

    nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
        document.getElementById(id).classList.add('page-active');
        if(el) {
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
        if(id === 'p-shop') this.renderShop();
        if(id === 'p-leader') this.renderLeaderboard();
    },

    sync() {
        document.getElementById('u-name').innerText = this.user.name;
        document.getElementById('u-stars').innerText = this.user.stars;
        document.getElementById('u-coins').innerText = this.user.coins;
        document.getElementById('u-tag').innerText = this.user.tag || '';
        
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const idx = db.findIndex(s => s.code === this.user.code);
        db[idx] = this.user;
        localStorage.setItem(this.dbKey, JSON.stringify(db));
    },

    renderShop() {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = this.items.map(item => {
            const owned = this.user.inventory.includes(item.id);
            return `
                <div class="bg-white/5 backdrop-blur-xl p-8 rounded-[50px] border border-white/10 text-center cursor-pointer hover:scale-110 transition-all ${owned?'border-cyan-400 bg-cyan-400/10':''}" onclick="App.buy(${item.id})">
                    <div class="text-[100px] mb-4">${item.e}</div>
                    <div class="bg-yellow-400 text-black px-6 py-2 rounded-full font-black text-2xl inline-block">${item.p} 💰</div>
                </div>
            `;
        }).join('');
    },

    buy(id) {
        const item = this.items.find(i => i.id === id);
        if(this.user.inventory.includes(id)) { this.user.tag = item.e; this.sync(); return; }
        if(this.user.coins >= item.p) {
            this.user.coins -= item.p; this.user.inventory.push(id); this.user.tag = item.e;
            this.sync(); this.renderShop(); confetti({ particleCount: 200 });
        }
    },

    renderLeaderboard() {
        const db = (JSON.parse(localStorage.getItem(this.dbKey)) || []).sort((a,b) => b.stars - a.stars);
        document.getElementById('leader-list').innerHTML = db.map((s, i) => `
            <div class="flex justify-between items-center p-12 bg-white/5 rounded-[60px] border border-white/10">
                <div class="flex items-center gap-10">
                    <span class="text-6xl font-black ${i<3?'text-yellow-400':'text-white/20'}">#${i+1}</span>
                    <span class="text-9xl">${s.avatar || '👤'}</span>
                    <div class="text-5xl font-black">${s.name} <span class="text-8xl ml-6">${s.tag || ''}</span></div>
                </div>
                <div class="text-6xl font-black text-cyan-400">${s.stars} ⭐</div>
            </div>
        `).join('');
    },

    openMap(world) {
        this.currentWorld = world;
        const grid = document.getElementById('map-grid');
        grid.innerHTML = '';
        for(let i=1; i<=100; i++) {
            const done = this.user.done[world].includes(i);
            const node = document.createElement('div');
            node.className = `node ${done?'done':''}`;
            node.innerHTML = done ? '✅' : i;
            node.onclick = () => Game.launch(i, world);
            grid.appendChild(node);
        }
        this.nav('p-map');
    }
};

/**
 * 🎮 محرك الألعاب الأسطوري (5 تجارب فريدة)
 */
const Game = {
    lvl: 0, world: '', score: 0, active: false, target: null,
    
    mathData: [{q:'5 + 5', a:10}, {q:'10 - 2', a:8}, {q:'3 + 4', a:7}, {q:'1 + 9', a:10}, {q:'6 - 3', a:3}],
    arabicData: [{q:'أ + س + د', a:'أسد'}, {q:'ب + ي + ت', a:'بيت'}, {q:'ق + ط + ة', a:'قطة'}, {q:'ن + ج + م', a:'نجم'}, {q:'و + ل + د', a:'ولد'}],

    launch(lvl, world) {
        this.lvl = lvl; this.world = world; this.score = 0; this.active = true;
        document.getElementById('game-arena').style.display = 'block';
        this.next();
    },

    next() {
        const surf = document.getElementById('arena-surface');
        surf.innerHTML = '';
        const data = this.world === 'math' ? this.mathData : this.arabicData;
        const q = data[Math.floor(Math.random()*5)];
        this.target = q.a;
        document.getElementById('g-quest').innerText = q.q;
        document.getElementById('g-score').innerText = this.score;

        const mode = Math.floor(Math.random() * 5);
        if(mode === 0) this.modeMeteor();    // مطاردة النيازك
        else if(mode === 1) this.modeCyber();  // تجميع السيبراني
        else if(mode === 2) this.modePortal(); // بوابات سحرية
        else if(mode === 3) this.modeBlast();  // انفجار الألوان
        else this.modeGravity();               // تحدي الجاذبية
    },

    // 1. مطاردة النيازك (سرعة خاطفة)
    modeMeteor() {
        this.loop = setInterval(() => {
            const m = document.createElement('div');
            const isT = Math.random() > 0.7;
            m.className = "absolute text-8xl cursor-pointer hover:scale-150 transition-transform";
            m.innerText = isT ? '☄️' : '🌑';
            m.style.left = Math.random()*90 + "%"; m.style.top = "-200px";
            const val = document.createElement('div');
            val.className = "absolute -bottom-10 w-full text-center text-3xl font-black";
            val.innerText = isT ? this.target : 'خطأ';
            m.appendChild(val);
            surf.appendChild(m);
            gsap.to(m, { y: window.innerHeight+300, rotation: 360, duration: 3, onComplete:()=>m.remove() });
            m.onclick = () => { if(isT) this.hit(); };
        }, 1000);
    },

    // 2. تجميع السيبراني (تركيز)
    modeCyber() {
        for(let i=0; i<15; i++) {
            const cube = document.createElement('div');
            const isT = i === 7;
            cube.className = "absolute w-40 h-40 bg-white/5 border-2 border-cyan-400 rounded-3xl flex items-center justify-center text-5xl font-black";
            cube.innerText = isT ? this.target : (Math.random()*20).toFixed(0);
            cube.style.left = Math.random()*80 + 10 + "%"; cube.style.top = Math.random()*70 + 15 + "%";
            surf.appendChild(cube);
            gsap.from(cube, { scale: 0, rotation: 180, delay: i*0.1 });
            cube.onclick = () => { if(isT) this.hit(); };
        }
    },

    // 3. البوابات السحرية (اختيار مصيري)
    modePortal() {
        const gates = [this.target, '؟', 'X'];
        gates.forEach((g, i) => {
            const p = document.createElement('div');
            p.className = "absolute w-60 h-80 bg-gradient-to-t from-purple-900 to-transparent border-t-8 border-cyan-400 rounded-t-full flex items-center justify-center text-7xl font-black";
            p.innerText = g; p.style.bottom = "10%"; p.style.left = (20 + i*25) + "%";
            surf.appendChild(p);
            gsap.to(p, { y: -20, repeat: -1, yoyo: true, delay: i*0.2 });
            p.onclick = () => { if(g === this.target) this.hit(); };
        });
    },

    // 4. انفجار الألوان (تفاعل بصري)
    modeBlast() {
        const b = document.createElement('div');
        b.className = "absolute w-96 h-96 rounded-full bg-gradient-to-br from-fuchsia-500 to-cyan-500 flex flex-col items-center justify-center text-center p-10 shadow-[0_0_100px_rgba(255,0,255,0.5)]";
        b.innerHTML = `<span class="text-4xl opacity-50">اضغط البطل:</span><br><span class="text-9xl">${this.target}</span>`;
        b.style.left = "35%"; b.style.top = "30%";
        surf.appendChild(b);
        gsap.to(b, { scale: 1.2, duration: 0.5, repeat: -1, yoyo: true });
        b.onclick = () => this.hit();
    },

    // 5. تحدي الجاذبية (دقة)
    modeGravity() {
        const ufo = document.createElement('div');
        ufo.className = "absolute text-[150px]"; ufo.innerText = "🛸";
        ufo.style.left = "40%"; ufo.style.top = "70%";
        const gift = document.createElement('div');
        gift.className = "absolute text-9xl bg-white/10 p-10 rounded-full border-4 border-dashed border-white";
        gift.innerText = this.target; gift.style.top = "15%"; gift.style.left = "40%";
        surf.appendChild(ufo); surf.appendChild(gift);
        gsap.to(ufo, { y: -window.innerHeight*0.5, duration: 2, repeat: -1, yoyo: true });
        ufo.onclick = () => this.hit();
    },

    hit() {
        this.score++; 
        confetti({ particleCount: 100, origin: { x: 0.5, y: 0.5 } });
        clearInterval(this.loop);
        if(this.score >= 5) this.win();
        else this.next();
    },

    win() {
        this.active = false;
        confetti({ particleCount: 1000, spread: 200 });
        if(!App.user.done[this.world].includes(this.lvl)) {
            App.user.done[this.world].push(this.lvl);
            App.user.stars += 200; App.user.coins += 500;
        }
        App.sync();
        setTimeout(() => { document.getElementById('game-arena').style.display = 'none'; App.openMap(this.world); }, 2500);
    },

    quit() { clearInterval(this.loop); this.active = false; document.getElementById('game-arena').style.display = 'none'; }
};
</script>
</body>
</html>
