<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أرض الألعاب - الصف الأول ب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; margin: 0; transition: 0.5s; min-height: 100vh; overflow-x: hidden; }
        
        /* ألوان كيدو لاند المبهجة */
        body.dark { background: #0f172a; color: white; }
        body.light { background: #f0f9ff; color: #0c4a6e; }

        /* خلفية متحركة خفيفة */
        .bg-pattern { position: fixed; inset: 0; z-index: -1; opacity: 0.1; background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); }

        .game-card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; position: relative; overflow: hidden;
        }
        .game-card:active { transform: scale(0.95); }
        .game-card:hover { transform: translateY(-5px); box-shadow: 0 20px 30px rgba(0,0,0,0.2); }

        .shimmer { 
            background: linear-gradient(90deg, #f59e0b, #ef4444, #3b82f6, #f59e0b); 
            background-size: 200% auto; -webkit-background-clip: text; color: transparent; 
            animation: s 4s linear infinite; 
        }
        @keyframes s { to { background-position: 200% center; } }

        .glass { backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.1); }
        .light .glass { background: white; border: 2px solid #bae6fd; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }

        .badge { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* زر تغيير اللون الذكي (V11) */
        #themeWrapper { position: fixed; bottom: 100px; left: 20px; z-index: 5000; display: flex; align-items: center; gap: 10px; }
        .theme-btn { width: 50px; height: 50px; background: #3b82f6; color: white; border-radius: 18px; display: flex; items-center justify-center; font-size: 1.5rem; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4); }
        #themeTip { background: #3b82f6; color: white; padding: 8px 12px; border-radius: 12px; font-size: 11px; font-weight: 800; display: none; }
    </style>
</head>
<body class="dark">
    <div class="bg-pattern"></div>

    <div id="themeWrapper">
        <button onclick="toggleTheme()" class="theme-btn">🌓</button>
        <div id="themeTip">غير الألوان من هنا! ✨</div>
    </div>

    <div id="loginGate" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass p-10 rounded-[3rem] w-full max-w-sm text-center">
            <div class="text-6xl mb-4">🚀</div>
            <h1 class="text-3xl font-black mb-6 shimmer">أرض الأساطير</h1>
            <input type="text" id="userInput" placeholder="اسم البطل" class="w-full p-4 mb-4 rounded-2xl bg-white/10 border-none text-center font-bold outline-none">
            <input type="password" id="passInput" placeholder="كلمة السر" class="w-full p-4 mb-8 rounded-2xl bg-white/10 border-none text-center font-bold outline-none">
            <button id="submitLogin" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-xl shadow-xl active:scale-95 transition-all">انطلق للعب! 🎮</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="p-5 flex justify-between items-center glass sticky top-0 z-50 rounded-b-[2rem]">
            <div class="flex items-center gap-3" onclick="openProfile()">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-yellow-400 to-orange-500 flex items-center justify-center text-2xl shadow-lg border-2 border-white">👤</div>
                <div>
                    <p id="navName" class="font-black text-sm"></p>
                    <p class="text-[10px] font-bold text-yellow-500">مستوى الأساطير ⭐</p>
                </div>
            </div>
            <h1 class="text-lg font-black shimmer">عالم ألعاب 1-ب</h1>
        </header>

        <main class="p-6 pb-40 max-w-4xl mx-auto">
            <div id="gamesPage" class="page active-page space-y-10">
                
                <div class="space-y-4">
                    <h2 class="text-2xl font-black flex items-center gap-2">🍎 جزيرة الحروف</h2>
                    <div class="grid grid-cols-2 gap-4" id="arabicGames">
                        </div>
                </div>

                <div class="space-y-4">
                    <h2 class="text-2xl font-black flex items-center gap-2">🔢 وادي الأرقام</h2>
                    <div class="grid grid-cols-2 gap-4" id="mathGames">
                        </div>
                </div>
            </div>

            <div id="leaderboardPage" class="page space-y-6">
                <h2 class="text-center text-3xl font-black shimmer">قائمة أساطير الصف</h2>
                <div class="glass rounded-[2.5rem] overflow-hidden">
                    <table class="w-full text-right">
                        <thead>
                            <tr class="bg-blue-600/20 text-blue-400">
                                <th class="p-4 font-black">الترتيب</th>
                                <th class="p-4 font-black">البطل</th>
                                <th class="p-4 font-black">النقاط</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardRows">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[85%] max-w-[400px] glass p-3 rounded-[2.5rem] flex justify-around items-center z-[4000] shadow-2xl">
            <button onclick="changePage('gamesPage', this)" class="text-3xl filter drop-shadow-md">🎮</button>
            <button onclick="changePage('leaderboardPage', this)" class="text-3xl opacity-30">🏆</button>
            <button onclick="openProfile()" class="text-3xl opacity-30">👤</button>
        </nav>
    </div>

    <div id="gameModal" class="fixed inset-0 bg-black z-[9999] hidden flex flex-col">
        <div class="p-4 flex justify-between items-center glass">
            <button onclick="closeGame()" class="bg-red-500 text-white px-6 py-2 rounded-xl font-black">إغلاق اللعبة ✕</button>
            <h3 id="currentGameTitle" class="font-black">اللعبة الآن</h3>
        </div>
        <iframe id="gameIframe" src="" class="w-full flex-grow border-none"></iframe>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        window.toggleTheme = () => {
            document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
            document.getElementById('themeTip').style.display = 'none';
        };

        window.changePage = (id, btn) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('nav button').forEach(b => b.classList.add('opacity-30'));
            btn.classList.remove('opacity-30');
            if(id === 'leaderboardPage') loadLeaderboard();
        };

        // الدخول
        document.getElementById('submitLogin').onclick = async () => {
            const u = document.getElementById('userInput').value.trim();
            const p = document.getElementById('passInput').value.trim();
            const { data } = await supabase.from('students').select('*').eq('username', u).eq('password', p).maybeSingle();
            
            if(data) { 
                localStorage.setItem('game_session', JSON.stringify(data)); 
                loginOk(data);
                setTimeout(() => { document.getElementById('themeTip').style.display = 'block'; }, 10000);
            } else alert("بطلنا العزيز، تأكد من الاسم وكلمة السر!");
        };

        function loginOk(user) {
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('navName').innerText = user.full_name;
            loadGames();
        }

        async function loadGames() {
            // سنفترض أننا نستخدم جدول assignments لتخزين الألعاب مؤقتاً
            // العمود title هو اسم اللعبة، و image_url هو رابط اللعبة، و description هو المادة (عربي/حساب)
            const { data } = await supabase.from('assignments').select('*');
            
            const createCard = (g) => `
                <div class="game-card glass p-4 rounded-[2rem] text-center border-b-8 border-blue-500/20" onclick="openGame('${g.image_url}', '${g.title}')">
                    <div class="text-4xl mb-2">⭐</div>
                    <p class="font-black text-xs">${g.title}</p>
                    <span class="text-[8px] bg-blue-500 text-white px-2 py-1 rounded-full mt-2 inline-block">لعب الآن</span>
                </div>
            `;

            document.getElementById('arabicGames').innerHTML = data.filter(g => g.description === 'عربي').map(createCard).join('');
            document.getElementById('mathGames').innerHTML = data.filter(g => g.description === 'حساب').map(createCard).join('');
        }

        window.openGame = (url, title) => {
            document.getElementById('gameIframe').src = url;
            document.getElementById('currentGameTitle').innerText = title;
            document.getElementById('gameModal').classList.remove('hidden');
        };

        window.closeGame = () => {
            document.getElementById('gameModal').classList.add('hidden');
            document.getElementById('gameIframe').src = '';
        };

        async function loadLeaderboard() {
            const { data } = await supabase.from('students').select('*').order('is_star', {ascending: false}); 
            // ملاحظة: يمكن إضافة عمود 'points' لاحقاً في قاعدة البيانات للترتيب الدقيق
            document.getElementById('leaderboardRows').innerHTML = data.map((s, i) => `
                <tr class="border-b border-white/5">
                    <td class="p-4 font-black text-center">${i+1}</td>
                    <td class="p-4 font-bold text-sm">${s.full_name}</td>
                    <td class="p-4 text-yellow-500 font-black">1500 XP</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
