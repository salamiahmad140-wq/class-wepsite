<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصف الأول "ب" | المنصة الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: white; }
        .neon-border { border: 1px solid rgba(59, 130, 246, 0.5); box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/20 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/20 blur-[120px] rounded-full"></div>
    </div>

    <div class="max-w-md w-full bg-slate-900/80 backdrop-blur-xl p-8 rounded-[2.5rem] neon-border text-center">
        <h1 class="text-4xl font-black mb-2 bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent">الصف الأول "ب" 🌟</h1>
        <p class="text-slate-400 mb-8 text-sm">مرحباً بكم في مدرستنا الرقمية</p>
        
        <div class="space-y-4">
            <input type="text" id="username" placeholder="اسم المستخدم" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl outline-none focus:border-blue-500 transition-all text-white">
            <input type="password" id="password" placeholder="كلمة المرور" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl outline-none focus:border-blue-500 transition-all text-white">
            
            <div class="flex items-center gap-2 px-2 text-sm text-slate-400">
                <input type="checkbox" id="remember" class="w-4 h-4 rounded">
                <label for="remember">تذكر جهازي</label>
            </div>

            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold text-lg shadow-lg shadow-blue-600/20 transition-all transform active:scale-95">دخول للمنصة</button>
        </div>
        
        <p class="mt-8 text-[10px] text-slate-500">بإشراف المعلمة: لبنى سلامي</p>
    </div>
</body>
</html>
