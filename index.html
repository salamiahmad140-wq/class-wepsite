<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أساطير لبنى - المستوى العالمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Fredoka:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #f59e0b; --bg: #0f172a; }
        * { user-select: none; font-family: 'Cairo', 'Fredoka', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: white; }

        /* شاشات النظام */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; overflow: hidden; z-index: 10; }
        .active { display: flex; }

        /* الأنيميشن */
        @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .animate-game-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* هود (HUD) */
        .hud-card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.1); border-radius: 1.5rem; }

        /* لوحة الصدارة والمتجر */
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* محرك الألعاب (Canvas) */
        #gameCanvas { width: 100%; height: 100%; background: radial-gradient(circle, #1e293b, #0f172a); cursor: pointer; }
    </style>
</head>
<body>

    <div id="scr-auth" class="screen active justify-center items-center bg-slate-950">
        <div class="text-center animate-game-pop">
            <div class="text-9xl mb-6">👑</div>
            <h1 class="text-6xl font-black mb-2 bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-amber-400">أساطير لبنى</h1>
            <p class="text-slate-500 font-bold mb-10 uppercase tracking-widest">Global Education Engine v4.0</p>
            <div class="space-y-4 w-80 mx-auto">
                <input type="text" id="player-name" placeholder="اسم البطل الصغير" class="w-full p-5 rounded-2xl bg-white/5 border border-white/10 text-center text-xl font-bold focus:border-indigo-500 outline-none transition-all">
                <button onclick="App.initPlayer()" class="w-full bg-indigo-600 hover:bg-indigo-500 p-5 rounded-2xl font-black text-2xl shadow-xl shadow-indigo-900/40 active:scale-95 transition-all">دخول الأكاديمية 🚀</button>
            </div>
        </div>
    </div>

    <div id="main-hud" class="fixed top-0 inset-x-0 p-6 z-[100] flex justify-between items-start pointer-events-none opacity-0 transition-opacity duration-500">
        <div class="pointer-events-auto hud-card p-3 pr-8 flex items-center gap-4 border-l-8 border-indigo-500">
            <div class="relative">
                <div id="hud-avatar" class="text-5xl">🐱</div>
                <div id="equipped-hat" class="absolute -top-4 -right-2 text-3xl"></div>
            </div>
            <div>
                <p id="hud-name" class="font-900 text-lg leading-none">--</p>
                <div class="flex gap-2 mt-1">
                    <span class="text-xs font-bold text-indigo-400 uppercase">مستوى 1</span>
                    <div class="w-20 h-2 bg-white/10 rounded-full overflow-hidden"><div class="h-full bg-indigo-500 w-1/3"></div></div>
                </div>
            </div>
        </div>
        <div class="pointer-events-auto flex flex-col gap-2">
            <div class="hud-card px-5 py-2 flex items-center gap-3 border-b-4 border-amber-500">
                <span id="hud-coins" class="text-amber-500 font-black text-xl">0</span>
                <span class="text-2xl">💰</span>
            </div>
            <div class="hud-card px-5 py-2 flex items-center gap-3 border-b-4 border-blue-400">
                <span id="hud-stars" class="text-blue-400 font-black text-xl">0</span>
                <span class="text-2xl">⭐</span>
            </div>
        </div>
    </div>

    <div id="scr-map" class="screen bg-[url('https://www.transparenttextures.com/patterns/dark-matter.png')]">
        <div class="mt-32 p-10 grid grid-cols-2 md:grid-cols-4 gap-8 overflow-y-auto custom-scroll h-full pb-32">
            </div>
    </div>

    <div id="scr-game" class="screen">
        <div class="absolute top-28 inset-x-0 text-center z-50">
            <h2 id="mission-text" class="text-4xl font-black text-white drop-shadow-2xl">جد الرقم 10</h2>
        </div>
        <canvas id="gameCanvas"></canvas>
        <button onclick="App.showScreen('scr-map')" class="absolute bottom-10 left-1/2 -translate-x-1/2 bg-red-500/20 hover:bg-red-500 text-red-500 hover:text-white px-10 py-4 rounded-full font-black transition-all">إنهاء المهمة</button>
    </div>

    <div id="scr-extra" class="screen pt-32 p-8">
        <div class="max-w-4xl mx-auto w-full flex flex-col h-full">
            <div class="flex gap-4 mb-8">
                <button onclick="App.renderShop()" class="flex-1 p-4 bg-indigo-600 rounded-2xl font-black text-xl">خزانة الملابس 👕</button>
                <button onclick="App.renderLeaderboard()" class="flex-1 p-4 bg-slate-800 rounded-2xl font-black text-xl">قائمة الصدارة 🏆</button>
            </div>
            <div id="extra-content" class="flex-grow overflow-y-auto custom-scroll p-4">
                </div>
        </div>
    </div>

    <nav id="navbar" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-lg h-20 hud-card flex justify-around items-center z-[200] opacity-0 transition-opacity">
        <button onclick="App.showScreen('scr-map')" class="text-3xl hover:scale-125 transition">🗺️</button>
        <button onclick="App.showScreen('scr-extra'); App.renderShop();" class="text-3xl hover:scale-125 transition">🛍️</button>
        <button onclick="App.showScreen('scr-extra'); App.renderLeaderboard();" class="text-3xl hover:scale-125 transition">🏆</button>
        <button onclick="location.reload()" class="text-3xl hover:scale-125 transition">⚙️</button>
    </nav>

    <script>
        // --- محرك النظام الأساسي (App Engine) ---
        const App = {
            state: {
                player: { name: '', coins: 100, stars: 0, avatar: '🦁', hat: '', ownedHats: [] },
                currentScreen: 'scr-auth',
                db: [
                    { name: 'ليان بطلة الصف', stars: 250, coins: 5000 },
                    { name: 'يوسف المغامر', stars: 180, coins: 3200 }
                ]
            },

            init() {
                // استعادة البيانات من الذاكرة
                const saved = localStorage.getItem('lubna_legends_data');
                if(saved) this.state.player = JSON.parse(saved);
                this.updateUI();
            },

            initPlayer() {
                const name = document.getElementById('player-name').value;
                if(!name) return alert("اكتب اسمك يا بطل!");
                this.state.player.name = name;
                this.save();
                this.showScreen('scr-map');
                document.getElementById('main-hud').style.opacity = '1';
                document.getElementById('navbar').style.opacity = '1';
                this.renderWorlds();
            },

            showScreen(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                this.state.currentScreen = id;
                if(id === 'scr-game') GameEngine.start();
            },

            save() {
                localStorage.setItem('lubna_legends_data', JSON.stringify(this.state.player));
                this.updateUI();
            },

            updateUI() {
                document.getElementById('hud-name').innerText = this.state.player.name;
                document.getElementById('hud-coins').innerText = this.state.player.coins;
                document.getElementById('hud-stars').innerText = this.state.player.stars;
                document.getElementById('hud-avatar').innerText = this.state.player.avatar;
                document.getElementById('equipped-hat').innerText = this.state.player.hat;
            },

            renderWorlds() {
                const map = document.querySelector('#scr-map div');
                const worlds = [
                    { name: 'مملكة الأرقام', icon: '🔢', color: 'bg-blue-600' },
                    { name: 'غابة الحروف', icon: '🅰️', color: 'bg-green-600' },
                    { name: 'جزيرة الأشكال', icon: '🔷', color: 'bg-purple-600' },
                    { name: 'فضاء العلوم', icon: '🚀', color: 'bg-indigo-600' }
                ];
                map.innerHTML = worlds.map(w => `
                    <div onclick="App.showScreen('scr-game')" class="${w.color} p-8 rounded-[3rem] text-center cursor-pointer transform hover:scale-105 transition shadow-2xl border-b-8 border-black/20">
                        <div class="text-7xl mb-4">${w.icon}</div>
                        <h3 class="text-2xl font-black">${w.name}</h3>
                    </div>
                `).join('');
            },

            renderShop() {
                const hats = [
                    { id: 'h1', name: 'تاج الملوك', icon: '👑', price: 100 },
                    { id: 'h2', name: 'قبعة الفضاء', icon: '🚀', price: 250 },
                    { id: 'h3', name: 'رداء القوة', icon: '🦸', price: 500 },
                    { id: 'h4', name: 'قبعة الذكاء', icon: '🎓', price: 150 }
                ];
                const container = document.getElementById('extra-content');
                container.innerHTML = `<div class="grid grid-cols-2 gap-4">` + hats.map(h => {
                    const owned = this.state.player.ownedHats.includes(h.id);
                    return `
                    <div class="hud-card p-6 text-center border-2 ${this.state.player.hat === h.icon ? 'border-indigo-500' : 'border-transparent'}">
                        <div class="text-6xl mb-4">${h.icon}</div>
                        <p class="font-black mb-4">${h.name}</p>
                        <button onclick="App.buyHat('${h.id}', '${h.icon}', ${h.price})" class="w-full py-3 rounded-xl font-black ${owned ? 'bg-green-600' : 'bg-amber-500'}">
                            ${owned ? 'ارتداء' : h.price + ' 💰'}
                        </button>
                    </div>`;
                }).join('') + `</div>`;
            },

            buyHat(id, icon, price) {
                if(this.state.player.ownedHats.includes(id)) {
                    this.state.player.hat = icon;
                } else if(this.state.player.coins >= price) {
                    this.state.player.coins -= price;
                    this.state.player.ownedHats.push(id);
                    this.state.player.hat = icon;
                } else return alert("اجمع مزيداً من النقود!");
                this.save(); this.renderShop();
            },

            renderLeaderboard() {
                const container = document.getElementById('extra-content');
                const list = [...this.state.db, {name: this.state.player.name, stars: this.state.player.stars}].sort((a,b) => b.stars - a.stars);
                container.innerHTML = list.map((s, i) => `
                    <div class="flex items-center gap-4 p-5 mb-3 bg-white/5 rounded-2xl border-r-4 ${i===0?'border-amber-500':'border-indigo-500'}">
                        <span class="text-2xl font-black opacity-30">#${i+1}</span>
                        <span class="flex-grow font-black">${s.name}</span>
                        <span class="text-indigo-400 font-black">${s.stars} ⭐</span>
                    </div>
                `).join('');
            }
        };

        // --- محرك الألعاب المتطور (Physics Game Engine) ---
        const GameEngine = {
            canvas: null, ctx: null, frog: null, target: 10, items: [], particles: [],
            
            start() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.target = Math.floor(Math.random() * 20) + 1;
                document.getElementById('mission-text').innerText = "جد الرقم " + this.target;
                
                this.frog = { x: this.canvas.width/2, y: this.canvas.height - 150, targetX: this.canvas.width/2, targetY: this.canvas.height - 150, size: 80 };
                this.spawnItems();
                this.animate();
            },

            spawnItems() {
                this.items = [];
                for(let i=0; i<8; i++) {
                    this.items.push({
                        x: Math.random() * (this.canvas.width - 100) + 50,
                        y: Math.random() * (this.canvas.height - 400) + 150,
                        val: Math.random() > 0.3 ? Math.floor(Math.random()*20)+1 : this.target,
                        size: 60
                    });
                }
            },

            animate() {
                if(App.state.currentScreen !== 'scr-game') return;
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // رسم العناصر
                this.items.forEach(item => {
                    this.ctx.fillStyle = "rgba(255,255,255,0.1)";
                    this.ctx.beginPath();
                    this.ctx.arc(item.x, item.y, item.size, 0, Math.PI*2);
                    this.ctx.fill();
                    this.ctx.fillStyle = "white";
                    this.ctx.font = "bold 40px Cairo";
                    this.ctx.textAlign = "center";
                    this.ctx.fillText(item.val, item.x, item.y + 15);
                });

                // تحريك الضفدع بسلاسة (Interpolation)
                this.frog.x += (this.frog.targetX - this.frog.x) * 0.1;
                this.frog.y += (this.frog.targetY - this.frog.y) * 0.1;

                this.ctx.font = "80px Cairo";
                this.ctx.fillText("🐸", this.frog.x, this.frog.y);

                requestAnimationFrame(() => this.animate());
            },

            handleTouch(e) {
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX || e.touches[0].clientX;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;

                this.items.forEach(item => {
                    const dist = Math.hypot(item.x - x, item.y - y);
                    if(dist < item.size) {
                        this.frog.targetX = item.x;
                        this.frog.targetY = item.y;
                        if(item.val === this.target) {
                            App.state.player.coins += 10;
                            App.state.player.stars += 1;
                            App.save();
                            setTimeout(() => this.start(), 500);
                        }
                    }
                });
            }
        };

        window.addEventListener('mousedown', (e) => GameEngine.handleTouch(e));
        window.addEventListener('touchstart', (e) => GameEngine.handleTouch(e));
        App.init();

    </script>
</body>
</html>
