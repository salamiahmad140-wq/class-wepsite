<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الصف الأول "ب" الرسمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; transition: 0.5s ease; min-height: 100vh; }
        body.dark { background: #020617; color: #f8fafc; }
        body.light { background: #f0f2f5; color: #1c1c1e; }
        
        .glass { backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .dark .glass { background: rgba(15, 23, 42, 0.7); box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .light .glass { background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .page { display: none; animation: slideUp 0.5s ease forwards; }
        .active-page { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .nav-dock { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 75px; border-radius: 2rem; z-index: 1000; }
        .profile-header { background: linear-gradient(45deg, #6366f1, #a855f7); height: 120px; }
    </style>
</head>
<body class="dark">

    <div id="loginGate" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass p-10 rounded-[3rem] w-full max-w-md text-center">
            <h1 class="text-3xl font-black mb-2">موقع الصف الأول "ب"</h1>
            <p class="text-indigo-500 font-bold mb-8">تسجيل دخول الأبطال</p>
            <div class="space-y-4">
                <input type="text" id="u" placeholder="اسم المستخدم" class="w-full p-4 rounded-2xl glass outline-none font-bold">
                <input type="password" id="p" placeholder="كلمة السر" class="w-full p-4 rounded-2xl glass outline-none font-bold">
                <button id="loginBtn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg">انطلق 🚀</button>
            </div>
            <button onclick="toggleTheme()" class="mt-6 opacity-50 text-xs font-bold">تبديل المظهر 🌓</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="p-4 sticky top-0 z-50 glass mb-6">
            <div class="flex justify-between items-center max-w-5xl mx-auto">
                <div class="flex items-center gap-3 cursor-pointer" onclick="openProfile()">
                    <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white">👤</div>
                    <span id="navName" class="font-black text-sm">البطل</span>
                </div>
                <h2 id="currentTitle" class="font-black text-lg">الرئيسية</h2>
                <button onclick="toggleTheme()" class="text-xl">🌓</button>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto px-6 pb-32">
            <section id="homePage" class="page active-page space-y-8">
                <div class="glass p-10 rounded-[2.5rem] text-center">
                    <h1 class="text-3xl font-black mb-2">أهلاً بك في موقعنا المبدع</h1>
                    <p class="text-indigo-500 font-bold">بإشراف المعلمة لبنى سلامي</p>
                </div>
                <div id="newsArea" class="grid gap-4"></div>
                <div class="glass p-6 rounded-[2.5rem]">
                    <h3 class="font-black mb-4">⭐ لوحة النجوم</h3>
                    <div id="starsGrid" class="grid grid-cols-2 md:grid-cols-5 gap-3"></div>
                </div>
            </section>

            <section id="hwPage" class="page space-y-6">
                <h2 class="text-2xl font-black text-center mb-6">📚 ركن الوظائف</h2>
                <div id="hwArea" class="space-y-4"></div>
            </section>

            <section id="eventsPage" class="page space-y-6">
                <h2 class="text-2xl font-black text-center mb-6">📸 فعالياتنا</h2>
                <div id="eventsArea" class="grid gap-6"></div>
            </section>
        </main>

        <div class="nav-dock glass flex justify-around items-center px-4">
            <button onclick="changePage('homePage', 'الرئيسية', this)" class="text-2xl p-4 text-indigo-500">🏠</button>
            <button onclick="changePage('hwPage', 'الوظائف', this)" class="text-2xl p-4 opacity-40">📚</button>
            <button onclick="changePage('eventsPage', 'الفعاليات', this)" class="text-2xl p-4 opacity-40">📸</button>
        </div>
    </div>

    <div id="profileModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center p-4 z-[2000] backdrop-blur-xl">
        <div class="glass w-full max-w-sm rounded-[3rem] overflow-hidden">
            <div class="profile-header"></div>
            <div class="p-8 -mt-12 text-center">
                <div class="w-20 h-20 rounded-2xl bg-indigo-600 border-4 border-white dark:border-slate-900 mx-auto flex items-center justify-center text-white text-3xl shadow-xl">👤</div>
                <h2 id="pName" class="text-xl font-black mt-4"></h2>
                <div id="pExams" class="mt-6 space-y-2 text-right"></div>
                <button onclick="logout()" class="mt-8 text-red-500 font-bold text-xs uppercase tracking-widest">تسجيل الخروج</button>
                <button onclick="closeProfile()" class="block w-full mt-4 font-bold opacity-50">إغلاق</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';
        
        window.toggleTheme = () => {
            const isDark = document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };
        if(localStorage.getItem('theme') === 'light') toggleTheme();

        window.changePage = (id, title, btn) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.getElementById('currentTitle').innerText = title;
            document.querySelectorAll('.nav-dock button').forEach(b => b.classList.add('opacity-40'));
            btn.classList.remove('opacity-40');
        };

        const session = JSON.parse(localStorage.getItem('edu_session'));
        if(session) loginOk(session);

        document.getElementById('loginBtn').onclick = async () => {
            const u = document.getElementById('u').value, p = document.getElementById('p').value;
            const { data } = await supabase.from('students').select('*').eq('username', u).eq('password', p).single();
            if(data) { localStorage.setItem('edu_session', JSON.stringify(data)); loginOk(data); }
            else alert("بيانات غير صحيحة");
        };

        function loginOk(user) {
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('navName').innerText = user.full_name;
            loadAll();
        }

        async function loadAll() {
            const { data: ads } = await supabase.from('assignments').select('*').order('created_at', {ascending: false});
            const { data: stds } = await supabase.from('students').select('*');

            document.getElementById('newsArea').innerHTML = ads.filter(a => a.title && !a.description && !a.image_url).map(a => `<div class="glass p-6 rounded-2xl border-r-4 border-indigo-500 font-bold">${a.title}</div>`).join('');
            document.getElementById('hwArea').innerHTML = ads.filter(a => a.description).map(a => `<div class="glass p-6 rounded-3xl border-b-4 border-indigo-500 font-bold text-lg leading-relaxed">${a.description}</div>`).join('');
            document.getElementById('eventsArea').innerHTML = ads.filter(a => a.image_url).map(a => {
                const isV = a.image_url.includes('mp4') || a.image_url.includes('youtu');
                return `<div class="glass p-4 rounded-[2rem]"><h4 class="font-black mb-3 text-center">${a.title || 'فعالية'}</h4>${isV ? `<video src="${a.image_url}" controls class="rounded-xl w-full"></video>` : `<img src="${a.image_url}" class="rounded-xl w-full">`}</div>`;
            }).join('');
            document.getElementById('starsGrid').innerHTML = stds.filter(s => s.is_star).map(s => `<div class="glass p-4 rounded-2xl text-center text-xs font-black">⭐<br>${s.full_name.split(' ')[0]}</div>`).join('');
        }

        window.openProfile = async () => {
            const user = JSON.parse(localStorage.getItem('edu_session'));
            document.getElementById('profileModal').classList.replace('hidden', 'flex');
            document.getElementById('pName').innerText = user.full_name;
            const { data } = await supabase.from('exams').select('*').eq('student_id', user.id).order('created_at', {ascending: false});
            document.getElementById('pExams').innerHTML = data.map(e => `<div class="flex justify-between glass p-3 rounded-xl text-xs font-bold"><span>${e.subject}</span><span class="text-indigo-500">${e.score}</span></div>`).join('');
        };
        window.closeProfile = () => document.getElementById('profileModal').classList.replace('flex', 'hidden');
        window.logout = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
</html>
