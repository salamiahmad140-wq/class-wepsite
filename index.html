<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أساطير 1-ب | المنصة العالمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #4361ee; --s: #4cc9f0; --a: #f72585; --bg: #f8f9fa; }
        body { font-family: 'Cairo', sans-serif; background: #1a1a2e; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 480px; height: 100%; background: var(--bg); position: relative; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,0.3); }
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; padding: 20px; overflow-y: auto; z-index: 10; background: var(--bg); padding-bottom: 90px; }
        .screen.active { display: flex; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* تصميم الجزر */
        .island-card { border-radius: 40px; padding: 25px; margin-bottom: 20px; color: white; cursor: pointer; position: relative; overflow: hidden; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .island-card:active { transform: scale(0.95); }
        .island-ar { background: linear-gradient(135deg, #ff4d6d, #ff758f); }
        .island-math { background: linear-gradient(135deg, #4361ee, #4cc9f0); }
        
        /* نيو روبو التفاعلي */
        .robo-wrap { position: fixed; bottom: 100px; left: 20px; z-index: 1000; transition: 0.5s; transform: scale(0); pointer-events: none; }
        .robo-wrap.active { transform: scale(1); }
        .bubble { background: white; border: 3px solid var(--p); padding: 10px; border-radius: 20px 20px 20px 0; margin-bottom: 10px; font-weight: 900; font-size: 0.8rem; width: 160px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .eye { transition: 0.1s; }

        .btn-game { background: white; border: 3px solid #eee; padding: 15px; border-radius: 20px; font-weight: 900; text-align: center; cursor: pointer; transition: 0.2s; }
        .btn-game:hover { border-color: var(--p); background: #f0f3ff; }
    </style>
</head>
<body>

<div id="app">
    <div id="neo-robo" class="robo-wrap">
        <div class="bubble" id="robo-text">أهلاً بك يا بطل!</div>
        <svg width="80" height="80" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="90" fill="#4361ee" />
            <rect x="50" y="60" width="100" height="70" rx="20" fill="white" />
            <circle cx="75" cy="95" r="10" fill="#333" class="eye" id="eye-l" />
            <circle cx="125" cy="95" r="10" fill="#333" class="eye" id="eye-r" />
            <path d="M85 115 Q100 125 115 115" stroke="#f72585" stroke-width="5" fill="none" stroke-linecap="round" />
        </svg>
    </div>

    <div id="sc-login" class="screen active justify-center text-center">
        <div class="text-7xl mb-6">🏰</div>
        <h1 class="text-4xl font-black text-slate-800 mb-2">أساطير 1-ب</h1>
        <p class="text-slate-400 font-bold mb-8 italic italic">ادخل كود البطل الخاص بك</p>
        <input type="text" id="u-code" placeholder="كود الطالب (مثلاً: S1)" class="w-full p-5 rounded-3xl bg-slate-100 text-center text-2xl font-black mb-6 outline-none uppercase border-2 border-transparent focus:border-blue-400 transition">
        <button onclick="App.login()" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-xl shadow-lg">ابدأ المغامرة 🚀</button>
    </div>

    <div id="sc-home" class="screen">
        <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
            <div class="flex items-center gap-3">
                <div id="u-avatar" class="text-3xl">👦</div>
                <div>
                    <h2 id="u-name" class="font-black text-lg leading-none">البطل</h2>
                    <span class="text-xs text-blue-500 font-bold">XP: <span id="u-xp">0</span></span>
                </div>
            </div>
            <div class="bg-amber-100 text-amber-600 px-4 py-2 rounded-2xl font-black flex items-center gap-1">💰 <span id="u-coins">0</span></div>
        </div>

        <div class="grid gap-2">
            <div onclick="App.openWorld('arabic')" class="island-card island-ar">
                <div class="text-5xl mb-3">🐛</div>
                <h3 class="text-2xl font-black">جزيرة الحروف</h3>
                <p class="text-sm opacity-90">دودة الحروف، قراءة الجمل، التنوين</p>
            </div>
            <div onclick="App.openWorld('math')" class="island-card island-math">
                <div class="text-5xl mb-3">🎈</div>
                <h3 class="text-2xl font-black">وادي الأرقام</h3>
                <p class="text-sm opacity-90">الجمع والطرح، الميزان المنطقي</p>
            </div>
        </div>
    </div>

    <div id="sc-game" class="screen z-[2000] p-0 bg-white">
        <div class="p-6 bg-slate-900 text-white flex justify-between items-center">
            <div id="g-lives">❤️❤️❤️</div>
            <div id="g-title" class="font-black">مهمة ذكية</div>
            <button onclick="App.nav('sc-home')" class="text-xs opacity-50">إغلاق</button>
        </div>
        <div class="p-8 text-center">
            <h2 id="g-question" class="text-2xl font-black text-slate-700 leading-snug">...</h2>
        </div>
        <div id="g-options" class="flex-1 px-6 flex flex-col gap-4"></div>
    </div>

    <nav id="nav-bar" class="fixed bottom-0 left-0 w-full h-20 bg-white/80 backdrop-blur-md border-t flex justify-around items-center hidden z-50 rounded-t-3xl">
        <div onclick="App.nav('sc-home')" class="text-2xl cursor-pointer opacity-40 active">🏠</div>
        <div onclick="alert('لوحة المتصدرين قريباً!')" class="text-2xl cursor-pointer opacity-40">🏆</div>
        <div onclick="location.reload()" class="text-2xl cursor-pointer opacity-40">🚪</div>
    </nav>
</div>

<script>
const DB_KEY = 'LEGENDS_1B_DATABASE';
const App = {
    user: null,
    login() {
        const c = document.getElementById('u-code').value.trim().toUpperCase();
        const db = JSON.parse(localStorage.getItem(DB_KEY)) || [{name: 'بطل تجريبي', code: 'S1', xp:0, coins:100}];
        const u = db.find(x => x.code === c);
        if(u) {
            this.user = u; this.sync();
            this.nav('sc-home');
            document.getElementById('nav-bar').classList.remove('hidden');
            this.roboSay(`أهلاً يا ${u.name}! جاهز؟`);
            confetti();
        } else { alert("الكود غير موجود في السجلات!"); }
    },
    sync() {
        document.getElementById('u-name').innerText = this.user.name;
        document.getElementById('u-xp').innerText = this.user.xp || 0;
        document.getElementById('u-coins').innerText = this.user.coins || 0;
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        const i = db.findIndex(x => x.code === this.user.code);
        if(i > -1) db[i] = this.user; else db.push(this.user);
        localStorage.setItem(DB_KEY, JSON.stringify(db));
    },
    nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    },
    roboSay(t) {
        const r = document.getElementById('neo-robo');
        document.getElementById('robo-text').innerText = t;
        r.classList.add('active');
        setTimeout(() => r.classList.remove('active'), 3000);
    },
    openWorld(w) {
        this.nav('sc-game');
        this.renderTask(w);
    },
    renderTask(w) {
        const opt = document.getElementById('g-options'); opt.innerHTML = '';
        let q, choices, correct;
        
        if(w === 'arabic') {
            q = "أكمل دودة الحروف: أ - ب - ت - ..."; correct = "ث";
            choices = ["ث", "ج", "خ"];
        } else {
            q = "ما هي الخطوة الأولى لغسل اليدين؟"; correct = "فتح الصنبور 🚰";
            choices = ["فتح الصنبور 🚰", "تنشيف اليد 🧼", "لبس الحذاء 👟"];
        }

        document.getElementById('g-question').innerText = q;
        choices.forEach(c => {
            const b = document.createElement('div');
            b.className = "btn-game";
            b.innerText = c;
            b.onclick = () => {
                if(c === correct) {
                    confetti(); this.user.xp += 50; this.user.coins += 20; this.sync();
                    this.roboSay("أنت عبقري!");
                    setTimeout(() => this.nav('sc-home'), 2000);
                } else { alert("حاول مرة أخرى!"); }
            };
            opt.appendChild(b);
        });
    }
};

// حركة عيون الروبوت مع الماوس
document.addEventListener('mousemove', (e) => {
    const el = document.getElementById('eye-l');
    const er = document.getElementById('eye-r');
    const x = (e.clientX / window.innerWidth - 0.5) * 10;
    const y = (e.clientY / window.innerHeight - 0.5) * 10;
    el.setAttribute('transform', `translate(${x},${y})`);
    er.setAttribute('transform', `translate(${x},${y})`);
});
</script>
</body>
</html>
