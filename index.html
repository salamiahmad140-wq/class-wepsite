<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كرنفال لبنى السحري 🍭</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Jomhuria&family=Fredoka:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { --p: #ff0a54; --b: #3a86ff; --g: #06d6a0; --y: #ffbe0b; --v: #8338ec; }
        * { font-family: 'Fredoka', 'Cairo', sans-serif; user-select: none; }
        
        body { 
            background: linear-gradient(45deg, #ffafcc, #a2d2ff, #bde0fe, #ffc8dd);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh; overflow: hidden; margin: 0;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* عناصر فرفشة متحركة */
        .confetti-slow { position: absolute; font-size: 2rem; animation: fall 10s linear infinite; z-index: 1; opacity: 0.6; }
        @keyframes fall { from { transform: translateY(-10vh) rotate(0deg); } to { transform: translateY(110vh) rotate(360deg); } }

        /* الصفحات */
        .page { position: absolute; inset: 0; display: none; flex-direction: column; padding: 20px; overflow-y: auto; padding-bottom: 140px; z-index: 10; }
        .page-active { display: flex; animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8) rotate(-5deg); } to { opacity: 1; transform: scale(1) rotate(0); } }

        /* خريطة المراحل - أزرار "بابلز" */
        .bubble-lvl {
            width: 110px; height: 110px; border-radius: 50%; background: white; 
            border: 8px solid white; display: flex; align-items: center; justify-content: center;
            font-size: 3rem; font-weight: 900; color: var(--b); box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            cursor: pointer; position: relative; transition: 0.3s;
        }
        .bubble-lvl.done { background: var(--g); color: white; border-color: #f0fff0; transform: scale(1.1); }
        .bubble-lvl:hover { transform: scale(1.2) rotate(10deg); z-index: 20; }

        /* متجر هدايا "للجنسين" */
        .gift-box {
            background: rgba(255, 255, 255, 0.9); border-radius: 45px; padding: 25px; text-align: center;
            border: 6px solid #fff; box-shadow: 0 15px 0 rgba(0,0,0,0.05); cursor: pointer;
        }
        .gift-box.owned { border-color: var(--v); background: #f3e8ff; }

        /* شريط التنقل السفلي */
        .mega-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            padding: 15px 50px; border-radius: 100px; display: flex; gap: 40px;
            border: 8px solid white; z-index: 1000; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        .nav-btn { font-size: 3.5rem; cursor: pointer; transition: 0.4s; }
        .nav-btn.active { transform: translateY(-25px) scale(1.4) rotate(15deg); filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2)); }

        /* شاشة اللعب */
        #play-zone { position: fixed; inset: 0; background: white; z-index: 5000; display: none; background: url('https://www.transparenttextures.com/patterns/colorful-soft-sprinkles.png'), linear-gradient(#fff, #e0f2fe); }
        .item-game { position: absolute; cursor: pointer; z-index: 5001; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
    </style>
</head>
<body>

    <div class="confetti-slow" style="left:10%; animation-delay: 0s;">🍬</div>
    <div class="confetti-slow" style="left:30%; animation-delay: 2s;">⭐</div>
    <div class="confetti-slow" style="left:60%; animation-delay: 4s;">🎈</div>
    <div class="confetti-slow" style="left:85%; animation-delay: 1s;">🍭</div>

    <div id="p-login" class="page page-active justify-center items-center">
        <div class="bg-white/80 p-12 rounded-[80px] border-[15px] border-white text-center w-[90%] max-w-xl shadow-2xl backdrop-blur-md">
            <div class="text-[150px] mb-6 animate-bounce">🎪</div>
            <h1 class="text-9xl font-black text-indigo-600 mb-2" style="font-family: 'Jomhuria';">كرنفال لبنى</h1>
            <p class="text-pink-500 font-bold text-3xl mb-10">أهلاً يا بطل/ة الصف الأول! 🌈</p>
            <input type="text" id="u-code" placeholder="كودك السحري" class="w-full text-center text-5xl p-7 rounded-[50px] border-8 border-pink-100 outline-none focus:border-blue-400 mb-8 font-black bg-white/50 tracking-widest text-blue-600">
            <button onclick="App.login()" class="w-full py-7 bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500 text-white rounded-[50px] text-5xl font-black shadow-[0_15px_0_#312e81] active:translate-y-3 active:shadow-none transition-all">هيا نفرفش! 🎈</button>
        </div>
    </div>

    <div id="p-home" class="page items-center">
        <div class="w-full max-w-4xl bg-white/40 backdrop-blur-xl rounded-[100px] p-12 border-[15px] border-white/50 shadow-2xl mt-10 text-center relative overflow-hidden">
            <div class="flex justify-between items-center mb-12">
                <div class="bg-gradient-to-r from-yellow-300 to-yellow-500 text-white px-10 py-5 rounded-full text-4xl font-black shadow-xl">💰 <span id="u-coins">0</span></div>
                <div class="bg-gradient-to-r from-blue-400 to-blue-600 text-white px-10 py-5 rounded-full text-4xl font-black shadow-xl">⭐ <span id="u-stars">0</span></div>
            </div>
            
            <div class="relative inline-block">
                <div id="u-avatar" class="w-72 h-72 bg-white rounded-full flex items-center justify-center text-[150px] border-[12px] border-pink-200 shadow-2xl overflow-hidden">👤</div>
                <div id="u-tag" class="absolute -top-12 -right-12 text-[140px] animate-bounce"></div>
            </div>
            
            <h2 id="u-name" class="text-9xl font-black text-indigo-900 mt-10 mb-12" style="font-family: 'Jomhuria';">البطل</h2>
            
            <div class="grid grid-cols-2 gap-12 w-full">
                <button onclick="App.nav('p-worlds')" class="bg-green-400 text-white p-12 rounded-[60px] text-5xl font-black border-b-[20px] border-green-700 active:translate-y-3 active:border-b-0 transition-all">الخريطة 🗺️</button>
                <button onclick="App.nav('p-shop')" class="bg-purple-400 text-white p-12 rounded-[60px] text-5xl font-black border-b-[20px] border-purple-700 active:translate-y-3 active:border-b-0 transition-all">المتجر 🎁</button>
            </div>
        </div>
    </div>

    <div id="p-shop" class="page">
        <h2 class="text-9xl font-black text-center text-purple-600 mb-12 mt-5" style="font-family: 'Jomhuria';">هدايا الأبطال 🛍️</h2>
        <div id="shop-grid" class="grid grid-cols-2 md:grid-cols-5 gap-10 max-w-7xl mx-auto p-6"></div>
    </div>

    <div id="p-leader" class="page items-center">
        <h2 class="text-9xl font-black text-center text-blue-600 mb-12 mt-5" style="font-family: 'Jomhuria';">لوحة الشرف الملكية 🏆</h2>
        <div id="leader-list" class="w-full max-w-5xl space-y-8 px-6"></div>
    </div>

    <div id="p-worlds" class="page items-center justify-center">
        <h2 class="text-8xl font-black text-white drop-shadow-lg mb-20">اختر جزيرة المغامرة! 🏝️</h2>
        <div class="flex flex-wrap justify-center gap-20">
            <div onclick="App.openMap('math')" class="w-[400px] bg-white/90 p-16 rounded-[80px] border-b-[30px] border-blue-500 text-center cursor-pointer hover:scale-110 transition-transform shadow-2xl">
                <div class="text-[180px] mb-8">🧮</div>
                <h3 class="text-6xl font-black text-blue-600">جزيرة الحساب</h3>
            </div>
            <div onclick="App.openMap('arabic')" class="w-[400px] bg-white/90 p-16 rounded-[80px] border-b-[30px] border-pink-500 text-center cursor-pointer hover:scale-110 transition-transform shadow-2xl">
                <div class="text-[180px] mb-8">🖍️</div>
                <h3 class="text-6xl font-black text-pink-600">جزيرة العربية</h3>
            </div>
        </div>
    </div>

    <div id="p-map" class="page">
        <div class="flex justify-between items-center p-12 bg-white/90 rounded-[60px] mb-16 shadow-2xl">
            <h2 id="map-title" class="text-7xl font-black text-indigo-900">المراحل</h2>
            <button onclick="App.nav('p-worlds')" class="bg-red-500 text-white px-16 py-6 rounded-full font-black text-4xl shadow-xl">رجوع</button>
        </div>
        <div id="map-grid" class="flex flex-wrap justify-center gap-14 p-6"></div>
    </div>

    <div id="play-zone">
        <div class="absolute top-10 inset-x-10 flex justify-between items-center z-[6000]">
            <div class="bg-blue-600 text-white px-12 py-6 rounded-full text-5xl font-black shadow-2xl">⭐ <span id="g-score">0</span> / 5</div>
            <div id="g-quest" class="bg-white border-[12px] border-yellow-400 px-20 py-8 rounded-[70px] text-7xl font-black text-indigo-900 shadow-2xl">...</div>
            <button onclick="Game.quit()" class="bg-red-500 text-white w-28 h-28 rounded-full text-6xl font-black shadow-2xl">✕</button>
        </div>
        <div id="arena" class="w-full h-full relative overflow-hidden"></div>
    </div>

    <nav id="navbar" class="mega-nav hidden">
        <div class="nav-btn active" onclick="App.nav('p-home', this)">🏠</div>
        <div class="nav-btn" onclick="App.nav('p-leader', this)">🏆</div>
        <div class="nav-btn" onclick="App.nav('p-shop', this)">🎁</div>
        <div class="nav-btn" onclick="App.nav('p-worlds', this)">🎮</div>
    </nav>

<script>
/**
 * 💡 المحرك المركزي (The Heart of Fun)
 */
const App = {
    dbKey: 'LUBNA_CARNIVAL_V5',
    user: null,
    items: [
        {id:1, n:'تاج مرصع', e:'👑', p:100}, {id:2, n:'خوذة بطل', e:'🪖', p:100},
        {id:3, n:'أجنحة سحرية', e:'🧚', p:200}, {id:4, n:'رداء النينجا', e:'🥋', p:200},
        {id:5, n:'قبعة ساحر', e:'🎩', p:300}, {id:6, n:'سيارة برق', e:'🏎️', p:300},
        {id:7, n:'نظارة ذكية', e:'🕶️', p:150}, {id:8, n:'سماعة موسيقى', e:'🎧', p:150},
        {id:9, n:'تنين طائر', e:'🐉', p:1500}, {id:10, n:'وحيد قرن', e:'🦄', p:1500},
        ...Array.from({length: 40}, (_, i) => ({
            id: i+11, n: 'جائزة ' + (i+11), e: ['🍭','🧸','🚀','💎','🦁','⚽','🎸','🚁','🍓','🐼','🐙','🍦'][i%12], p: (i+5)*40
        }))
    ],

    login() {
        const code = document.getElementById('u-code').value.trim().toUpperCase();
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const found = db.find(s => s.code === code);
        
        if(found) {
            this.user = found;
            if(!this.user.inventory) this.user.inventory = [];
            if(!this.user.done) this.user.done = { math: [], arabic: [] };
            this.nav('p-home');
            document.getElementById('navbar').classList.remove('hidden');
            this.sync();
            confetti({ particleCount: 300, spread: 100, origin: { y: 0.6 } });
        } else alert("يا بطل! الكود غير صحيح، اسأل الأستاذة لبنى.");
    },

    nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
        document.getElementById(id).classList.add('page-active');
        if(el) {
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
        if(id === 'p-shop') this.renderShop();
        if(id === 'p-leader') this.renderLeaderboard();
    },

    sync() {
        document.getElementById('u-name').innerText = this.user.name;
        document.getElementById('u-stars').innerText = this.user.stars;
        document.getElementById('u-coins').innerText = this.user.coins;
        document.getElementById('u-tag').innerText = this.user.tag || '';
        
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const idx = db.findIndex(s => s.code === this.user.code);
        db[idx] = this.user;
        localStorage.setItem(this.dbKey, JSON.stringify(db));
    },

    renderShop() {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = this.items.map(item => {
            const owned = this.user.inventory.includes(item.id);
            return `
                <div class="gift-box ${owned?'owned':''}" onclick="App.buy(${item.id})">
                    <div class="text-8xl mb-4">${item.e}</div>
                    <div class="font-black text-2xl text-indigo-900">${item.n}</div>
                    <div class="bg-gradient-to-r from-yellow-400 to-orange-500 text-white rounded-full px-6 py-2 mt-4 font-black inline-block shadow-lg">${item.p} 💰</div>
                </div>
            `;
        }).join('');
    },

    buy(id) {
        const item = this.items.find(i => i.id === id);
        if(this.user.inventory.includes(id)) { this.user.tag = item.e; this.sync(); alert("تم التغيير!"); return; }
        if(this.user.coins >= item.p) {
            this.user.coins -= item.p; this.user.inventory.push(id); this.user.tag = item.e;
            this.sync(); this.renderShop(); confetti({ particleCount: 200 });
        } else alert("تحتاج لمزيد من الكوينز! العب واجمعها.");
    },

    renderLeaderboard() {
        const db = (JSON.parse(localStorage.getItem(this.dbKey)) || []).sort((a,b) => b.stars - a.stars);
        document.getElementById('leader-list').innerHTML = db.map((s, i) => `
            <div class="flex justify-between items-center p-10 bg-white/80 rounded-[60px] border-4 border-white shadow-2xl ${s.code===this.user.code?'border-blue-400 bg-blue-50':''}">
                <div class="flex items-center gap-10">
                    <span class="text-6xl font-black text-blue-200">#${i+1}</span>
                    <span class="text-8xl">${s.avatar || '🦁'}</span>
                    <div class="text-5xl font-black text-indigo-900">${s.name} <span class="text-8xl ml-6">${s.tag || ''}</span></div>
                </div>
                <div class="text-6xl font-black text-yellow-500">${s.stars} ⭐</div>
            </div>
        `).join('');
    },

    openMap(world) {
        this.currentWorld = world;
        document.getElementById('map-title').innerText = world === 'math' ? 'تحديات جزيرة الحساب' : 'تحديات جزيرة العربية';
        const grid = document.getElementById('map-grid');
        grid.innerHTML = '';
        for(let i=1; i<=100; i++) {
            const isDone = this.user.done[world].includes(i);
            const isLocked = i > 5;
            const btn = document.createElement('div');
            btn.className = `bubble-lvl ${isDone ? 'done' : ''} ${isLocked ? 'opacity-30 grayscale' : ''}`;
            btn.innerHTML = isLocked ? '🔒' : (isDone ? '✨' : i);
            if(!isLocked) btn.onclick = () => Game.launch(i, world);
            grid.appendChild(btn);
        }
        this.nav('p-map');
    }
};

/**
 * 🎮 محرك الألعاب التعليمية (Educational Games Engine)
 */
const Game = {
    lvl: 0, world: '', score: 0, active: false, target: null,
    
    // بيانات الألعاب حسب العالم
    data: {
        math: [
            {q:'5 + 5 = ?', a:10}, {q:'10 - 2 = ?', a:8}, {q:'3 + 4 = ?', a:7}, {q:'9 - 3 = ?', a:6}, {q:'12 + 1 = ?', a:13}
        ],
        arabic: [
            {q:'بـ + يـ + ت = ?', a:'بيت'}, {q:'قـ + لـ + م = ?', a:'قلم'}, {q:'سـ + مـ + ك = ?', a:'سمك'}, {q:'كـ + تـ + ا + ب = ?', a:'كتاب'}, {q:'نـ + جـ + م = ?', a:'نجم'}
        ]
    },

    launch(lvl, world) {
        this.lvl = lvl; this.world = world; this.score = 0; this.active = true;
        document.getElementById('play-zone').style.display = 'block';
        this.next();
    },

    next() {
        const arena = document.getElementById('arena');
        arena.innerHTML = '';
        const q = this.data[this.world][Math.floor(Math.random()*5)];
        this.target = q.a;
        document.getElementById('g-quest').innerText = q.q;
        document.getElementById('g-score').innerText = this.score;

        // اختيار أحد الأنواع الخمسة للألعاب
        const type = Math.floor(Math.random() * 5);
        if(type === 0) this.modeBubbles();
        else if(type === 1) this.modeRain();
        else if(type === 2) this.modeFastTap();
        else if(type === 3) this.modeSlideIn();
        else this.modeHiddenBox();
    },

    // 1. نظام الفقاعات (مرتبط بالموضوع)
    modeBubbles() {
        this.timer = setInterval(() => {
            if(!this.active) return;
            const b = document.createElement('div');
            const isR = Math.random() > 0.7;
            const val = isR ? this.target : (this.world === 'math' ? 99 : 'خاطئ');
            b.className = "item-game w-40 h-40 rounded-full bg-white/90 border-8 border-blue-400 flex items-center justify-center text-5xl font-black";
            b.innerText = val; b.style.left = Math.random()*80+"%"; b.style.bottom = "-150px";
            arena.appendChild(b);
            gsap.to(b, { y: -window.innerHeight-200, duration: 5, onComplete:()=>b.remove() });
            b.onclick = () => { if(val == this.target) this.hit(b); };
        }, 1200);
    },

    // 2. نظام مطر الإجابات
    modeRain() {
        this.timer = setInterval(() => {
            const b = document.createElement('div');
            const isR = Math.random() > 0.7;
            b.className = "item-game text-9xl p-4";
            b.innerText = isR ? '✅' : '❌';
            const hint = document.createElement('div');
            hint.className = "absolute -bottom-10 text-4xl font-black text-indigo-900 w-full text-center";
            hint.innerText = isR ? this.target : 'خطأ';
            b.appendChild(hint);
            b.style.left = Math.random()*80+"%"; b.style.top = "-150px";
            arena.appendChild(b);
            gsap.to(b, { y: window.innerHeight+200, duration: 4, onComplete:()=>b.remove() });
            b.onclick = () => { if(isR) this.hit(b); };
        }, 1200);
    },

    // 3. نظام الضغط السريع (تحدي ذكاء)
    modeFastTap() {
        const b = document.createElement('div');
        b.className = "item-game w-64 h-64 bg-yellow-400 rounded-full border-[15px] border-white flex flex-col items-center justify-center shadow-2xl";
        b.innerHTML = `<span class="text-4xl text-white">الإجابة هي:</span><span class="text-7xl text-white font-black">${this.target}</span>`;
        b.style.left = "35%"; b.style.top = "35%";
        arena.appendChild(b);
        gsap.to(b, { scale: 1.2, repeat: -1, yoyo: true });
        b.onclick = () => this.hit(b);
    },

    // 4. نظام الانزلاق (تجميع)
    modeSlideIn() {
        const b = document.createElement('div');
        b.className = "item-game p-10 bg-green-400 text-white rounded-[50px] text-7xl font-black";
        b.innerText = this.target; b.style.left = "-300px"; b.style.top = "40%";
        arena.appendChild(b);
        gsap.to(b, { x: window.innerWidth + 500, duration: 4, onComplete:()=>this.next() });
        b.onclick = () => this.hit(b);
    },

    // 5. نظام الصناديق السحرية
    modeHiddenBox() {
        for(let i=0; i<3; i++) {
            const b = document.createElement('div');
            b.className = "item-game w-56 h-56 bg-indigo-500 rounded-[50px] border-8 border-white flex items-center justify-center text-8xl shadow-xl";
            b.innerText = "🎁"; b.style.top = "40%"; b.style.left = (20 + i*25) + "%";
            arena.appendChild(b);
            b.onclick = () => {
                if(Math.random() > 0.4) { b.innerText = "⭐"; this.hit(b); }
                else { b.innerText = "💨"; gsap.to(b, { opacity: 0, scale: 0.5 }); }
            };
        }
    },

    hit(el) {
        this.score++; 
        confetti({ particleCount: 50, origin: { x: 0.5, y: 0.5 } });
        if(this.score >= 5) this.win();
        else { clearInterval(this.timer); this.next(); }
    },

    win() {
        this.active = false; clearInterval(this.timer);
        confetti({ particleCount: 500, spread: 150 });
        if(!App.user.done[this.world].includes(this.lvl)) {
            App.user.done[this.world].push(this.lvl);
            App.user.stars += 100; App.user.coins += 200;
        }
        App.sync();
        setTimeout(() => { document.getElementById('play-zone').style.display = 'none'; App.openMap(this.world); }, 2000);
    },

    quit() { this.active = false; clearInterval(this.timer); document.getElementById('play-zone').style.display = 'none'; }
};
</script>
</body>
</html>
