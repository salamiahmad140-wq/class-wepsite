<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مملكة الأستاذة لبنى السحرية</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Jomhuria&display=swap" rel="stylesheet">

    <style>
        :root { --p-color: #ff85a2; --b-color: #70d6ff; --y-color: #ffd60a; }
        * { font-family: 'Cairo', sans-serif; user-select: none; transition: all 0.3s ease; }
        
        body { 
            background: #e0f2fe; /* لون سماوي فاتح */
            background-image: radial-gradient(#bae6fd 2px, transparent 2px);
            background-size: 30px 30px;
            overflow: hidden; height: 100vh; margin: 0;
        }

        /* تصميم الغيوم في الخلفية */
        .cloud { position: absolute; background: white; border-radius: 100px; opacity: 0.8; z-index: -1; animation: move 20s linear infinite; }
        @keyframes move { from { left: -200px; } to { left: 100vw; } }

        /* الصفحات بتصميم طفولي مستدير */
        .page { position: absolute; inset: 0; display: none; flex-direction: column; padding: 20px; overflow-y: auto; padding-bottom: 120px; }
        .page-active { display: flex; animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        @keyframes bounceIn { from { transform: scale(0.5) translateY(100px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        /* المتجر الفاخر */
        .item-box { 
            background: white; border-radius: 40px; border: 6px solid #ffdae0; 
            padding: 15px; text-align: center; cursor: pointer; box-shadow: 0 10px 0 #ffdae0;
        }
        .item-box:hover { transform: scale(1.1) rotate(3deg); background: #fff1f2; }
        .item-box.owned { border-color: #4ade80; box-shadow: 0 10px 0 #bbf7d0; }

        /* شريط التنقل (مستوحى من ألعاب الفيديو) */
        .royal-nav { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            padding: 10px 30px; border-radius: 100px; display: flex; gap: 20px;
            border: 6px solid #7dd3fc; z-index: 1000; box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        .nav-icon { font-size: 2.5rem; cursor: pointer; filter: grayscale(1); }
        .nav-icon.active { filter: grayscale(0); transform: translateY(-15px) scale(1.2); }

        /* الألعاب */
        #game-zone { position: fixed; inset: 0; background: #fff; z-index: 2000; display: none; background: linear-gradient(#bae6fd, #e0f2fe); }
        .game-bubble { 
            position: absolute; width: 120px; height: 120px; background: white; 
            border-radius: 50%; border: 6px solid #fbbf24; display: flex; 
            align-items: center; justify-content: center; font-size: 2.5rem; 
            font-weight: 900; color: #1e3a8a; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* لوحة الصدارة */
        .rank-card {
            background: white; border-radius: 30px; margin-bottom: 10px; padding: 15px 25px;
            display: flex; justify-content: space-between; items: center; border: 4px solid #e0f2fe;
        }
    </style>
</head>
<body>

    <div class="cloud" style="top: 10%; width: 200px; height: 60px; animation-duration: 25s;"></div>
    <div class="cloud" style="top: 30%; width: 150px; height: 50px; animation-duration: 35s; animation-delay: -5s;"></div>

    <div id="p-login" class="page page-active justify-center items-center">
        <div class="bg-white/90 p-10 rounded-[60px] border-[10px] border-pink-300 text-center w-[90%] max-w-lg shadow-2xl">
            <div class="text-9xl mb-4">🏠</div>
            <h1 class="text-6xl font-black text-pink-500 mb-2" style="font-family: 'Jomhuria', cursive;">مدرسة الإبداع</h1>
            <p class="text-blue-400 font-bold text-xl mb-8">أهلاً يا بطل/ة الصف الأول ب</p>
            <input type="text" id="login-code" placeholder="كودك السحري هنا" class="w-full text-center text-3xl p-5 rounded-full border-4 border-blue-200 focus:border-pink-400 outline-none mb-6 font-black bg-blue-50">
            <button onclick="App.login()" class="w-full py-5 bg-pink-500 text-white rounded-full text-3xl font-black shadow-[0_10px_0_#be185d] active:translate-y-2 active:shadow-none transition-all">هيا نلعب! ✨</button>
        </div>
    </div>

    <div id="p-home" class="page">
        <div class="max-w-4xl mx-auto w-full pt-10">
            <div class="bg-white rounded-[60px] p-8 border-[10px] border-blue-200 shadow-xl relative text-center">
                <div class="flex justify-between items-center mb-6 px-4">
                    <div class="bg-amber-100 text-amber-600 px-6 py-2 rounded-full font-black text-2xl border-4 border-amber-200">💰 <span id="u-coins">0</span></div>
                    <div class="bg-blue-100 text-blue-600 px-6 py-2 rounded-full font-black text-2xl border-4 border-blue-200">⭐ <span id="u-stars">0</span></div>
                </div>
                <div class="relative inline-block">
                    <div id="u-avatar" class="w-48 h-48 bg-pink-50 rounded-full flex items-center justify-center text-[100px] border-8 border-pink-200">👤</div>
                    <div id="u-tag" class="absolute -top-6 -right-6 text-8xl animate-bounce"></div>
                </div>
                <h2 id="u-name" class="text-7xl font-black text-blue-500 mt-4 mb-10" style="font-family: 'Jomhuria', cursive;">البطل</h2>
                
                <div class="grid grid-cols-2 gap-6">
                    <button onclick="App.nav('p-worlds')" class="bg-green-400 text-white p-8 rounded-[40px] text-4xl font-black border-b-[15px] border-green-600 active:translate-y-2 active:border-b-0 transition-all">الخريطة 🗺️</button>
                    <button onclick="App.nav('p-shop')" class="bg-purple-400 text-white p-8 rounded-[40px] text-4xl font-black border-b-[15px] border-purple-600 active:translate-y-2 active:border-b-0 transition-all">المتجر 🎁</button>
                </div>
            </div>
        </div>
    </div>

    <div id="p-shop" class="page">
        <h2 class="text-6xl font-black text-center text-pink-500 mb-8 mt-5" style="font-family: 'Jomhuria', cursive;">متجر أبطال لبنى</h2>
        <div id="shop-grid" class="grid grid-cols-2 md:grid-cols-5 gap-6 max-w-6xl mx-auto p-4">
            </div>
    </div>

    <div id="p-leader" class="page">
        <h2 class="text-6xl font-black text-center text-blue-500 mb-8 mt-5" style="font-family: 'Jomhuria', cursive;">أساطير الصف الأول ب</h2>
        <div id="leader-list" class="max-w-4xl mx-auto w-full px-4"></div>
    </div>

    <div id="p-worlds" class="page items-center justify-center">
        <h2 class="text-6xl font-black text-pink-500 mb-12" style="font-family: 'Jomhuria', cursive;">اختر عالمك المفضل</h2>
        <div class="flex flex-wrap justify-center gap-10">
            <div onclick="App.openMap('math')" class="w-72 bg-white p-10 rounded-[60px] border-b-[20px] border-blue-400 text-center cursor-pointer hover:rotate-2">
                <div class="text-9xl mb-4">🔢</div>
                <h3 class="text-4xl font-black text-blue-600">عالم الحساب</h3>
            </div>
            <div onclick="App.openMap('arabic')" class="w-72 bg-white p-10 rounded-[60px] border-b-[20px] border-pink-400 text-center cursor-pointer hover:-rotate-2">
                <div class="text-9xl mb-4">🅰️</div>
                <h3 class="text-4xl font-black text-pink-600">عالم العربية</h3>
            </div>
        </div>
    </div>

    <div id="p-map" class="page">
        <div class="flex justify-between items-center p-6">
            <h2 id="map-name" class="text-5xl font-black text-blue-600">الخريطة</h2>
            <button onclick="App.nav('p-worlds')" class="bg-white px-8 py-3 rounded-full font-black shadow-lg">رجوع</button>
        </div>
        <div id="map-grid" class="flex flex-wrap justify-center gap-8 p-10"></div>
    </div>

    <div id="game-zone">
        <div class="absolute top-10 inset-x-10 flex justify-between items-center z-[3000]">
            <div id="g-score" class="bg-blue-500 text-white px-8 py-4 rounded-full text-3xl font-black">0 / 5</div>
            <div id="g-task" class="bg-white border-8 border-pink-300 px-12 py-5 rounded-full text-5xl font-black text-blue-900">...</div>
            <button onclick="Game.quit()" class="bg-red-500 text-white w-20 h-20 rounded-full text-4xl font-black shadow-xl">X</button>
        </div>
        <div id="arena" class="w-full h-full relative"></div>
    </div>

    <nav id="nav-bar" class="royal-nav hidden">
        <div class="nav-icon active" onclick="App.nav('p-home', this)">🏠</div>
        <div class="nav-icon" onclick="App.nav('p-leader', this)">🏆</div>
        <div class="nav-icon" onclick="App.nav('p-shop', this)">🎁</div>
        <div class="nav-icon" onclick="App.nav('p-worlds', this)">🎮</div>
    </nav>

<script>
/**
 * 🛠️ محرك التشغيل (App Engine)
 */
const App = {
    dbKey: 'LUBNA_KIDS_2026_V1',
    user: null,
    items: [
        {id:1, n:'تاج وردي', e:'👑', p:100}, {id:2, n:'سيف بطل', e:'⚔️', p:100},
        {id:3, n:'جناح فراشة', e:'🦋', p:200}, {id:4, n:'خوذة فضائية', e:'👨‍🚀', p:200},
        {id:5, n:'عصا سحرية', e:'🪄', p:300}, {id:6, n:'سيارة سباق', e:'🏎️', p:300},
        {id:7, n:'نظارة قلب', e:'🕶️', p:150}, {id:8, n:'قبعة قرصان', e:'🏴‍☠️', p:150},
        {id:9, n:'يونيكورن', e:'🦄', p:1000}, {id:10, n:'تنين طائر', e:'🐉', p:1000},
        // توليد بقية الـ 50 عنصر
        ...Array.from({length: 40}, (_, i) => ({
            id: i+11, n: 'هدية ' + (i+11), e: ['🍭','🧸','🚀','🚁','💎','🎀','🚲','🦁','🐼','🐙','⚽','🎸'][i%12], p: (i+5)*20
        }))
    ],

    login() {
        const code = document.getElementById('login-code').value.trim().toUpperCase();
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const found = db.find(s => s.code === code);
        
        if(found) {
            this.user = found;
            if(!this.user.inventory) this.user.inventory = [];
            this.nav('p-home');
            document.getElementById('nav-bar').classList.remove('hidden');
            this.sync();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else alert("الكود خطأ يا بطل! اسأل الأستاذة لبنى.");
    },

    nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
        document.getElementById(id).classList.add('page-active');
        if(el) {
            document.querySelectorAll('.nav-icon').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
        if(id === 'p-shop') this.renderShop();
        if(id === 'p-leader') this.renderLeaderboard();
    },

    sync() {
        document.getElementById('u-name').innerText = this.user.name;
        document.getElementById('u-stars').innerText = this.user.stars;
        document.getElementById('u-coins').innerText = this.user.coins;
        document.getElementById('u-tag').innerText = this.user.tag || '';
        
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const idx = db.findIndex(s => s.code === this.user.code);
        db[idx] = this.user;
        localStorage.setItem(this.dbKey, JSON.stringify(db));
    },

    renderShop() {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = this.items.map(item => {
            const owned = this.user.inventory.includes(item.id);
            return `
                <div class="item-box ${owned?'owned':''}" onclick="App.buy(${item.id})">
                    <div class="text-7xl mb-2">${item.e}</div>
                    <div class="font-black text-sm text-blue-900">${item.n}</div>
                    <div class="bg-amber-400 text-white rounded-full px-3 py-1 mt-2 font-black">${item.p} 💰</div>
                </div>
            `;
        }).join('');
    },

    buy(id) {
        const item = this.items.find(i => i.id === id);
        if(this.user.inventory.includes(id)) {
            this.user.tag = item.e;
            this.sync();
            alert("لقد لبست: " + item.n);
            return;
        }
        if(this.user.coins >= item.p) {
            this.user.coins -= item.p;
            this.user.inventory.push(id);
            this.user.tag = item.e;
            this.sync();
            this.renderShop();
            confetti({ particleCount: 100 });
        } else alert("نقودك لا تكفي! العب واجمع المزيد.");
    },

    renderLeaderboard() {
        const db = (JSON.parse(localStorage.getItem(this.dbKey)) || []).sort((a,b) => b.stars - a.stars);
        document.getElementById('leader-list').innerHTML = db.map((s, i) => `
            <div class="rank-card ${s.code===this.user.code?'border-pink-400 bg-pink-50':''}">
                <div class="flex items-center gap-4">
                    <span class="text-4xl font-black text-blue-300 w-10">#${i+1}</span>
                    <span class="text-5xl">${s.avatar || '🦁'}</span>
                    <div class="text-2xl font-black">${s.name} <span class="text-4xl ml-2">${s.tag || ''}</span></div>
                </div>
                <div class="text-3xl font-black text-pink-500">${s.stars} ⭐</div>
            </div>
        `).join('');
    },

    openMap(world) {
        this.currentWorld = world;
        document.getElementById('map-name').innerText = world === 'math' ? 'عالم الحساب' : 'عالم العربية';
        const grid = document.getElementById('map-grid');
        grid.innerHTML = '';
        for(let i=1; i<=100; i++) {
            const isLocked = i > 5;
            const btn = document.createElement('div');
            btn.className = `w-24 h-24 rounded-full flex items-center justify-center text-4xl font-black cursor-pointer shadow-lg border-4 ${isLocked?'bg-gray-200 border-gray-300 text-gray-400':'bg-white border-pink-400 text-pink-500'}`;
            btn.innerHTML = isLocked ? '🔒' : i;
            if(!isLocked) btn.onclick = () => Game.start(i, world);
            else btn.onclick = () => alert("ترقبوا المراحل القادمة قريباً!");
            grid.appendChild(btn);
        }
        this.nav('p-map');
    }
};

/**
 * 🎮 محرك الألعاب (Game Engine) - إصلاح شامل
 */
const Game = {
    lvl: 0, world: '', score: 0, target: null, active: false, loop: null,

    // أسئلة المرحلة
    questions: {
        math: [
            {q:'10 + 5', a:15}, {q:'8 + 2', a:10}, {q:'20 - 5', a:15}, {q:'12 + 6', a:18}, {q:'9 - 3', a:6}
        ],
        arabic: [
            {q:'مَـ + ـدْرَ + سَـ + ـة', a:'مدرسة'}, {q:'قَـ + ـلَـ + ـم', a:'قلم'}, {q:'بَـ + ـيْـ + ـت', a:'بيت'}, {q:'كِـ + ـتَـ + ـا + ب', a:'كتاب'}, {q:'نُـ + ـجُـ + ـو + م', a:'نجوم'}
        ]
    },

    start(lvl, world) {
        this.lvl = lvl; this.world = world; this.score = 0; this.active = true;
        document.getElementById('game-zone').style.display = 'block';
        this.next();
    },

    next() {
        const arena = document.getElementById('arena');
        arena.innerHTML = '';
        const qData = this.questions[this.world][Math.floor(Math.random()*5)];
        this.target = qData.a;
        document.getElementById('g-task').innerText = qData.q;
        document.getElementById('g-score').innerText = `${this.score} / 5`;

        this.loop = setInterval(() => {
            if(!this.active) return;
            this.spawn();
        }, 1500);
    },

    spawn() {
        const arena = document.getElementById('arena');
        const bubble = document.createElement('div');
        const isCorrect = Math.random() > 0.6;
        let val;

        if(this.world === 'math') val = isCorrect ? this.target : Math.floor(Math.random()*20);
        else val = isCorrect ? this.target : 'شجرة';

        bubble.className = 'game-bubble';
        bubble.innerText = val;
        bubble.style.left = Math.random() * (window.innerWidth - 150) + 'px';
        bubble.style.top = window.innerHeight + 'px';
        arena.appendChild(bubble);

        gsap.to(bubble, {
            y: -window.innerHeight - 200, 
            duration: 6, 
            ease: "none",
            onComplete: () => bubble.remove()
        });

        bubble.onclick = () => {
            if(val == this.target) {
                this.score++;
                confetti({ particleCount: 30, origin: { x: bubble.offsetLeft/window.innerWidth, y: bubble.offsetTop/window.innerHeight } });
                bubble.remove();
                if(this.score >= 5) this.win();
                else { clearInterval(this.loop); this.next(); }
            } else {
                bubble.style.background = "#fee2e2";
                gsap.to(bubble, { x: 10, repeat: 3, yoyo: true, duration: 0.1 });
            }
        };
    },

    win() {
        this.active = false; clearInterval(this.loop);
        confetti({ particleCount: 300, spread: 100 });
        App.user.stars += 20;
        App.user.coins += 50;
        App.sync();
        setTimeout(() => {
            document.getElementById('game-zone').style.display = 'none';
            App.openMap(this.world);
        }, 2000);
    },

    quit() {
        this.active = false; clearInterval(this.loop);
        document.getElementById('game-zone').style.display = 'none';
    }
};
</script>
</body>
</html>
