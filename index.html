<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مملكة لبنى السحرية ✨ | أساطير الصف الأول ب</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Fredoka:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --p-color: #ffafcc; --b-color: #a2d2ff; --g-color: #b5e48c; --y-color: #ffd60a; }
        * { font-family: 'Fredoka', 'Cairo', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: linear-gradient(135deg, #fef9e7 0%, #f0fdf4 100%);
            height: 100vh; overflow: hidden; margin: 0;
            background-image: url('https://www.transparenttextures.com/patterns/puffy-puffs.png');
        }

        /* تأثيرات الغيوم والفراشات في الخلفية */
        .bg-element { position: absolute; pointer-events: none; z-index: 0; opacity: 0.7; }
        
        /* تأثير الصفحات السحابي (Cloud Fade) */
        .page { position: absolute; inset: 0; display: none; flex-direction: column; padding: 20px; overflow-y: auto; padding-bottom: 130px; z-index: 10; }
        .page-active { display: flex; animation: cloudFadeIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes cloudFadeIn { from { opacity: 0; transform: translateY(50px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* خريطة الـ 100 مرحلة (الأولى 5 مفتوحة) */
        .grid-levels { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 20px; padding: 30px; }
        .lvl-bubble {
            aspect-ratio: 1; border-radius: 50%; background: white; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 2.8rem; font-weight: 900; color: #475569; border: 6px solid #e2e8f0;
            box-shadow: 0 10px 0 #cbd5e1; cursor: pointer; transition: 0.3s; position: relative;
        }
        .lvl-bubble.done { background: #b5e48c; border-color: #7db342; color: white; box-shadow: 0 10px 0 #558b2f; }
        .lvl-bubble.active-now { border-color: #ffafcc; animation: bubblePulse 1.5s infinite; }
        @keyframes bubblePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); box-shadow: 0 10px 0 #cbd5e1, 0 0 30px rgba(255, 175, 204, 0.6); } }
        
        /* المراحل القادمة (Locked) */
        .lvl-locked { opacity: 0.2; background: #e2e8f0; border-color: #cbd5e1; color: #94a3b8; pointer-events: none; box-shadow: none; }
        .lock-icon { position: absolute; bottom: -10px; font-size: 1.5rem; }

        /* شريط التحكم الكرتوني */
        .bottom-dock { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            padding: 12px 40px; border-radius: 100px; display: flex; gap: 40px;
            border: 6px solid #a2d2ff; z-index: 1000; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .dock-item { font-size: 3rem; cursor: pointer; transition: 0.4s; filter: drop-shadow(0 4px 0 rgba(0,0,0,0.1)); }
        .dock-item.active { transform: translateY(-20px) scale(1.3) rotate(5deg); }

        /* شاشة اللعبة */
        #game-arena { position: fixed; inset: 0; background: #fff; z-index: 5000; display: none; background: url('https://www.transparenttextures.com/patterns/colorful-soft-sprinkles.png'), radial-gradient(circle, #fff 0%, #e0f2fe 100%); }
        .game-target { position: absolute; cursor: pointer; z-index: 5001; }
    </style>
</head>
<body>

    <div class="bg-element" style="top:10%; left:5%; font-size: 3rem;">☁️</div>
    <div class="bg-element" style="top:25%; right:10%; font-size: 2.5rem;">🌸</div>
    <div class="bg-element" style="bottom:30%; left:15%; font-size: 2rem;">🦋</div>

    <div id="p-login" class="page page-active justify-center items-center">
        <div class="bg-white/90 p-12 rounded-[60px] border-[12px] border-pink-100 text-center w-[90%] max-w-lg shadow-2xl backdrop-blur-md">
            <div class="text-[120px] mb-6 animate-bounce">🍦</div>
            <h1 class="text-7xl font-black text-pink-400 mb-2">عالم لبنى السحري</h1>
            <p class="text-blue-400 font-bold text-2xl mb-10">أهلاً يا بطل/ة الصف الأول! ✨</p>
            <input type="text" id="user-code" placeholder="أدخل كودك السحري" class="w-full text-center text-4xl p-6 rounded-full border-4 border-blue-100 outline-none focus:border-pink-300 mb-8 font-black bg-blue-50/50">
            <button onclick="App.login()" class="w-full py-6 bg-gradient-to-r from-pink-400 to-pink-500 text-white rounded-full text-4xl font-black shadow-[0_12px_0_#db2777] active:translate-y-2 active:shadow-none transition-all">هيا بنا! 🚀</button>
        </div>
    </div>

    <div id="p-home" class="page items-center">
        <div class="w-full max-w-4xl bg-white/70 backdrop-blur-md rounded-[70px] p-10 border-[10px] border-white shadow-2xl mt-10 relative">
            <div class="flex justify-between w-full mb-10 px-4">
                <div class="bg-white px-8 py-3 rounded-full border-4 border-amber-300 text-3xl font-black text-amber-500 shadow-sm">💰 <span id="u-coins">0</span></div>
                <div class="bg-white px-8 py-3 rounded-full border-4 border-blue-300 text-3xl font-black text-blue-500 shadow-sm">⭐ <span id="u-stars">0</span></div>
            </div>
            
            <div class="relative inline-block group">
                <div id="u-avatar" class="w-56 h-56 bg-gradient-to-b from-pink-50 to-white rounded-full flex items-center justify-center text-[110px] border-8 border-pink-100 shadow-inner">👤</div>
                <div id="u-tag" class="absolute -top-10 -right-10 text-[120px] animate-pulse"></div>
            </div>
            
            <h2 id="u-name" class="text-7xl font-black text-indigo-900 mt-6 mb-12 italic">البطل المبدع</h2>
            
            <div class="grid grid-cols-2 gap-8 w-full">
                <button onclick="App.nav('p-worlds')" class="bg-blue-400 text-white p-8 rounded-[45px] text-4xl font-black border-b-[15px] border-blue-600 active:translate-y-2 active:border-b-0 transition-all">الخريطة 🗺️</button>
                <button onclick="App.nav('p-shop')" class="bg-pink-400 text-white p-8 rounded-[45px] text-4xl font-black border-b-[15px] border-pink-600 active:translate-y-2 active:border-b-0 transition-all">المتجر 🎁</button>
            </div>
        </div>
    </div>

    <div id="p-shop" class="page">
        <h2 class="text-6xl font-black text-center text-pink-500 mb-10 mt-5">متجر هدايا الأبطال 🛍️</h2>
        <div id="shop-grid" class="grid grid-cols-2 md:grid-cols-5 gap-6 max-w-6xl mx-auto p-4">
            </div>
    </div>

    <div id="p-leader" class="page items-center">
        <h2 class="text-6xl font-black text-blue-500 mb-10 mt-5">أوائل الصف الأول ب 🏆</h2>
        <div id="leader-list" class="w-full max-w-3xl space-y-4 px-4"></div>
    </div>

    <div id="p-worlds" class="page items-center justify-center">
        <h2 class="text-7xl font-black text-indigo-900 mb-16">اختر عالمك المفضل 🪐</h2>
        <div class="flex flex-wrap justify-center gap-12">
            <div onclick="App.openMap('math')" class="w-80 bg-white p-12 rounded-[60px] border-b-[20px] border-blue-400 text-center cursor-pointer hover:scale-105 transition shadow-xl">
                <div class="text-[130px] mb-4">🔢</div>
                <h3 class="text-4xl font-black text-blue-600">عالم الحساب</h3>
            </div>
            <div onclick="App.openMap('arabic')" class="w-80 bg-white p-12 rounded-[60px] border-b-[20px] border-pink-400 text-center cursor-pointer hover:scale-105 transition shadow-xl">
                <div class="text-[130px] mb-4">📖</div>
                <h3 class="text-4xl font-black text-pink-600">عالم العربية</h3>
            </div>
        </div>
    </div>

    <div id="p-map" class="page">
        <div class="p-8 sticky top-0 bg-white/70 backdrop-blur-md rounded-full mb-10 flex justify-between">
            <h2 id="map-name" class="text-4xl font-black text-indigo-900">المراحل</h2>
            <button onclick="App.nav('p-worlds')" class="bg-pink-400 text-white px-8 py-3 rounded-full font-black text-2xl">رجوع</button>
        </div>
        <div id="map-render" class="grid grid-levels"></div>
    </div>

    <div id="game-arena">
        <div class="absolute top-8 inset-x-8 flex justify-between items-center z-[6000]">
            <div id="g-score" class="bg-blue-600 text-white px-10 py-5 rounded-full text-4xl font-black shadow-xl">⭐ 0 / 5</div>
            <div id="g-task" class="bg-white border-[10px] border-pink-300 px-12 py-5 rounded-[40px] text-6xl font-black text-blue-900 shadow-2xl">...</div>
            <button onclick="Game.quit()" class="bg-red-400 text-white w-20 h-20 rounded-full text-4xl font-black shadow-xl">X</button>
        </div>
        <div id="g-canvas" class="w-full h-full relative overflow-hidden"></div>
    </div>

    <nav id="navbar" class="bottom-dock hidden">
        <div class="dock-item active" onclick="App.nav('p-home', this)">🏠</div>
        <div class="dock-item" onclick="App.nav('p-leader', this)">🏆</div>
        <div class="dock-item" onclick="App.nav('p-shop', this)">🎁</div>
        <div class="dock-item" onclick="App.nav('p-worlds', this)">🎮</div>
    </nav>

<script>
/**
 * 🛠️ المحرك الأساسي (Core System)
 */
const App = {
    dbKey: 'LUBNA_ULTIMATE_KIDS_V1',
    user: null, currentWorld: 'math',
    items: [
        {id:1, n:'تاج وردي', e:'👑', p:100}, {id:2, n:'خوذة بطل', e:'🪖', p:100},
        {id:3, n:'جناح فراشة', e:'🦋', p:150}, {id:4, n:'روبوت', e:'🤖', p:150},
        {id:5, n:'عصا سحرية', e:'🪄', p:200}, {id:6, n:'برق', e:'⚡', p:200},
        {id:7, n:'نظارة قلب', e:'🕶️', p:120}, {id:8, n:'قبعة قرصان', e:'🏴‍☠️', p:120},
        // توليد الـ 50 عنصر برمجياً للسهولة
        ...Array.from({length: 42}, (_, i) => ({
            id: i+9, n: 'هدية ' + (i+9), e: ['🍭','🧸','🚀','💎','🦁',' panda','⚽','🎸','🚲','🦁','🐼','🐙'][i%12], p: (i+5)*20
        }))
    ],

    login() {
        const code = document.getElementById('user-code').value.trim().toUpperCase();
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const found = db.find(s => s.code === code);
        if(found) {
            this.user = found;
            if(!this.user.inventory) this.user.inventory = [];
            if(!this.user.equipped) this.user.equipped = null;
            this.nav('p-home');
            document.getElementById('navbar').classList.remove('hidden');
            this.sync();
        } else alert("الكود خطأ! اسأل معلمتك لبنى.");
    },

    nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
        document.getElementById(id).classList.add('page-active');
        if(el) {
            document.querySelectorAll('.dock-item').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }
        if(id === 'p-shop') this.renderShop();
        if(id === 'p-leader') this.renderLeaderboard();
    },

    sync() {
        document.getElementById('u-name').innerText = this.user.name;
        document.getElementById('u-stars').innerText = this.user.stars;
        document.getElementById('u-coins').innerText = this.user.coins;
        document.getElementById('u-avatar').innerText = this.user.avatar || '👤';
        document.getElementById('u-tag').innerText = this.user.equipped || '';
        
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const idx = db.findIndex(s => s.code === this.user.code);
        db[idx] = this.user;
        localStorage.setItem(this.dbKey, JSON.stringify(db));
    },

    renderShop() {
        const container = document.getElementById('shop-grid');
        container.innerHTML = this.items.map(item => {
            const owned = this.user.inventory.includes(item.id);
            return `
                <div class="bg-white rounded-[35px] border-4 ${owned?'border-green-400':'border-blue-50'} p-6 text-center cursor-pointer hover:scale-105" onclick="App.buy(${item.id})">
                    <div class="text-7xl mb-2">${item.e}</div>
                    <div class="font-black text-xl text-blue-900">${item.n}</div>
                    <div class="bg-amber-400 text-white rounded-full px-4 py-1 mt-2 font-black inline-block">${item.p} 💰</div>
                </div>
            `;
        }).join('');
    },

    buy(id) {
        const item = this.items.find(i => i.id === id);
        if(this.user.inventory.includes(id)) {
            this.user.equipped = item.e;
            this.sync();
            alert("لقد ارتديت: " + item.n);
            return;
        }
        if(this.user.coins >= item.p) {
            this.user.coins -= item.p;
            this.user.inventory.push(id);
            this.user.equipped = item.e;
            this.sync();
            this.renderShop();
            confetti({ particleCount: 100 });
        } else alert("نقودك لا تكفي!");
    },

    openMap(world) {
        this.currentWorld = world;
        document.getElementById('map-name').innerText = world === 'math' ? 'تحدي الحساب (المستوى 1)' : 'تحدي العربية (المستوى 1)';
        const render = document.getElementById('map-render');
        render.innerHTML = '';
        const prog = this.user.progress[world];
        for(let i=1; i<=100; i++) {
            const isDone = i <= prog;
            const isLocked = i > 5; // 5 مراحل فقط مفتوحة حالياً
            const card = document.createElement('div');
            card.className = `lvl-bubble ${isDone ? 'done' : ''} ${isLocked ? 'lvl-locked' : ''} ${i === prog + 1 ? 'active-now' : ''}`;
            card.innerHTML = isLocked ? '<span class="lock-icon">🔒</span>' : (isDone ? '✅' : i);
            if(!isLocked) card.onclick = () => Game.start(i, world);
            else card.onclick = () => alert("هذه المرحلة ستفتحها المعلمة لبنى قريباً بمفاجأة منوعة!");
            render.appendChild(card);
        }
        this.nav('p-map');
    },

    renderLeaderboard() {
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const sorted = db.sort((a,b) => b.stars - a.stars);
        document.getElementById('leader-list').innerHTML = sorted.map((s, i) => `
            <div class="bg-white rounded-[35px] p-6 flex justify-between items-center ${s.code===this.user.code?'border-4 border-pink-400':''}">
                <div class="flex items-center gap-6">
                    <span class="text-4xl font-black text-blue-300 w-10">#${i+1}</span>
                    <span class="text-6xl">${s.avatar || '👤'}</span>
                    <span class="text-2xl font-black">${s.name} <span class="text-4xl ml-2">${s.equipped || ''}</span></span>
                </div>
                <div class="text-4xl font-black text-amber-500">${s.stars} ⭐</div>
            </div>
        `).join('');
    }
};

/**
 * 🎮 محرك الألعاب التعليمية (5 ألعاب منوعة ومترابطة)
 */
const Game = {
    active: false, lvl: 1, world: '', score: 0, target: null, loop: null,

    // بيانات الألعاب (الحساب: 0-20 جمع وطرح)
    mathQuestions: [
        {q:'5 + 5 = ?', a:10}, {q:'10 - 4 = ?', a:6}, {q:'15 + 2 = ?', a:17}, {q:'20 - 5 = ?', a:15}, {q:'7 + 8 = ?', a:15}
    ],
    // بيانات الألعاب (العربي: مقاطع وكلمات)
    arabicQuestions: [
        {q:'مَـ + دْرَ + سَـ + ة = ?', a:'مدرسة'}, {q:'بَـ + يْـ + ت = ?', a:'بيت'}, {q:'أ + سَـ + د = ?', a:'أسد'}, {q:'قَـ + لَـ + م = ?', a:'قلم'}, {q:'كِـ + تـ + ا + ب = ?', a:'كتاب'}
    ],

    start(lvl, world) {
        this.lvl = lvl; this.world = world; this.score = 0; this.active = true;
        document.getElementById('game-arena').style.display = 'block';
        document.getElementById('g-canvas').innerHTML = '';
        this.nextQuestion();
    },

    nextQuestion() {
        const arena = document.getElementById('g-canvas');
        arena.innerHTML = ''; // تنظيف الأجسام السابقة
        const taskDisplay = document.getElementById('g-task');
        document.getElementById('g-score').innerText = `⭐ ${this.score} / 5`;

        // تنويع الألعاب الـ 5 بناءً على المستوى أو عشوائياً
        const gameType = Math.floor(Math.random() * 5); // اختيار عشوائي للنوع
        
        // جلب السؤال
        const source = this.world === 'math' ? this.mathQuestions : this.arabicQuestions;
        const qData = source[Math.floor(Math.random()*source.length)];
        this.target = qData.a;
        taskDisplay.innerText = qData.q;

        clearInterval(this.loop); // إيقاف الحلقات السابقة

        if(gameType === 0) this.mode_popBubble();   // 1. الفقاعات الصاعدة
        else if(gameType === 1) this.mode_catchItem(); // 2. صيد العناصر الساقطة
        else if(gameType === 2) this.mode_whackItem(); // 3. ضرب العنصر الظاهر
        else if(gameType === 3) this.mode_slideItem(); // 4. انزلاق العنصر لمكانه
        else this.mode_mysteryBox();                   // 5. الصناديق الغامضة
    },

    // اللعبة 1: الفقاعات الصاعدة (Pop the Bubble)
    mode_popBubble() {
        this.loop = setInterval(() => {
            if(!this.active) return;
            const b = document.createElement('div');
            const isRight = Math.random() > 0.6;
            const content = isRight ? this.target : (this.world==='math'?Math.floor(Math.random()*50):'بحر');
            
            b.className = "game-target flex items-center justify-center bg-white rounded-full shadow-xl text-3xl font-black transition-all";
            b.style.width = "100px"; b.style.height = "100px"; b.style.border = "6px solid #a2d2ff";
            b.innerText = content;
            b.style.left = Math.random() * (window.innerWidth - 100) + "px";
            b.style.bottom = "-120px";
            document.getElementById('g-canvas').appendChild(b);

            gsap.to(b, {
                y: -(window.innerHeight + 200),
                duration: 5 - (this.lvl * 0.01),
                ease: "none",
                onComplete: () => b.remove()
            });

            b.onclick = () => { if(content == this.target) this.hit(b); else this.miss(b); };
        }, 1100);
    },

    // اللعبة 2: صيد العناصر الساقطة (Catch the Fall)
    mode_catchItem() {
        this.loop = setInterval(() => {
            const item = document.createElement('div');
            const isRight = Math.random() > 0.6;
            const content = isRight ? this.target : '💣';
            item.className = "game-target text-9xl p-4 transition-transform";
            item.innerText = isRight ? '🌟' : '💣'; // شكل جمالي للصف الأول
            item.style.left = Math.random() * 80 + "%";
            item.style.top = "-200px";
            document.getElementById('g-canvas').appendChild(item);

            gsap.to(item, {
                y: window.innerHeight + 300,
                duration: 4 - (this.lvl * 0.01),
                ease: "none",
                onComplete: () => item.remove()
            });

            item.onclick = () => { if(isRight) this.hit(item); else this.miss(item); };
        }, 1200);
    },

    // اللعبة 3: ضرب العنصر الظاهر (Whack-a-Mole)
    mode_whackItem() {
        const createMole = () => {
            if(!this.active) return;
            const mole = document.createElement('div');
            mole.className = "game-target w-40 h-40 bg-yellow-400 rounded-full border-8 border-white shadow-2xl flex items-center justify-center text-7xl active:scale-90 transition";
            mole.innerText = '⭐';
            mole.style.left = Math.random()*70 + 15 + "%";
            mole.style.top = Math.random()*60 + 20 + "%";
            document.getElementById('g-canvas').appendChild(mole);
            
            gsap.from(mole, {scale:0, duration:0.3});
            
            mole.onclick = () => { this.hit(mole); clearInterval(moleInterval); };
            
            setTimeout(() => { mole.remove(); }, 1500 - (this.lvl*10));
        }
        createMole();
        const moleInterval = setInterval(createMole, 2000 - (this.lvl*10));
        this.loop = moleInterval;
    },

    // اللعبة 4: انزلاق العنصر لمكانه (Slider)
    mode_slideItem() {
        const item = document.createElement('div');
        item.className = "game-target px-12 py-6 bg-emerald-400 text-white rounded-[40px] text-6xl font-black";
        item.innerText = this.target;
        item.style.left = "10%"; item.style.top = "50%";
        document.getElementById('g-canvas').appendChild(item);
        
        // مجرد انزلاق بسيط لللمس
        gsap.to(item, {x: window.innerWidth * 0.7, duration:3, repeat:-1, yoyo:true, ease:"power1.inOut"});
        item.onclick = () => this.hit(item);
    },

    // اللعبة 5: الصناديق الغامضة (Mystery Boxes)
    mode_mysteryBox() {
        for(let i=0; i<3; i++) {
            const box = document.createElement('div');
            box.className = "game-target w-56 h-56 bg-pink-400 rounded-[40px] border-8 border-white flex items-center justify-center text-8xl";
            box.innerText = "🎁";
            box.style.top = "40%";
            box.style.left = (20 + i*25) + "%";
            document.getElementById('g-canvas').appendChild(box);
            box.onclick = () => {
                if(Math.random() > 0.5) { box.innerText = "⭐"; this.hit(box); }
                else { box.innerText = "💨"; gsap.to(box, {opacity:0, scale:0, duration:0.5}); }
            };
        }
    },

    hit(el) {
        this.score++; 
        if(el) {
            gsap.to(el, {scale: 1.5, opacity: 0, duration: 0.3, onComplete: () => el.remove()});
        }
        confetti({ particleCount: 30, spread: 50 });
        if(this.score >= 5) this.win();
        else {
            clearInterval(this.loop);
            this.nextQuestion();
        }
    },

    miss(el) {
        gsap.to(el, {x: "+=20", yoyo: true, repeat: 3, duration: 0.05, border: "6px solid red"});
    },

    win() {
        this.active = false; clearInterval(this.loop);
        confetti({ particleCount: 400, spread: 150 });
        
        App.user.stars += 50; App.user.coins += 200;
        if(App.user.progress[this.world] < this.lvl) App.user.progress[this.world] = this.lvl;
        App.sync();
        
        setTimeout(() => {
            document.getElementById('game-arena').style.display = 'none';
            App.openMap(this.world);
        }, 2000);
    },

    quit() { this.active = false; clearInterval(this.loop); document.getElementById('game-arena').style.display = 'none'; }
};
</script>
</body>
</html>
