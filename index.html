<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>موقع الصف الأول ب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #6366f1; }
        body { font-family: 'Cairo', sans-serif; transition: background 0.4s ease; -webkit-tap-highlight-color: transparent; }
        
        /* الوضع الفاتح */
        body.light { background-color: #f8fafc; color: #0f172a; }
        .light .card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .light .glass-nav { background: rgba(255, 255, 255, 0.8); border-bottom: 1px solid #e2e8f0; }

        /* الوضع الداكن */
        body.dark { background-color: #020617; color: #f1f5f9; }
        .dark .card { background: #0f172a; border: 1px solid #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dark .glass-nav { background: rgba(15, 23, 42, 0.8); border-bottom: 1px solid #1e293b; }

        .glass-nav { backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 1000; }
        
        .hero-text { background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; color: transparent; }
        
        .page { display: none; }
        .active-page { display: block; animation: fadeInUp 0.5s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-main { background: var(--accent); color: white; transition: 0.3s; }
        .btn-main:hover { opacity: 0.9; transform: translateY(-2px); }

        /* شريط التنقل السفلي */
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; border-radius: 2rem; display: flex; justify-content: space-around; padding: 12px; z-index: 1001; }
        .nav-link { opacity: 0.4; transition: 0.3s; cursor: pointer; font-size: 1.5rem; }
        .nav-link.active { opacity: 1; transform: scale(1.2); color: var(--accent); }
    </style>
</head>
<body class="dark">

    <div id="loginGate" class="min-h-screen flex items-center justify-center p-6">
        <div class="card p-10 rounded-[2.5rem] w-full max-w-sm text-center">
            <h1 class="text-3xl font-900 mb-2 hero-text font-black">موقع الصف الأول ب</h1>
            <p class="text-sm opacity-50 mb-8 font-bold">مدرسة ابن رشد الابتدائية</p>
            
            <div class="space-y-4">
                <input type="text" id="userInput" placeholder="اسم المستخدم" class="w-full p-4 rounded-2xl bg-slate-500/10 border-none outline-none text-center font-bold focus:ring-2 ring-indigo-500">
                <input type="password" id="passInput" placeholder="كلمة السر" class="w-full p-4 rounded-2xl bg-slate-500/10 border-none outline-none text-center font-bold focus:ring-2 ring-indigo-500">
                <button id="submitLogin" class="w-full btn-main py-4 rounded-2xl font-black text-lg shadow-lg">دخول 🚀</button>
            </div>
            <button onclick="toggleTheme()" class="mt-6 text-xs opacity-30 font-bold uppercase tracking-widest">تبديل المظهر 🌓</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="glass-nav p-4">
            <div class="max-w-4xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3 cursor-pointer" onclick="openProfile()">
                    <div class="w-10 h-10 rounded-full bg-indigo-500 flex items-center justify-center text-white">👤</div>
                    <p id="navName" class="font-bold text-sm"></p>
                </div>
                <button onclick="toggleTheme()" class="text-xl">🌓</button>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto px-6 pt-8 pb-32">
            <section id="homePage" class="page active-page space-y-12">
                <div class="py-12 text-center">
                    <h2 class="text-5xl font-black hero-text mb-4">أهلاً بكم أبطالنا</h2>
                    <p class="opacity-60 font-bold">كل يوم هو مغامرة جديدة في مدرسة ابن رشد</p>
                </div>

                <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

                <div class="space-y-6">
                    <h3 class="text-xl font-black border-r-4 border-indigo-500 pr-3">💎 الطلاب المتميزون</h3>
                    <div id="starsGrid" class="grid grid-cols-3 sm:grid-cols-5 gap-4"></div>
                </div>
            </section>

            <section id="hwPage" class="page space-y-6">
                <h2 class="text-3xl font-black hero-text text-center">الوظائف والمهام</h2>
                <div id="hwArea" class="space-y-4 text-right"></div>
            </section>

            <section id="eventsPage" class="page space-y-12">
                <h2 class="text-3xl font-black hero-text text-center">معرض الفعاليات</h2>
                <div id="eventsArea" class="space-y-16"></div>
            </section>
        </main>

        <div class="bottom-nav card border-none shadow-2xl">
            <span onclick="changePage('homePage', this)" class="nav-link active">🏠</span>
            <span onclick="changePage('hwPage', this)" class="nav-link">📚</span>
            <span onclick="changePage('eventsPage', this)" class="nav-link">📸</span>
        </div>
    </div>

    <div id="profileModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center p-6 z-[2000] backdrop-blur-md">
        <div class="card w-full max-w-sm rounded-[2rem] overflow-hidden">
            <div class="p-8 text-center">
                <div class="w-20 h-20 rounded-full bg-indigo-600 mx-auto flex items-center justify-center text-3xl mb-4">👤</div>
                <h2 id="pFullName" class="text-2xl font-black mb-6"></h2>
                <div id="pExams" class="space-y-2 text-right"></div>
                <button onclick="logout()" class="mt-8 text-red-500 font-bold text-xs">خروج</button>
                <button onclick="closeProfile()" class="block w-full mt-4 opacity-20 text-sm">إغلاق</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        window.toggleTheme = () => {
            const isD = document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
            localStorage.setItem('theme_final', isD ? 'dark' : 'light');
        };
        if(localStorage.getItem('theme_final') === 'light') toggleTheme();

        window.changePage = (id, btn) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            btn.classList.add('active');
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        const session = JSON.parse(localStorage.getItem('session_final'));
        if(session) loginOk(session);

        document.getElementById('submitLogin').onclick = async () => {
            const u = document.getElementById('userInput').value.trim();
            const p = document.getElementById('passInput').value.trim();
            const { data } = await supabase.from('students').select('*').eq('username', u).eq('password', p).maybeSingle();
            if(data) { localStorage.setItem('session_final', JSON.stringify(data)); loginOk(data); }
            else alert("بيانات الدخول غير صحيحة");
        };

        function loginOk(user) {
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('navName').innerText = user.full_name;
            loadData();
        }

        async function loadData() {
            const { data: ads } = await supabase.from('assignments').select('*').order('created_at', {ascending: false});
            const { data: stds } = await supabase.from('students').select('*').order('full_name');

            if(ads) {
                document.getElementById('newsGrid').innerHTML = ads.filter(a => a.title && !a.description && !a.image_url).map(a => `<div class="card p-6 rounded-2xl"><p class="font-bold text-lg">${a.title}</p></div>`).join('');
                document.getElementById('hwArea').innerHTML = ads.filter(a => a.description).map(a => `<div class="card p-8 rounded-2xl"><p class="text-xl leading-relaxed">${a.description}</p></div>`).join('');
                document.getElementById('eventsArea').innerHTML = ads.filter(a => a.image_url).map(a => {
                    const isV = a.image_url.includes('mp4');
                    return `<div class="space-y-4"><h4 class="text-xl font-bold text-center">${a.title || ''}</h4><div class="card p-2 rounded-2xl overflow-hidden">${isV ? `<video src="${a.image_url}" controls class="w-full rounded-xl"></video>` : `<img src="${a.image_url}" class="w-full rounded-xl">`}</div></div>`;
                }).join('');
            }
            if(stds) {
                document.getElementById('starsGrid').innerHTML = stds.filter(s => s.is_star).map(s => `<div class="card p-4 rounded-xl text-center"><div class="text-2xl mb-1">💎</div><p class="text-[10px] font-bold opacity-60">${s.full_name.split(' ')[0]}</p></div>`).join('');
            }
        }

        window.openProfile = async () => {
            const u = JSON.parse(localStorage.getItem('session_final'));
            document.getElementById('profileModal').classList.replace('hidden', 'flex');
            document.getElementById('pFullName').innerText = u.full_name;
            const { data } = await supabase.from('exams').select('*').eq('student_id', u.id).order('created_at', {ascending: false});
            document.getElementById('pExams').innerHTML = data.map(e => `<div class="flex justify-between items-center p-3 border-b border-slate-500/10"><span class="text-xs font-bold opacity-50">${e.subject}</span><span class="font-black text-indigo-500">${e.score}</span></div>`).join('') || '<p class="text-center opacity-20 text-xs">لا يوجد نتائج</p>';
        };
        window.closeProfile = () => document.getElementById('profileModal').classList.replace('flex', 'hidden');
        window.logout = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
</html>
