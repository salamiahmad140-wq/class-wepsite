<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة النجوم | مدرسة ابن رشد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --s: #a855f7; --t: #ec4899; }
        body { font-family: 'Cairo', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* تأثير النيون المتنفس */
        @keyframes breathing { 0%, 100% { box-shadow: 0 0 20px rgba(99,102,241,0.2); } 50% { box-shadow: 0 0 40px rgba(168,85,247,0.4); } }
        
        body.dark { background: #020617; color: #e2e8f0; }
        body.light { background: #f0f4f8; color: #1e293b; }

        .glass-panel { backdrop-filter: blur(25px) saturate(180%); background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); }
        .light .glass-panel { background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(0,0,0,0.05); }

        .hero-title { background: linear-gradient(to right, #818cf8, #c084fc, #f472b6); -webkit-background-clip: text; color: transparent; animation: hue 5s infinite linear; }
        @keyframes hue { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }

        .btn-premium { background: linear-gradient(45deg, var(--p), var(--s)); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden; }
        .btn-premium:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 20px 40px rgba(99,102,241,0.4); }
        
        .page { display: none; transform-origin: top; }
        .active-page { display: block; animation: zoomIn 0.6s ease-out forwards; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .star-card { position: relative; border-radius: 2rem; padding: 2rem; transition: 0.5s; cursor: pointer; }
        .star-card::before { content: ''; position: absolute; inset: -2px; background: linear-gradient(45deg, var(--p), var(--s), var(--t)); border-radius: 2.1rem; z-index: -1; opacity: 0; transition: 0.5s; }
        .star-card:hover::before { opacity: 1; filter: blur(10px); }
        
        /* شريط التنقل السفلي الاحترافي */
        .dock { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border-radius: 2.5rem; display: flex; justify-content: space-between; padding: 10px 30px; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="dark">

    <div id="loginGate" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass-panel p-12 rounded-[3.5rem] w-full max-w-md border-white/5 text-center relative overflow-hidden">
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-purple-600/20 blur-[100px]"></div>
            <h1 class="text-4xl font-black mb-2 hero-title">منصة النجوم</h1>
            <p class="text-indigo-400 font-bold mb-10 text-xs tracking-[0.3em] uppercase">ابن رشد الابتدائية</p>
            
            <div class="space-y-4">
                <input type="text" id="userInput" placeholder="اسم البطل" class="w-full p-5 rounded-2xl bg-white/5 border border-white/10 outline-none font-bold focus:border-indigo-500 transition-all text-center">
                <input type="password" id="passInput" placeholder="كلمة السر" class="w-full p-5 rounded-2xl bg-white/5 border border-white/10 outline-none font-bold focus:border-indigo-500 transition-all text-center">
                <button id="submitLogin" class="btn-premium w-full text-white py-5 rounded-2xl font-black text-xl shadow-xl">انطلاق 🚀</button>
            </div>
            <p class="mt-8 text-[10px] opacity-30 font-bold">الصف الأول ب - نسخة 2026</p>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="p-6 sticky top-0 z-50 glass-panel border-b border-white/5">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4 group cursor-pointer" onclick="openProfile()">
                    <div class="w-12 h-12 rounded-xl btn-premium flex items-center justify-center text-white text-xl">👤</div>
                    <div class="text-right">
                        <p id="navName" class="font-black text-sm">البطل المبدع</p>
                        <p class="text-[8px] opacity-50 uppercase tracking-tighter">الحساب الشخصي</p>
                    </div>
                </div>
                <button onclick="toggleTheme()" class="w-12 h-12 glass-panel rounded-xl flex items-center justify-center text-xl">🌓</button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-6 pt-10 pb-40">
            <section id="homePage" class="page active-page space-y-20">
                <div class="relative py-20 px-10 rounded-[4rem] overflow-hidden text-center glass-panel">
                    <div class="absolute inset-0 bg-gradient-to-br from-indigo-600/20 to-purple-600/20"></div>
                    <h1 class="text-5xl md:text-7xl font-black mb-6 hero-title leading-tight">فضاء الصف الأول "ب"</h1>
                    <p class="text-xl font-bold opacity-70">مدرسة ابن رشد الابتدائية - بإشراف لبنى سلامي</p>
                </div>

                <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>

                <div class="space-y-10">
                    <h3 class="text-3xl font-black flex items-center gap-4">💎 الطلاب المتميزون <span class="h-px flex-1 bg-white/10"></span></h3>
                    <div id="starsGrid" class="grid grid-cols-2 md:grid-cols-5 gap-6"></div>
                </div>
            </section>

            <section id="hwPage" class="page space-y-10 text-center">
                <h2 class="text-6xl font-black hero-title">ركن الوظائف</h2>
                <div id="hwArea" class="grid gap-8 text-right"></div>
            </section>

            <section id="eventsPage" class="page space-y-20">
                <h2 class="text-6xl font-black text-center hero-title">معرض الصور</h2>
                <div id="eventsArea" class="space-y-32"></div>
            </section>
        </main>

        <div class="dock">
            <button onclick="changePage('homePage', 'الرئيسية', this)" class="text-3xl text-indigo-500 transition-all scale-125">🏠</button>
            <button onclick="changePage('hwPage', 'الوظائف', this)" class="text-3xl opacity-30 transition-all hover:scale-110">📚</button>
            <button onclick="changePage('eventsPage', 'الفعاليات', this)" class="text-3xl opacity-30 transition-all hover:scale-110">📸</button>
        </div>
    </div>

    <div id="profileModal" class="fixed inset-0 bg-black/90 hidden items-center justify-center p-4 z-[2000] backdrop-blur-2xl">
        <div class="glass-panel w-full max-w-sm rounded-[4rem] overflow-hidden border-white/20">
            <div class="h-40 bg-gradient-to-br from-indigo-600 to-purple-700 relative">
                <div class="absolute -bottom-10 left-1/2 -translate-x-1/2 w-28 h-28 rounded-3xl bg-slate-900 border-4 border-slate-900 flex items-center justify-center text-5xl shadow-2xl">👤</div>
            </div>
            <div class="pt-16 pb-12 px-10 text-center">
                <h2 id="pFullName" class="text-2xl font-black mb-8"></h2>
                <div class="space-y-3 text-right">
                    <p class="text-xs font-black text-indigo-400 border-r-2 border-indigo-500 pr-2">آخر العلامات:</p>
                    <div id="pExams" class="space-y-2 max-h-48 overflow-y-auto pr-2"></div>
                </div>
                <button onclick="logout()" class="mt-12 text-red-400 font-black text-[10px] tracking-widest opacity-50 hover:opacity-100">تسجيل الخروج</button>
                <button onclick="closeProfile()" class="block w-full mt-4 font-bold opacity-20">إغلاق</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        // نظام المظهر
        window.toggleTheme = () => {
            const d = document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
            localStorage.setItem('lubna_theme', d ? 'dark' : 'light');
        };
        if(localStorage.getItem('lubna_theme') === 'light') toggleTheme();

        // التنقل السلس
        window.changePage = (id, title, btn) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.dock button').forEach(b => { b.classList.add('opacity-30'); b.classList.remove('scale-125', 'text-indigo-500'); });
            btn.classList.remove('opacity-30'); btn.classList.add('scale-125', 'text-indigo-500');
            window.scrollTo(0,0);
        };

        // الدخول الذكي
        const sess = JSON.parse(localStorage.getItem('lubna_session'));
        if(sess) loginOk(sess);

        document.getElementById('submitLogin').onclick = async () => {
            const u = document.getElementById('userInput').value.trim();
            const p = document.getElementById('passInput').value.trim();
            const { data, error } = await supabase.from('students').select('*').eq('username', u).eq('password', p).maybeSingle();
            if(data) { localStorage.setItem('lubna_session', JSON.stringify(data)); loginOk(data); }
            else alert("عذراً بطلنا.. تأكد من اسم المستخدم وكلمة السر");
        };

        function loginOk(user) {
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('navName').innerText = user.full_name;
            loadData();
        }

        async function loadData() {
            const { data: ads } = await supabase.from('assignments').select('*').order('created_at', {ascending: false});
            const { data: stds } = await supabase.from('students').select('*').order('full_name');

            document.getElementById('newsGrid').innerHTML = ads.filter(a => a.title && !a.description && !a.image_url).map(a => `
                <div class="glass-panel p-10 rounded-[3rem] border-r-8 border-indigo-500 hover:rotate-1 transition-all">
                    <span class="text-indigo-400 font-black text-[10px] block mb-2 uppercase">إعلان هام</span>
                    <p class="text-2xl font-black">${a.title}</p>
                </div>
            `).join('');

            document.getElementById('hwArea').innerHTML = ads.filter(a => a.description).map(a => `
                <div class="glass-panel p-12 rounded-[4rem] hover:bg-white/5 transition-colors">
                    <p class="text-3xl font-black leading-relaxed">${a.description}</p>
                </div>
            `).join('');

            document.getElementById('eventsArea').innerHTML = ads.filter(a => a.image_url).map(a => {
                const isV = a.image_url.includes('mp4') || a.image_url.includes('youtu');
                return `
                <div class="max-w-4xl mx-auto space-y-8">
                    <h4 class="text-4xl font-black text-center hero-title">${a.title || ''}</h4>
                    <div class="rounded-[4rem] overflow-hidden shadow-2xl glass-panel p-4">
                        ${isV ? `<video src="${a.image_url}" controls class="w-full rounded-[3rem]"></video>` : `<img src="${a.image_url}" class="w-full rounded-[3rem]">`}
                    </div>
                </div>`;
            }).join('');

            document.getElementById('starsGrid').innerHTML = stds.filter(s => s.is_star).map(s => `
                <div class="glass-panel p-8 rounded-[2.5rem] text-center star-card">
                    <div class="text-4xl mb-2">💎</div>
                    <p class="font-black text-xs">${s.full_name.split(' ')[0]}</p>
                </div>
            `).join('');
        }

        window.openProfile = async () => {
            const u = JSON.parse(localStorage.getItem('lubna_session'));
            document.getElementById('profileModal').classList.replace('hidden', 'flex');
            document.getElementById('pFullName').innerText = u.full_name;
            const { data } = await supabase.from('exams').select('*').eq('student_id', u.id).order('created_at', {ascending: false});
            document.getElementById('pExams').innerHTML = data.map(e => `
                <div class="flex justify-between items-center glass-panel p-4 rounded-2xl">
                    <span class="font-black text-xs opacity-50">${e.subject}</span>
                    <span class="bg-indigo-600 text-white px-5 py-1 rounded-full font-black text-xs">${e.score}</span>
                </div>
            `).join('') || '<p class="text-center opacity-20 text-xs italic">لا توجد بيانات</p>';
        };
        window.closeProfile = () => document.getElementById('profileModal').classList.replace('flex', 'hidden');
        window.logout = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
</html>
