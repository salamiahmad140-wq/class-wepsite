<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أساطير لبنى | Omniverse 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Fredoka:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --c-main: #6366f1; --c-acc: #f59e0b; --bg: #f8fafc; }
        * { user-select: none; font-family: 'Fredoka', 'Cairo', sans-serif; box-sizing: border-box; }
        body { background: var(--bg); margin: 0; overflow: hidden; height: 100vh; color: #1e293b; }

        /* الانتقالات والواجهات */
        .view { position: absolute; inset: 0; display: none; flex-direction: column; z-index: 10; background: var(--bg); overflow-y: auto; overflow-x: hidden; }
        .view-active { display: flex; animation: fadeUp 0.5s ease-out both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* التصميم الطفولي الرهيب */
        .bouncy-card { background: white; border-radius: 40px; box-shadow: 0 20px 0 #e2e8f0; border: 8px solid white; transition: 0.3s; cursor: pointer; }
        .bouncy-card:active { transform: translateY(15px); box-shadow: 0 5px 0 #e2e8f0; }

        /* شبكة الـ 100 مرحلة */
        .mega-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 25px; padding: 40px; }
        .node { aspect-ratio: 1; border-radius: 35px; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; box-shadow: 0 10px 0 #cbd5e1; position: relative; }
        .node-locked { filter: grayscale(1); opacity: 0.5; pointer-events: none; }
        .node-locked::before { content: '🔒'; position: absolute; font-size: 2rem; }
        .node-done::after { content: '⭐'; position: absolute; top: -10px; right: -10px; font-size: 2rem; }

        /* الألعاب */
        .game-zone { flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .draggable { cursor: grab; transition: transform 0.2s; }
        .draggable:active { cursor: grabbing; transform: scale(1.1); }

        /* شريط التنقل */
        .magic-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 15px 40px; border-radius: 100px; display: flex; gap: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); z-index: 999; }
        .nav-ico { font-size: 2.5rem; opacity: 0.4; cursor: pointer; transition: 0.3s; }
        .nav-ico.active { opacity: 1; transform: translateY(-10px) scale(1.2); }
    </style>
</head>
<body>

    <div id="v-login" class="view view-active bg-gradient-to-br from-indigo-500 to-purple-600 justify-center items-center">
        <div class="text-center text-white w-full max-w-lg">
            <h1 class="text-[100px] font-black drop-shadow-2xl leading-none mb-4">أساطير<br>لبنى</h1>
            <p class="text-2xl font-bold mb-12 opacity-80 tracking-widest">الموسم الأسطوري</p>
            
            <div class="bg-white/10 p-10 rounded-[50px] backdrop-blur-md border-4 border-white/20 shadow-2xl">
                <input type="text" id="login-code" placeholder="أدخل كودك هنا" class="w-full bg-white/90 text-indigo-900 text-center text-4xl p-6 rounded-[30px] font-black outline-none mb-8">
                <button onclick="App.login()" class="w-full bg-amber-400 text-indigo-900 py-6 rounded-[30px] text-3xl font-black shadow-[0_10px_0_#b45309] active:translate-y-2 active:shadow-none transition-all">دخول الأبطال 🚀</button>
            </div>
        </div>
    </div>

    <div id="v-profile" class="view bg-slate-50 p-10">
        <div class="max-w-4xl mx-auto w-full mt-20">
            <div class="bg-white p-12 rounded-[60px] shadow-2xl text-center border-t-[20px] border-indigo-500 relative">
                <div id="p-avatar" class="text-[120px] bg-indigo-50 w-48 h-48 rounded-full flex items-center justify-center mx-auto -mt-32 shadow-xl border-8 border-white">🐱</div>
                <h2 id="p-name" class="text-6xl font-black text-indigo-900 mt-6">الاسم</h2>
                <p id="p-code-disp" class="text-2xl text-slate-400 font-mono mt-2 mb-10">CODE</p>
                
                <div class="grid grid-cols-2 gap-8">
                    <div class="bg-amber-50 p-8 rounded-[40px]">
                        <div class="text-slate-500 text-xl font-bold mb-2">رصيد الذهب</div>
                        <div id="p-coins" class="text-5xl font-black text-amber-500">0 💰</div>
                    </div>
                    <div class="bg-blue-50 p-8 rounded-[40px]">
                        <div class="text-slate-500 text-xl font-bold mb-2">نجوم التميز</div>
                        <div id="p-stars" class="text-5xl font-black text-blue-500">0 ⭐</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="v-worlds" class="view bg-sky-50 p-10">
        <h2 class="text-6xl font-black text-center text-slate-800 mt-10 mb-16">عوالم التعلم 🪐</h2>
        <div class="flex justify-center gap-10 max-w-5xl mx-auto">
            <div onclick="App.openMap('math')" class="bouncy-card flex-1 p-16 text-center border-blue-400 border-b-[15px]">
                <div class="text-[120px]">🧮</div><h3 class="text-4xl font-black text-blue-600 mt-6">عالم الحساب</h3>
            </div>
            <div onclick="App.openMap('arabic')" class="bouncy-card flex-1 p-16 text-center border-emerald-400 border-b-[15px]">
                <div class="text-[120px]">📖</div><h3 class="text-4xl font-black text-emerald-600 mt-6">عالم العربية</h3>
            </div>
        </div>
    </div>

    <div id="v-map" class="view bg-white p-10">
        <div class="flex justify-between items-center mb-10 max-w-7xl mx-auto w-full">
            <h2 id="map-title" class="text-6xl font-black text-indigo-900">المراحل</h2>
            <button onclick="App.nav('v-worlds')" class="text-4xl bg-slate-100 p-4 rounded-full">🔙</button>
        </div>
        <div id="map-grid" class="mega-grid max-w-7xl mx-auto w-full pb-32"></div>
    </div>

    <div id="v-game" class="view bg-slate-900 overflow-hidden">
        <div class="absolute top-8 inset-x-8 flex justify-between z-50 pointer-events-none">
            <div class="bg-white/90 p-6 rounded-3xl pointer-events-auto shadow-xl flex items-center gap-6">
                <div class="text-4xl font-black text-indigo-600" id="g-level">1</div>
                <div>
                    <div id="g-instruction" class="text-2xl font-black text-slate-800">التعليمات هنا</div>
                    <div class="text-slate-400 font-bold">ركز جيداً يا بطل</div>
                </div>
            </div>
            <button onclick="App.nav('v-map')" class="bg-red-500 text-white p-6 rounded-3xl text-3xl pointer-events-auto shadow-xl hover:bg-red-600">خروج ❌</button>
        </div>
        <div id="game-stage" class="game-zone text-white"></div>
    </div>

    <div id="v-store" class="view bg-pink-50 p-10 pb-40">
        <h2 class="text-7xl font-black text-center text-pink-500 mt-10 mb-16">متجر العجائب 🛍️</h2>
        <div id="store-items" class="grid grid-cols-4 gap-8 max-w-7xl mx-auto"></div>
    </div>

    <div id="v-rank" class="view bg-amber-50 p-10 pb-40">
        <h2 class="text-7xl font-black text-center text-amber-600 mt-10 mb-16">أساطير الصف 🏆</h2>
        <div id="rank-list" class="max-w-4xl mx-auto space-y-6"></div>
    </div>

    <div id="v-admin" class="view bg-slate-100 p-10 pb-40">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center bg-white p-10 rounded-[40px] shadow-lg mb-10">
                <h1 class="text-5xl font-black text-indigo-900">غرفة القائدة لبنى 👑</h1>
                <button onclick="Admin.add()" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl text-xl font-black shadow-lg">إضافة بطل +</button>
            </div>
            <div class="bg-white rounded-[40px] shadow-lg overflow-hidden">
                <table class="w-full text-right text-xl">
                    <thead class="bg-slate-50"><tr class="border-b">
                        <th class="p-6">البطل</th><th class="p-6">الكود الدائم</th><th class="p-6">المراحل (حساب/عربي)</th><th class="p-6">التحكم</th>
                    </tr></thead>
                    <tbody id="admin-tbody"></tbody>
                </table>
            </div>
            <button onclick="App.nav('v-login')" class="mt-10 text-slate-400 font-bold">تسجيل الخروج</button>
        </div>
    </div>

    <nav id="navbar" class="magic-nav hidden">
        <div class="nav-ico active" onclick="App.nav('v-profile', this)">👤</div>
        <div class="nav-ico" onclick="App.nav('v-worlds', this)">🪐</div>
        <div class="nav-ico" onclick="App.nav('v-store', this)">🛍️</div>
        <div class="nav-ico" onclick="App.nav('v-rank', this)">🏆</div>
        <div class="nav-ico" onclick="App.nav('v-admin', this)">⚙️</div>
    </nav>

<script>
    // ==========================================
    // 🏦 قاعدة البيانات الدائمة (Permanent DB)
    // ==========================================
    const DB = {
        save: (d) => localStorage.setItem('LUBNA_OMNI_DB', JSON.stringify(d)),
        load: () => JSON.parse(localStorage.getItem('LUBNA_OMNI_DB')) || [],
        store: [
            { id:1, n:'تاج الملك', i:'👑', p:200 }, { id:2, n:'خوذة فضاء', i:'🚀', p:500 },
            { id:3, n:'أرنب سريع', i:'🐰', p:150 }, { id:4, n:'رداء خارق', i:'🦸', p:1000 },
            { id:5, n:'نظارة ذكية', i:'🕶️', p:100 }, { id:6, n:'ساحر', i:'🧙', p:800 }
        ]
    };

    // ==========================================
    // 🧠 النواة (Core System)
    // ==========================================
    const App = {
        user: null, currentWorld: 'math',

        login() {
            const code = document.getElementById('login-code').value.trim().toUpperCase();
            const students = DB.load();
            const u = students.find(s => s.code === code);
            if(u) {
                this.user = u;
                document.getElementById('navbar').classList.remove('hidden');
                this.nav('v-profile', document.querySelectorAll('.nav-ico')[0]);
                this.sync();
            } else alert("الكود غير صحيح! راجع الأستاذة لبنى.");
        },

        sync() {
            // تحديث الواجهات بالبيانات
            document.getElementById('p-name').innerText = this.user.name;
            document.getElementById('p-code-disp').innerText = "الكود: " + this.user.code;
            document.getElementById('p-avatar').innerText = this.user.avatar || '🐱';
            document.getElementById('p-coins').innerText = this.user.coins + " 💰";
            document.getElementById('p-stars').innerText = this.user.stars + " ⭐";
            
            // حفظ في القاعدة
            const students = DB.load();
            const idx = students.findIndex(s => s.code === this.user.code);
            if(idx > -1) { students[idx] = this.user; DB.save(students); }
        },

        nav(id, el=null) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('view-active'));
            document.getElementById(id).classList.add('view-active');
            if(el) {
                document.querySelectorAll('.nav-ico').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
            if(id === 'v-store') this.renderStore();
            if(id === 'v-rank') this.renderRank();
            if(id === 'v-admin') Admin.render();
            if(id === 'v-profile') this.sync();
        },

        openMap(w) {
            this.currentWorld = w;
            document.getElementById('map-title').innerText = w === 'math' ? 'جبل الأرقام (100 مرحلة)' : 'وادي الحروف (100 مرحلة)';
            const grid = document.getElementById('map-grid');
            grid.innerHTML = '';
            
            const prog = this.user.progress[w] || 0;
            for(let i=1; i<=100; i++) {
                const isLocked = i > (prog + 1);
                const node = document.createElement('div');
                node.className = `node ${isLocked ? 'node-locked' : ''} ${i <= prog ? 'node-done' : ''}`;
                node.innerText = i;
                if(!isLocked) node.onclick = () => Games.launch(i, w);
                grid.appendChild(node);
            }
            this.nav('v-map');
        },

        renderStore() {
            const grid = document.getElementById('store-items');
            grid.innerHTML = DB.store.map(it => `
                <div class="bouncy-card p-8 text-center" onclick="App.buy('${it.i}', ${it.p})">
                    <div class="text-[80px] mb-4">${it.i}</div>
                    <div class="text-2xl font-black mb-4">${it.n}</div>
                    <div class="bg-pink-100 text-pink-600 py-2 rounded-2xl font-black text-xl">${it.p} 💰</div>
                </div>
            `).join('');
        },

        buy(item, price) {
            if(this.user.coins >= price) {
                this.user.coins -= price;
                this.user.avatar = item;
                this.sync();
                confetti(); alert("مبارك! تم تغيير شخصيتك.");
            } else alert("تحتاج إلى المزيد من الذهب!");
        },

        renderRank() {
            const list = document.getElementById('rank-list');
            const sorted = DB.load().sort((a,b) => b.stars - a.stars);
            list.innerHTML = sorted.map((s, i) => `
                <div class="bg-white p-6 rounded-3xl flex items-center gap-6 shadow-sm border-r-[10px] ${i===0?'border-amber-400':'border-indigo-400'}">
                    <div class="text-3xl font-black opacity-30 w-10">#${i+1}</div>
                    <div class="text-5xl">${s.avatar || '🐱'}</div>
                    <div class="flex-grow text-2xl font-black text-slate-800">${s.name}</div>
                    <div class="text-2xl font-black text-blue-500">${s.stars} ⭐</div>
                </div>
            `).join('');
        }
    };

    // ==========================================
    // 🎮 محركات الألعاب الـ 10 (The 10 Game Engines)
    // ==========================================
    const Games = {
        stage: document.getElementById('game-stage'),
        inst: document.getElementById('g-instruction'),
        lvlNum: 1, world: 'math',

        launch(lvl, w) {
            this.lvlNum = lvl; this.world = w;
            document.getElementById('g-level').innerText = `المرحلة ${lvl}`;
            App.nav('v-game');
            this.stage.innerHTML = '';
            
            // توزيع 10 ألعاب مختلفة على الـ 100 مرحلة باستخدام الموديلو
            const engineType = (lvl % 10) || 10;
            this[`engine_${engineType}`]();
        },

        win() {
            confetti({ particleCount: 150, spread: 80 });
            App.user.coins += 50; App.user.stars += 5;
            if(App.user.progress[this.world] < this.lvlNum) App.user.progress[this.world] = this.lvlNum;
            App.sync();
            this.stage.innerHTML = `<div class="text-8xl font-black text-green-400 animate-bounce">أحسنت يا بطل! 🌟</div>`;
            setTimeout(() => App.openMap(this.world), 2500);
        },

        // --- محرك 1: الاختيار الصحيح ---
        engine_1() {
            const target = this.world === 'math' ? '5' : 'ب';
            this.inst.innerText = `أين هو ${target}؟`;
            const options = this.world === 'math' ? [2,5,8,9] : ['أ','ب','ت','ث'];
            options.sort(() => Math.random() - 0.5);
            
            this.stage.innerHTML = `<div class="flex gap-10">` + options.map(o => 
                `<div onclick="if('${o}'==='${target}') Games.win(); else this.style.opacity=0.2" class="w-40 h-40 bg-white text-indigo-900 rounded-[40px] flex items-center justify-center text-7xl font-black cursor-pointer hover:scale-110 transition shadow-2xl">${o}</div>`
            ).join('') + `</div>`;
        },

        // --- محرك 2: الإكمال (المنطق) ---
        engine_2() {
            this.inst.innerText = "أكمل النمط الناقص";
            const q = this.world === 'math' ? "1 - 2 - 3 - ?" : "أ - ب - ت - ؟";
            const a = this.world === 'math' ? "4" : "ث";
            this.stage.innerHTML = `
                <div class="text-center">
                    <div class="text-7xl font-black mb-20">${q}</div>
                    <div class="flex gap-8 justify-center">
                        <div onclick="Games.win()" class="w-32 h-32 bg-amber-400 rounded-full flex items-center justify-center text-5xl font-black cursor-pointer">${a}</div>
                        <div onclick="this.style.opacity=0.2" class="w-32 h-32 bg-amber-400 rounded-full flex items-center justify-center text-5xl font-black cursor-pointer">${this.world==='math'?'5':'ج'}</div>
                    </div>
                </div>
            `;
        },

        // --- محرك 3: النقر السريع ---
        engine_3() {
            this.inst.innerText = "انقر على الهدف 5 مرات بسرعة!";
            let clicks = 0;
            this.stage.innerHTML = `<div id="target-btn" class="w-60 h-60 bg-pink-500 rounded-full flex items-center justify-center text-[100px] cursor-pointer active:scale-90 transition select-none">🎯</div>`;
            document.getElementById('target-btn').onclick = function() {
                clicks++;
                this.style.transform = `translate(${Math.random()*200-100}px, ${Math.random()*200-100}px)`;
                if(clicks >= 5) Games.win();
            };
        },

        // --- محركات 4 إلى 10 (نماذج مصغرة لتوفير المساحة وتوضيح الفكرة) ---
        engine_4() { this.inst.innerText = "لعبة الذاكرة المطابقة"; this.stage.innerHTML = `<button onclick="Games.win()" class="text-5xl bg-white text-black p-10 rounded-[40px]">تخطي للفوز (محاكاة الذاكرة)</button>`; },
        engine_5() { this.inst.innerText = "لعبة السحب والإفلات"; this.stage.innerHTML = `<button onclick="Games.win()" class="text-5xl bg-white text-black p-10 rounded-[40px]">تخطي للفوز (محاكاة السحب)</button>`; },
        engine_6() { this.inst.innerText = "لعبة العد"; this.stage.innerHTML = `<button onclick="Games.win()" class="text-5xl bg-white text-black p-10 rounded-[40px]">تخطي للفوز (محاكاة العد)</button>`; },
        engine_7() { this.inst.innerText = "لعبة الميزان"; this.stage.innerHTML = `<button onclick="Games.win()" class="text-5xl bg-white text-black p-10 rounded-[40px]">تخطي للفوز (محاكاة الميزان)</button>`; },
        engine_8() { this.inst.innerText = "لعبة الترتيب التصاعدي"; this.stage.innerHTML = `<button onclick="Games.win()" class="text-5xl bg-white text-black p-10 rounded-[40px]">تخطي للفوز (محاكاة الترتيب)</button>`; },
        engine_9() { this.inst.innerText = "لعبة صيد البالونات"; this.stage.innerHTML = `<button onclick="Games.win()" class="text-5xl bg-white text-black p-10 rounded-[40px]">تخطي للفوز (محاكاة البالونات)</button>`; },
        engine_10() { this.inst.innerText = "لعبة المتاهة"; this.stage.innerHTML = `<button onclick="Games.win()" class="text-5xl bg-white text-black p-10 rounded-[40px]">تخطي للفوز (محاكاة المتاهة)</button>`; }
    };

    // ==========================================
    // 👩‍🏫 وحدة الإدارة (Admin Panel)
    // ==========================================
    const Admin = {
        render() {
            const list = document.getElementById('admin-tbody');
            const st = DB.load();
            list.innerHTML = st.map(s => `
                <tr class="border-b">
                    <td class="p-6 font-black">${s.name}</td>
                    <td class="p-6 font-mono text-indigo-600 bg-indigo-50 rounded-xl px-4">${s.code}</td>
                    <td class="p-6 font-bold">ح: ${s.progress.math} | ع: ${s.progress.arabic}</td>
                    <td class="p-6"><button onclick="Admin.del('${s.code}')" class="text-red-500 bg-red-50 px-4 py-2 rounded-xl">حذف</button></td>
                </tr>
            `).join('');
        },
        add() {
            const n = prompt("اكتبي اسم الطالب الجديد:");
            if(n) {
                const db = DB.load();
                const code = "LUB-" + Math.floor(1000 + Math.random()*9000); // كود دائم من 4 أرقام
                db.push({ name: n, code: code, avatar: '🐱', coins: 0, stars: 0, progress: { math: 0, arabic: 0 } });
                DB.save(db);
                this.render();
                alert(`تم إضافة الطالب! الكود الدائم هو: ${code}`);
            }
        },
        del(c) {
            if(confirm("هل أنتِ متأكدة من الحذف؟")) {
                DB.save(DB.load().filter(s => s.code !== c));
                this.render();
            }
        }
    };

    // إضافة طالب تجريبي أول مرة لتسهيل فحص النظام
    if(DB.load().length === 0) {
        DB.save([{ name: "طالب تجريبي", code: "1234", avatar: '🐱', coins: 500, stars: 10, progress: { math: 5, arabic: 2 } }]);
    }
</script>
</body>
</html>
