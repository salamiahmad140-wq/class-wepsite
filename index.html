<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أكاديمية الأساطير | الإصدار العالمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Cairo:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --p-main: #FF3D71; --p-sec: #00D68F; --p-blue: #0095FF; --p-gold: #FFAA00; }
        body { font-family: 'Fredoka', 'Cairo', sans-serif; background: #151A30; overflow: hidden; margin: 0; }
        
        /* تأثيرات حركية فائقة */
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 2px solid rgba(255,255,255,0.1); border-radius: 2.5rem; }
        .game-btn { transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; border-bottom: 8px solid rgba(0,0,0,0.3); }
        .game-btn:active { transform: translateY(4px); border-bottom-width: 2px; }

        /* خريطة العالم المتحركة */
        #world-scroll { overflow-x: auto; scroll-behavior: smooth; white-space: nowrap; height: 100vh; background: url('https://www.transparenttextures.com/patterns/stardust.png'), linear-gradient(135deg, #151A30 0%, #101426 100%); }
        .level-node { display: inline-block; width: 150px; height: 150px; margin: 200px 50px; position: relative; }
        .node-circle { width: 100px; height: 100px; background: white; border-radius: 40%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; box-shadow: 0 15px 40px rgba(0,0,0,0.5); border: 5px solid var(--p-blue); }

        /* الألعاب - نظام الجسيمات */
        #game-arena { background: radial-gradient(circle, #222b45, #151a30); position: relative; overflow: hidden; }
        .particle { position: absolute; pointer-events: none; animation: pop 0.6s ease-out forwards; }
        @keyframes pop { from { transform: scale(0); opacity: 1; } to { transform: scale(3); opacity: 0; } }

        /* لوحة الصدارة */
        .leader-item { background: linear-gradient(90deg, rgba(255,255,255,0.05), transparent); border-radius: 1.5rem; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
        .rank-1 { border-right: 5px solid var(--p-gold); background: rgba(255,170,0,0.1); }
    </style>
</head>
<body>

    <div class="fixed top-0 inset-x-0 p-6 z-[100] flex justify-between items-center pointer-events-none">
        <div class="pointer-events-auto glass-card p-2 pr-6 flex items-center gap-4">
            <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center text-3xl shadow-xl" id="ui-avatar">🦁</div>
            <div>
                <p id="ui-name" class="font-black text-sm text-white">بطل لبنى</p>
                <div class="flex gap-1 text-[10px] text-blue-400 font-bold uppercase"><span id="ui-stars">15</span> ⭐ نجمة</div>
            </div>
        </div>
        <div class="pointer-events-auto flex gap-4">
            <div class="glass-card px-6 py-3 text-yellow-400 font-black flex items-center gap-2">
                <span id="ui-coins">1500</span> <span class="text-xl">💰</span>
            </div>
        </div>
    </div>

    <main class="w-full h-full">
        <section id="scr-login" class="flex flex-col items-center justify-center h-full p-6 text-center">
            <div class="text-[120px] mb-6 animate-bounce">🏰</div>
            <h1 class="text-6xl font-black text-white mb-4">أكاديمية الأساطير</h1>
            <p class="text-white/40 mb-12">مستعدة للمغامرة يا بطلة؟</p>
            <div class="glass-card p-10 w-full max-w-md">
                <input id="login-input" type="text" placeholder="أدخل اسمك أو كودك" class="w-full p-6 rounded-3xl bg-white/5 border-2 border-white/10 text-center text-2xl font-black text-white focus:border-blue-500 mb-6 outline-none">
                <button onclick="bootGame()" class="w-full game-btn bg-blue-500 text-white p-6 rounded-3xl font-black text-2xl shadow-blue-900/50">ابدأ الرحلة 🚀</button>
            </div>
        </section>

        <section id="scr-map" class="hidden h-full">
            <div id="world-scroll">
                <div class="inline-block w-40"></div> <div id="levels-container" class="relative inline-block h-full">
                    </div>
            </div>
        </section>

        <section id="scr-game" class="hidden flex-col h-full">
            <div class="p-10 flex justify-between items-center bg-black/20">
                <button onclick="showScreen('scr-map')" class="text-red-500 font-black">✕ انسحاب</button>
                <div class="text-center">
                    <p class="text-xs text-white/40 uppercase">المهمة</p>
                    <h2 id="target-title" class="text-4xl font-black text-yellow-400">أين رقم 5؟</h2>
                </div>
                <div id="game-timer" class="text-3xl font-black text-blue-500">20</div>
            </div>
            <div id="game-arena" class="flex-grow">
                <div id="frog" class="absolute bottom-10 left-1/2 -translate-x-1/2 text-7xl z-50 transition-all duration-500">🐸</div>
                <div id="lily-pads" class="w-full h-full relative"></div>
            </div>
        </section>

        <section id="scr-leaderboard" class="hidden p-10 pt-32 h-full overflow-y-auto">
            <h2 class="text-5xl font-black text-center mb-10 text-white">لوحة الأبطال 🏆</h2>
            <div class="max-w-2xl mx-auto" id="leader-list">
                </div>
        </section>
    </main>

    <nav id="nav-bar" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-80 h-20 glass-card flex justify-around items-center z-[200] hidden">
        <button onclick="showScreen('scr-map')" class="text-3xl">🗺️</button>
        <button onclick="showScreen('scr-leaderboard')" class="text-3xl">🏆</button>
        <button onclick="alert('المتجر قيد التحديث!')" class="text-3xl">🛍️</button>
    </nav>

    <script>
        let player = { name: '', stars: 0, coins: 0, avatar: '🦁' };

        function showScreen(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'scr-leaderboard') renderLeaderboard();
        }

        function bootGame() {
            const name = document.getElementById('login-input').value;
            if(!name) return;
            player.name = name;
            document.getElementById('ui-name').innerText = name;
            document.getElementById('nav-bar').classList.remove('hidden');
            renderMap();
            showScreen('scr-map');
        }

        function renderMap() {
            const container = document.getElementById('levels-container');
            container.innerHTML = '';
            for(let i=1; i<=100; i++) {
                const node = document.createElement('div');
                node.className = 'level-node';
                node.style.top = (Math.sin(i * 0.5) * 150) + "px";
                node.innerHTML = `
                    <div class="node-circle game-btn" onclick="startLevel(${i})">${i}</div>
                    <div class="absolute -bottom-10 left-1/2 -translate-x-1/2 font-black text-white/20">LEVEL</div>
                `;
                container.appendChild(node);
            }
        }

        function startLevel(lvl) {
            showScreen('scr-game');
            const arena = document.getElementById('lily-pads');
            arena.innerHTML = '';
            const target = Math.floor(Math.random() * 10) + 1;
            document.getElementById('target-title').innerText = `جد الرقم ${target}`;

            // توليد أوراق الشجر كأنها منصات حقيقية
            for(let i=0; i<6; i++) {
                const pad = document.createElement('div');
                pad.className = 'absolute w-32 h-24 bg-green-600 rounded-full flex items-center justify-center text-3xl font-black shadow-2xl cursor-pointer game-btn text-white';
                const val = i === 0 ? target : (target + i + 2);
                pad.innerText = val;
                pad.style.left = (Math.random() * 70 + 10) + "%";
                pad.style.top = (Math.random() * 70 + 10) + "%";
                
                pad.onclick = () => {
                    const frog = document.getElementById('frog');
                    const rect = pad.getBoundingClientRect();
                    frog.style.left = (rect.left + rect.width/2) + "px";
                    frog.style.top = (rect.top - 20) + "px";
                    frog.style.bottom = "auto";
                    frog.style.transform = "translateX(-50%) scale(1.2)";

                    if(val === target) {
                        setTimeout(() => {
                            createExplosion(rect.left, rect.top);
                            player.coins += 50;
                            player.stars += 1;
                            updateUI();
                            alert("أحسنتِ يا بطلة! +50 كوينز 💰");
                            startLevel(lvl);
                        }, 500);
                    } else {
                        setTimeout(() => {
                            frog.style.top = "auto";
                            frog.style.bottom = "40px";
                            frog.style.left = "50%";
                        }, 500);
                    }
                };
                arena.appendChild(pad);
            }
        }

        function createExplosion(x, y) {
            const p = document.createElement('div');
            p.className = 'particle text-4xl';
            p.innerText = "⭐";
            p.style.left = x + "px";
            p.style.top = y + "px";
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
        }

        function updateUI() {
            document.getElementById('ui-coins').innerText = player.coins;
            document.getElementById('ui-stars').innerText = player.stars;
        }

        function renderLeaderboard() {
            const list = document.getElementById('leader-list');
            const mockData = [
                { name: "أمير الأساطير", stars: 150, avatar: "👑" },
                { name: "ليان المبدعة", stars: 120, avatar: "🦋" },
                { name: player.name, stars: player.stars, avatar: "🦁" }
            ].sort((a,b) => b.stars - a.stars);

            list.innerHTML = mockData.map((s, i) => `
                <div class="leader-item ${i===0?'rank-1':''}">
                    <div class="text-3xl font-black text-white/20 w-10">#${i+1}</div>
                    <div class="text-4xl">${s.avatar}</div>
                    <div class="flex-grow text-white font-black text-xl">${s.name}</div>
                    <div class="text-blue-400 font-black">${s.stars} ⭐</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
