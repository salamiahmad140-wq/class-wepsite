<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أساطير الصف الأول ب | إمبراطورية لبنى</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Fredoka:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #fbbf24; --royal: #4f46e5; --dark: #0f172a; }
        * { font-family: 'Fredoka', 'Cairo', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: white; overflow: hidden; height: 100vh; margin: 0; }

        /* الأنظمة الأساسية */
        .page { position: absolute; inset: 0; display: none; flex-direction: column; background: radial-gradient(circle at center, #1e293b, #0f172a); z-index: 10; overflow-y: auto; padding-bottom: 120px; }
        .page-active { display: flex; animation: pageIn 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes pageIn { from { opacity: 0; transform: scale(1.1); filter: blur(10px); } to { opacity: 1; transform: scale(1); filter: blur(0); } }

        /* متجر الإكسسوارات */
        .shop-card { background: rgba(255,255,255,0.05); border: 4px solid rgba(255,255,255,0.1); border-radius: 40px; transition: 0.3s; position: relative; overflow: hidden; }
        .shop-card:hover { border-color: var(--gold); transform: translateY(-10px); background: rgba(255,255,255,0.1); }
        .bought-badge { position: absolute; top: 10px; right: 10px; background: #10b981; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; }

        /* خريطة الـ 200 مرحلة */
        .map-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 20px; padding: 30px; }
        .lvl-btn { aspect-ratio: 1; border-radius: 30px; background: white; color: var(--dark); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; box-shadow: 0 10px 0 #cbd5e1; cursor: pointer; border: 4px solid transparent; }
        .lvl-btn.done { background: #bbf7d0; color: #166534; box-shadow: 0 10px 0 #86efac; }
        .lvl-btn.locked { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        .lvl-btn.current { border-color: var(--gold); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* شريط التحكم السفلي (The Royal Dock) */
        .dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); padding: 15px 40px; border-radius: 100px; display: flex; gap: 40px; border: 1px solid rgba(255,255,255,0.2); z-index: 1000; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .dock-item { font-size: 2.5rem; cursor: pointer; transition: 0.4s; filter: grayscale(1); opacity: 0.5; }
        .dock-item.active { filter: grayscale(0); opacity: 1; transform: translateY(-15px) scale(1.3); }

        /* شاشة اللعب */
        #game-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; }
        .game-target { position: absolute; cursor: pointer; font-size: 5rem; z-index: 10; transition: transform 0.1s linear; }
    </style>
</head>
<body>

    <div id="p-login" class="page page-active justify-center items-center">
        <div class="text-center p-12 bg-white/5 rounded-[60px] border border-white/10 backdrop-blur-3xl w-[90%] max-w-lg">
            <h1 class="text-7xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-b from-amber-200 to-amber-500">أساطير ب</h1>
            <p class="text-2xl text-amber-200/50 mb-10 tracking-[5px]">إمبراطورية لبنى التعليمية</p>
            <input type="text" id="code-in" placeholder="كود البطل" class="w-full text-center text-4xl p-6 rounded-3xl mb-8 bg-white text-indigo-950 font-black outline-none shadow-2xl">
            <button onclick="App.login()" class="w-full py-6 bg-gradient-to-r from-amber-400 to-orange-500 text-indigo-950 rounded-3xl text-4xl font-black shadow-[0_15px_0_#b45309] active:translate-y-2 active:shadow-none transition-all">هيا بنا! 🚀</button>
        </div>
    </div>

    <div id="p-profile" class="page">
        <div class="p-10 flex flex-col items-center">
            <div id="u-avatar-frame" class="relative">
                <div id="u-avatar" class="w-48 h-48 bg-white rounded-full flex items-center justify-center text-[100px] border-8 border-indigo-500 shadow-2xl">👤</div>
                <div id="u-item" class="absolute -top-10 -right-5 text-7xl transform rotate-12"></div>
            </div>
            <h2 id="u-name" class="text-6xl font-black mt-6">...</h2>
            <div class="flex gap-6 mt-8">
                <div class="bg-amber-400 text-indigo-950 px-8 py-3 rounded-2xl text-2xl font-black shadow-xl">💰 <span id="u-coins">0</span></div>
                <div class="bg-blue-500 text-white px-8 py-3 rounded-2xl text-2xl font-black shadow-xl">⭐ <span id="u-stars">0</span></div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-4xl mt-12">
                <div onclick="App.nav('p-worlds')" class="bg-indigo-600 p-8 rounded-[40px] flex items-center gap-6 cursor-pointer border-b-[10px] border-indigo-900 active:translate-y-2 active:border-b-0 transition-all">
                    <span class="text-7xl">🌍</span>
                    <div><h3 class="text-3xl font-black">رحلة الـ 200 مرحلة</h3><p class="opacity-70">ابدأ مغامرتك الآن</p></div>
                </div>
                <div onclick="App.nav('p-shop')" class="bg-purple-600 p-8 rounded-[40px] flex items-center gap-6 cursor-pointer border-b-[10px] border-purple-900 active:translate-y-2 active:border-b-0 transition-all">
                    <span class="text-7xl">🛍️</span>
                    <div><h3 class="text-3xl font-black">متجر الإكسسوارات</h3><p class="opacity-70">زيّن بطلك بالذهب</p></div>
                </div>
            </div>
        </div>
    </div>

    <div id="p-shop" class="page">
        <div class="p-10">
            <h2 class="text-6xl font-black text-center mb-12 text-amber-400">متجر الأساطير الملكي 🛍️</h2>
            <div id="shop-items" class="grid grid-cols-2 md:grid-cols-4 gap-8 max-w-6xl mx-auto">
                </div>
        </div>
    </div>

    <div id="p-leader" class="page">
        <div class="p-10 max-w-4xl mx-auto w-full">
            <h2 class="text-6xl font-black text-center mb-12 text-blue-400">نخبة الصف الأول ب 🏆</h2>
            <div id="leader-list" class="space-y-4"></div>
        </div>
    </div>

    <div id="p-worlds" class="page items-center">
        <h2 class="text-6xl font-black my-16">اختر العالم 🪐</h2>
        <div class="flex flex-wrap justify-center gap-10">
            <div onclick="App.openMap('math')" class="w-80 bg-white p-10 rounded-[50px] text-indigo-900 text-center border-b-[20px] border-blue-400 cursor-pointer">
                <div class="text-[100px] mb-4">🧮</div>
                <h3 class="text-4xl font-black">عالم الحساب</h3>
            </div>
            <div onclick="App.openMap('arabic')" class="w-80 bg-white p-10 rounded-[50px] text-emerald-900 text-center border-b-[20px] border-emerald-400 cursor-pointer">
                <div class="text-[100px] mb-4">📖</div>
                <h3 class="text-4xl font-black">عالم العربية</h3>
            </div>
        </div>
    </div>

    <div id="p-map" class="page">
        <div class="p-8 sticky top-0 bg-dark/90 backdrop-blur-md z-50 flex justify-between">
            <h2 id="map-name" class="text-4xl font-black text-amber-400">الخريطة</h2>
            <button onclick="App.nav('p-worlds')" class="bg-white/10 px-6 py-2 rounded-xl">رجوع</button>
        </div>
        <div id="map-render" class="map-grid"></div>
    </div>

    <div id="game-screen">
        <div class="absolute top-10 inset-x-10 flex justify-between items-center z-[3000]">
            <div id="g-task" class="bg-white px-10 py-5 rounded-3xl text-4xl font-black text-indigo-950 shadow-2xl">...</div>
            <button onclick="Game.quit()" class="bg-red-500 w-16 h-16 rounded-full text-3xl font-bold text-white">X</button>
        </div>
        <div id="g-arena" class="relative w-full h-full overflow-hidden"></div>
    </div>

    <nav id="dock" class="dock hidden">
        <div class="dock-item active" onclick="App.nav('p-profile', this)">👤</div>
        <div class="dock-item" onclick="App.nav('p-worlds', this)">🪐</div>
        <div class="dock-item" onclick="App.nav('p-leader', this)">🏆</div>
        <div class="dock-item" onclick="App.nav('p-shop', this)">👑</div>
    </nav>

<script>
/**
 * 🛠️ المحرك الأساسي (The Empire Core)
 */
const App = {
    dbKey: 'LUBNA_ULTIMATE_V3_2026',
    user: null, currentWorld: 'math',
    items: [
        {id: 1, name: 'تاج ذهبي', emoji: '👑', price: 1000},
        {id: 2, name: 'نظارة أساطير', emoji: '🕶️', price: 500},
        {id: 3, name: 'رداء القوة', emoji: '🧣', price: 800},
        {id: 4, name: 'سيف المعرفة', emoji: '🗡️', price: 1500},
        {id: 5, name: 'خوذة فضائية', emoji: '👨‍🚀', price: 2000},
        {id: 6, name: 'قناع النينجا', emoji: '🥷', price: 1200}
    ],

    login() {
        const code = document.getElementById('code-in').value.trim().toUpperCase();
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const found = db.find(s => s.code === code);
        
        if(found) {
            this.user = found;
            if(!this.user.inventory) this.user.inventory = [];
            if(!this.user.equipped) this.user.equipped = null;
            this.nav('p-profile');
            document.getElementById('dock').classList.remove('hidden');
            this.sync();
        } else alert("البطل غير موجود! اسأل المعلمة لبنى عن الكود.");
    },

    nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
        document.getElementById(id).classList.add('page-active');
        if(el) {
            document.querySelectorAll('.dock-item').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }
        if(id === 'p-shop') this.renderShop();
        if(id === 'p-leader') this.renderLeaderboard();
    },

    sync() {
        document.getElementById('u-name').innerText = this.user.name;
        document.getElementById('u-stars').innerText = this.user.stars;
        document.getElementById('u-coins').innerText = this.user.coins;
        document.getElementById('u-avatar').innerText = this.user.avatar || '👤';
        document.getElementById('u-item').innerText = this.user.equipped || '';
        
        const db = JSON.parse(localStorage.getItem(this.dbKey));
        const idx = db.findIndex(s => s.code === this.user.code);
        db[idx] = this.user;
        localStorage.setItem(this.dbKey, JSON.stringify(db));
    },

    renderShop() {
        const container = document.getElementById('shop-items');
        container.innerHTML = this.items.map(item => {
            const isOwned = this.user.inventory.includes(item.id);
            return `
                <div class="shop-card p-8 text-center" onclick="App.buyItem(${item.id})">
                    ${isOwned ? '<span class="bought-badge">مملوك</span>' : ''}
                    <div class="text-8xl mb-4">${item.emoji}</div>
                    <div class="text-2xl font-black">${item.name}</div>
                    <div class="text-amber-400 font-bold mt-2">💰 ${item.price}</div>
                    ${isOwned ? `<button onclick="event.stopPropagation(); App.equip(${item.id})" class="mt-4 bg-white text-dark px-6 py-2 rounded-xl font-bold">ارتداء</button>` : ''}
                </div>
            `;
        }).join('');
    },

    buyItem(id) {
        const item = this.items.find(i => i.id === id);
        if(this.user.inventory.includes(id)) return;
        if(this.user.coins >= item.price) {
            this.user.coins -= item.price;
            this.user.inventory.push(id);
            this.sync();
            this.renderShop();
            confetti({particleCount: 100});
        } else alert("ذهبك لا يكفي! العب أكثر لتجمع الذهب.");
    },

    equip(id) {
        const item = this.items.find(i => i.id === id);
        this.user.equipped = item.emoji;
        this.sync();
        alert("تم ارتداء " + item.name);
    },

    openMap(world) {
        this.currentWorld = world;
        document.getElementById('map-name').innerText = world === 'math' ? 'عالم الحساب (100 مرحلة)' : 'عالم العربية (100 مرحلة)';
        const render = document.getElementById('map-render');
        render.innerHTML = '';
        const prog = this.user.progress[world];
        for(let i=1; i<=100; i++) {
            const isLocked = i > (prog + 1);
            const btn = document.createElement('div');
            btn.className = `lvl-btn ${i<=prog?'done':''} ${isLocked?'locked':''} ${i===prog+1?'current':''}`;
            btn.innerText = i;
            if(!isLocked) btn.onclick = () => Game.start(i, world);
            render.appendChild(btn);
        }
        this.nav('p-map');
    },

    renderLeaderboard() {
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const sorted = db.sort((a,b) => b.stars - a.stars);
        document.getElementById('leader-list').innerHTML = sorted.map((s, i) => `
            <div class="bg-white/5 p-6 rounded-3xl flex justify-between items-center ${s.code===this.user.code?'border-2 border-amber-400':''}">
                <div class="flex items-center gap-4">
                    <span class="text-3xl font-black w-10 text-amber-400">#${i+1}</span>
                    <span class="text-5xl">${s.avatar || '🦁'}</span>
                    <span class="text-2xl font-black">${s.name}</span>
                </div>
                <div class="text-3xl font-black text-blue-400">${s.stars} ⭐</div>
            </div>
        `).join('');
    }
};

/**
 * 🎮 محرك الألعاب (The Diverse Game Engine)
 */
const Game = {
    lvl: 0, world: '', score: 0, target: null, active: false,

    start(lvl, world) {
        this.lvl = lvl; this.world = world; this.score = 0; this.active = true;
        document.getElementById('game-screen').style.display = 'block';
        this.initLevel();
    },

    initLevel() {
        const arena = document.getElementById('g-arena');
        const task = document.getElementById('g-task');
        arena.innerHTML = '';

        // تنويع الألعاب بناءً على المستوى
        if(this.lvl % 2 === 0) {
            // لعبة الفقاعات المتطايرة
            this.target = this.world === 'math' ? Math.floor(Math.random()*20) : 'أ';
            task.innerText = `فجّر الفقاعة التي تحمل: ${this.target}`;
        } else {
            // لعبة الصيد السريع
            this.target = this.world === 'math' ? Math.floor(Math.random()*10)+1 : 'ب';
            task.innerText = `اصطد الـ ${this.target} بسرعة!`;
        }

        this.loop = setInterval(() => {
            if(!this.active) return;
            this.spawn();
        }, 1000 - (this.lvl * 5));
    },

    spawn() {
        const arena = document.getElementById('g-arena');
        const obj = document.createElement('div');
        const isTarget = Math.random() > 0.6;
        
        let content;
        if(this.world === 'math') content = isTarget ? this.target : Math.floor(Math.random()*50);
        else content = isTarget ? this.target : 'ج';

        obj.className = "game-target flex items-center justify-center w-32 h-32 bg-gradient-to-tr from-blue-400 to-indigo-600 rounded-full text-white font-black shadow-2xl";
        obj.innerText = content;
        obj.style.left = Math.random() * (window.innerWidth - 150) + "px";
        obj.style.top = window.innerHeight + "px";
        arena.appendChild(obj);

        gsap.to(obj, {
            y: -(window.innerHeight + 300),
            x: "+=" + (Math.random()*200 - 100),
            duration: 4 - (this.lvl * 0.01),
            ease: "none",
            onComplete: () => obj.remove()
        });

        obj.onclick = () => {
            if(content == this.target) {
                this.score++;
                confetti({particleCount: 30, origin: {x: obj.offsetLeft/window.innerWidth, y: obj.offsetTop/window.innerHeight}});
                obj.remove();
                if(this.score >= 5) this.win();
            } else {
                obj.style.background = "red";
                gsap.to(obj, {shake: 10, duration: 0.2});
            }
        };
    },

    win() {
        this.active = false; clearInterval(this.loop);
        confetti({particleCount: 200, spread: 70});
        App.user.stars += 10;
        App.user.coins += 100;
        if(App.user.progress[this.world] < this.lvl) App.user.progress[this.world] = this.lvl;
        App.sync();
        
        setTimeout(() => {
            document.getElementById('game-screen').style.display = 'none';
            App.openMap(this.world);
        }, 2000);
    },

    quit() {
        this.active = false; clearInterval(this.loop);
        document.getElementById('game-screen').style.display = 'none';
    }
};
</script>
</body>
</html>
