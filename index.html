<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أرض الأساطير - الأول ب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; margin: 0; transition: 0.6s; overflow-x: hidden; }
        body.dark { background: #070b14; color: white; }
        body.light { background: #e0f2fe; color: #0369a1; }

        /* ستايل العوالم - يشبه Kideo Land */
        .world-node {
            width: 130px; height: 130px; border-radius: 40px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 0 rgba(0,0,0,0.2); border: 4px solid white;
        }
        .world-node:active { transform: translateY(8px); box-shadow: 0 5px 0 rgba(0,0,0,0.2); }
        
        /* قفل الألعاب القادمة */
        .locked { filter: grayscale(1) opacity(0.6); pointer-events: none; }
        .locked::after { content: '🔒'; position: absolute; top: -10px; right: -10px; font-size: 24px; }

        /* حركة الدودة البسيطة للخلفية */
        .worm-bg { position: fixed; bottom: 10%; left: -100px; font-size: 40px; animation: crawl 20s linear infinite; z-index: -1; }
        @keyframes crawl { 0% { left: -100px; transform: scaleX(1); } 50% { left: 110vw; transform: scaleX(1); } 51% { transform: scaleX(-1); } 100% { left: -100px; transform: scaleX(-1); } }

        .glass { backdrop-filter: blur(15px); background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
        .shimmer { background: linear-gradient(90deg, #fbbf24, #f87171, #60a5fa, #fbbf24); background-size: 200% auto; -webkit-background-clip: text; color: transparent; animation: s 4s linear infinite; }
        @keyframes s { to { background-position: 200% center; } }
    </style>
</head>
<body class="dark">

    <div class="worm-bg">🐛</div>

    <div id="mainApp" class="min-h-screen">
        <header class="p-6 flex justify-between items-center glass rounded-b-[3rem] sticky top-0 z-50">
            <div class="flex items-center gap-3" onclick="openProfile()">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-yellow-400 to-orange-500 flex items-center justify-center text-3xl shadow-lg border-2 border-white">👤</div>
                <div>
                    <p id="navName" class="font-black text-sm">البطل المبدع</p>
                    <div class="flex gap-1 text-[10px] text-yellow-400 font-bold">⭐⭐⭐⭐⭐</div>
                </div>
            </div>
            <h1 class="text-xl font-900 shimmer font-black">أرض الأساطير</h1>
        </header>

        <main class="p-6 pb-40">
            
            <div class="mb-10 text-center">
                <h2 class="text-2xl font-black mb-2">أهلاً بك في مغامرتك! 🛡️</h2>
                <p class="text-xs opacity-60">لقد قطعت 50% من طريق العلم هذا العام، استعد للقادم!</p>
            </div>

            <div class="space-y-12">
                
                <div class="space-y-6">
                    <h3 class="text-xl font-black flex items-center gap-2">📕 لغتي العربية (مراجعة)</h3>
                    <div class="flex flex-wrap justify-around gap-y-10">
                        <div class="world-node bg-pink-500" onclick="alert('انطلقت لعبة دودة الحروف!')">
                            <span class="text-4xl mb-1">🐛</span>
                            <span class="text-[10px] font-black">دودة الحروف</span>
                        </div>
                        <div class="world-node bg-purple-500" onclick="alert('انطلقت لعبة تركيب الكلمات!')">
                            <span class="text-4xl mb-1">🧩</span>
                            <span class="text-[10px] font-black">تركيب كلمات</span>
                        </div>
                    </div>
                </div>

                <div class="space-y-6">
                    <h3 class="text-xl font-black flex items-center gap-2">🔢 ركن الحساب (الجمع والطرح)</h3>
                    <div class="flex flex-wrap justify-around gap-y-10">
                        <div class="world-node bg-blue-500" onclick="alert('انطلقت لعبة منطاد الأرقام!')">
                            <span class="text-4xl mb-1">🎈</span>
                            <span class="text-[10px] font-black">منطاد الأرقام</span>
                        </div>
                        <div class="world-node bg-indigo-500 locked">
                            <span class="text-4xl mb-1">⚖️</span>
                            <span class="text-[10px] font-black">أكبر وأصغر</span>
                        </div>
                    </div>
                </div>

                <div class="mt-12 p-6 glass rounded-[2.5rem] text-center border-2 border-dashed border-white/20">
                    <p class="text-yellow-400 font-black text-sm mb-2">💎 لعبة الأسبوع القادم</p>
                    <p class="text-xs opacity-50">ترقبوا "متاهة التنوين" يوم الأحد القادم!</p>
                </div>

            </div>
        </main>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-[400px] glass p-4 rounded-[2.5rem] flex justify-around items-center z-[1000] shadow-2xl">
            <button class="text-3xl">🏠</button>
            <button class="text-3xl opacity-20" onclick="alert('سيتم تفعيل لوحة المتصدرين غداً!')">🏆</button>
            <button class="text-3xl opacity-20">📸</button>
        </nav>
    </div>

    <div style="position: fixed; bottom: 100px; left: 20px; z-index: 5000;">
        <button onclick="document.body.classList.toggle('dark'); document.body.classList.toggle('light');" class="w-12 h-12 bg-indigo-600 text-white rounded-2xl shadow-xl flex items-center justify-center text-xl">🌓</button>
    </div>

</body>
</html>
