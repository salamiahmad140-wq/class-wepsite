<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>موقع الصف الأول ب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --s: #a855f7; --t: #ec4899; }
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; overflow-x: hidden; scroll-behavior: smooth; margin: 0; }
        
        /* خلفية سحرية عميقة */
        body.dark { background: radial-gradient(circle at top right, #1e1b4b, #020617); color: #f8fafc; }
        body.light { background: radial-gradient(circle at top right, #e0e7ff, #f8fafc); color: #0f172a; }

        /* تأثير الزجاج الفائق المطوّر */
        .ultra-glass { 
            backdrop-filter: blur(25px) saturate(180%); 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }
        .light .ultra-glass { background: rgba(255, 255, 255, 0.65); border: 1px solid rgba(0,0,0,0.05); }

        /* نيون العناوين */
        .mega-title { 
            background: linear-gradient(135deg, #818cf8, #f472b6, #fbbf24); 
            -webkit-background-clip: text; color: transparent; 
            animation: gradient-shift 6s infinite alternate;
        }
        @keyframes gradient-shift { 0% { filter: hue-rotate(0deg); transform: scale(1); } 100% { filter: hue-rotate(20deg); transform: scale(1.02); } }

        /* تحويم البطاقات */
        .hover-card { transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .hover-card:hover { transform: translateY(-12px) scale(1.02); box-shadow: 0 30px 60px rgba(99,102,241,0.25); }

        .page { display: none; }
        .active-page { display: block; animation: pageReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes pageReveal { from { opacity: 0; transform: translateY(30px) scale(0.95); filter: blur(10px); } to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } }

        /* الـ Dock العائم المتطور */
        .dock { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: fit-content; min-width: 280px; padding: 10px 20px;
            border-radius: 2.5rem; z-index: 1000; display: flex; gap: 30px; justify-content: center;
            border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        
        .particles { position: fixed; inset: 0; pointer-events: none; z-index: -1; opacity: 0.4; }
        
        /* تخصيص للموبايل */
        @media (max-width: 640px) {
            .mega-title { font-size: 2.5rem !important; }
            .dock { gap: 20px; min-width: 250px; padding: 8px 15px; }
            .dock button { font-size: 1.8rem !important; }
        }
    </style>
</head>
<body class="dark">

    <div class="particles" id="particles"></div>

    <div id="loginGate" class="min-h-screen flex items-center justify-center p-6">
        <div class="ultra-glass p-10 md:p-14 rounded-[3.5rem] w-full max-w-md text-center relative overflow-hidden">
            <div class="absolute -top-10 -left-10 w-32 h-32 bg-indigo-500/20 blur-[60px]"></div>
            <h1 class="text-4xl font-black mb-10 mega-title">موقع الصف الأول ب</h1>
            
            <div class="space-y-5">
                <input type="text" id="userInput" placeholder="اسم البطل" class="w-full p-5 rounded-2xl bg-white/5 border border-white/10 outline-none font-bold focus:ring-2 ring-indigo-500 transition-all text-center">
                <input type="password" id="passInput" placeholder="كلمة السر" class="w-full p-5 rounded-2xl bg-white/5 border border-white/10 outline-none font-bold focus:ring-2 ring-indigo-500 transition-all text-center">
                <button id="submitLogin" class="w-full bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 text-white py-5 rounded-2xl font-black text-xl shadow-2xl active:scale-95 transition-all">انطلاق 🚀</button>
            </div>
            <button onclick="toggleTheme()" class="mt-8 opacity-40 text-[10px] uppercase font-bold tracking-[0.3em]">تبديل المظهر 🌓</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="p-5 sticky top-0 z-50 ultra-glass border-b border-white/5">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4 cursor-pointer group" onclick="openProfile()">
                    <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-600 to-pink-600 flex items-center justify-center text-white text-xl shadow-lg transition-transform group-hover:scale-110">👤</div>
                    <div class="text-right">
                        <p id="navName" class="font-black text-base md:text-lg">بطل الصف</p>
                        <p class="text-[8px] opacity-40 font-bold uppercase">ابن رشد الابتدائية</p>
                    </div>
                </div>
                <h2 id="currentTitle" class="hidden md:block text-xl font-black opacity-80">الرئيسية</h2>
                <button onclick="toggleTheme()" class="w-10 h-10 ultra-glass rounded-xl flex items-center justify-center text-xl">🌓</button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto px-6 pt-10 pb-40">
            <section id="homePage" class="page active-page space-y-16">
                <div class="relative py-20 px-6 md:px-10 rounded-[4rem] overflow-hidden text-center ultra-glass">
                    <div class="absolute inset-0 bg-gradient-to-br from-indigo-600/10 via-transparent to-pink-600/10"></div>
                    <h1 class="text-5xl md:text-8xl font-black mb-6 mega-title tracking-tighter">موقع الصف الأول ب</h1>
                    <p class="text-xl md:text-2xl font-bold opacity-60">مدرسة ابن رشد الابتدائية</p>
                </div>

                <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>

                <div class="space-y-10">
                    <h3 class="text-3xl font-black flex items-center gap-5 pr-2">💎 الطلاب المتميزون <span class="h-[1px] flex-1 bg-gradient-to-l from-white/20 to-transparent"></span></h3>
                    <div id="starsGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-6"></div>
                </div>
            </section>

            <section id="hwPage" class="page space-y-10 text-center">
                <h2 class="text-6xl font-black mega-title">ركن الوظائف</h2>
                <div id="hwArea" class="grid gap-8"></div>
            </section>

            <section id="eventsPage" class="page space-y-20">
                <h2 class="text-6xl font-black text-center mega-title">معرض الفعاليات</h2>
                <div id="eventsArea" class="space-y-24"></div>
            </section>
        </main>

        <div class="dock ultra-glass">
            <button onclick="changePage('homePage', 'الرئيسية', this)" class="text-4xl text-indigo-500 scale-125 transition-all">🏠</button>
            <button onclick="changePage('hwPage', 'الوظائف', this)" class="text-4xl opacity-30 hover:opacity-100 transition-all">📚</button>
            <button onclick="changePage('eventsPage', 'الفعاليات', this)" class="text-4xl opacity-30 hover:opacity-100 transition-all">📸</button>
        </div>
    </div>

    <div id="profileModal" class="fixed inset-0 bg-black/95 hidden items-center justify-center p-4 z-[2000] backdrop-blur-[40px]">
        <div class="ultra-glass w-full max-w-sm rounded-[3.5rem] overflow-hidden border-white/20">
            <div class="h-36 bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-600 relative">
                <div class="absolute -bottom-10 left-1/2 -translate-x-1/2 w-28 h-28 rounded-3xl bg-slate-900 border-4 border-slate-900 flex items-center justify-center text-5xl shadow-2xl">👤</div>
            </div>
            <div class="pt-16 pb-10 px-10 text-center">
                <h2 id="pFullName" class="text-2xl font-black mb-1"></h2>
                <p class="text-indigo-400 font-bold text-[10px] uppercase tracking-widest mb-8">بطاقة الطالب الرقمية</p>
                <div id="pExams" class="space-y-2 max-h-48 overflow-y-auto pr-2 text-right"></div>
                <button onclick="logout()" class="mt-10 text-red-500 font-black text-[10px] tracking-widest opacity-40 hover:opacity-100 transition-all">تسجيل الخروج</button>
                <button onclick="closeProfile()" class="block w-full mt-4 font-bold opacity-10">إغلاق</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        // تأثير الجزيئات
        const pContainer = document.getElementById('particles');
        for(let i=0; i<25; i++) {
            const p = document.createElement('div');
            p.style.cssText = `position:absolute; width:3px; height:3px; background:white; border-radius:50%; top:${Math.random()*100}%; left:${Math.random()*100}%; opacity:${Math.random()*0.5}; filter:blur(1px); animation: float ${15+Math.random()*15}s infinite linear;`;
            pContainer.appendChild(p);
        }

        window.toggleTheme = () => {
            const isD = document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
            localStorage.setItem('ibn_theme_v5', isD ? 'dark' : 'light');
        };
        if(localStorage.getItem('ibn_theme_v5') === 'light') toggleTheme();

        window.changePage = (id, title, btn) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.getElementById('currentTitle').innerText = title;
            document.querySelectorAll('.dock button').forEach(b => { b.classList.add('opacity-30'); b.classList.remove('scale-125', 'text-indigo-500'); });
            btn.classList.remove('opacity-30'); btn.classList.add('scale-125', 'text-indigo-500');
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        const session = JSON.parse(localStorage.getItem('ibn_session_v5'));
        if(session) loginOk(session);

        document.getElementById('submitLogin').onclick = async () => {
            const u = document.getElementById('userInput').value.trim();
            const p = document.getElementById('passInput').value.trim();
            const { data } = await supabase.from('students').select('*').eq('username', u).eq('password', p).maybeSingle();
            if(data) { localStorage.setItem('ibn_session_v5', JSON.stringify(data)); loginOk(data); }
            else alert("عذراً.. تأكد من بياناتك!");
        };

        function loginOk(user) {
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('navName').innerText = user.full_name;
            loadData();
        }

        async function loadData() {
            const { data: ads } = await supabase.from('assignments').select('*').order('created_at', {ascending: false});
            const { data: stds } = await supabase.from('students').select('*').order('full_name');

            document.getElementById('newsGrid').innerHTML = ads.filter(a => a.title && !a.description && !a.image_url).map(a => `
                <div class="ultra-glass p-8 md:p-12 rounded-[3rem] border-r-8 border-indigo-500 hover-card">
                    <p class="text-2xl md:text-3xl font-black leading-tight">${a.title}</p>
                </div>
            `).join('');

            document.getElementById('hwArea').innerHTML = ads.filter(a => a.description).map(a => `
                <div class="ultra-glass p-10 md:p-16 rounded-[4rem] hover-card">
                    <p class="text-3xl md:text-4xl font-black leading-relaxed">${a.description}</p>
                </div>
            `).join('');

            document.getElementById('eventsArea').innerHTML = ads.filter(a => a.image_url).map(a => {
                const isV = a.image_url.includes('mp4') || a.image_url.includes('youtu');
                return `
                <div class="max-w-4xl mx-auto space-y-8">
                    <h4 class="text-3xl md:text-5xl font-black text-center mega-title">${a.title || ''}</h4>
                    <div class="rounded-[3rem] md:rounded-[5rem] overflow-hidden ultra-glass p-3 md:p-6 shadow-2xl">
                        ${isV ? `<video src="${a.image_url}" controls class="w-full rounded-[2.5rem] md:rounded-[4rem]"></video>` : `<img src="${a.image_url}" class="w-full rounded-[2.5rem] md:rounded-[4rem]">`}
                    </div>
                </div>`;
            }).join('');

            document.getElementById('starsGrid').innerHTML = stds.filter(s => s.is_star).map(s => `
                <div class="ultra-glass p-6 md:p-10 rounded-[2.5rem] md:rounded-[3.5rem] text-center hover-card group">
                    <div class="text-4xl md:text-5xl mb-3 group-hover:animate-bounce">💎</div>
                    <p class="font-black text-xs md:text-sm tracking-tighter">${s.full_name.split(' ')[0]}</p>
                </div>
            `).join('');
        }

        window.openProfile = async () => {
            const u = JSON.parse(localStorage.getItem('ibn_session_v5'));
            document.getElementById('profileModal').classList.replace('hidden', 'flex');
            document.getElementById('pFullName').innerText = u.full_name;
            const { data } = await supabase.from('exams').select('*').eq('student_id', u.id).order('created_at', {ascending: false});
            document.getElementById('pExams').innerHTML = data.map(e => `
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5 mb-2">
                    <span class="font-black text-[10px] opacity-40">${e.subject}</span>
                    <span class="bg-indigo-600/20 text-indigo-400 px-4 py-1 rounded-full font-black text-xs">${e.score}</span>
                </div>
            `).join('') || '<p class="text-center opacity-20 text-xs italic">لا نتائج</p>';
        };
        window.closeProfile = () => document.getElementById('profileModal').classList.replace('flex', 'hidden');
        window.logout = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
</html>
