<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نجوم أول "ب" | الرئيسية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; transition: 0.3s; }
        .light { background: #fdf2f8; color: #1e293b; }
        .dark { background: #0f172a; color: #f1f5f9; }
        .hero-gradient { background: linear-gradient(135deg, #6366f1, #a855f7); }
        .nav-bottom { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 50; }
        .dark .nav-bottom { background: #1e293b; border-top: 1px solid #334155; }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="light pb-24" id="bodyTag">

    <div id="loginGate" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-800 p-8 rounded-[3rem] shadow-2xl w-full max-w-md border-b-8 border-indigo-600">
            <h1 class="text-3xl font-black text-center text-indigo-600 mb-8">مرحباً يا بطل! 🚀</h1>
            <input type="text" id="u" placeholder="اسم المستخدم" class="w-full p-4 mb-4 rounded-2xl bg-slate-100 dark:bg-slate-700 border-none outline-indigo-500">
            <input type="password" id="p" placeholder="كلمة السر" class="w-full p-4 mb-4 rounded-2xl bg-slate-100 dark:bg-slate-700 border-none outline-indigo-500">
            <div class="flex items-center gap-2 mb-6">
                <input type="checkbox" id="rememberMe" class="w-5 h-5">
                <label for="rememberMe" class="text-sm font-bold">تذكرني 💾</label>
            </div>
            <button id="loginBtn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg">دخول للمنصة 🎈</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="p-4 flex justify-between items-center bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-40">
            <button onclick="toggleTheme()" class="text-2xl">🌓</button>
            <div class="flex items-center gap-2" onclick="showProfile()">
                <span id="userName" class="font-black text-indigo-600 underline">البطل</span>
                <div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center">👤</div>
            </div>
        </nav>

        <div class="p-6">
            <header class="hero-gradient p-10 rounded-[3rem] text-white text-center mb-8 shadow-xl">
                <h2 class="text-3xl font-black mb-2">أهلاً بكم في موقع صفنا! 🌟</h2>
                <p class="opacity-90">مساحة الإبداع مع المعلمة لبنى سلامي</p>
            </header>

            <section class="mb-10">
                <h3 class="text-xl font-black text-red-500 mb-4 flex items-center gap-2 italic">⚠️ هام جداً:</h3>
                <div id="newsList" class="space-y-4 text-slate-900 dark:text-white"></div>
            </section>

            <section>
                <h3 class="text-xl font-black text-indigo-600 mb-6 underline">🏆 أبطال الأسبوع المتميزون:</h3>
                <div id="starsGrid" class="grid grid-cols-2 gap-4"></div>
            </section>
        </div>

        <div id="profileModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-6 z-[60]">
            <div class="bg-white dark:bg-slate-800 w-full max-w-sm rounded-[3rem] p-8 animate-pop text-center">
                <div class="text-5xl mb-4">⭐</div>
                <h2 id="profFullName" class="text-2xl font-black text-indigo-600"></h2>
                <p id="profCode" class="text-slate-400 text-xs mb-6"></p>
                <div class="bg-slate-100 dark:bg-slate-700 p-4 rounded-2xl mb-4">
                    <p class="text-xs font-bold mb-1">آخر علامة حصلت عليها:</p>
                    <p id="profGrade" class="text-3xl font-black text-yellow-500">0</p>
                </div>
                <div class="text-right">
                    <p class="font-bold text-sm mb-2">📋 سجل الاختبارات:</p>
                    <div id="examsList" class="space-y-2 max-h-32 overflow-y-auto p-1"></div>
                </div>
                <button onclick="hideProfile()" class="mt-6 font-bold text-red-400">إغلاق ❌</button>
            </div>
        </div>
    </div>

    <div class="nav-bottom">
        <a href="index.html" class="flex flex-col items-center gap-1 text-indigo-600">
            <span class="text-xl">🏠</span><span class="text-[10px] font-bold">الرئيسية</span>
        </a>
        <a href="homework.html" class="flex flex-col items-center gap-1 text-slate-400">
            <span class="text-xl">📚</span><span class="text-[10px] font-bold">الوظائف</span>
        </a>
        <a href="events.html" class="flex flex-col items-center gap-1 text-slate-400">
            <span class="text-xl">📸</span><span class="text-[10px] font-bold">الفعاليات</span>
        </a>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';
        
        let currentUser = null;

        window.toggleTheme = () => {
            const b = document.getElementById('bodyTag');
            b.classList.toggle('light');
            b.classList.toggle('dark');
        };

        const login = async () => {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            const { data } = await supabase.from('students').select('*').eq('username', user).eq('password', pass).single();
            
            if(data) {
                currentUser = data;
                if(document.getElementById('rememberMe').checked) localStorage.setItem('savedUser', JSON.stringify({u:user, p:pass}));
                document.getElementById('loginGate').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('userName').innerText = data.full_name.split(' ')[0];
                loadContent();
            } else alert("تأكد من بياناتك يا بطل!");
        };

        async function loadContent() {
            // الإعلانات
            const { data: news } = await supabase.from('assignments').select('*').not('title', 'is', null).order('created_at', {ascending: false});
            document.getElementById('newsList').innerHTML = news.map(n => `
                <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl border-r-8 border-red-500 shadow-sm font-bold text-lg">${n.title}</div>
            `).join('');

            // المتميزون
            const { data: stars } = await supabase.from('students').select('*').eq('is_star', true);
            document.getElementById('starsGrid').innerHTML = stars.map(s => `
                <div class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] text-center shadow-md border border-indigo-100 dark:border-slate-700">
                    <div class="text-3xl mb-2">⭐</div>
                    <p class="font-black text-indigo-600 dark:text-indigo-400 text-sm">${s.full_name.split(' ')[0]}</p>
                </div>
            `).join('');
        }

        window.showProfile = async () => {
            document.getElementById('profileModal').classList.replace('hidden', 'flex');
            document.getElementById('profFullName').innerText = currentUser.full_name;
            document.getElementById('profCode').innerText = "كود الطالب: #" + currentUser.id.slice(0,5);
            document.getElementById('profGrade').innerText = currentUser.grade || 0;
            
            const { data: exams } = await supabase.from('exams').select('*').eq('student_id', currentUser.id);
            document.getElementById('examsList').innerHTML = exams.length ? exams.map(e => `
                <div class="flex justify-between bg-slate-50 dark:bg-slate-900 p-2 rounded-xl text-xs">
                    <span class="font-bold">${e.subject}</span>
                    <span class="text-indigo-600">${e.score}</span>
                </div>
            `).join('') : '<p class="text-[10px] text-slate-400">لا يوجد اختبارات مسجلة بعد</p>';
        };

        window.hideProfile = () => document.getElementById('profileModal').classList.replace('flex', 'hidden');
        document.getElementById('loginBtn').onclick = login;
    </script>
</body>
</html>
