<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أساطير الأول ب - النسخة الملكية</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Fredoka:wght@600&display=swap" rel="stylesheet">

    <style>
        :root {
            --kids-blue: #a2d2ff;
            --kids-pink: #ffafcc;
            --kids-yellow: #ffeb3b;
            --kids-green: #b7e4c7;
            --kids-purple: #c8b6ff;
        }

        body {
            font-family: 'Cairo', 'Fredoka', sans-serif;
            background: #f0f9ff;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            overflow: hidden;
            touch-action: manipulation;
        }

        .soft-card {
            background: white;
            border-radius: 40px;
            box-shadow: 0 15px 0 #dbeafe;
            border: 4px solid #f0f7ff;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .soft-card:active {
            transform: translateY(10px);
            box-shadow: 0 5px 0 #dbeafe;
        }

        /* تحسين خريطة المراحل */
        .map-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            gap: 30px;
            background: url('https://www.transparenttextures.com/patterns/pave.png');
        }

        .step-node {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            cursor: pointer;
            position: relative;
            z-index: 10;
        }

        /* الصدارة */
        .leaderboard-item {
            background: linear-gradient(to left, white, var(--kids-green));
            border-radius: 20px;
            margin-bottom: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* واجهة اللعبة */
        #game-overlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9999;
            display: none;
            flex-direction: column;
        }

        .drop-zone {
            min-height: 120px;
            border: 4px dashed #cbd5e1;
            border-radius: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .drag-item {
            padding: 15px 25px;
            background: var(--kids-yellow);
            border-radius: 15px;
            cursor: grab;
            font-size: 2rem;
            font-weight: 900;
            box-shadow: 0 5px 0 #facc15;
        }
    </style>
</head>
<body class="select-none">

    <div id="screen-login" class="fixed inset-0 bg-[#f0f9ff] flex flex-col items-center justify-center p-6 z-[500]">
        <div class="soft-card p-10 bg-white w-full max-w-md text-center">
            <img src="https://cdn-icons-png.flaticon.com/512/3024/3024509.png" class="w-32 mx-auto mb-6 animate-bounce" alt="Logo">
            <h1 class="text-4xl font-black text-blue-500 mb-8">مرحباً يا بطل!</h1>
            <input id="login-input" type="text" placeholder="أدخل كودك السري" class="w-full p-5 rounded-2xl bg-blue-50 border-2 border-blue-200 text-center text-2xl font-bold mb-6 focus:outline-none focus:border-blue-500">
            <button onclick="App.handleLogin()" class="w-full py-5 bg-green-400 text-white rounded-3xl text-2xl font-black shadow-[0_10px_0_#22c55e] hover:brightness-110 active:translate-y-1">دخول للمغامرة 🚀</button>
        </div>
    </div>

    <div id="screen-main" class="hidden h-screen flex flex-col p-4">
        <div class="flex justify-between items-center mb-6">
            <div class="flex gap-4">
                <div class="soft-card px-6 py-2 bg-white flex items-center gap-2">
                    <span class="text-2xl">⭐</span> <span id="stat-stars" class="font-black text-blue-600">0</span>
                </div>
                <div class="soft-card px-6 py-2 bg-white flex items-center gap-2">
                    <span class="text-2xl">💰</span> <span id="stat-coins" class="font-black text-yellow-600">0</span>
                </div>
            </div>
            <button onclick="App.showLeaderboard()" class="soft-card p-3 bg-purple-100 text-2xl">🏆 الصدارة</button>
        </div>

        <div class="text-center mb-10">
            <div id="user-avatar" class="text-8xl mb-2">🧒</div>
            <h2 id="user-name" class="text-3xl font-black text-slate-700">بطل الأساطير</h2>
        </div>

        <div class="grid grid-cols-2 gap-6 max-w-2xl mx-auto w-full">
            <div onclick="App.showWorlds()" class="soft-card p-8 bg-blue-100 text-center cursor-pointer">
                <div class="text-6xl mb-4">🗺️</div>
                <span class="text-2xl font-black text-blue-800">الخريطة</span>
            </div>
            <div onclick="App.showShop()" class="soft-card p-8 bg-pink-100 text-center cursor-pointer">
                <div class="text-6xl mb-4">🛍️</div>
                <span class="text-2xl font-black text-pink-800">المتجر</span>
            </div>
        </div>
    </div>

    <div id="screen-map" class="hidden h-screen overflow-y-auto pb-32">
        <div class="p-6 flex justify-between">
            <button onclick="App.goBack()" class="soft-card px-6 py-2 bg-red-100 font-bold">رجوع</button>
            <h2 id="map-title" class="text-3xl font-black text-slate-700">خريطة التعلم</h2>
        </div>
        <div id="map-render" class="map-container"></div>
    </div>

    <div id="modal-leaderboard" class="hidden fixed inset-0 bg-black/50 backdrop-blur-md z-[1000] flex items-center justify-center p-4">
        <div class="soft-card bg-white w-full max-w-lg p-8 max-h-[80vh] overflow-y-auto">
            <h2 class="text-3xl font-black text-center mb-6 text-purple-600">🏆 لوحة الصدارة</h2>
            <div id="leaderboard-list"></div>
            <button onclick="App.closeModal('modal-leaderboard')" class="w-full mt-6 py-3 bg-slate-200 rounded-xl font-bold">إغلاق</button>
        </div>
    </div>

    <div id="game-overlay">
        <div class="p-4 flex justify-between items-center bg-blue-50 border-b-4 border-blue-100">
            <div class="flex gap-4 items-center">
                <span id="game-lives" class="text-3xl">❤️❤️❤️</span>
                <span id="game-timer" class="text-2xl font-mono font-bold bg-white px-4 rounded-full">00:00</span>
            </div>
            <div id="game-progress" class="text-xl font-black text-blue-500">المهمة 1 / 5</div>
        </div>

        <div id="game-content" class="flex-1 flex flex-col items-center justify-center p-6 text-center">
            </div>

        <div id="game-controls" class="p-8 text-center">
            <div id="game-instruction" class="text-2xl font-bold text-slate-500 mb-6">اقرأ الكلمة ثم اختر الصورة</div>
        </div>
    </div>

    <nav id="bottom-nav" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur-md border-4 border-blue-100 px-8 py-4 rounded-full flex gap-10 shadow-2xl z-[400]">
        <button onclick="App.showMain()" class="text-4xl hover:scale-125 transition">🏠</button>
        <button onclick="App.showWorlds()" class="text-4xl hover:scale-125 transition">🎮</button>
        <button onclick="App.showShop()" class="text-4xl hover:scale-125 transition">🎁</button>
    </nav>

<script>
/**
 * 💡 نظام إدارة البيانات والمنطق
 */
const App = {
    state: {
        user: null,
        dbKey: 'LEGENDS_V4_STORAGE',
        currentScreen: 'login',
        leaderboard: [
            {name: 'أحمد', stars: 1250, avatar: '👦'},
            {name: 'سارة', stars: 1100, avatar: '👧'},
            {name: 'ياسين', stars: 950, avatar: '🧒'}
        ]
    },

    init() {
        this.loadDB();
    },

    loadDB() {
        const data = localStorage.getItem(this.state.dbKey);
        if(!data) {
            // بيانات تجريبية للمعلم
            const initialDB = [
                {code: '1111', name: 'بطل التجربة', stars: 0, coins: 100, done: [], avatar: '🧒'}
            ];
            localStorage.setItem(this.state.dbKey, JSON.stringify(initialDB));
        }
    },

    handleLogin() {
        const code = document.getElementById('login-input').value;
        const db = JSON.parse(localStorage.getItem(this.state.dbKey));
        const user = db.find(u => u.code === code);

        if(user) {
            this.state.user = user;
            this.showMain();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else {
            alert("الكود غير موجود يا بطل! تأكد من المعلم.");
        }
    },

    showMain() {
        this.hideAll();
        document.getElementById('screen-main').classList.remove('hidden');
        document.getElementById('bottom-nav').classList.remove('hidden');
        document.getElementById('stat-stars').innerText = this.state.user.stars;
        document.getElementById('stat-coins').innerText = this.state.user.coins;
        document.getElementById('user-name').innerText = this.state.user.name;
    },

    showWorlds() {
        this.hideAll();
        document.getElementById('screen-map').classList.remove('hidden');
        this.renderMap();
    },

    renderMap() {
        const container = document.getElementById('map-render');
        container.innerHTML = '';
        for(let i=1; i<=10; i++) {
            const isLocked = i > (this.state.user.done.length + 1);
            const node = document.createElement('div');
            node.className = `step-node ${isLocked ? 'bg-slate-200 text-slate-400' : 'bg-blue-400 text-white shadow-[0_8px_0_#1e40af]'} `;
            node.innerHTML = isLocked ? '🔒' : i;
            if(!isLocked) node.onclick = () => GameEngine.init(i);
            container.appendChild(node);
        }
    },

    showLeaderboard() {
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = this.state.leaderboard
            .sort((a,b) => b.stars - a.stars)
            .map((u, i) => `
                <div class="leaderboard-item">
                    <div class="flex items-center gap-4">
                        <span class="font-black text-slate-400">#${i+1}</span>
                        <span class="text-3xl">${u.avatar}</span>
                        <span class="font-bold text-slate-700">${u.name}</span>
                    </div>
                    <div class="font-black text-blue-500">${u.stars} ⭐</div>
                </div>
            `).join('');
        document.getElementById('modal-leaderboard').classList.remove('hidden');
    },

    closeModal(id) { document.getElementById(id).classList.add('hidden'); },
    hideAll() {
        ['screen-login', 'screen-main', 'screen-map', 'modal-leaderboard'].forEach(id => {
            document.getElementById(id).classList.add('hidden');
        });
    },
    goBack() { this.showMain(); }
};

/**
 * 🎮 محرك الألعاب المتطور (Logic Engine)
 */
const GameEngine = {
    currentLevel: 1,
    step: 1,
    lives: 3,
    timer: 0,
    interval: null,

    init(level) {
        this.currentLevel = level;
        this.step = 1;
        this.lives = 3;
        this.timer = 0;
        document.getElementById('game-overlay').style.display = 'flex';
        this.startTimer();
        this.loadStep();
    },

    startTimer() {
        this.interval = setInterval(() => {
            this.timer++;
            const m = Math.floor(this.timer / 60).toString().padStart(2, '0');
            const s = (this.timer % 60).toString().padStart(2, '0');
            document.getElementById('game-timer').innerText = `${m}:${s}`;
        }, 1000);
    },

    loadStep() {
        const container = document.getElementById('game-content');
        const instruction = document.getElementById('game-instruction');
        document.getElementById('game-progress').innerText = `المهمة ${this.step} / 5`;
        document.getElementById('game-lives').innerText = "❤️".repeat(this.lives);
        container.innerHTML = '';

        // تنويع الألعاب بناءً على الخطوة والمستوى (Logic)
        const gameType = (this.currentLevel + this.step) % 4;

        if(gameType === 0) this.gamePickColor(container, instruction);
        else if(gameType === 1) this.gameSortNumbers(container, instruction);
        else if(gameType === 2) this.gameMatchEmoji(container, instruction);
        else this.gameMissingLetter(container, instruction);
    },

    // 1. لعبة اختيار الألوان (منطق بصري)
    gamePickColor(ctx, instr) {
        instr.innerText = "اضغط على اللون الأزرق فقط! 🌊";
        const colors = ['bg-blue-500', 'bg-red-500', 'bg-green-500', 'bg-yellow-500'];
        for(let i=0; i<8; i++) {
            const c = colors[Math.floor(Math.random()*colors.length)];
            const btn = document.createElement('div');
            btn.className = `${c} w-24 h-24 rounded-3xl cursor-pointer shadow-lg transform transition active:scale-90`;
            btn.onclick = () => {
                if(c === 'bg-blue-500') this.handleCorrect(btn);
                else this.handleWrong(btn);
            };
            ctx.classList.add('grid', 'grid-cols-2', 'gap-4');
            ctx.appendChild(btn);
        }
    },

    // 2. لعبة ترتيب الأرقام (منطق رياضي)
    gameSortNumbers(ctx, instr) {
        instr.innerText = "رتب الأرقام من الأصغر للأكبر 🔢";
        ctx.classList.remove('grid', 'grid-cols-2');
        const nums = [Math.floor(Math.random()*10), Math.floor(Math.random()*10)+10, Math.floor(Math.random()*10)+20].sort(()=>Math.random()-0.5);
        
        const dropZone = document.createElement('div');
        dropZone.className = "drop-zone w-full max-w-md mb-8";
        dropZone.id = "sortable-zone";
        
        const itemsWrapper = document.createElement('div');
        itemsWrapper.className = "flex gap-4";
        
        nums.forEach(n => {
            const item = document.createElement('div');
            item.className = "drag-item";
            item.innerText = n;
            item.dataset.val = n;
            itemsWrapper.appendChild(item);
        });

        ctx.appendChild(dropZone);
        ctx.appendChild(itemsWrapper);

        new Sortable(itemsWrapper, { group: 'sort', animation: 150 });
        new Sortable(dropZone, { 
            group: 'sort', 
            onAdd: (evt) => {
                const currentItems = Array.from(dropZone.children).map(el => parseInt(el.dataset.val));
                if(currentItems.length === 3) {
                    if(currentItems[0] < currentItems[1] && currentItems[1] < currentItems[2]) this.handleCorrect();
                    else { alert("الترتيب خاطئ! حاول مرة أخرى"); this.handleWrong(); this.loadStep(); }
                }
            }
        });
    },

    // 3. لعبة مطابقة الإيموجي (منطق لغوي)
    gameMatchEmoji(ctx, instr) {
        instr.innerText = "ما هو إيموجي (التفاحة)؟ 🍎";
        const options = [
            {t: '🍎', correct: true}, {t: '🍌', correct: false}, 
            {t: '🥕', correct: false}, {t: '🍇', correct: false}
        ].sort(()=>Math.random()-0.5);

        ctx.classList.add('grid', 'grid-cols-2', 'gap-6');
        options.forEach(opt => {
            const b = document.createElement('div');
            b.className = "soft-card p-10 text-6xl cursor-pointer bg-white";
            b.innerText = opt.t;
            b.onclick = () => opt.correct ? this.handleCorrect(b) : this.handleWrong(b);
            ctx.appendChild(b);
        });
    },

    // 4. لعبة الحرف الناقص (تحليل الكلمات)
    gameMissingLetter(ctx, instr) {
        instr.innerText = "أكمل الكلمة: (قـ _ ـم) 🖋️";
        const options = ['ل', 'ب', 'د', 'س'];
        ctx.classList.add('grid', 'grid-cols-2', 'gap-6');
        options.forEach(letter => {
            const b = document.createElement('div');
            b.className = "soft-card p-10 text-5xl font-black text-blue-600";
            b.innerText = letter;
            b.onclick = () => letter === 'ل' ? this.handleCorrect(b) : this.handleWrong(b);
            ctx.appendChild(b);
        });
    },

    handleCorrect(el) {
        if(el) el.style.background = "#b7e4c7";
        confetti({ particleCount: 50, spread: 30, origin: { y: 0.8 } });
        setTimeout(() => {
            this.step++;
            if(this.step > 5) this.finishGame();
            else this.loadStep();
        }, 600);
    },

    handleWrong(el) {
        if(el) {
            gsap.to(el, { x: 10, repeat: 3, yoyo: true, duration: 0.1 });
            el.style.background = "#ffafcc";
        }
        this.lives--;
        if(this.lives <= 0) {
            alert("للأسف انتهت المحاولات! حاول مرة أخرى.");
            this.quit();
        } else {
            document.getElementById('game-lives').innerText = "❤️".repeat(this.lives);
        }
    },

    finishGame() {
        clearInterval(this.interval);
        confetti({ particleCount: 300, spread: 100 });
        alert(`أحسنت! فزت بـ 100 نجمة و 50 عملة! 🏆`);
        App.state.user.stars += 100;
        App.state.user.coins += 50;
        if(!App.state.user.done.includes(this.currentLevel)) App.state.user.done.push(this.currentLevel);
        
        // حفظ في الذاكرة
        const db = JSON.parse(localStorage.getItem(App.state.dbKey));
        const idx = db.findIndex(u => u.code === App.state.user.code);
        db[idx] = App.state.user;
        localStorage.setItem(App.state.dbKey, JSON.stringify(db));

        this.quit();
        App.showMain();
    },

    quit() {
        clearInterval(this.interval);
        document.getElementById('game-overlay').style.display = 'none';
        App.showMain();
    }
};

App.init();
</script>
</body>
</html>
