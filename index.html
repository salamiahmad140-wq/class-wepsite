<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أساطير الأول ب - النسخة الذكية</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Fredoka:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { --joy-blue: #00b4d8; --joy-orange: #ff9f1c; --joy-green: #2ec4b6; --joy-red: #e71d36; }
        * { font-family: 'Fredoka', 'Cairo', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { background: #fdfcf0; background-image: radial-gradient(#e5e7eb 1.5px, transparent 1.5px); background-size: 30px 30px; height: 100vh; overflow: hidden; margin: 0; }

        .page { position: absolute; inset: 0; display: none; flex-direction: column; padding: 20px; overflow-y: auto; padding-bottom: 140px; }
        .page-active { display: flex; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* خريطة المراحل المتغيرة */
        .map-container { display: flex; flex-direction: column; gap: 40px; padding: 40px 20px; align-items: center; }
        .lvl-path { width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 900; background: white; border: 8px solid #ddd; box-shadow: 0 10px 0 #ccc; cursor: pointer; position: relative; }
        .lvl-path.active { background: var(--joy-blue); color: white; border-color: #caf0f8; box-shadow: 0 10px 0 #0077b6; transform: rotate(-5deg); }
        .lvl-path.done { background: var(--joy-green); color: white; border-color: #c7f9cc; box-shadow: 0 10px 0 #38a3a5; }

        /* شاشة اللعب */
        #game-view { position: fixed; inset: 0; background: #fff; z-index: 5000; display: none; background-image: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%); }
        .target-box { position: absolute; cursor: pointer; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.1s; }
        .target-box:active { transform: scale(0.9); }
        
        .word-part { display: inline-block; padding: 10px 20px; background: white; border: 4px solid #333; border-radius: 15px; margin: 5px; font-size: 3rem; font-weight: 900; }
    </style>
</head>
<body>

    <div id="p-login" class="page page-active justify-center items-center">
        <div class="bg-white p-12 rounded-[50px] border-[10px] border-yellow-300 text-center w-[90%] max-w-lg shadow-2xl">
            <div class="text-[120px] mb-4">🎒</div>
            <h1 class="text-6xl font-black text-slate-800 mb-8">أبطال الصف الأول ب</h1>
            <input type="text" id="u-code" placeholder="كودك السري" class="w-full text-center text-4xl p-6 rounded-3xl border-4 border-slate-100 outline-none focus:border-blue-400 mb-8 font-black bg-slate-50">
            <button onclick="App.login()" class="w-full py-6 bg-blue-500 text-white rounded-3xl text-4xl font-black shadow-[0_10px_0_#1e40af]">هيا نلعب! ✨</button>
        </div>
    </div>

    <div id="p-home" class="page items-center">
        <div class="w-full max-w-4xl p-6">
            <div class="flex justify-between mb-10">
                <div class="bg-white px-8 py-3 rounded-full shadow-lg border-4 border-amber-400 text-3xl font-black">💰 <span id="u-coins">0</span></div>
                <div class="bg-white px-8 py-3 rounded-full shadow-lg border-4 border-blue-400 text-3xl font-black">⭐ <span id="u-stars">0</span></div>
            </div>
            <div class="text-center mb-10">
                <div id="u-avatar" class="text-[140px] bg-white w-64 h-64 rounded-full inline-flex items-center justify-center border-8 border-white shadow-2xl mb-6">👤</div>
                <h2 id="u-name" class="text-6xl font-black text-slate-800">بطلنا المبدع</h2>
            </div>
            <div class="grid grid-cols-2 gap-8">
                <div onclick="App.nav('p-worlds')" class="bg-orange-400 text-white p-10 rounded-[40px] text-4xl font-black text-center shadow-[0_12px_0_#c2410c] cursor-pointer active:translate-y-2 active:shadow-none transition-all">الخريطة 🗺️</div>
                <div onclick="App.nav('p-shop')" class="bg-pink-500 text-white p-10 rounded-[40px] text-4xl font-black text-center shadow-[0_12px_0_#9d174d] cursor-pointer active:translate-y-2 active:shadow-none transition-all">المتجر 🎁</div>
            </div>
        </div>
    </div>

    <div id="p-shop" class="page">
        <h2 class="text-6xl font-black text-center mb-10 text-slate-800">سوق الأساطير 🦄</h2>
        <div id="shop-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6 px-4"></div>
    </div>

    <div id="p-worlds" class="page items-center justify-center">
        <h2 class="text-7xl font-black mb-16 text-slate-800">اختر عالمك</h2>
        <div class="flex flex-wrap justify-center gap-10">
            <div onclick="App.openMap('math')" class="w-80 p-10 bg-blue-500 text-white rounded-[50px] text-center cursor-pointer shadow-xl">
                <div class="text-[120px] mb-4">➕</div>
                <div class="text-4xl font-black">الحساب</div>
            </div>
            <div onclick="App.openMap('arabic')" class="w-80 p-10 bg-emerald-500 text-white rounded-[50px] text-center cursor-pointer shadow-xl">
                <div class="text-[120px] mb-4">📖</div>
                <div class="text-4xl font-black">لغتي</div>
            </div>
        </div>
    </div>

    <div id="p-map" class="page">
        <div class="flex justify-between items-center p-6 bg-white shadow-md rounded-3xl mb-10">
            <h2 id="map-title" class="text-4xl font-black text-blue-600">المراحل</h2>
            <button onclick="App.nav('p-worlds')" class="bg-red-500 text-white px-8 py-3 rounded-2xl font-black">رجوع</button>
        </div>
        <div id="map-render" class="map-container"></div>
    </div>

    <div id="game-view">
        <div class="absolute top-8 inset-x-8 flex justify-between items-center z-[6000]">
            <div id="g-lives" class="text-4xl">❤️❤️❤️</div>
            <div id="g-task" class="bg-white px-10 py-6 rounded-3xl border-b-8 border-blue-500 text-6xl font-black shadow-xl">...</div>
            <div id="g-score" class="bg-yellow-400 px-6 py-3 rounded-full text-2xl font-black">⭐ 0/5</div>
        </div>
        <div id="g-arena" class="w-full h-full relative overflow-hidden"></div>
    </div>

    <nav id="navbar" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white/90 px-10 py-4 rounded-full flex gap-12 shadow-2xl z-[1000] hidden border-4 border-blue-50">
        <div class="text-5xl cursor-pointer" onclick="App.nav('p-home')">🏠</div>
        <div class="text-5xl cursor-pointer" onclick="App.nav('p-shop')">🎁</div>
        <div class="text-5xl cursor-pointer" onclick="App.nav('p-worlds')">🎮</div>
    </nav>

<script>
/**
 * 🛠️ نظام الإدارة الذكي
 */
const App = {
    dbKey: 'LEGENDS_1B_FINAL_V2',
    user: null, currentWorld: 'math',
    items: Array.from({length: 40}, (_, i) => ({
        id: i+1, e: ['🐯','🦊','🏎️','🚀','🛸','🚁','🦾','🤖','🦁','🐱','🎩','👑','💎','🍦','🍭'][i%15], p: (i+2)*100
    })),

    login() {
        const code = document.getElementById('u-code').value.trim().toUpperCase();
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const found = db.find(s => s.code === code);
        if(found) {
            this.user = found; this.nav('p-home');
            document.getElementById('navbar').classList.remove('hidden');
            this.sync();
        } else alert("الكود غير صحيح!");
    },

    nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
        document.getElementById(id).classList.add('page-active');
        if(id === 'p-shop') this.renderShop();
    },

    sync() {
        document.getElementById('u-name').innerText = this.user.name;
        document.getElementById('u-stars').innerText = this.user.stars;
        document.getElementById('u-coins').innerText = this.user.coins;
        document.getElementById('u-avatar').innerText = this.user.equipped || '👤';
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const idx = db.findIndex(s => s.code === this.user.code);
        db[idx] = this.user; localStorage.setItem(this.dbKey, JSON.stringify(db));
    },

    renderShop() {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = this.items.map(item => {
            const owned = this.user.inventory.includes(item.id);
            return `<div class="bg-white p-6 rounded-[30px] border-b-8 ${owned?'border-blue-400 bg-blue-50':'border-slate-200'} text-center cursor-pointer" onclick="App.buy(${item.id})">
                <div class="text-7xl mb-4">${item.e}</div>
                <div class="bg-amber-400 text-white px-4 py-1 rounded-full font-black">${item.p} 💰</div>
            </div>`;
        }).join('');
    },

    buy(id) {
        const item = this.items.find(i => i.id === id);
        if(this.user.inventory.includes(id)) { this.user.equipped = item.e; this.sync(); return; }
        if(this.user.coins >= item.p) {
            this.user.coins -= item.p; this.user.inventory.push(id); this.user.equipped = item.e;
            this.sync(); this.renderShop(); confetti({particleCount:100});
        }
    },

    openMap(world) {
        this.currentWorld = world;
        const render = document.getElementById('map-render'); render.innerHTML = '';
        for(let i=1; i<=20; i++) {
            const isDone = this.user.done[world].includes(i);
            const isLocked = i > (this.user.done[world].length + 1);
            const node = document.createElement('div');
            node.className = `lvl-path ${isLocked?'':'active'} ${isDone?'done':''}`;
            node.style.marginRight = (Math.sin(i) * 150) + "px"; // مسار متعرج ممتع
            node.innerHTML = isLocked ? '🔒' : (isDone ? '✅' : i);
            if(!isLocked) node.onclick = () => Game.start(i, world);
            render.appendChild(node);
        }
        this.nav('p-map');
    }
};

/**
 * 🎮 محرك الألعاب التعليمي (كل مرحلة شكل!)
 */
const Game = {
    active: false, lvl: 1, world: '', score: 0, lives: 3, target: null, loop: null,
    // محتوى تعليمي حقيقي ومصحح
    mathData: [
        {q:'كم تفاحة؟ 🍎🍎🍎', a:3}, {q:'5 + 2 = ?', a:7}, {q:'10 - 3 = ?', a:7}, {q:'أكمل النمط: 2, 4, 6, ?', a:8}, {q:'4 + 4 = ?', a:8}
    ],
    arabicData: [
        {q:'رتب: بـ - يـ - ت', a:'بيت', parts:['بـ','يـ','ت']},
        {q:'ما هو الحرف الأول؟ (أسد)', a:'أ'},
        {q:'حلل الكلمة: قلم', a:'ق-ل-م', parts:['ق','ل','م']},
        {q:'اختر الكلمة الصحيحة: (🧤)', a:'قفاز'},
        {q:'أكمل: مـ - د - ر - سـ - ؟', a:'ة'}
    ],

    start(lvl, world) {
        this.lvl = lvl; this.world = world; this.score = 0; this.lives = 3; this.active = true;
        document.getElementById('game-view').style.display = 'block';
        this.updateUI();
        this.nextLevel();
    },

    updateUI() {
        document.getElementById('g-score').innerText = `⭐ ${this.score} / 5`;
        document.getElementById('g-lives').innerText = "❤️".repeat(this.lives);
    },

    nextLevel() {
        const arena = document.getElementById('g-arena'); arena.innerHTML = '';
        const pool = this.world === 'math' ? this.mathData : this.arabicData;
        const qData = pool[Math.floor(Math.random() * pool.length)];
        this.target = qData.a;
        document.getElementById('g-task').innerText = qData.q;
        
        clearInterval(this.loop);
        
        // تغيير نوع اللعبة بناءً على رقم المرحلة (كل مرحلة مختلفة!)
        const gameType = (this.lvl + this.score) % 5;
        
        if(gameType === 0) this.game_bubbles(qData); // فقاعات صابون
        else if(gameType === 1) this.game_sorting(qData); // ترتيب حروف
        else if(gameType === 2) this.game_fastClick(qData); // سرعة البرق
        else if(gameType === 3) this.game_memory(qData); // بطاقات الذاكرة
        else this.game_jump(qData); // القفز العالي
    },

    // 1. فقاعات الصابون (تحتاج دقة)
    game_bubbles(data) {
        this.loop = setInterval(() => {
            const b = document.createElement('div');
            const isT = Math.random() > 0.6;
            b.className = "target-box w-32 h-32 bg-blue-100/50 rounded-full border-4 border-white shadow-inner text-3xl font-black";
            b.innerText = isT ? this.target : (this.world=='math'?Math.floor(Math.random()*20):'خ');
            b.style.left = Math.random()*80 + "%"; b.style.bottom = "-100px";
            document.getElementById('g-arena').appendChild(b);
            gsap.to(b, { y: -(window.innerHeight + 200), x: "+=50", duration: 4, onComplete:()=>b.remove() });
            b.onclick = () => isT ? this.hit(b) : this.fail();
        }, 1000);
    },

    // 2. ترتيب الحروف (تعليمي بحت)
    game_sorting(data) {
        if(!data.parts) { this.game_fastClick(data); return; }
        const container = document.createElement('div');
        container.className = "absolute inset-0 flex items-center justify-center gap-6 flex-wrap p-10";
        data.parts.sort(() => Math.random() - 0.5).forEach(p => {
            const btn = document.createElement('div');
            btn.className = "p-10 bg-white border-8 border-orange-400 rounded-3xl text-6xl font-black cursor-pointer shadow-xl";
            btn.innerText = p;
            btn.onclick = () => {
                btn.style.background = "#dcfce7";
                if(btn.innerText === data.parts[this.score % data.parts.length]) { // تبسيط للتحقق
                   this.hit();
                }
            };
            container.appendChild(btn);
        });
        document.getElementById('g-arena').appendChild(container);
    },

    // 3. سرعة البرق (تظهر وتختفي)
    game_fastClick(data) {
        const spawn = () => {
            if(!this.active) return;
            const item = document.createElement('div');
            item.className = "target-box p-8 bg-yellow-400 rounded-full border-8 border-white text-5xl font-black shadow-2xl";
            item.innerText = this.target;
            item.style.left = Math.random()*70+10+"%"; item.style.top = Math.random()*60+20+"%";
            document.getElementById('g-arena').appendChild(item);
            gsap.fromTo(item, {scale:0}, {scale:1.2, duration:0.4, yoyo:true, repeat:1, repeatDelay:0.5, onComplete:()=>item.remove()});
            item.onclick = () => this.hit(item);
        };
        spawn(); this.loop = setInterval(spawn, 1500);
    },

    // 4. بطاقات الذاكرة (أين الإجابة؟)
    game_memory(data) {
        const grid = document.createElement('div');
        grid.className = "absolute inset-0 grid grid-cols-2 gap-10 p-20";
        for(let i=0; i<4; i++) {
            const card = document.createElement('div');
            const isT = i === 1;
            card.className = "bg-blue-600 rounded-[40px] border-8 border-white flex items-center justify-center text-8xl shadow-2xl cursor-pointer text-white";
            card.innerText = "?";
            card.onclick = () => {
                card.innerText = isT ? this.target : '❌';
                if(isT) this.hit(card); else this.fail();
            };
            grid.appendChild(card);
        }
        document.getElementById('g-arena').appendChild(grid);
    },

    // 5. القفز العالي (تتحرك أفقياً بسرعة)
    game_jump(data) {
        const jumper = document.createElement('div');
        jumper.className = "target-box p-10 bg-emerald-500 text-white rounded-[40px] text-6xl font-black border-8 border-white shadow-2xl";
        jumper.innerText = this.target;
        jumper.style.left = "-200px"; jumper.style.top = "50%";
        document.getElementById('g-arena').appendChild(jumper);
        gsap.to(jumper, { x: window.innerWidth + 400, duration: 2.5, repeat: -1, ease: "none" });
        jumper.onclick = () => this.hit(jumper);
    },

    hit(el) {
        this.score++; this.updateUI();
        if(el) gsap.to(el, {scale:2, opacity:0, duration:0.2});
        confetti({particleCount:40, origin:{y:0.8}});
        if(this.score >= 5) this.win(); else this.nextLevel();
    },

    fail() {
        this.lives--; this.updateUI();
        document.body.style.background = "#fee2e2";
        setTimeout(() => document.body.style.background = "#fdfcf0", 200);
        if(this.lives <= 0) this.gameOver();
    },

    win() {
        this.active = false; clearInterval(this.loop);
        confetti({particleCount:300, spread:100});
        App.user.stars += 100; App.user.coins += 500;
        if(!App.user.done[this.world].includes(this.lvl)) App.user.done[this.world].push(this.lvl);
        App.sync();
        setTimeout(() => { document.getElementById('game-view').style.display='none'; App.openMap(this.world); }, 2000);
    },

    gameOver() {
        this.active = false; clearInterval(this.loop);
        alert("انتهت المحاولات! حاول مرة أخرى بتركيز يا بطل.");
        document.getElementById('game-view').style.display='none';
    },

    quit() { this.active = false; clearInterval(this.loop); document.getElementById('game-view').style.display='none'; }
};
</script>
</body>
</html>
