<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أساطير 1-ب | عالم المرح</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Fredoka:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { --p-blue: #4cc9f0; --p-pink: #f72585; --p-yellow: #fee440; --p-purple: #7209b7; }
        * { font-family: 'Fredoka', 'Cairo', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #0f172a; 
            background-image: radial-gradient(circle at 20% 30%, #1e293b 0%, #0f172a 100%);
            color: white; height: 100vh; overflow: hidden; margin: 0;
        }

        /* فرفشة الخلفية */
        .joy-blob { position: absolute; border-radius: 50%; filter: blur(60px); z-index: -1; opacity: 0.4; animation: float 15s infinite alternate; }
        @keyframes float { from { transform: translate(0,0) rotate(0deg); } to { transform: translate(100px, 100px) rotate(360deg); } }

        .page { position: absolute; inset: 0; display: none; flex-direction: column; padding: clamp(10px, 5vw, 40px); overflow-y: auto; padding-bottom: 120px; }
        .page-active { display: flex; animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* أزرار تفتح النفس */
        .card-joy {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border: 3px solid rgba(255, 255, 255, 0.1); border-bottom: 10px solid rgba(0,0,0,0.3);
            border-radius: 40px; transition: 0.2s; cursor: pointer;
        }
        .card-joy:active { transform: translateY(6px); border-bottom-width: 4px; }
        .card-math { border-color: var(--p-blue); box-shadow: 0 0 20px rgba(76, 201, 240, 0.2); }
        .card-arabic { border-color: var(--p-pink); box-shadow: 0 0 20px rgba(247, 37, 133, 0.2); }

        /* الخريطة */
        .map-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 15px; width: 100%; max-width: 800px; margin: 0 auto; }
        .lvl-node {
            aspect-ratio: 1; border-radius: 25px; display: flex; align-items: center; justify-content: center;
            font-size: clamp(1.5rem, 4vw, 2.5rem); font-weight: 900; background: #1e293b; border: 4px solid #334155; transition: 0.3s;
        }
        .lvl-node.open { background: var(--p-blue); border-color: white; box-shadow: 0 0 15px var(--p-blue); }
        .lvl-node.done { background: #06d6a0; border-color: white; }

        /* شاشة اللعب */
        #game-view { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; }
        .game-canvas { position: absolute; inset: 0; background: radial-gradient(circle, #1e1b4b 0%, #020617 100%); overflow: hidden; }
        .target-item { position: absolute; cursor: pointer; z-index: 10; filter: drop-shadow(0 0 15px rgba(255,255,255,0.5)); }

        @media (max-width: 640px) {
            .map-grid { grid-template-columns: repeat(3, 1fr); }
            #g-task { font-size: 3rem !important; padding: 15px !important; }
        }
    </style>
</head>
<body>

    <div class="joy-blob w-80 h-80 bg-blue-500 top-[10%] left-[5%]"></div>
    <div class="joy-blob w-96 h-96 bg-pink-500 bottom-[10%] right-[5%]"></div>

    <div id="p-login" class="page page-active justify-center items-center">
        <div class="bg-white/10 backdrop-blur-2xl p-10 rounded-[60px] border-4 border-white/20 text-center w-full max-w-md shadow-2xl">
            <div class="text-8xl mb-6 animate-bounce">🚀</div>
            <h1 class="text-5xl font-black mb-10 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-pink-500">أساطير 1-ب</h1>
            <input type="text" id="u-code" placeholder="أدخل كود البطل" class="w-full text-center text-3xl p-5 rounded-3xl bg-black/50 border-2 border-white/20 text-white outline-none focus:border-cyan-400 mb-8 font-black">
            <button onclick="App.login()" class="w-full py-5 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-3xl text-3xl font-black shadow-lg active:scale-95 transition">انطلق! ✨</button>
        </div>
    </div>

    <div id="p-home" class="page items-center">
        <div class="w-full max-w-4xl flex justify-between items-center mb-10">
            <div class="bg-black/30 p-4 rounded-3xl border-2 border-yellow-400 text-2xl font-black">💰 <span id="u-coins">0</span></div>
            <div class="bg-black/30 p-4 rounded-3xl border-2 border-cyan-400 text-2xl font-black">⭐ <span id="u-stars">0</span></div>
        </div>
        
        <div class="text-center mb-12">
            <div id="u-avatar" class="w-48 h-48 sm:w-64 sm:h-64 bg-white/10 rounded-full inline-flex items-center justify-center text-[100px] sm:text-[150px] border-8 border-white/20 shadow-2xl">👤</div>
            <h2 id="u-name" class="text-5xl sm:text-7xl font-black mt-6">مبدع 1-ب</h2>
        </div>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 w-full max-w-2xl">
            <div onclick="App.nav('p-worlds')" class="card-joy p-10 text-4xl font-black flex flex-col items-center gap-4 bg-blue-500/20"><span>🌍</span> الخريطة</div>
            <div onclick="App.nav('p-shop')" class="card-joy p-10 text-4xl font-black flex flex-col items-center gap-4 bg-pink-500/20"><span>🛍️</span> المتجر</div>
        </div>
    </div>

    <div id="p-shop" class="page">
        <h2 class="text-5xl font-black text-center mb-12 text-pink-400">سوق الأبطال 💎</h2>
        <div id="shop-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </div>

    <div id="p-worlds" class="page items-center justify-center">
        <h2 class="text-6xl font-black mb-16">اختر العالم</h2>
        <div class="flex flex-wrap justify-center gap-8">
            <div onclick="App.openMap('math')" class="card-joy card-math w-full sm:w-80 p-12 text-center">
                <div class="text-9xl mb-4">🧮</div>
                <div class="text-4xl font-black">الحساب</div>
            </div>
            <div onclick="App.openMap('arabic')" class="card-joy card-arabic w-full sm:w-80 p-12 text-center">
                <div class="text-9xl mb-4">📖</div>
                <div class="text-4xl font-black">لغتي</div>
            </div>
        </div>
    </div>

    <div id="p-map" class="page">
        <div class="flex justify-between items-center mb-10">
            <h2 id="map-title" class="text-4xl font-black">المراحل</h2>
            <button onclick="App.nav('p-worlds')" class="bg-red-500 px-6 py-2 rounded-2xl font-black">رجوع</button>
        </div>
        <div id="map-grid" class="map-grid"></div>
        <div class="text-center mt-10 text-slate-400 font-bold">🔒 سيتم فتح باقي المراحل قريباً!</div>
    </div>

    <div id="game-view">
        <div class="game-canvas">
            <div class="absolute top-6 inset-x-6 flex justify-between items-center z-[6000]">
                <div id="g-lives" class="text-3xl">❤️❤️❤️</div>
                <div id="g-task" class="bg-white/10 backdrop-blur-xl border-2 border-white/20 px-8 py-4 rounded-3xl text-5xl font-black text-white">...</div>
                <div id="g-score" class="bg-blue-600 px-6 py-2 rounded-full text-xl font-black">⭐ 0/5</div>
            </div>
            <div id="g-arena" class="w-full h-full relative"></div>
            <button onclick="Game.quit()" class="absolute bottom-6 right-6 bg-red-500/50 w-16 h-16 rounded-full text-3xl z-[7000]">❌</button>
        </div>
    </div>

    <nav id="navbar" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/10 backdrop-blur-xl border-2 border-white/10 px-10 py-4 rounded-full flex gap-10 z-[1000] hidden shadow-2xl">
        <div class="text-5xl cursor-pointer hover:scale-125 transition" onclick="App.nav('p-home')">🏠</div>
        <div class="text-5xl cursor-pointer hover:scale-125 transition" onclick="App.nav('p-worlds')">🎮</div>
        <div class="text-5xl cursor-pointer hover:scale-125 transition" onclick="App.nav('p-shop')">🛍️</div>
    </nav>

<script>
const App = {
    dbKey: 'LEGENDS_1B_V3',
    user: null, currentWorld: 'math',
    items: Array.from({length: 20}, (_, i) => ({ id: i+1, e: ['🦁','🐼','🏎️','🚀','🛸','🐲','💎','⚡','🦾','🎩'][i%10], p: (i+1)*200 })),

    login() {
        const code = document.getElementById('u-code').value.trim().toUpperCase();
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const found = db.find(s => s.code === code);
        if(found) {
            this.user = found; this.nav('p-home');
            document.getElementById('navbar').classList.remove('hidden');
            this.sync();
        } else alert("الكود خطأ!");
    },

    nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
        document.getElementById(id).classList.add('page-active');
        if(id === 'p-shop') this.renderShop();
    },

    sync() {
        document.getElementById('u-name').innerText = this.user.name;
        document.getElementById('u-stars').innerText = this.user.stars;
        document.getElementById('u-coins').innerText = this.user.coins;
        document.getElementById('u-avatar').innerText = this.user.equipped || '👤';
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const idx = db.findIndex(s => s.code === this.user.code);
        db[idx] = this.user; localStorage.setItem(this.dbKey, JSON.stringify(db));
    },

    renderShop() {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = this.items.map(item => {
            const owned = this.user.inventory.includes(item.id);
            return `<div class="card-joy p-6 text-center ${owned?'border-blue-400 bg-blue-900/20':''}" onclick="App.buy(${item.id})">
                <div class="text-7xl mb-4">${item.e}</div>
                <div class="bg-yellow-500 text-black px-4 py-1 rounded-full font-black">${item.p} 💰</div>
            </div>`;
        }).join('');
    },

    buy(id) {
        const item = this.items.find(i => i.id === id);
        if(this.user.inventory.includes(id)) { this.user.equipped = item.e; this.sync(); return; }
        if(this.user.coins >= item.p) {
            this.user.coins -= item.p; this.user.inventory.push(id); this.user.equipped = item.e;
            this.sync(); this.renderShop(); confetti({particleCount:100});
        }
    },

    openMap(world) {
        this.currentWorld = world;
        const grid = document.getElementById('map-grid'); grid.innerHTML = '';
        for(let i=1; i<=20; i++) {
            const isDone = this.user.done[world].includes(i);
            const isLocked = i > 10;
            const node = document.createElement('div');
            node.className = `lvl-node ${isLocked?'opacity-30':(isDone?'done':'open cursor-pointer')}`;
            node.innerHTML = isLocked ? '🔒' : (isDone ? '✅' : i);
            if(!isLocked) node.onclick = () => Game.start(i, world);
            grid.appendChild(node);
        }
        this.nav('p-map');
    }
};

/**
 * 🎮 محرك الألعاب المتطور
 */
const Game = {
    active: false, score: 0, lives: 3, target: null, loop: null,
    mathPool: [{q:'5 + 5', a:10}, {q:'10 - 2', a:8}, {q:'3 + 4', a:7}, {q:'9 - 3', a:6}],
    arabicPool: [{q:'أسـ + ـد', a:'أسد'}, {q:'قـ + ـمـ + ـر', a:'قمر'}, {q:'كـ + ـتـ + اب', a:'كتاب'}],

    start(lvl, world) {
        this.score = 0; this.lives = 3; this.active = true;
        document.getElementById('game-view').style.display = 'block';
        this.updateUI(); this.next();
    },

    updateUI() {
        document.getElementById('g-score').innerText = `⭐ ${this.score}/5`;
        document.getElementById('g-lives').innerText = "❤️".repeat(this.lives);
    },

    next() {
        const arena = document.getElementById('g-arena'); arena.innerHTML = '';
        const data = App.currentWorld === 'math' ? this.mathPool : this.arabicPool;
        const q = data[Math.floor(Math.random()*data.length)];
        this.target = q.a;
        document.getElementById('g-task').innerText = q.q;
        
        clearInterval(this.loop);
        const mode = Math.floor(Math.random() * 4);
        
        if(mode === 0) this.mode_float(); // طفو
        else if(mode === 1) this.mode_speed(); // سرعة
        else if(mode === 2) this.mode_grid(); // اختيار
        else this.mode_ufo(); // فضائيين
    },

    mode_float() {
        this.loop = setInterval(() => {
            const el = document.createElement('div');
            const isT = Math.random() > 0.6;
            el.className = "target-item p-6 bg-white/20 rounded-full text-4xl font-black border-2 border-white/50";
            el.innerText = isT ? this.target : '❄️';
            el.style.left = Math.random()*80 + "%"; el.style.bottom = "-100px";
            document.getElementById('g-arena').appendChild(el);
            gsap.to(el, { y: -window.innerHeight-200, duration: 4, onComplete:()=>el.remove() });
            el.onclick = () => isT ? this.hit(el) : this.fail();
        }, 1200);
    },

    mode_speed() {
        const el = document.createElement('div');
        el.className = "target-item p-10 bg-blue-500 rounded-3xl text-6xl font-black shadow-2xl";
        el.innerText = this.target; el.style.left = "-200px"; el.style.top = "40%";
        document.getElementById('g-arena').appendChild(el);
        gsap.to(el, { x: window.innerWidth+300, duration: 2.5, repeat: -1, ease: "none" });
        el.onclick = () => this.hit(el);
    },

    mode_grid() {
        const container = document.createElement('div');
        container.className = "absolute inset-0 flex flex-wrap items-center justify-center gap-6 p-10";
        for(let i=0; i<4; i++) {
            const isT = i === 1;
            const b = document.createElement('div');
            b.className = "p-10 bg-white/10 border-4 border-white/20 rounded-[40px] text-6xl font-black";
            b.innerText = isT ? this.target : '!!';
            b.onclick = () => isT ? this.hit(b) : this.fail();
            container.appendChild(b);
        }
        document.getElementById('g-arena').appendChild(container);
    },

    mode_ufo() {
        this.loop = setInterval(() => {
            const u = document.createElement('div');
            u.className = "target-item text-8xl"; u.innerText = '🛸';
            u.style.left = Math.random()*80+"%"; u.style.top = Math.random()*70+"%";
            document.getElementById('g-arena').appendChild(u);
            gsap.from(u, { scale: 0, duration: 0.5 });
            u.onclick = () => { u.innerText = '💥'; this.hit(u); };
            setTimeout(() => u.remove(), 1000);
        }, 1000);
    },

    hit(el) {
        this.score++; this.updateUI();
        if(el) gsap.to(el, {scale:2, opacity:0});
        confetti({particleCount:40, origin:{y:0.8}});
        if(this.score >= 5) this.win(); else this.next();
    },

    fail() {
        this.lives--; this.updateUI();
        if(this.lives <= 0) { alert("انتهت القلوب!"); this.quit(); }
    },

    win() {
        this.active = false; clearInterval(this.loop);
        confetti({particleCount:300, spread:100});
        App.user.stars += 100; App.user.coins += 500;
        if(!App.user.done[App.currentWorld].includes(1)) App.user.done[App.currentWorld].push(1);
        App.sync();
        setTimeout(() => this.quit(), 2000);
    },

    quit() { this.active = false; clearInterval(this.loop); document.getElementById('game-view').style.display='none'; }
};
</script>
</body>
</html>
