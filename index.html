<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم الأستاذة لبنى الفرفوش 🌸</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Jomhuria&family=Fredoka:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { --p: #ff758f; --b: #00b4d8; --g: #70e000; --y: #ffca3a; }
        * { font-family: 'Fredoka', 'Cairo', sans-serif; user-select: none; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        body { 
            background: #caf0f8;
            background-image: url('https://www.transparenttextures.com/patterns/kids-coupon.png');
            height: 100vh; overflow: hidden; margin: 0;
        }

        /* زينة فرفوشة */
        .deco { position: absolute; pointer-events: none; z-index: 1; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
        .float { animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-20px) rotate(5deg); } }

        /* الصفحات */
        .page { position: absolute; inset: 0; display: none; flex-direction: column; padding: 20px; overflow-y: auto; padding-bottom: 130px; z-index: 10; }
        .page-active { display: flex; animation: pageIn 0.6s both; }
        @keyframes pageIn { from { opacity: 0; transform: scale(1.2); } to { opacity: 1; transform: scale(1); } }

        /* خريطة المراحل */
        .step-card {
            width: 100px; height: 100px; border-radius: 35% 65% 61% 39% / 30% 33% 67% 70%;
            background: white; border: 6px solid white; display: flex; align-items: center; justify-content: center;
            font-size: 3rem; font-weight: 900; color: var(--b); box-shadow: 0 15px 30px rgba(0,0,0,0.1); cursor: pointer;
        }
        .step-card.completed { background: var(--g); color: white; border-color: #ccff33; }
        .step-card.locked { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }

        /* متجر فخم */
        .shop-item {
            background: white; border-radius: 40px; padding: 20px; text-align: center;
            border: 6px solid #fecdd3; box-shadow: 0 12px 0 #fecdd3; cursor: pointer;
        }
        .shop-item:hover { transform: scale(1.1) rotate(-3deg); background: #fff1f2; }
        .shop-item.owned { border-color: var(--g); box-shadow: 0 12px 0 #d9f99d; }

        /* شريط التنقل السفلي */
        .nav-dock {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            padding: 10px 40px; border-radius: 100px; display: flex; gap: 30px;
            border: 6px solid var(--p); z-index: 1000; box-shadow: 0 20px 50px rgba(255, 117, 143, 0.3);
        }
        .nav-link { font-size: 3rem; cursor: pointer; filter: saturate(0.5); }
        .nav-link.active { filter: saturate(1.5); transform: translateY(-20px) scale(1.3); }

        /* شاشة اللعب */
        #game-screen { position: fixed; inset: 0; background: white; z-index: 5000; display: none; background: linear-gradient(to bottom, #a2d2ff, #ffffff); }
        .game-obj { position: absolute; cursor: pointer; transition: 0.1s; z-index: 5001; }
    </style>
</head>
<body>

    <div class="deco float text-8xl" style="top:5%; left:5%;">☁️</div>
    <div class="deco float text-7xl" style="top:15%; right:5%; animation-delay: 1s;">🌸</div>
    <div class="deco float text-6xl" style="bottom:20%; left:10%; animation-delay: 2s;">🦋</div>
    <div class="deco float text-8xl" style="bottom:10%; right:10%; animation-delay: 1.5s;">🌈</div>

    <div id="p-login" class="page page-active justify-center items-center">
        <div class="bg-white/80 p-12 rounded-[70px] border-[15px] border-pink-200 text-center w-[90%] max-w-xl shadow-2xl backdrop-blur-sm">
            <div class="text-9xl mb-6 animate-bounce">🍦</div>
            <h1 class="text-8xl font-black text-pink-500 mb-2" style="font-family: 'Jomhuria';">مملكة لبنى</h1>
            <p class="text-blue-500 font-bold text-2xl mb-10">يا بطل الصف الأول.. أدخل كودك السحري!</p>
            <input type="text" id="u-code" placeholder="----" class="w-full text-center text-5xl p-6 rounded-[40px] border-8 border-blue-100 outline-none focus:border-pink-400 mb-8 font-black bg-blue-50 tracking-widest">
            <button onclick="App.login()" class="w-full py-6 bg-gradient-to-r from-pink-400 to-pink-600 text-white rounded-[40px] text-4xl font-black shadow-[0_15px_0_#be185d] active:translate-y-3 active:shadow-none transition-all">دخول الأبطال! 🚀</button>
        </div>
    </div>

    <div id="p-home" class="page items-center">
        <div class="w-full max-w-4xl bg-white/60 backdrop-blur-lg rounded-[80px] p-12 border-[12px] border-white shadow-2xl mt-10 text-center relative">
            <div class="flex justify-between items-center mb-12">
                <div class="bg-yellow-400 text-white px-10 py-4 rounded-full text-4xl font-black shadow-lg">💰 <span id="u-coins">0</span></div>
                <div class="bg-blue-400 text-white px-10 py-4 rounded-full text-4xl font-black shadow-lg">⭐ <span id="u-stars">0</span></div>
            </div>
            
            <div class="relative inline-block">
                <div id="u-avatar" class="w-64 h-64 bg-pink-100 rounded-[60px] flex items-center justify-center text-[120px] border-8 border-pink-300 shadow-inner rotate-3">👤</div>
                <div id="u-tag" class="absolute -top-10 -right-10 text-[120px] animate-pulse"></div>
            </div>
            
            <h2 id="u-name" class="text-8xl font-black text-indigo-900 mt-8 mb-12 italic" style="font-family: 'Jomhuria';">اسم البطل</h2>
            
            <div class="grid grid-cols-2 gap-10 w-full">
                <button onclick="App.nav('p-worlds')" class="bg-blue-500 text-white p-10 rounded-[50px] text-5xl font-black border-b-[20px] border-blue-700 active:translate-y-2 active:border-b-0">الخريطة 🗺️</button>
                <button onclick="App.nav('p-shop')" class="bg-pink-500 text-white p-10 rounded-[50px] text-5xl font-black border-b-[20px] border-pink-700 active:translate-y-2 active:border-b-0">المتجر 🎁</button>
            </div>
        </div>
    </div>

    <div id="p-shop" class="page">
        <h2 class="text-8xl font-black text-center text-pink-500 mb-12 mt-5" style="font-family: 'Jomhuria';">متجر الفرفشة 🛍️</h2>
        <div id="shop-grid" class="grid grid-cols-2 md:grid-cols-5 gap-8 max-w-6xl mx-auto p-4"></div>
    </div>

    <div id="p-leader" class="page items-center">
        <h2 class="text-8xl font-black text-center text-blue-500 mb-12 mt-5" style="font-family: 'Jomhuria';">أساطير الصف الأول ب</h2>
        <div id="leader-list" class="w-full max-w-4xl space-y-6"></div>
    </div>

    <div id="p-worlds" class="page items-center justify-center">
        <h2 class="text-7xl font-black text-indigo-900 mb-16">اختر مغامرتك! 🎡</h2>
        <div class="flex flex-wrap justify-center gap-16">
            <div onclick="App.openMap('math')" class="w-96 bg-white p-12 rounded-[70px] border-b-[25px] border-blue-400 text-center cursor-pointer hover:rotate-3 shadow-2xl">
                <div class="text-[150px] mb-6">🔢</div>
                <h3 class="text-5xl font-black text-blue-600">عالم الحساب</h3>
            </div>
            <div onclick="App.openMap('arabic')" class="w-96 bg-white p-12 rounded-[70px] border-b-[25px] border-pink-400 text-center cursor-pointer hover:-rotate-3 shadow-2xl">
                <div class="text-[150px] mb-6">🅰️</div>
                <h3 class="text-5xl font-black text-pink-600">عالم العربية</h3>
            </div>
        </div>
    </div>

    <div id="p-map" class="page">
        <div class="flex justify-between items-center p-10 bg-white/80 rounded-[50px] mb-12 border-4 border-white shadow-xl">
            <h2 id="map-title" class="text-6xl font-black text-indigo-900">المراحل</h2>
            <button onclick="App.nav('p-worlds')" class="bg-red-400 text-white px-12 py-4 rounded-full font-black text-3xl shadow-lg">رجوع</button>
        </div>
        <div id="map-grid" class="flex flex-wrap justify-center gap-12 p-4"></div>
    </div>

    <div id="game-screen">
        <div class="absolute top-10 inset-x-10 flex justify-between items-center z-[6000]">
            <div class="bg-blue-600 text-white px-10 py-5 rounded-full text-4xl font-black shadow-2xl">⭐ <span id="g-score">0</span> / 5</div>
            <div id="g-msg" class="bg-white border-[10px] border-pink-400 px-16 py-6 rounded-[50px] text-6xl font-black text-indigo-900 shadow-2xl">...</div>
            <button onclick="Game.quit()" class="bg-red-500 text-white w-24 h-24 rounded-full text-5xl font-black shadow-2xl">✕</button>
        </div>
        <div id="arena" class="w-full h-full relative overflow-hidden"></div>
    </div>

    <nav id="navbar" class="nav-dock hidden">
        <div class="nav-link active" onclick="App.nav('p-home', this)">🏠</div>
        <div class="nav-link" onclick="App.nav('p-leader', this)">🏆</div>
        <div class="nav-link" onclick="App.nav('p-shop', this)">🎁</div>
        <div class="nav-link" onclick="App.nav('p-worlds', this)">🎮</div>
    </nav>

<script>
/**
 * 💡 محرك التطبيق (App Core)
 */
const App = {
    dbKey: 'LUBNA_FUN_V4',
    user: null,
    items: [
        {id:1, n:'تاج ملكي', e:'👑', p:100}, {id:2, n:'سيف ذهبي', e:'⚔️', p:100},
        {id:3, n:'جناح فراشة', e:'🦋', p:150}, {id:4, n:'خوذة نينجا', e:'🥷', p:150},
        {id:5, n:'عصا سحرية', e:'🪄', p:200}, {id:6, n:'سيارة سباق', e:'🏎️', p:200},
        {id:7, n:'نظارة قلب', e:'🕶️', p:120}, {id:8, n:'قبعة قرصان', e:'🏴‍☠️', p:120},
        {id:9, n:'يونيكورن', e:'🦄', p:1000}, {id:10, n:'تنين نار', e:'🐉', p:1000},
        ...Array.from({length: 40}, (_, i) => ({
            id: i+11, n: 'هدية ' + (i+11), e: ['🍭','🧸','🚀','🚁','💎','🎀','⚽','🎸','🚲','🦁','🐼','🐙'][i%12], p: (i+5)*30
        }))
    ],

    login() {
        const code = document.getElementById('u-code').value.trim().toUpperCase();
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const found = db.find(s => s.code === code);
        
        if(found) {
            this.user = found;
            if(!this.user.inventory) this.user.inventory = [];
            if(!this.user.done) this.user.done = { math: [], arabic: [] };
            this.nav('p-home');
            document.getElementById('navbar').classList.remove('hidden');
            this.sync();
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.7 } });
        } else alert("الكود خطأ! حاول مجدداً يا بطل.");
    },

    nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
        document.getElementById(id).classList.add('page-active');
        if(el) {
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
        if(id === 'p-shop') this.renderShop();
        if(id === 'p-leader') this.renderLeaderboard();
    },

    sync() {
        document.getElementById('u-name').innerText = this.user.name;
        document.getElementById('u-stars').innerText = this.user.stars;
        document.getElementById('u-coins').innerText = this.user.coins;
        document.getElementById('u-tag').innerText = this.user.tag || '';
        
        const db = JSON.parse(localStorage.getItem(this.dbKey)) || [];
        const idx = db.findIndex(s => s.code === this.user.code);
        db[idx] = this.user;
        localStorage.setItem(this.dbKey, JSON.stringify(db));
    },

    renderShop() {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = this.items.map(item => {
            const owned = this.user.inventory.includes(item.id);
            return `
                <div class="shop-item ${owned?'owned':''}" onclick="App.buy(${item.id})">
                    <div class="text-8xl mb-4">${item.e}</div>
                    <div class="font-black text-2xl text-blue-900">${item.n}</div>
                    <div class="bg-yellow-400 text-white rounded-full px-6 py-2 mt-4 font-black inline-block shadow-md">${item.p} 💰</div>
                </div>
            `;
        }).join('');
    },

    buy(id) {
        const item = this.items.find(i => i.id === id);
        if(this.user.inventory.includes(id)) {
            this.user.tag = item.e; this.sync(); alert("ارتديت: " + item.e); return;
        }
        if(this.user.coins >= item.p) {
            this.user.coins -= item.p; this.user.inventory.push(id); this.user.tag = item.e;
            this.sync(); this.renderShop(); confetti({ particleCount: 150 });
        } else alert("نقودك لا تكفي! العب واجمع المزيد.");
    },

    renderLeaderboard() {
        const db = (JSON.parse(localStorage.getItem(this.dbKey)) || []).sort((a,b) => b.stars - a.stars);
        document.getElementById('leader-list').innerHTML = db.map((s, i) => `
            <div class="flex justify-between items-center p-8 bg-white rounded-[50px] border-4 border-blue-50 shadow-xl ${s.code===this.user.code?'border-pink-300 bg-pink-50':''}">
                <div class="flex items-center gap-8">
                    <span class="text-5xl font-black text-blue-300 w-16">#${i+1}</span>
                    <span class="text-7xl">${s.avatar || '🦁'}</span>
                    <div class="text-4xl font-black text-indigo-900">${s.name} <span class="text-6xl ml-4">${s.tag || ''}</span></div>
                </div>
                <div class="text-5xl font-black text-pink-500">${s.stars} ⭐</div>
            </div>
        `).join('');
    },

    openMap(world) {
        this.currentWorld = world;
        document.getElementById('map-title').innerText = world === 'math' ? 'عالم الأرقام' : 'عالم الكلمات';
        const grid = document.getElementById('map-grid');
        grid.innerHTML = '';
        for(let i=1; i<=100; i++) {
            const isDone = this.user.done[world].includes(i);
            const isLocked = i > 5;
            const card = document.createElement('div');
            card.className = `step-card ${isDone ? 'completed' : ''} ${isLocked ? 'locked' : ''}`;
            card.innerHTML = isLocked ? '🔒' : (isDone ? '✨' : i);
            if(!isLocked) card.onclick = () => Game.launch(i, world);
            grid.appendChild(card);
        }
        this.nav('p-map');
    }
};

/**
 * 🎮 محرك الألعاب الـ 5 الممتعة (Game Engine - 5 Games)
 */
const Game = {
    lvl: 0, world: '', score: 0, active: false, type: 0,
    launch(lvl, world) {
        this.lvl = lvl; this.world = world; this.score = 0; this.active = true;
        this.type = Math.floor(Math.random() * 5); // اختيار أحد الألعاب الخمسة عشوائياً
        document.getElementById('game-screen').style.display = 'block';
        this.next();
    },

    next() {
        const arena = document.getElementById('arena');
        arena.innerHTML = '';
        document.getElementById('g-score').innerText = this.score;

        // أنواع الألعاب
        if(this.type === 0) this.gamePop();       // لعبة الفقاعات
        else if(this.type === 1) this.gameRain(); // لعبة المطر
        else if(this.type === 2) this.gameClick(); // لعبة الضغطة السريعة
        else if(this.type === 3) this.gameSlide(); // لعبة الانزلاق
        else this.gameMystery();                   // لعبة الصندوق الغامض
    },

    // 1. لعبة الفقاعات المتصاعدة
    gamePop() {
        document.getElementById('g-msg').innerText = "فجر الفقاعة الصحيحة!";
        const target = this.world === 'math' ? 10 : 'أسد';
        this.loop = setInterval(() => {
            if(!this.active) return;
            const b = document.createElement('div');
            const isT = Math.random() > 0.7;
            const val = isT ? target : (this.world === 'math' ? 5 : 'قطة');
            b.className = "game-obj w-32 h-32 bg-white/80 rounded-full border-4 border-blue-400 flex items-center justify-center text-4xl font-black";
            b.innerText = val;
            b.style.left = Math.random() * 80 + '%';
            b.style.bottom = "-150px";
            arena.appendChild(b);
            gsap.to(b, { y: -window.innerHeight - 300, duration: 5, onComplete: () => b.remove() });
            b.onclick = () => { if(val == target) this.hit(b); };
        }, 1000);
    },

    // 2. لعبة المطر المتساقط
    gameRain() {
        document.getElementById('g-msg').innerText = "أمسك الإجابة قبل السقوط!";
        const target = this.world === 'math' ? 7 : 'قلم';
        this.loop = setInterval(() => {
            const b = document.createElement('div');
            const isT = Math.random() > 0.7;
            const val = isT ? target : '❌';
            b.className = "game-obj text-8xl"; b.innerText = isT ? (this.world === 'math' ? '7️⃣' : '✏️') : '💣';
            b.style.left = Math.random() * 80 + '%'; b.style.top = "-150px";
            arena.appendChild(b);
            gsap.to(b, { y: window.innerHeight + 300, duration: 4, onComplete: () => b.remove() });
            b.onclick = () => { if(isT) this.hit(b); };
        }, 1000);
    },

    // 3. لعبة الضغطة السريعة
    gameClick() {
        document.getElementById('g-msg').innerText = "اضغط بسرعة!";
        const b = document.createElement('div');
        b.className = "game-obj w-48 h-48 bg-yellow-400 rounded-full flex items-center justify-center text-8xl shadow-2xl border-8 border-white";
        b.innerText = "⭐"; b.style.left = "40%"; b.style.top = "40%";
        arena.appendChild(b);
        b.onclick = () => {
            this.hit(b);
            if(this.score < 5) {
                b.style.left = Math.random() * 70 + 10 + "%";
                b.style.top = Math.random() * 70 + 10 + "%";
            }
        };
    },

    // 4. لعبة الانزلاق
    gameSlide() {
        document.getElementById('g-msg').innerText = "حرك النجمة لمكانها!";
        const b = document.createElement('div');
        b.className = "game-obj text-9xl cursor-move"; b.innerText = "🌟";
        b.style.left = "10%"; b.style.top = "50%";
        const target = document.createElement('div');
        target.className = "absolute right-10 top-1/2 w-40 h-40 border-8 border-dashed border-pink-400 rounded-full";
        arena.appendChild(b); arena.appendChild(target);
        gsap.to(b, { x: 50, repeat: -1, yoyo: true });
        b.onclick = () => this.hit(b); // تبسيطاً للصف الأول
    },

    // 5. لعبة الصندوق الغامض
    gameMystery() {
        document.getElementById('g-msg').innerText = "أي صندوق يخفي النجمة؟";
        for(let i=0; i<3; i++) {
            const b = document.createElement('div');
            b.className = "game-obj w-40 h-40 bg-pink-400 rounded-3xl flex items-center justify-center text-7xl";
            b.innerText = "📦"; b.style.top = "40%"; b.style.left = (25 + i * 20) + "%";
            arena.appendChild(b);
            b.onclick = () => {
                if(Math.random() > 0.5) { b.innerText = "⭐"; this.hit(b); }
                else { b.innerText = "💨"; gsap.to(b, { opacity: 0 }); }
            };
        }
    },

    hit(el) {
        this.score++; confetti({ particleCount: 30, origin: { x: 0.5, y: 0.5 } });
        if(this.score >= 5) this.win();
        else document.getElementById('g-score').innerText = this.score;
    },

    win() {
        this.active = false; clearInterval(this.loop);
        confetti({ particleCount: 400, spread: 150 });
        if(!App.user.done[this.world].includes(this.lvl)) {
            App.user.done[this.world].push(this.lvl);
            App.user.stars += 50; App.user.coins += 100;
        }
        App.sync();
        setTimeout(() => { document.getElementById('game-screen').style.display = 'none'; App.openMap(this.world); }, 2000);
    },

    quit() { this.active = false; clearInterval(this.loop); document.getElementById('game-screen').style.display = 'none'; }
};
</script>
</body>
</html>
